<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1920, height=1080" />
    <title>Scene 3 — Assembly Focus Reveal (hyperframes)</title>

    <!--
      HyperFrames composition.tsx.

      Choreography (5 phases, 5 seconds total):
        0.00 – 0.67s   "Just use" assembles in a discrete sequence (with hold)
        0.73 – 1.23s   Pink logo pops in with back.out elastic
        1.50 – 2.20s   "Just use" slides left + fades; container recenters around brand
        2.67 – 3.57s   Camera zooms 5.5× into the logo (scale + counter-translate)
        3.67 – 5.00s   Logo breathes (sine onUpdate, multiplicative on pop scale)

      Key differences :
        - Single paused anime.js timeline registered to hyperframesAnime.register("main")
        - brandTextWidth measured via getBoundingClientRect after document.fonts.ready
        - HERO_FINAL_OFFSET_X derived from real measurement, not estimate
        - Breathing uses the onUpdate (multiplicative) form so it multiplies
          onto the pop scale, not a fromTo + yoyo which would overwrite the pop value
        - Three nested transform layers: zoom-scale → zoom-translate → recenter-shift
        - Logo is loaded from a static PNG asset
    -->

    <script src="https://cdn.jsdelivr.net/npm/animejs@4.5.0/dist/bundles/anime.umd.min.js"></script>

    <style>
      :root {
        --bg: #000000;
        --text-white: #ffffff;
        --pink: #e91e63;
      }
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        width: 1920px;
        height: 1080px;
        overflow: hidden;
        background: var(--bg);
        font-family: "Google Sans", "Roboto", Inter, system-ui, sans-serif;
        color: var(--text-white);
      }

      .stage {
        position: absolute;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
      }

      /* Three nested transform layers (outer → inner) */
      .zoom-scale {
        transform-origin: center center;
        will-change: transform;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .zoom-translate {
        will-change: transform;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .recenter-shift {
        display: flex;
        align-items: center;
      }

      /* Companion text — fixed width to prevent assembly jitter */
      .companion {
        width: 600px;
        display: flex;
        justify-content: flex-end;
        margin-right: 30px;
        white-space: nowrap;
        color: var(--text-white);
        font-size: 140px;
        font-weight: 400;
        line-height: 1;
      }

      /* Brand group: text + hero icon */
      .brand-group {
        display: flex;
        align-items: center;
        gap: 20px;
      }
      .brand-text {
        color: var(--text-white);
        font-size: 140px;
        font-weight: 700;
        white-space: nowrap;
        line-height: 1;
      }
      .hero {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 140px;
        height: 140px;
        /* initial scale(0) set by anime.js fromTo */
      }
      .hero .logo-mark {
        width: 100%;
        height: 100%;
        display: block;
      }

      /* Hidden probe used for text measurement */
      .measure-probe {
        position: absolute;
        left: -99999px;
        top: -99999px;
        visibility: hidden;
        white-space: pre;
      }
    </style>
  </head>
  <body>
    <div
      id="root"
      data-composition-id="main"
      data-start="0"
      data-duration="5"
      data-width="1920"
      data-height="1080"
    >
      <div
        class="stage clip"
        data-start="0"
        data-duration="5"
        data-track-index="1"
        id="brand-stage"
      >
        <div class="zoom-scale" data-layout-allow-overflow>
          <div class="zoom-translate">
            <div class="recenter-shift">
              <div class="companion">
                <span class="companion-text">J</span>
              </div>

              <div class="brand-group" data-layout-allow-overflow>
                <span class="brand-text">Hyperframes</span>
                <div class="hero">
                  <!-- Inline-SVG placeholder mark — swap for your logo image -->
                  <svg
                    class="logo-mark"
                    viewBox="0 0 100 100"
                    role="img"
                    aria-label="hyperframes logo"
                  >
                    <defs>
                      <linearGradient id="hfMark" x1="0" y1="0" x2="1" y2="1">
                        <stop offset="0" stop-color="#8b7bff" />
                        <stop offset="1" stop-color="#3ddc97" />
                      </linearGradient>
                    </defs>
                    <rect x="4" y="4" width="92" height="92" rx="22" fill="url(#hfMark)" />
                    <text
                      x="50"
                      y="63"
                      text-anchor="middle"
                      font-family="Inter, system-ui, sans-serif"
                      font-size="40"
                      font-weight="800"
                      fill="#fff"
                    >
                      HF
                    </text>
                  </svg>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script>
      /* ================================================================
         CONSTANTS — composition dimensions baked in.
         ================================================================ */
      const W = 1920,
        H = 1080;
      const TOTAL_DURATION = 5.0;

      const COMPANION_WIDTH = 600;
      const COMPANION_GAP = 30; // margin-right on .companion
      const BRAND_FONT_SIZE = 140;
      const HERO_GAP = 20;
      const HERO_SIZE = 140;

      const TIMING = {
        // Phase 1: companion assembly
        textStart: 0.0,
        textEnd: 0.67,

        // Phase 2: hero pop
        popStart: 0.73,
        popDur: 0.5,

        // Phase 3: slide-out + recenter
        slideStart: 1.5,
        slideDur: 0.7,

        // Phase 4: zoom
        zoomStart: 2.67,
        zoomDur: 0.9,

        // Phase 5: breathing
        breathStart: 3.67,
      };

      const FINAL_RECENTER_OFFSET = -180; // pre-calculated, tuned for visual feel

      /* ================================================================
         DISCRETE TEXT SEQUENCE for the companion assembly.
         Converted from the source frame-based sequence to seconds at 30fps.
         ================================================================ */
      const SEQUENCE = [
        { t: 0.0, text: "J" },
        { t: 0.07, text: "Jus" },
        { t: 0.13, text: "Just" },
        { t: 0.27, text: "Just" }, // hold for pacing
        { t: 0.4, text: "Just u" },
        { t: 0.53, text: "Just us" },
        { t: 0.67, text: "Just use" },
      ];

      /* ================================================================
         TIMELINE — built synchronously so HyperFrames can seek it.
         ================================================================ */
      const transformState = new WeakMap();
      const transformKeys = new Set([
        "x",
        "y",
        "z",
        "translateX",
        "translateY",
        "translateZ",
        "xPercent",
        "yPercent",
        "scale",
        "scaleX",
        "scaleY",
        "rotation",
        "rotate",
        "rotationX",
        "rotateX",
        "rotationY",
        "rotateY",
      ]);
      const propMap = new Map([
        ["x", "translateX"],
        ["y", "translateY"],
        ["z", "translateZ"],
        ["rotation", "rotate"],
        ["rotationX", "rotateX"],
        ["rotationY", "rotateY"],
        ["rotationZ", "rotateZ"],
      ]);

      function ms(seconds) {
        return Math.round(Number(seconds || 0) * 1000);
      }

      function resolveTargets(target) {
        if (Array.isArray(target)) return target.flatMap(resolveTargets);
        if (typeof target === "string") return [...document.querySelectorAll(target)];
        return target ? [target] : [];
      }

      function cssLength(value) {
        return typeof value === "number" ? value + "px" : String(value);
      }

      function cssAngle(value) {
        return typeof value === "number" ? value + "deg" : String(value);
      }

      function renderTransform(state) {
        const parts = [];
        if (state.xPercent !== undefined) parts.push("translateX(" + state.xPercent + "%)");
        if (state.yPercent !== undefined) parts.push("translateY(" + state.yPercent + "%)");
        const tx = state.x ?? state.translateX;
        const ty = state.y ?? state.translateY;
        const tz = state.z ?? state.translateZ;
        if (tx !== undefined) parts.push("translateX(" + cssLength(tx) + ")");
        if (ty !== undefined) parts.push("translateY(" + cssLength(ty) + ")");
        if (tz !== undefined) parts.push("translateZ(" + cssLength(tz) + ")");
        const rotate = state.rotation ?? state.rotate;
        const rotateX = state.rotationX ?? state.rotateX;
        const rotateY = state.rotationY ?? state.rotateY;
        const rotateZ = state.rotationZ ?? state.rotateZ;
        if (rotate !== undefined) parts.push("rotate(" + cssAngle(rotate) + ")");
        if (rotateX !== undefined) parts.push("rotateX(" + cssAngle(rotateX) + ")");
        if (rotateY !== undefined) parts.push("rotateY(" + cssAngle(rotateY) + ")");
        if (rotateZ !== undefined) parts.push("rotateZ(" + cssAngle(rotateZ) + ")");
        if (state.scale !== undefined) parts.push("scale(" + state.scale + ")");
        if (state.scaleX !== undefined) parts.push("scaleX(" + state.scaleX + ")");
        if (state.scaleY !== undefined) parts.push("scaleY(" + state.scaleY + ")");
        return parts.join(" ");
      }

      function setTweenState(target, vars) {
        for (const item of resolveTargets(target)) {
          if (!(item instanceof Element)) {
            Object.assign(item, vars);
            continue;
          }
          const state = transformState.get(item) ?? {};
          let changedTransform = false;
          for (const [key, value] of Object.entries(vars)) {
            if (key === "attr") {
              for (const [attrName, attrValue] of Object.entries(value))
                item.setAttribute(attrName, attrValue);
            } else if (key === "textContent") {
              item.textContent = value;
            } else if (key.startsWith("--")) {
              item.style.setProperty(key, value);
            } else if (transformKeys.has(key)) {
              state[key] = value;
              changedTransform = true;
            } else if (key === "opacity") {
              item.style.opacity = value;
            } else if (key === "backgroundColor") {
              item.style.backgroundColor = value;
            } else if (key === "boxShadow") {
              item.style.boxShadow = value;
            } else {
              item.style[key] = value;
            }
          }
          if (changedTransform) {
            transformState.set(item, state);
            item.style.transform = renderTransform(state);
          }
        }
      }

      function getTweenProperty(target, key) {
        const item = resolveTargets(target)[0];
        if (!item) return undefined;
        if (item instanceof Element && key.startsWith("--"))
          return getComputedStyle(item).getPropertyValue(key);
        if (item instanceof Element && transformKeys.has(key))
          return transformState.get(item)?.[key];
        return item[key];
      }

      function mapEase(ease) {
        if (typeof ease !== "string") return ease;
        const compact = ease.replace(/\s+/g, "");
        const table = {
          none: "linear",
          "power1.in": "inQuad",
          "power1.out": "outQuad",
          "power1.inOut": "inOutQuad",
          "power2.in": "inCubic",
          "power2.out": "outCubic",
          "power2.inOut": "inOutCubic",
          "power3.in": "inQuart",
          "power3.out": "outQuart",
          "power3.inOut": "inOutQuart",
          "power4.in": "inQuint",
          "power4.out": "outQuint",
          "power4.inOut": "inOutQuint",
          "sine.inOut": "inOutSine",
          "sine.out": "outSine",
          "expo.out": "outExpo",
          "expo.inOut": "inOutExpo",
        };
        if (table[compact]) return table[compact];
        const back = /^back\.(in|out|inOut)\(([^)]*)\)$/.exec(compact);
        if (back) return back[1] + "Back(" + back[2] + ")";
        return ease;
      }

      function normalizeStagger(stagger) {
        if (stagger === undefined) return undefined;
        if (typeof stagger === "number") return anime.stagger(ms(stagger));
        const span = stagger.each ?? stagger.amount;
        if (span === undefined) return undefined;
        const options = {};
        if (stagger.from !== undefined) options.from = stagger.from;
        if (stagger.grid !== undefined) options.grid = stagger.grid;
        if (stagger.axis !== undefined) options.axis = stagger.axis;
        if (stagger.start !== undefined) options.start = ms(stagger.start);
        if (stagger.ease !== undefined) options.ease = mapEase(stagger.ease);
        return anime.stagger(ms(span), options);
      }

      function normalizeTween(vars, fromVars, target, position) {
        const props = {};
        let driverKey = null;
        for (const [key, value] of Object.entries(vars)) {
          if (
            ["duration", "ease", "stagger", "repeat", "yoyo", "overwrite", "onUpdate"].includes(key)
          )
            continue;
          const animeKey = propMap.get(key) ?? key;
          const fromValue = fromVars?.[key];
          props[animeKey] = fromValue === undefined ? value : [fromValue, value];
          if (driverKey === null) driverKey = key;
        }
        props.duration = ms(vars.duration ?? 0.5);
        if (vars.ease !== undefined) props.ease = mapEase(vars.ease);
        const delay = normalizeStagger(vars.stagger);
        if (delay !== undefined) props.delay = delay;
        if (vars.repeat !== undefined)
          props.loop = vars.repeat === -1 ? true : Math.max(0, Math.floor(vars.repeat)) + 1;
        if (vars.yoyo === true) props.alternate = true;
        if (typeof vars.onUpdate === "function") {
          const userUpdate = vars.onUpdate;
          const durationSeconds = Number(vars.duration ?? 0.5);
          props.onUpdate = function (self) {
            const first = resolveTargets(target)[0];
            let progress = 0;
            if (driverKey !== null) {
              const raw = keyValue(first, driverKey);
              const start = Number(fromVars?.[driverKey] ?? 0);
              const end = Number(vars[driverKey]);
              const current = Number(raw);
              if (
                Number.isFinite(current) &&
                Number.isFinite(start) &&
                Number.isFinite(end) &&
                end !== start
              ) {
                progress = (current - start) / (end - start);
              }
            }
            adapterTime.current =
              Number(position || 0) + Math.max(0, Math.min(1, progress)) * durationSeconds;
            userUpdate.call(this, self);
          };
        }
        return props;
      }

      function keyValue(target, key) {
        if (!target) return undefined;
        if (target instanceof Element && key.startsWith("--"))
          return getComputedStyle(target).getPropertyValue(key);
        return target[key];
      }

      const adapterTime = { current: 0 };

      function createTimelineAdapter(timeline) {
        return {
          to(target, vars, position = 0) {
            timeline.add(target, normalizeTween(vars, undefined, target, position), ms(position));
            return this;
          },
          fromTo(target, fromVars, toVars, position = 0) {
            timeline.add(target, normalizeTween(toVars, fromVars, target, position), ms(position));
            return this;
          },
          set(target, vars, position = 0) {
            timeline.add(
              { tick: 0 },
              {
                tick: [0, 1],
                duration: 1,
                ease: "linear",
                onUpdate: () => setTweenState(target, vars),
              },
              ms(position),
            );
            return this;
          },
          time() {
            return adapterTime.current;
          },
        };
      }
      const tl = anime.createTimeline({ autoplay: false });
      const anim = createTimelineAdapter(tl);

      {
        /* Measure the brand text width with a hidden DOM probe. */
        const probe = document.createElement("span");
        probe.className = "measure-probe";
        probe.style.font = `700 ${BRAND_FONT_SIZE}px "Google Sans", "Roboto", Inter, system-ui, sans-serif`;
        probe.style.whiteSpace = "pre";
        probe.style.lineHeight = "1";
        probe.textContent = "Hyperframes"; // MUST match the rendered .brand-text casing
        document.body.appendChild(probe);
        const brandTextWidth = probe.getBoundingClientRect().width;
        probe.remove();

        /* Derive the hero's post-Phase-3 offset from viewport center.
           baseHeroOffset = (C + G + B + L) / 2     <- heroSize cancels out
           HERO_FINAL_OFFSET_X = baseHeroOffset + FINAL_RECENTER_OFFSET */
        const baseHeroOffset = (COMPANION_WIDTH + COMPANION_GAP + brandTextWidth + HERO_GAP) / 2;
        const HERO_FINAL_OFFSET_X = baseHeroOffset + FINAL_RECENTER_OFFSET;

        /* ============================================================
           PHASE 1: Discrete companion assembly
           ============================================================ */
        const textEl = document.querySelector(".companion-text");

        for (const entry of SEQUENCE) {
          anim.set(textEl, { textContent: entry.text }, entry.t);
        }

        /* ============================================================
           PHASE 2: Hero pops in (elastic)
           ============================================================ */
        anim.fromTo(
          ".hero",
          { scale: 0 },
          {
            scale: 1,
            duration: TIMING.popDur,
            ease: "back.out(2)", // spring(stiffness:200, damping:12)
          },
          TIMING.popStart,
        );

        /* ============================================================
           PHASE 3: Companion exit + container recenter
           Two concurrent tweens at the same timeline position.
           ============================================================ */
        anim.to(
          ".companion",
          {
            opacity: 0,
            x: -80,
            duration: TIMING.slideDur,
            ease: "power3.out", // spring(stiffness:100, damping:20)
          },
          TIMING.slideStart,
        );

        anim.to(
          ".recenter-shift",
          {
            x: FINAL_RECENTER_OFFSET,
            duration: TIMING.slideDur,
            ease: "power3.out",
          },
          TIMING.slideStart,
        );

        /* ============================================================
           PHASE 4: Zoom — scale (outer) + counter-translate (middle) + brand text exits.
           ============================================================ */
        anim.to(
          ".zoom-scale",
          {
            scale: 5.5,
            duration: TIMING.zoomDur,
            ease: "power2.out", // spring(stiffness:80, damping:20, mass:1.5)
          },
          TIMING.zoomStart,
        );

        anim.to(
          ".zoom-translate",
          {
            x: -HERO_FINAL_OFFSET_X,
            y: 0,
            duration: TIMING.zoomDur,
            ease: "power2.out",
          },
          TIMING.zoomStart,
        );

        // Brand text fades out + slides left so the logo gets all the zoom space.
        anim.to(
          ".brand-text",
          {
            opacity: 0,
            x: -600,
            duration: TIMING.zoomDur * 0.4,
            ease: "power2.out",
          },
          TIMING.zoomStart,
        );

        /* ============================================================
           PHASE 5: Breathing — onUpdate so it MULTIPLIES on the hero's
           final pop scale, doesn't overwrite it.
           ============================================================ */
        const heroEl = document.querySelector(".hero");
        const HERO_FINAL_SCALE = 1.0;
        const SCALE_PERIOD = 1.5; // seconds per cycle
        const SCALE_AMP = 0.04;
        const ROTATE_AMP = 2;

        const breathDur = TOTAL_DURATION - TIMING.breathStart;

        anim.to(
          { tick: 0 },
          {
            tick: 1,
            duration: breathDur,
            ease: "none",
            onUpdate: function () {
              const idleTime = Math.max(0, anim.time() - TIMING.breathStart);
              const omega = (idleTime / SCALE_PERIOD) * Math.PI * 2;
              setTweenState(heroEl, {
                scale: HERO_FINAL_SCALE * (1 + Math.sin(omega) * SCALE_AMP),
                rotation: Math.sin(omega) * ROTATE_AMP,
              });
            },
          },
          TIMING.breathStart,
        );
      }
      hyperframesAnime.register("main", tl);
    </script>
  </body>
</html>
