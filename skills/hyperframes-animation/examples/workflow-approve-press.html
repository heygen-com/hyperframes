<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1920, height=1080" />
    <title>Scene — HyperFrames Workflow Approve & Press</title>

    <!--
      Blueprint: workflow-approve-press
      HyperFrames composition.tsx.
      Same four-phase choreography, anime.js-driven, seek-safe.

      Audio (assumed accompanying narration):
        "This is AI that renders with you, not just for you.
         Preview the result, render to MP4, then confirm."

      Sub-phases (local time, 5.5s total):
        0.17 – 0.72s   Headline "AI edits WITH you" slides down
        0.50 – 1.10s   Center editor mockup scales in
        0.67 – 2.17s   Step indicators stagger-enter on the left (3D-tilted)
        2.00 – 3.33s   Step state machine: 1→complete, 2→active … 2→complete, 3→active
        3.52 – 4.02s   Confirm MP4 button (3D-tilted right) bouncy entry after render step is active
        4.22 – 4.72s   Button depression (linear, no overshoot)
        4.72 – 5.22s   Render confirmed: step 3 completes, color shifts to success green + checkmark pop

      Asset placeholders:
        ./assets/editor-demo.mp4  — center product demo video. Replace with a
                                    real export of the AI-editor flow. The
                                    composition falls back to a CSS-mockup of
                                    an editor timeline so it renders without
                                    network or media files.
    -->

    <script src="https://cdn.jsdelivr.net/npm/animejs@4.5.0/dist/bundles/anime.umd.min.js"></script>

    <style>
      :root {
        /* Palette — port of the the source COLORS / TYPOGRAPHY constants */
        --text-primary: #ffffff;
        --text-secondary: #cbd5e1;
        --text-muted: #94a3b8;
        --brand-purple: #a78bfa;
        --brand-purple-glow: rgba(167, 139, 250, 0.6);
        --brand-green: #22c55e;
        --brand-green-glow: rgba(34, 197, 94, 0.6);
        --panel-stroke: rgba(255, 255, 255, 0.1);
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        width: 1920px;
        height: 1080px;
        overflow: hidden;
        background: #000;
        font-family:
          "Inter",
          system-ui,
          -apple-system,
          sans-serif;
        color: var(--text-primary);
      }

      /* ============================================================
         BACKGROUND — port of <FrostedGlassBackground />
         ============================================================ */
      .bg {
        position: absolute;
        inset: 0;
        background:
          radial-gradient(ellipse at 25% 30%, rgba(167, 139, 250, 0.2), transparent 55%),
          radial-gradient(ellipse at 80% 70%, rgba(34, 197, 94, 0.12), transparent 55%),
          linear-gradient(135deg, #1a1530 0%, #0a0815 70%);
      }

      /* Ambient warm glow on the right (button side) */
      .ambient {
        position: absolute;
        inset: 0;
        background: radial-gradient(
          ellipse at 70% 50%,
          var(--brand-purple-glow) 0%,
          transparent 40%
        );
        opacity: 0.15;
        pointer-events: none;
      }

      /* Vignette */
      .vignette {
        position: absolute;
        inset: 0;
        background: radial-gradient(ellipse at center, transparent 40%, rgba(0, 0, 0, 0.4) 100%);
        pointer-events: none;
      }

      /* ============================================================
         PHASE 1 — HEADLINE
         ============================================================ */
      .headline-wrap {
        position: absolute;
        top: 80px;
        left: 50%;
        transform: translateX(-50%);
        opacity: 0; /* anime.js fades in */
        text-align: center;
        white-space: nowrap;
      }
      .headline {
        font-size: 96px;
        font-weight: 800;
        line-height: 1.2;
        letter-spacing: -0.01em;
        color: var(--text-primary);
      }
      .headline .accent {
        color: var(--brand-purple);
        text-shadow: 0 0 30px var(--brand-purple-glow);
      }

      /* ============================================================
         PHASE 2 — CENTER DEMO
         (Falls back to a CSS-mockup editor when ./assets/editor-demo.mp4
          is missing. The mockup is purely decorative — no animation
          inside it; the eye reads it as a paused product screenshot.)
         ============================================================ */
      .demo-wrap {
        position: absolute;
        left: 50%;
        top: 60%;
        opacity: 0;
      }
      .demo-frame {
        width: 1000px;
        height: 600px;
        border-radius: 16px;
        overflow: hidden;
        border: 2px solid var(--panel-stroke);
        box-shadow:
          0 0 40px var(--brand-purple-glow),
          0 20px 60px rgba(0, 0, 0, 0.5);
        position: relative;
      }
      .demo-frame video {
        display: block;
        width: 100%;
        height: 100%;
        object-fit: cover;
      }

      /* CSS-mockup fallback for the editor demo */
      .demo-mockup {
        position: absolute;
        inset: 0;
        display: grid;
        grid-template-rows: 56px 1fr 100px;
        background: linear-gradient(180deg, #1f1b3a 0%, #15112a 100%);
      }
      .mockup-toolbar {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 0 20px;
        background: #15112a;
        border-bottom: 1px solid var(--panel-stroke);
      }
      .mockup-toolbar .dot {
        width: 12px;
        height: 12px;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.18);
      }
      .mockup-toolbar .dot.r {
        background: #ef4444;
      }
      .mockup-toolbar .dot.y {
        background: #eab308;
      }
      .mockup-toolbar .dot.g {
        background: #22c55e;
      }
      .mockup-toolbar .title {
        margin-left: 18px;
        color: var(--text-secondary);
        font-size: 16px;
        font-weight: 500;
      }
      .mockup-canvas {
        position: relative;
        padding: 30px;
        overflow: hidden;
        background:
          repeating-linear-gradient(0deg, rgba(255, 255, 255, 0.04) 0 1px, transparent 1px 40px),
          repeating-linear-gradient(90deg, rgba(255, 255, 255, 0.04) 0 1px, transparent 1px 40px);
      }
      .mockup-canvas .preview-box {
        width: 100%;
        height: 100%;
        border-radius: 10px;
        background: linear-gradient(135deg, rgba(167, 139, 250, 0.35), rgba(34, 197, 94, 0.2));
        border: 1px solid var(--panel-stroke);
        box-shadow: inset 0 0 60px rgba(0, 0, 0, 0.4);
        display: flex;
        align-items: center;
        justify-content: center;
        color: var(--text-secondary);
        font-size: 18px;
        font-weight: 600;
        letter-spacing: 0.18em;
        text-transform: uppercase;
      }
      .mockup-timeline {
        display: flex;
        flex-direction: column;
        gap: 6px;
        padding: 14px 20px;
        background: #15112a;
        border-top: 1px solid var(--panel-stroke);
      }
      .mockup-timeline .track {
        height: 24px;
        display: flex;
        gap: 4px;
      }
      .mockup-timeline .clip {
        height: 100%;
        border-radius: 4px;
      }
      .mockup-timeline .t1 .a {
        flex: 3;
        background: var(--brand-purple);
        opacity: 0.85;
      }
      .mockup-timeline .t1 .b {
        flex: 2;
        background: var(--brand-purple);
        opacity: 0.55;
      }
      .mockup-timeline .t1 .c {
        flex: 4;
        background: var(--brand-purple);
        opacity: 0.85;
      }
      .mockup-timeline .t2 .a {
        flex: 5;
        background: var(--brand-green);
        opacity: 0.75;
      }
      .mockup-timeline .t2 .b {
        flex: 2;
        background: var(--brand-green);
        opacity: 0.45;
      }
      .mockup-timeline .t2 .c {
        flex: 2;
        background: var(--brand-green);
        opacity: 0.75;
      }

      /* ============================================================
         PHASE 3 — LEFT FLANK: STEP INDICATORS (3D-TILTED)
         ============================================================ */
      .steps-flank {
        position: absolute;
        left: 100px;
        top: 55%;
        transform: translateY(-50%) perspective(800px) rotateY(15deg);
        display: flex;
        flex-direction: column;
        gap: 30px;
      }
      .step {
        display: flex;
        align-items: center;
        gap: 16px;
        opacity: 0; /* anime.js fades in */
      }
      .step-circle {
        width: 40px;
        height: 40px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        border: 2px solid var(--text-muted);
        background-color: transparent;
        box-shadow: none;
        transition: none; /* Steps SNAP between states, no CSS transition */
        flex-shrink: 0;
      }
      .step-num {
        font-size: 18px;
        font-weight: 700;
        color: var(--text-muted);
      }
      .step-check {
        display: none;
      }
      .step-label {
        font-size: 28px;
        font-weight: 500;
        color: var(--text-secondary);
      }

      /* State machine — toggled via anim.set({ attr: data-state }) */
      .step[data-state="active"] .step-circle {
        border-color: var(--brand-purple);
        box-shadow: 0 0 15px var(--brand-purple-glow);
      }
      .step[data-state="active"] .step-num {
        color: var(--brand-purple);
      }
      .step[data-state="active"] .step-label {
        font-weight: 700;
        color: var(--text-primary);
      }

      .step[data-state="complete"] .step-circle {
        border-color: var(--brand-green);
        background-color: var(--brand-green);
      }
      .step[data-state="complete"] .step-num {
        display: none;
      }
      .step[data-state="complete"] .step-check {
        display: inline-flex;
      }

      /* ============================================================
         PHASE 4 — RIGHT FLANK: CONFIRM BUTTON (3D-TILTED)
         ============================================================ */
      .button-flank {
        position: absolute;
        right: 70px;
        top: 55%;
        transform: translateY(-50%) perspective(800px) rotateY(-15deg);
      }
      .btn-press {
        opacity: 0;
        transform-origin: center center;
      }
      .btn {
        --btn-glow-blur: 20px;
        padding: 20px 50px;
        border-radius: 12px;
        background-color: var(--brand-purple);
        box-shadow: 0 0 var(--btn-glow-blur) var(--brand-purple-glow);
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 12px;
        color: var(--text-primary);
        font-size: 36px;
        font-weight: 700;
        white-space: nowrap;
      }
      .btn-check {
        display: inline-flex;
        transform-origin: center center;
      }
    </style>
  </head>
  <body>
    <div
      id="root"
      data-composition-id="interactive-workflow"
      data-start="0"
      data-duration="5.5"
      data-width="1920"
      data-height="1080"
      style="position: relative; width: 1920px; height: 1080px; overflow: hidden"
    >
      <!-- Background layers -->
      <div class="bg"></div>

      <!-- PHASE 1: Headline -->
      <div class="headline-wrap">
        <div class="headline">
          HyperFrames builds
          <span class="accent">WITH</span>
          you
        </div>
      </div>

      <!-- PHASE 2: Center demo (video with CSS-mockup fallback) -->
      <div class="demo-wrap">
        <div class="demo-frame">
          <!--
            Real asset path (replace for production).
            If missing, the CSS mockup below shows through the transparent
            poster region. The video stays muted per HyperFrames rules.
          -->
          <!-- Decorative CSS-mockup of an editor — paused screenshot feel. -->
          <div class="demo-mockup">
            <div class="mockup-toolbar">
              <span class="dot r"></span><span class="dot y"></span><span class="dot g"></span>
              <span class="title">HyperFrames — Project: Launch Promo</span>
            </div>
            <div class="mockup-canvas">
              <div class="preview-box">Preview · 1920 × 1080</div>
            </div>
            <div class="mockup-timeline">
              <div class="track t1">
                <div class="clip a"></div>
                <div class="clip b"></div>
                <div class="clip c"></div>
              </div>
              <div class="track t2">
                <div class="clip a"></div>
                <div class="clip b"></div>
                <div class="clip c"></div>
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- PHASE 3: Left-flank step indicators (3D-tilted +15°) -->
      <div class="steps-flank">
        <div class="step step-1" data-step="1" data-state="pending">
          <div class="step-circle">
            <span class="step-num">1</span>
            <svg class="step-check" width="20" height="20" viewBox="0 0 24 24" fill="none">
              <path d="M20 6L9 17L4 12" stroke="#fff" stroke-width="2.5" stroke-linecap="round" />
            </svg>
          </div>
          <span class="step-label">Compose HTML Scene</span>
        </div>

        <div class="step step-2" data-step="2" data-state="pending">
          <div class="step-circle">
            <span class="step-num">2</span>
            <svg class="step-check" width="20" height="20" viewBox="0 0 24 24" fill="none">
              <path d="M20 6L9 17L4 12" stroke="#fff" stroke-width="2.5" stroke-linecap="round" />
            </svg>
          </div>
          <span class="step-label">Seek &amp; Preview</span>
        </div>

        <div class="step step-3" data-step="3" data-state="pending">
          <div class="step-circle">
            <span class="step-num">3</span>
            <svg class="step-check" width="20" height="20" viewBox="0 0 24 24" fill="none">
              <path d="M20 6L9 17L4 12" stroke="#fff" stroke-width="2.5" stroke-linecap="round" />
            </svg>
          </div>
          <span class="step-label">Render to MP4</span>
        </div>
      </div>

      <!-- PHASE 4: Right-flank confirm button (3D-tilted -15°) -->
      <div class="button-flank">
        <div class="btn-press">
          <div class="btn">
            <span class="btn-check">
              <svg width="28" height="28" viewBox="0 0 24 24" fill="none">
                <path
                  d="M20 6L9 17L4 12"
                  stroke="#fff"
                  stroke-width="3"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                />
              </svg>
            </span>
            <span class="btn-label">Confirm MP4</span>
          </div>
        </div>
      </div>

      <!-- Ambient + vignette overlays (pointer-events: none) -->
      <div class="ambient"></div>
      <div class="vignette"></div>
    </div>

    <script>
      const transformState = new WeakMap();
      const transformKeys = new Set([
        "x",
        "y",
        "z",
        "translateX",
        "translateY",
        "translateZ",
        "xPercent",
        "yPercent",
        "scale",
        "scaleX",
        "scaleY",
        "rotation",
        "rotate",
        "rotationX",
        "rotateX",
        "rotationY",
        "rotateY",
      ]);
      const propMap = new Map([
        ["x", "translateX"],
        ["y", "translateY"],
        ["z", "translateZ"],
        ["rotation", "rotate"],
        ["rotationX", "rotateX"],
        ["rotationY", "rotateY"],
        ["rotationZ", "rotateZ"],
      ]);

      function ms(seconds) {
        return Math.round(Number(seconds || 0) * 1000);
      }

      function resolveTargets(target) {
        if (Array.isArray(target)) return target.flatMap(resolveTargets);
        if (typeof target === "string") return [...document.querySelectorAll(target)];
        return target ? [target] : [];
      }

      function cssLength(value) {
        return typeof value === "number" ? value + "px" : String(value);
      }

      function cssAngle(value) {
        return typeof value === "number" ? value + "deg" : String(value);
      }

      function renderTransform(state) {
        const parts = [];
        if (state.xPercent !== undefined) parts.push("translateX(" + state.xPercent + "%)");
        if (state.yPercent !== undefined) parts.push("translateY(" + state.yPercent + "%)");
        const tx = state.x ?? state.translateX;
        const ty = state.y ?? state.translateY;
        const tz = state.z ?? state.translateZ;
        if (tx !== undefined) parts.push("translateX(" + cssLength(tx) + ")");
        if (ty !== undefined) parts.push("translateY(" + cssLength(ty) + ")");
        if (tz !== undefined) parts.push("translateZ(" + cssLength(tz) + ")");
        const rotate = state.rotation ?? state.rotate;
        const rotateX = state.rotationX ?? state.rotateX;
        const rotateY = state.rotationY ?? state.rotateY;
        const rotateZ = state.rotationZ ?? state.rotateZ;
        if (rotate !== undefined) parts.push("rotate(" + cssAngle(rotate) + ")");
        if (rotateX !== undefined) parts.push("rotateX(" + cssAngle(rotateX) + ")");
        if (rotateY !== undefined) parts.push("rotateY(" + cssAngle(rotateY) + ")");
        if (rotateZ !== undefined) parts.push("rotateZ(" + cssAngle(rotateZ) + ")");
        if (state.scale !== undefined) parts.push("scale(" + state.scale + ")");
        if (state.scaleX !== undefined) parts.push("scaleX(" + state.scaleX + ")");
        if (state.scaleY !== undefined) parts.push("scaleY(" + state.scaleY + ")");
        return parts.join(" ");
      }

      function setTweenState(target, vars) {
        for (const item of resolveTargets(target)) {
          if (!(item instanceof Element)) {
            Object.assign(item, vars);
            continue;
          }
          const state = transformState.get(item) ?? {};
          let changedTransform = false;
          for (const [key, value] of Object.entries(vars)) {
            if (key === "attr") {
              for (const [attrName, attrValue] of Object.entries(value))
                item.setAttribute(attrName, attrValue);
            } else if (key === "textContent") {
              item.textContent = value;
            } else if (key.startsWith("--")) {
              item.style.setProperty(key, value);
            } else if (transformKeys.has(key)) {
              state[key] = value;
              changedTransform = true;
            } else if (key === "opacity") {
              item.style.opacity = value;
            } else if (key === "backgroundColor") {
              item.style.backgroundColor = value;
            } else if (key === "boxShadow") {
              item.style.boxShadow = value;
            } else {
              item.style[key] = value;
            }
          }
          if (changedTransform) {
            transformState.set(item, state);
            item.style.transform = renderTransform(state);
          }
        }
      }

      function getTweenProperty(target, key) {
        const item = resolveTargets(target)[0];
        if (!item) return undefined;
        if (item instanceof Element && key.startsWith("--"))
          return getComputedStyle(item).getPropertyValue(key);
        if (item instanceof Element && transformKeys.has(key))
          return transformState.get(item)?.[key];
        return item[key];
      }

      function mapEase(ease) {
        if (typeof ease !== "string") return ease;
        const compact = ease.replace(/\s+/g, "");
        const table = {
          none: "linear",
          "power1.in": "inQuad",
          "power1.out": "outQuad",
          "power1.inOut": "inOutQuad",
          "power2.in": "inCubic",
          "power2.out": "outCubic",
          "power2.inOut": "inOutCubic",
          "power3.in": "inQuart",
          "power3.out": "outQuart",
          "power3.inOut": "inOutQuart",
          "power4.in": "inQuint",
          "power4.out": "outQuint",
          "power4.inOut": "inOutQuint",
          "sine.inOut": "inOutSine",
          "sine.out": "outSine",
          "expo.out": "outExpo",
          "expo.inOut": "inOutExpo",
        };
        if (table[compact]) return table[compact];
        const back = /^back\.(in|out|inOut)\(([^)]*)\)$/.exec(compact);
        if (back) return back[1] + "Back(" + back[2] + ")";
        return ease;
      }

      function normalizeStagger(stagger) {
        if (stagger === undefined) return undefined;
        if (typeof stagger === "number") return anime.stagger(ms(stagger));
        const span = stagger.each ?? stagger.amount;
        if (span === undefined) return undefined;
        const options = {};
        if (stagger.from !== undefined) options.from = stagger.from;
        if (stagger.grid !== undefined) options.grid = stagger.grid;
        if (stagger.axis !== undefined) options.axis = stagger.axis;
        if (stagger.start !== undefined) options.start = ms(stagger.start);
        if (stagger.ease !== undefined) options.ease = mapEase(stagger.ease);
        return anime.stagger(ms(span), options);
      }

      function normalizeTween(vars, fromVars, target, position) {
        const props = {};
        let driverKey = null;
        for (const [key, value] of Object.entries(vars)) {
          if (
            ["duration", "ease", "stagger", "repeat", "yoyo", "overwrite", "onUpdate"].includes(key)
          )
            continue;
          const animeKey = propMap.get(key) ?? key;
          const fromValue = fromVars?.[key];
          props[animeKey] = fromValue === undefined ? value : [fromValue, value];
          if (driverKey === null) driverKey = key;
        }
        props.duration = ms(vars.duration ?? 0.5);
        if (vars.ease !== undefined) props.ease = mapEase(vars.ease);
        const delay = normalizeStagger(vars.stagger);
        if (delay !== undefined) props.delay = delay;
        if (vars.repeat !== undefined)
          props.loop = vars.repeat === -1 ? true : Math.max(0, Math.floor(vars.repeat)) + 1;
        if (vars.yoyo === true) props.alternate = true;
        if (typeof vars.onUpdate === "function") {
          const userUpdate = vars.onUpdate;
          const durationSeconds = Number(vars.duration ?? 0.5);
          props.onUpdate = function (self) {
            const first = resolveTargets(target)[0];
            let progress = 0;
            if (driverKey !== null) {
              const raw = keyValue(first, driverKey);
              const start = Number(fromVars?.[driverKey] ?? 0);
              const end = Number(vars[driverKey]);
              const current = Number(raw);
              if (
                Number.isFinite(current) &&
                Number.isFinite(start) &&
                Number.isFinite(end) &&
                end !== start
              ) {
                progress = (current - start) / (end - start);
              }
            }
            adapterTime.current =
              Number(position || 0) + Math.max(0, Math.min(1, progress)) * durationSeconds;
            userUpdate.call(this, self);
          };
        }
        return props;
      }

      function keyValue(target, key) {
        if (!target) return undefined;
        if (target instanceof Element && key.startsWith("--"))
          return getComputedStyle(target).getPropertyValue(key);
        return target[key];
      }

      const adapterTime = { current: 0 };

      function createTimelineAdapter(timeline) {
        return {
          to(target, vars, position = 0) {
            timeline.add(target, normalizeTween(vars, undefined, target, position), ms(position));
            return this;
          },
          fromTo(target, fromVars, toVars, position = 0) {
            timeline.add(target, normalizeTween(toVars, fromVars, target, position), ms(position));
            return this;
          },
          set(target, vars, position = 0) {
            timeline.add(
              { tick: 0 },
              {
                tick: [0, 1],
                duration: 1,
                ease: "linear",
                onUpdate: () => setTweenState(target, vars),
              },
              ms(position),
            );
            return this;
          },
          time() {
            return adapterTime.current;
          },
        };
      }
      const tl = anime.createTimeline({ autoplay: false });
      const anim = createTimelineAdapter(tl);

      // ── Phase boundaries (seconds) — match the blueprint ────────────
      const HEADLINE_START = 0.17;
      const HEADLINE_END = 0.72;
      const VIDEO_START = 0.5;
      const STEPS_START = 0.67;
      const STEP_STAGGER = 0.5;
      const STEP_ACTIVE_T2 = 2.0; // step 1 → complete, step 2 → active
      const STEP_ACTIVE_T3 = 3.33; // step 2 → complete, step 3 → active
      const BUTTON_ENTER = 3.52; // after "Render to MP4" becomes active
      const PRESS_FRAME = 4.22;
      const PRESS_DURATION = 0.5;
      const CHECK_POP = PRESS_FRAME + PRESS_DURATION;
      const SCENE_END = 5.5; // matches data-duration on the root

      // ── Phase 1: Headline slides down from top ─────────────────────
      setTweenState(".demo-wrap", { xPercent: -50, yPercent: -50, scale: 0.8, opacity: 0 });
      setTweenState(".step", { x: -30, opacity: 0 });
      setTweenState(".btn-press", { scale: 0, opacity: 0 });
      setTweenState(".btn-check", { scale: 0 });

      anim.fromTo(
        ".headline-wrap",
        { y: -40, opacity: 0 },
        {
          y: 0,
          opacity: 1,
          duration: HEADLINE_END - HEADLINE_START,
          ease: "back.out(1.2)", // ≈ the source SPRING_CONFIGS.entrance
        },
        HEADLINE_START,
      );

      // ── Phase 2: Center demo scales in ─────────────────────────────
      // HyperFrames syncs the <video> element's currentTime to the seek
      // position automatically — no .play() call needed (and one here
      // would break deterministic rendering).
      anim.to(
        ".demo-wrap",
        { scale: 1, opacity: 1, duration: 0.6, ease: "power3.out" },
        VIDEO_START,
      );

      // ── Phase 3a: Stagger entry of the step indicators ─────────────
      anim.to(
        ".step",
        {
          x: 0,
          opacity: 1,
          duration: 0.4,
          ease: "power3.out",
          stagger: { each: STEP_STAGGER, from: "start" },
        },
        STEPS_START,
      );

      // ── Phase 3b: Step state machine (snap-toggled here) ──
      // Step 1 enters in the "active" state because narration starts on it.
      anim.set(".step-1", { attr: { "data-state": "active" } }, STEPS_START);

      // First transition — step 1 finishes, step 2 takes over.
      anim.set(".step-1", { attr: { "data-state": "complete" } }, STEP_ACTIVE_T2);
      anim.set(".step-2", { attr: { "data-state": "active" } }, STEP_ACTIVE_T2);

      // Second transition — step 2 finishes, step 3 takes over.
      anim.set(".step-2", { attr: { "data-state": "complete" } }, STEP_ACTIVE_T3);
      anim.set(".step-3", { attr: { "data-state": "active" } }, STEP_ACTIVE_T3);

      // ── Phase 4a: Button bouncy entry ──────────────────────────────
      anim.to(
        ".btn-press",
        { scale: 1, opacity: 1, duration: 0.5, ease: "back.out(1.4)", overwrite: "auto" },
        BUTTON_ENTER,
      );

      // ── Phase 4b: Press (linear depression → linear return) ────────
      // Two adjacent tweens on .btn-press — end value of (1) = start value of (2).
      anim.to(".btn-press", { scale: 0.95, duration: 0.1, ease: "power1.out" }, PRESS_FRAME);
      anim.to(
        ".btn-press",
        { scale: 1.0, duration: PRESS_DURATION - 0.1, ease: "power1.in" },
        PRESS_FRAME + 0.1,
      );

      // ── Phase 4c: Color shift + label swap (at press end) ──────────
      anim.to(
        ".btn",
        {
          backgroundColor: "#15803d",
          boxShadow: "0 0 25px rgba(21, 128, 61, 0.68)",
          duration: 0.3,
          ease: "power2.out",
        },
        CHECK_POP,
      );
      anim.set(".btn-label", { textContent: "Approved!" }, CHECK_POP);
      anim.set(".step-3", { attr: { "data-state": "complete" } }, CHECK_POP);

      // ── Phase 4d: Checkmark pops into view ─────────────────────────
      // back.out(1.6) ≈ the source spring({ stiffness: 200, damping: 15 }).
      anim.to(".btn-check", { scale: 1, duration: 0.5, ease: "back.out(1.6)" }, CHECK_POP);

      // ── Ambient pulsing glow on the button (Math.sin) ──
      // Source: `glowIntensity = 20 + Math.sin(frame * 0.1) * 10` — i.e. blur
      // oscillates 10 ↔ 30 around 20, with angular freq 0.1 rad/frame.
      // At 60fps that's 6 rad/s, so full period ≈ 2π / 6 ≈ 1.05s.
      // Finite yoyo replaces the continuous sine; `box-shadow` reads the
      // tweened CSS variable so the blur is actually animatable.
      const PULSE_PERIOD = 1.05;
      const PULSE_HALVES = Math.max(2, Math.floor((SCENE_END - BUTTON_ENTER) / (PULSE_PERIOD / 2)));
      anim.fromTo(
        ".btn",
        { "--btn-glow-blur": "10px" }, // source amplitude: 20 ± 10
        {
          "--btn-glow-blur": "30px",
          duration: PULSE_PERIOD / 2,
          ease: "sine.inOut",
          yoyo: true,
          repeat: PULSE_HALVES - 1,
        },
        BUTTON_ENTER,
      );

      hyperframesAnime.register("interactive-workflow", tl);
    </script>
  </body>
</html>
