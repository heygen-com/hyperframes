<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1920, height=1080" />
    <title>Scene 7 — HyperFrames Decrypt Pan Track</title>

    <!--
      HyperFrames composition.tsx.

      Choreography (4 phases, 7 seconds total):
        0.0 – 0.7s   Shot 1 static text fades in + rises ("HyperFrames renders")
        0.7 – 1.6s   Hacker-flip decodes the accent word ("video")
        2.8 – 3.5s   Horizontal pan to Shot 2 with parallax exit + scale-in
        3.7 – 6.1s   Cursor-tracked typing: "HTML, CSS and JS become MP4"
          (NOT @the source/layout-utils, NOT a charWidthRatio constant)
        - Bar width pre-allocated from the full text — never tweened
        - Camera follows cursor by tweening the strip's `x`, with a piecewise
          Math.min(initialOffset, trackingOffset) for the two-phase camera
        - Hacker-flip glyph flicker via deterministic int hash, not Math.random
    -->

    <script src="https://cdn.jsdelivr.net/npm/animejs@4.5.0/dist/bundles/anime.umd.min.js"></script>

    <style>
      :root {
        --bg: linear-gradient(
          135deg,
          #3a3a3a 0%,
          #17211f 30%,
          #0b2328 48%,
          #1f3518 70%,
          #343434 100%
        );
        --text-dark: #f8fafc;
        --text-highlight: #18d9e8;
        --text-highlight-2: #7bea5a;
        --search-bg: rgba(14, 24, 23, 0.82);
        --cursor: #7bea5a;
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        width: 1920px;
        height: 1080px;
        overflow: hidden;
        background: var(--bg);
        font-family:
          "Inter",
          system-ui,
          -apple-system,
          sans-serif;
        color: var(--text-dark);
      }

      .viewport {
        position: absolute;
        inset: 0;
        overflow: hidden;
      }
      .strip {
        display: flex;
        height: 100%;
        will-change: transform;
      }
      .shot {
        width: 1920px;
        height: 100%;
        position: relative;
        flex-shrink: 0;
      }

      /* ============================================================
         SHOT 1 — "HyperFrames renders video"
         ============================================================ */
      .shot1-content {
        position: absolute;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        opacity: 0; /* anime.js fromTo fades in */
      }
      .shot1-row {
        display: flex;
        align-items: baseline;
        gap: 0.4em;
        font-size: 130px;
      }
      .shot1-static {
        font-weight: 500;
        color: var(--text-dark);
        text-shadow: 0 0 36px rgba(24, 217, 232, 0.18);
      }
      .shot1-accent {
        font-weight: 700;
        display: flex;
        perspective: 800px; /* required for the per-glyph rotateX */
      }
      .flip-glyph {
        position: relative;
        display: inline-block;
        min-width: 0;
      }
      .flip-glyph.space {
        min-width: 0.4em;
      }
      .flip-glyph .ghost {
        opacity: 0;
      }
      .flip-glyph .anim {
        position: absolute;
        left: 0;
        top: 0;
        width: 100%;
        color: var(--text-highlight);
        background: linear-gradient(135deg, var(--text-highlight) 0%, var(--text-highlight-2) 100%);
        -webkit-background-clip: text;
        background-clip: text;
        -webkit-text-fill-color: transparent;
        filter: drop-shadow(0 0 24px rgba(24, 217, 232, 0.32))
          drop-shadow(0 0 36px rgba(123, 234, 90, 0.22));
        opacity: 0;
        transform: perspective(600px) rotateX(90deg);
        transform-origin: bottom;
        backface-visibility: hidden;
      }

      /* ============================================================
         SHOT 2 — Search bar with cursor-tracked typing
         ============================================================ */
      .shot2-bar {
        position: absolute;
        top: 50%;
        /* left set by JS once we know the bar's world coordinate */
        height: 240px;
        background: var(--search-bg);
        border: 1px solid rgba(123, 234, 90, 0.22);
        box-shadow:
          0 0 60px rgba(24, 217, 232, 0.2),
          0 0 96px rgba(123, 234, 90, 0.14),
          inset 0 0 32px rgba(24, 217, 232, 0.08);
        border-radius: 999px;
        display: flex;
        align-items: center;
        padding-left: 120px;
        padding-right: 180px;
        opacity: 0; /* anime.js fromTo fades in */
        transform-origin: left center;
      }
      .search-text {
        font-size: 120px;
        font-weight: 400;
        color: var(--text-dark);
        text-shadow: 0 0 24px rgba(248, 250, 252, 0.16);
        white-space: pre;
        line-height: 1;
      }
      .search-cursor {
        font-size: 120px;
        color: var(--cursor);
        text-shadow: 0 0 26px rgba(123, 234, 90, 0.42);
        margin-left: 4px;
        font-weight: 300;
        line-height: 1;
      }

      /* Hidden probe used by measureNodeWidth */
      .measure-probe {
        position: absolute;
        left: -99999px;
        top: -99999px;
        visibility: hidden;
        white-space: pre;
      }
    </style>
  </head>
  <body>
    <div
      id="root"
      data-composition-id="main"
      data-start="0"
      data-duration="7"
      data-width="1920"
      data-height="1080"
    >
      <div class="viewport" data-layout-allow-overflow>
        <div class="strip" data-layout-allow-overflow>
          <!-- =====================================================
               SHOT 1 — "HyperFrames renders video"
               ===================================================== -->
          <div
            id="shot-decode"
            class="shot shot1 clip"
            data-start="0"
            data-duration="3.5"
            data-track-index="1"
          >
            <div class="shot1-content">
              <div class="shot1-row">
                <span class="shot1-static">HyperFrames renders</span>
                <span class="shot1-accent" aria-label="video">
                  <!-- .flip-glyph spans generated by JS -->
                </span>
              </div>
            </div>
          </div>

          <!-- =====================================================
               SHOT 2 — Search bar typing
               ===================================================== -->
          <div
            id="shot-typing"
            class="shot shot2 clip"
            data-start="2.5"
            data-duration="4.5"
            data-track-index="2"
          >
            <div class="shot2-bar">
              <span class="search-text"></span><span class="search-cursor">_</span>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script>
      /* ================================================================
         CONSTANTS — all baked at setup time.
         ================================================================ */
      const W = 1920,
        H = 1080;
      const COMPOSITION_DURATION = 7;
      const FPS_HASH = 60; // synthetic clock for the flicker hash

      const TIMING = {
        // Phase 1: shot1 text fades in + rises
        shot1EntryStart: 0.0,
        shot1EntryDur: 0.67,

        // Phase 2: hacker-flip "video"
        flipStart: 0.7,
        flipStagger: 0.066, // ~2 frames at 30fps per glyph
        flipDuration: 0.55,

        // Phase 3: horizontal pan
        panStart: 2.83,
        panDuration: 0.67,

        // Phase 4: cursor-tracked typing
        typingStart: 3.67, // panStart + panDuration + 0.17 buffer
        charRate: 0.083, // seconds per character (~2.5 frames at 30fps)
      };

      const FULL_TEXT = "HTML, CSS and JS become MP4";
      const FONT_SIZE = 120;
      const PADDING_LEFT = 120;
      const PADDING_RIGHT = 180;
      const CURSOR_VIS_W = FONT_SIZE * 0.6; // visual cursor width approximation
      const CURSOR_TARGET = W * 0.7; // screen X where cursor locks
      const BAR_LEFT_MARGIN = 80; // initial left margin in Phase 4
      const PARALLAX_DIST = 400; // px Shot 1 moves extra during pan

      /* ================================================================
         BUILD DOM — flip glyphs (Shot 1) generated synchronously.
         The accent text is "video" → 5 glyphs.
         ================================================================ */
      const accentEl = document.querySelector(".shot1-accent");
      const ACCENT_WORD = "video";
      ACCENT_WORD.split("").forEach((char, index) => {
        const span = document.createElement("span");
        span.className = "flip-glyph" + (char === " " ? " space" : "");
        span.dataset.char = char;
        span.dataset.index = String(index);
        // Each glyph needs its own font-size to match the surrounding row.
        span.style.fontSize = "130px";
        const ghost = document.createElement("span");
        ghost.className = "ghost";
        ghost.textContent = char === " " ? " " : char;
        const anim = document.createElement("span");
        anim.className = "anim";
        anim.textContent = char === " " ? " " : char;
        span.append(ghost, anim);
        accentEl.appendChild(span);
      });

      /* ================================================================
         TEXT MEASUREMENT — uses a hidden DOM probe so we capture
         real letter-spacing, kerning, and font-feature widths.
         Must run AFTER document.fonts.ready.
         ================================================================ */
      function measureNodeWidth(text, font) {
        const probe = document.createElement("span");
        probe.className = "measure-probe";
        probe.style.font = font;
        probe.style.whiteSpace = "pre";
        probe.textContent = text;
        document.body.appendChild(probe);
        const width = probe.getBoundingClientRect().width;
        probe.remove();
        return width;
      }

      /* ================================================================
         TIMELINE BUILD — fires after fonts are ready so measurements
         use the real rendered metrics, not fallback fonts.
         ================================================================ */
      const transformState = new WeakMap();
      const transformKeys = new Set([
        "x",
        "y",
        "z",
        "translateX",
        "translateY",
        "translateZ",
        "xPercent",
        "yPercent",
        "scale",
        "scaleX",
        "scaleY",
        "rotation",
        "rotate",
        "rotationX",
        "rotateX",
        "rotationY",
        "rotateY",
      ]);
      const propMap = new Map([
        ["x", "translateX"],
        ["y", "translateY"],
        ["z", "translateZ"],
        ["rotation", "rotate"],
        ["rotationX", "rotateX"],
        ["rotationY", "rotateY"],
        ["rotationZ", "rotateZ"],
      ]);

      function ms(seconds) {
        return Math.round(Number(seconds || 0) * 1000);
      }

      function resolveTargets(target) {
        if (Array.isArray(target)) return target.flatMap(resolveTargets);
        if (typeof target === "string") return [...document.querySelectorAll(target)];
        return target ? [target] : [];
      }

      function cssLength(value) {
        return typeof value === "number" ? value + "px" : String(value);
      }

      function cssAngle(value) {
        return typeof value === "number" ? value + "deg" : String(value);
      }

      function renderTransform(state) {
        const parts = [];
        if (state.xPercent !== undefined) parts.push("translateX(" + state.xPercent + "%)");
        if (state.yPercent !== undefined) parts.push("translateY(" + state.yPercent + "%)");
        const tx = state.x ?? state.translateX;
        const ty = state.y ?? state.translateY;
        const tz = state.z ?? state.translateZ;
        if (tx !== undefined) parts.push("translateX(" + cssLength(tx) + ")");
        if (ty !== undefined) parts.push("translateY(" + cssLength(ty) + ")");
        if (tz !== undefined) parts.push("translateZ(" + cssLength(tz) + ")");
        const rotate = state.rotation ?? state.rotate;
        const rotateX = state.rotationX ?? state.rotateX;
        const rotateY = state.rotationY ?? state.rotateY;
        const rotateZ = state.rotationZ ?? state.rotateZ;
        if (rotate !== undefined) parts.push("rotate(" + cssAngle(rotate) + ")");
        if (rotateX !== undefined) parts.push("rotateX(" + cssAngle(rotateX) + ")");
        if (rotateY !== undefined) parts.push("rotateY(" + cssAngle(rotateY) + ")");
        if (rotateZ !== undefined) parts.push("rotateZ(" + cssAngle(rotateZ) + ")");
        if (state.scale !== undefined) parts.push("scale(" + state.scale + ")");
        if (state.scaleX !== undefined) parts.push("scaleX(" + state.scaleX + ")");
        if (state.scaleY !== undefined) parts.push("scaleY(" + state.scaleY + ")");
        return parts.join(" ");
      }

      function setTweenState(target, vars) {
        for (const item of resolveTargets(target)) {
          if (!(item instanceof Element)) {
            Object.assign(item, vars);
            continue;
          }
          const state = transformState.get(item) ?? {};
          let changedTransform = false;
          for (const [key, value] of Object.entries(vars)) {
            if (key === "attr") {
              for (const [attrName, attrValue] of Object.entries(value))
                item.setAttribute(attrName, attrValue);
            } else if (key === "textContent") {
              item.textContent = value;
            } else if (key.startsWith("--")) {
              item.style.setProperty(key, value);
            } else if (transformKeys.has(key)) {
              state[key] = value;
              changedTransform = true;
            } else if (key === "opacity") {
              item.style.opacity = value;
            } else if (key === "backgroundColor") {
              item.style.backgroundColor = value;
            } else if (key === "boxShadow") {
              item.style.boxShadow = value;
            } else {
              item.style[key] = value;
            }
          }
          if (changedTransform) {
            transformState.set(item, state);
            item.style.transform = renderTransform(state);
          }
        }
      }

      function getTweenProperty(target, key) {
        const item = resolveTargets(target)[0];
        if (!item) return undefined;
        if (item instanceof Element && key.startsWith("--"))
          return getComputedStyle(item).getPropertyValue(key);
        if (item instanceof Element && transformKeys.has(key))
          return transformState.get(item)?.[key];
        return item[key];
      }

      function mapEase(ease) {
        if (typeof ease !== "string") return ease;
        const compact = ease.replace(/\s+/g, "");
        const table = {
          none: "linear",
          "power1.in": "inQuad",
          "power1.out": "outQuad",
          "power1.inOut": "inOutQuad",
          "power2.in": "inCubic",
          "power2.out": "outCubic",
          "power2.inOut": "inOutCubic",
          "power3.in": "inQuart",
          "power3.out": "outQuart",
          "power3.inOut": "inOutQuart",
          "power4.in": "inQuint",
          "power4.out": "outQuint",
          "power4.inOut": "inOutQuint",
          "sine.inOut": "inOutSine",
          "sine.out": "outSine",
          "expo.out": "outExpo",
          "expo.inOut": "inOutExpo",
        };
        if (table[compact]) return table[compact];
        const back = /^back\.(in|out|inOut)\(([^)]*)\)$/.exec(compact);
        if (back) return back[1] + "Back(" + back[2] + ")";
        return ease;
      }

      function normalizeStagger(stagger) {
        if (stagger === undefined) return undefined;
        if (typeof stagger === "number") return anime.stagger(ms(stagger));
        const span = stagger.each ?? stagger.amount;
        if (span === undefined) return undefined;
        const options = {};
        if (stagger.from !== undefined) options.from = stagger.from;
        if (stagger.grid !== undefined) options.grid = stagger.grid;
        if (stagger.axis !== undefined) options.axis = stagger.axis;
        if (stagger.start !== undefined) options.start = ms(stagger.start);
        if (stagger.ease !== undefined) options.ease = mapEase(stagger.ease);
        return anime.stagger(ms(span), options);
      }

      function normalizeTween(vars, fromVars, target, position) {
        const props = {};
        let driverKey = null;
        for (const [key, value] of Object.entries(vars)) {
          if (
            ["duration", "ease", "stagger", "repeat", "yoyo", "overwrite", "onUpdate"].includes(key)
          )
            continue;
          const animeKey = propMap.get(key) ?? key;
          const fromValue = fromVars?.[key];
          props[animeKey] = fromValue === undefined ? value : [fromValue, value];
          if (driverKey === null) driverKey = key;
        }
        props.duration = ms(vars.duration ?? 0.5);
        if (vars.ease !== undefined) props.ease = mapEase(vars.ease);
        const delay = normalizeStagger(vars.stagger);
        if (delay !== undefined) props.delay = delay;
        if (vars.repeat !== undefined)
          props.loop = vars.repeat === -1 ? true : Math.max(0, Math.floor(vars.repeat)) + 1;
        if (vars.yoyo === true) props.alternate = true;
        if (typeof vars.onUpdate === "function") {
          const userUpdate = vars.onUpdate;
          const durationSeconds = Number(vars.duration ?? 0.5);
          props.onUpdate = function (self) {
            const first = resolveTargets(target)[0];
            let progress = 0;
            if (driverKey !== null) {
              const raw = keyValue(first, driverKey);
              const start = Number(fromVars?.[driverKey] ?? 0);
              const end = Number(vars[driverKey]);
              const current = Number(raw);
              if (
                Number.isFinite(current) &&
                Number.isFinite(start) &&
                Number.isFinite(end) &&
                end !== start
              ) {
                progress = (current - start) / (end - start);
              }
            }
            adapterTime.current =
              Number(position || 0) + Math.max(0, Math.min(1, progress)) * durationSeconds;
            userUpdate.call(this, self);
          };
        }
        return props;
      }

      function keyValue(target, key) {
        if (!target) return undefined;
        if (target instanceof Element && key.startsWith("--"))
          return getComputedStyle(target).getPropertyValue(key);
        return target[key];
      }

      const adapterTime = { current: 0 };

      function createTimelineAdapter(timeline) {
        return {
          to(target, vars, position = 0) {
            timeline.add(target, normalizeTween(vars, undefined, target, position), ms(position));
            return this;
          },
          fromTo(target, fromVars, toVars, position = 0) {
            timeline.add(target, normalizeTween(toVars, fromVars, target, position), ms(position));
            return this;
          },
          set(target, vars, position = 0) {
            timeline.add(
              { tick: 0 },
              {
                tick: [0, 1],
                duration: 1,
                ease: "linear",
                onUpdate: () => setTweenState(target, vars),
              },
              ms(position),
            );
            return this;
          },
          time() {
            return adapterTime.current;
          },
        };
      }
      const tl = anime.createTimeline({ autoplay: false });
      const anim = createTimelineAdapter(tl);

      // Register early so HF can find it; tweens are added below.

      document.fonts.ready.then(() => {
        const searchFont = `400 ${FONT_SIZE}px Inter, system-ui, sans-serif`;
        const fullTextWidth = measureNodeWidth(FULL_TEXT, searchFont);
        const barWidth = PADDING_LEFT + fullTextWidth + CURSOR_VIS_W + PADDING_RIGHT;

        // Pre-allocate the bar's final width — no width tweens ever.
        const barEl = document.querySelector(".shot2-bar");
        barEl.style.width = barWidth + "px";

        // Initial bar position in Shot 2's local space.
        // We position it at LEFT_MARGIN from the shot's left edge.
        barEl.style.left = BAR_LEFT_MARGIN + "px";
        barEl.style.transform = "translateY(-50%)"; // vertical center

        // ============================================================
        // PHASE 1: Shot 1 text fade in + rise
        // ============================================================
        anim.fromTo(
          ".shot1-content",
          { opacity: 0, y: 30 },
          {
            opacity: 1,
            y: 0,
            duration: TIMING.shot1EntryDur,
            ease: "power2.out",
          },
          TIMING.shot1EntryStart,
        );

        // ============================================================
        // PHASE 2: Hacker-flip "video"
        // ============================================================
        const CHAR_POOL = "abcdefghijklmnopqrstuvwxyz";
        const FLICKER = 3;
        const REVEAL_AT = 0.6;

        // Deterministic 32-bit mix — replaces Math.random / seeded RNG.
        function pseudoHash(i, t) {
          return ((i * 374761393 + t * 668265263) >>> 0) % CHAR_POOL.length;
        }

        document.querySelectorAll(".flip-glyph").forEach((glyph) => {
          const index = Number(glyph.dataset.index);
          const real = glyph.dataset.char === " " ? " " : glyph.dataset.char;
          const anim = glyph.querySelector(".anim");
          const start = TIMING.flipStart + index * TIMING.flipStagger;

          anim.fromTo(
            anim,
            { rotationX: 90, opacity: 0, "--p": 0 },
            {
              rotationX: 0,
              opacity: 1,
              "--p": 1,
              duration: TIMING.flipDuration,
              ease: "back.out(1.6)", // spring(stiffness:150, damping:14)
              onUpdate: function () {
                const p = Number(getTweenProperty(anim, "--p"));
                if (p >= REVEAL_AT) {
                  if (anim.textContent !== real) anim.textContent = real;
                } else {
                  const localFrame = Math.floor((anim.time() - start) * FPS_HASH);
                  const bucket = Math.max(0, Math.floor(localFrame / FLICKER));
                  anim.textContent = CHAR_POOL[pseudoHash(index, bucket)];
                }
              },
            },
            start,
          );
        });

        // ============================================================
        // PHASE 3: Horizontal pan + parallax exit + Shot 2 entry
        // All three tweens at the same timeline position run in parallel.
        // ============================================================
        // (a) Camera pan — strip slides one full viewport left.
        anim.to(
          ".strip",
          {
            x: -W,
            duration: TIMING.panDuration,
            ease: "power3.inOut", // cinematic slow-in-slow-out
          },
          TIMING.panStart,
        );

        // (b) Shot 1 parallax exit — content moves EXTRA -PARALLAX_DIST.
        anim.to(
          ".shot1-content",
          {
            x: -PARALLAX_DIST,
            duration: TIMING.panDuration,
            ease: "power3.inOut",
          },
          TIMING.panStart,
        );

        // Shot 1 fades out partway through the pan so the eye lands on Shot 2.
        anim.to(
          ".shot1-content",
          {
            opacity: 0,
            duration: TIMING.panDuration * 0.4,
            ease: "power2.out",
          },
          TIMING.panStart,
        );

        // (c) Shot 2 bar entry — fade + scale with mild overshoot ("landing").
        anim.fromTo(
          ".shot2-bar",
          { opacity: 0, scale: 0.8 },
          {
            opacity: 1,
            scale: 1,
            duration: TIMING.panDuration,
            ease: "back.out(1.2)",
          },
          TIMING.panStart,
        );

        // ============================================================
        // PHASE 4: Cursor-tracked typing.
        //
        // The strip is now at x = -W (Shot 2 fully on screen). For the
        // cursor-track effect we'll *further* shift the strip by a piecewise
        // amount: hold initial offset while the empty bar's cursor is left
        // of CURSOR_TARGET, then follow once typing pushes it past.
        // ============================================================
        const searchTextEl = document.querySelector(".search-text");
        const stripEl = document.querySelector(".strip");

        const CURSOR_WIDTH_HALF = CURSOR_VIS_W / 2;
        const STRIP_BASE_X = -W; // strip's x at the end of Phase 3

        // Initial Phase-4 offset = 0 (no additional shift on top of -W).
        // i.e. bar already sits at BAR_LEFT_MARGIN inside Shot 2.
        const INITIAL_OFFSET = 0;

        // Typing driver — a clock that runs from 0 to FULL_TEXT.length.
        const typingProxy = { progress: 0 };
        const typingDur = FULL_TEXT.length * TIMING.charRate;
        const typingEnd = TIMING.typingStart + typingDur;
        const postTypingHold = Math.max(0, COMPOSITION_DURATION - typingEnd);

        anim.to(
          typingProxy,
          {
            progress: FULL_TEXT.length,
            duration: typingDur,
            ease: "none",
            onUpdate: function () {
              const charsTyped = Math.min(FULL_TEXT.length, Math.floor(typingProxy.progress));
              const visibleText = FULL_TEXT.slice(0, charsTyped);
              if (searchTextEl.textContent !== visibleText) {
                searchTextEl.textContent = visibleText;
              }

              // Measure current visible width to compute cursor screen position.
              // Cheap because Inter's metrics are cached after the first call.
              const visibleW =
                visibleText.length === 0 ? 0 : measureNodeWidth(visibleText, searchFont);

              // Cursor X in *Shot 2's* coordinate system:
              //   shot left edge → bar left edge (BAR_LEFT_MARGIN)
              //                  → cursor within bar (PADDING_LEFT + visibleW + CURSOR_WIDTH_HALF)
              const cursorXInShot2 = BAR_LEFT_MARGIN + PADDING_LEFT + visibleW + CURSOR_WIDTH_HALF;

              // For the cursor to land at CURSOR_TARGET on the *screen*, the
              // strip must be shifted by:
              //   stripX = CURSOR_TARGET - cursorXInShot2 - W   (the -W accounts
              //   for Shot 2 being the SECOND shot in the strip)
              const trackingStripX = CURSOR_TARGET - cursorXInShot2 - W;

              // Piecewise: hold STRIP_BASE_X + INITIAL_OFFSET until tracking
              // would pan FURTHER LEFT than the base, then follow.
              const finalStripX = Math.min(STRIP_BASE_X + INITIAL_OFFSET, trackingStripX);

              setTweenState(stripEl, { x: finalStripX });
            },
          },
          TIMING.typingStart,
        );

        if (postTypingHold > 0) {
          anim.to(
            ".search-cursor",
            {
              opacity: 0.22,
              duration: postTypingHold / 2,
              repeat: 1,
              yoyo: true,
              ease: "none",
            },
            typingEnd,
          );
        }
        hyperframesAnime.register("main", tl);
      });
    </script>
  </body>
</html>
