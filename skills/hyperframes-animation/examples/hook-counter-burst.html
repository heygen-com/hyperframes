<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1920, height=1080" />
    <title>Scene 01 — Counting Icon Burst</title>

    <!--
      HyperFrames composition.tsx.

      Choreography (4 phases, 3.5 seconds total):
        0.00 – 0.17s   Background visible with dark overlay; nothing else
        0.17 – 0.57s   Four enriched icons enter staggered, clustered at startOffset 0.4
                       (clock 0.17s · scissors 0.30s · video 0.43s · play 0.57s)
        0.47 – 1.47s   Counter "0 → 90" with growing font size (0.20W → 0.42W);
                       icons expand outward from 40% to 100% position
        0.50 – 2.33s   Camera focus phase: scale 0.92 → 1.0
        2.33 – 3.50s   Camera push phase: scale 1.0 → 1.08
        1.27s          Percent symbol pops in with own spring

      Continuous motion (running from t=0, gated by icon visibility):
        Clock minute hand: linear rotation 420° over 3.5s
        Scissors: ±15° sine oscillation, period ~1.7s
        Cutting line: stroke-dashoffset drifts -200 over 3.5s
        Video record dot: opacity + scale phase-offset sine pulses
        Play triangle: scale pulse ±8%, period ~2.6s
          ease + duration (no shared driver needed, just identical timing)
        - Counter text + number scale are emitted as seek-safe timeline keyframes
        - Background: local Pexels MP4 plus dark overlay
        - Per-icon entry uses anime.js fromTo on a nested .icon-entry wrapper
          so it never overwrites the .icon-pos expansion tween
    -->

    <script src="https://cdn.jsdelivr.net/npm/animejs@4.5.0/dist/bundles/anime.umd.min.js"></script>

    <style>
      :root {
        --bg-dark: #060812;
        --text-primary: #ffffff;
        --accent-yellow: #edcb50;
        --record-red: #ef4444;
      }
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        width: 1920px;
        height: 1080px;
        overflow: hidden;
        background: var(--bg-dark);
        font-family:
          "Inter",
          system-ui,
          -apple-system,
          sans-serif;
        color: var(--text-primary);
      }

      /* ============================================================
         BACKGROUND (static gradient)
         ============================================================ */
      .bg {
        position: absolute;
        inset: 0;
        transform-origin: center center;
        will-change: transform;
        background:
          radial-gradient(ellipse at 30% 30%, rgba(80, 100, 200, 0.25), transparent 60%),
          radial-gradient(ellipse at 70% 70%, rgba(180, 80, 150, 0.2), transparent 60%),
          linear-gradient(135deg, #0a0d1f 0%, #1a0d20 100%);
      }
      .bg-overlay {
        position: absolute;
        inset: 0;
        background: rgba(0, 0, 0, 0.66);
      }

      /* ============================================================
         CAMERA WRAPPER (anime.js-managed scale phases)
         ============================================================ */
      .camera {
        position: absolute;
        inset: 0;
        transform-origin: center center;
        will-change: transform;
      }

      /* ============================================================
         ICONS — two nested wrappers per icon.
         .icon-pos is positioned at TARGET; anime.js x/y shifts toward center.
         .icon-entry tweens scale/opacity/rotation.
         ============================================================ */
      .icons-stage {
        position: absolute;
        inset: 0;
      }
      .icon-pos {
        position: absolute;
        width: 180px;
        height: 180px;
        will-change: transform;
      }
      .icon-entry {
        width: 100%;
        height: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        will-change: transform, opacity;
        /* initial scale(0) + opacity(0) set by anime.js fromTo */
      }
      .icon-svg {
        width: 100%;
        height: 100%;
        display: block;
      }

      /* SVG inner elements — class hooks for anime.js tweens */
      .clock-hand-min {
        transform-box: view-box;
      }
      .scissor-upper,
      .scissor-lower {
        transform-origin: 12px 12px;
      }
      .play-tri {
        transform-origin: 12px 12px;
      }
      .record-dot {
        transform-origin: 19px 8px;
      }
      .play-ring {
        transform-origin: 12px 12px;
        transform: rotate(-90deg);
      }

      /* ============================================================
         COUNTER (absolute center, 3D entry)
         ============================================================ */
      .counter-stage {
        position: absolute;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        perspective: 2000px;
        perspective-origin: center center;
      }
      .counter-3d {
        display: flex;
        align-items: baseline;
        justify-content: center;
        transform-style: preserve-3d;
        will-change: transform, opacity;
        opacity: 0; /* anime.js entry fades in */
      }
      .counter-number {
        font-size: 806px; /* W × 0.42 — final size, anime.js scales from 0.20W */
        font-weight: 900;
        letter-spacing: -0.04em;
        line-height: 0.9;
        font-variant-numeric: tabular-nums; /* prevents 1→2 digit jitter */
        color: var(--text-primary);
        display: inline-block;
        transform-origin: center bottom;
        will-change: transform;
      }
      .counter-percent {
        font-size: 269px; /* W × 0.14 */
        font-weight: 700;
        letter-spacing: -0.02em;
        color: var(--accent-yellow);
        margin-left: 16px;
        display: inline-block;
        will-change: transform, opacity;
        opacity: 0; /* anime.js entry tweens in later */
      }

      /* ============================================================
         VIGNETTE
         ============================================================ */
      .vignette {
        position: absolute;
        inset: 0;
        background: radial-gradient(ellipse at center, transparent 50%, rgba(0, 0, 0, 0.5) 100%);
        pointer-events: none;
        z-index: 400;
      }
    </style>
  </head>
  <body>
    <div
      id="root"
      data-composition-id="main"
      data-start="0"
      data-duration="3.5"
      data-width="1920"
      data-height="1080"
    >
      <div class="bg"></div>
      <div class="bg-overlay"></div>

      <div
        class="camera clip"
        data-start="0"
        data-duration="3.5"
        data-track-index="1"
        id="camera-stage"
      >
        <div class="icons-stage">
          <!-- Clock -->
          <div class="icon-pos clock-pos" id="clock-pos">
            <div class="icon-entry clock-entry">
              <svg
                class="icon-svg"
                viewBox="0 0 24 24"
                xmlns="http://www.w3.org/2000/svg"
                aria-hidden="true"
              >
                <circle
                  class="clock-ring"
                  cx="12"
                  cy="12"
                  r="9"
                  fill="none"
                  stroke="white"
                  stroke-width="2"
                  stroke-dasharray="56.5"
                  stroke-dashoffset="56.5"
                />
                <line
                  x1="12"
                  y1="12"
                  x2="12"
                  y2="8"
                  stroke="white"
                  stroke-width="2"
                  stroke-linecap="round"
                />
                <line
                  class="clock-hand-min"
                  x1="12"
                  y1="12"
                  x2="12"
                  y2="6"
                  stroke="#edcb50"
                  stroke-width="2"
                  stroke-linecap="round"
                />
                <circle cx="12" cy="12" r="1.5" fill="#edcb50" />
              </svg>
            </div>
          </div>

          <!-- Scissors -->
          <div class="icon-pos scissors-pos" id="scissors-pos">
            <div class="icon-entry scissors-entry">
              <svg
                class="icon-svg"
                viewBox="0 0 24 24"
                xmlns="http://www.w3.org/2000/svg"
                aria-hidden="true"
              >
                <g class="scissor-upper">
                  <path
                    d="M12 10.5L4.5 3L6.5 3L14 10.5"
                    stroke="white"
                    stroke-width="2"
                    stroke-linecap="round"
                    fill="none"
                  />
                  <circle cx="6" cy="6" r="2.5" fill="none" stroke="white" stroke-width="1.5" />
                </g>
                <g class="scissor-lower">
                  <path
                    d="M12 13.5L4.5 21L6.5 21L14 13.5"
                    stroke="white"
                    stroke-width="2"
                    stroke-linecap="round"
                    fill="none"
                  />
                  <circle cx="6" cy="18" r="2.5" fill="none" stroke="white" stroke-width="1.5" />
                </g>
                <line
                  class="cutting-line"
                  x1="14"
                  y1="12"
                  x2="20"
                  y2="12"
                  stroke="#edcb50"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-dasharray="4 2"
                />
              </svg>
            </div>
          </div>

          <!-- Video -->
          <div class="icon-pos video-pos" id="video-pos">
            <div class="icon-entry video-entry">
              <svg
                class="icon-svg"
                viewBox="0 0 24 24"
                xmlns="http://www.w3.org/2000/svg"
                aria-hidden="true"
              >
                <rect
                  class="video-frame"
                  x="3"
                  y="5"
                  width="14"
                  height="14"
                  rx="2"
                  stroke="white"
                  stroke-width="2"
                  fill="none"
                  stroke-dasharray="56"
                  stroke-dashoffset="56"
                />
                <path d="M8 9L13 12L8 15V9Z" fill="white" />
                <circle class="record-dot" cx="19" cy="8" r="2.5" fill="#ef4444" />
              </svg>
            </div>
          </div>

          <!-- Play -->
          <div class="icon-pos play-pos" id="play-pos">
            <div class="icon-entry play-entry">
              <svg
                class="icon-svg"
                viewBox="0 0 24 24"
                xmlns="http://www.w3.org/2000/svg"
                aria-hidden="true"
              >
                <circle
                  class="play-ring"
                  cx="12"
                  cy="12"
                  r="9"
                  fill="none"
                  stroke="white"
                  stroke-width="2"
                  stroke-dasharray="56.5"
                  stroke-dashoffset="56.5"
                />
                <circle cx="12" cy="12" r="7" fill="rgba(255,255,255,0.05)" />
                <path class="play-tri" d="M10 8L16 12L10 16V8Z" fill="#edcb50" />
              </svg>
            </div>
          </div>
        </div>
        <!-- /.icons-stage -->

        <div class="counter-stage">
          <div class="counter-3d" id="counter-3d">
            <span class="counter-number" id="counter-number">0</span
            ><span class="counter-percent" id="counter-percent">%</span>
          </div>
        </div>
      </div>
      <!-- /.camera -->

      <div class="vignette"></div>
    </div>

    <script>
      /* ================================================================
         CONSTANTS
         ================================================================ */
      const W = 1920,
        H = 1080;
      const ICON_SIZE = 180;
      const CENTER_X = W / 2 - ICON_SIZE / 2; // 870
      const CENTER_Y = H / 2 - ICON_SIZE / 2; // 450

      const TIMING = {
        // Phase 2 — icon entries (staggered)
        clockEntryAt: 0.17,
        scissorsEntryAt: 0.3,
        videoEntryAt: 0.43,
        playEntryAt: 0.57,
        entryDur: 0.55,

        // Phase 3 — count + expansion (shared start, dur, ease)
        countAt: 0.47,
        countDur: 1.0,
        startOffset: 0.4,

        // Counter 3D entry (slightly earlier than count starts)
        counterEntryAt: 0.27,
        counterEntryDur: 0.7,

        // Percent symbol entry
        percentEntryAt: 1.27,
        percentEntryDur: 0.55,

        // Phase 4 — camera
        cameraFocusAt: 0.5,
        cameraFocusDur: 1.83,
        cameraPushAt: 2.33,
        cameraPushDur: 1.17,
      };

      const ICONS = [
        {
          name: "clock",
          sel: "#clock-pos",
          targetX: W * 0.06,
          targetY: H * 0.18,
          delay: TIMING.clockEntryAt,
          entryRotation: -180,
          entryEase: "back.out(1.5)",
        },
        {
          name: "scissors",
          sel: "#scissors-pos",
          targetX: W * 0.85,
          targetY: H * 0.2,
          delay: TIMING.scissorsEntryAt,
          entryRotation: 0,
          entryEase: "back.out(1.5)",
        },
        {
          name: "video",
          sel: "#video-pos",
          targetX: W * 0.04,
          targetY: H * 0.68,
          delay: TIMING.videoEntryAt,
          entryRotation: 0,
          entryEase: "back.out(1.4)",
        },
        {
          name: "play",
          sel: "#play-pos",
          targetX: W * 0.88,
          targetY: H * 0.65,
          delay: TIMING.playEntryAt,
          entryRotation: 90,
          entryEase: "back.out(1.5)",
        },
      ];

      /* ================================================================
         SET ICON TARGET POSITIONS + INITIAL EXPANSION OFFSETS
         ================================================================ */
      ICONS.forEach(({ sel, targetX, targetY }) => {
        const el = document.querySelector(sel);
        el.style.left = targetX + "px";
        el.style.top = targetY + "px";

        // Initial offset for START_OFFSET = 0.4:
        // position = target + (center - target) * (1 - 0.4) = target + 0.6 * (center - target)
        const offsetX = (CENTER_X - targetX) * (1 - TIMING.startOffset);
        const offsetY = (CENTER_Y - targetY) * (1 - TIMING.startOffset);
        setTweenState(el, { x: offsetX, y: offsetY });
      });

      /* Set initial entry state on each .icon-entry */
      ICONS.forEach(({ name, entryRotation }) => {
        setTweenState(`.${name}-entry`, {
          scale: 0,
          opacity: 0,
          rotation: entryRotation,
        });
      });

      /* Set initial background and camera scale + subtle pan baseline */
      setTweenState(".bg", { scale: 1.05 });
      setTweenState(".camera", { scale: 0.92, x: 0, y: 2 });
      setTweenState("#counter-number", { scale: 0.2 / 0.42 });

      /* ================================================================
         TIMELINE
         ================================================================ */
      const transformState = new WeakMap();
      const transformKeys = new Set([
        "x",
        "y",
        "z",
        "translateX",
        "translateY",
        "translateZ",
        "xPercent",
        "yPercent",
        "scale",
        "scaleX",
        "scaleY",
        "rotation",
        "rotate",
        "rotationX",
        "rotateX",
        "rotationY",
        "rotateY",
      ]);
      const propMap = new Map([
        ["x", "translateX"],
        ["y", "translateY"],
        ["z", "translateZ"],
        ["rotation", "rotate"],
        ["rotationX", "rotateX"],
        ["rotationY", "rotateY"],
        ["rotationZ", "rotateZ"],
      ]);

      function ms(seconds) {
        return Math.round(Number(seconds || 0) * 1000);
      }

      function resolveTargets(target) {
        if (Array.isArray(target)) return target.flatMap(resolveTargets);
        if (typeof target === "string") return [...document.querySelectorAll(target)];
        return target ? [target] : [];
      }

      function cssLength(value) {
        return typeof value === "number" ? value + "px" : String(value);
      }

      function cssAngle(value) {
        return typeof value === "number" ? value + "deg" : String(value);
      }

      function renderTransform(state) {
        const parts = [];
        if (state.xPercent !== undefined) parts.push("translateX(" + state.xPercent + "%)");
        if (state.yPercent !== undefined) parts.push("translateY(" + state.yPercent + "%)");
        const tx = state.x ?? state.translateX;
        const ty = state.y ?? state.translateY;
        const tz = state.z ?? state.translateZ;
        if (tx !== undefined) parts.push("translateX(" + cssLength(tx) + ")");
        if (ty !== undefined) parts.push("translateY(" + cssLength(ty) + ")");
        if (tz !== undefined) parts.push("translateZ(" + cssLength(tz) + ")");
        const rotate = state.rotation ?? state.rotate;
        const rotateX = state.rotationX ?? state.rotateX;
        const rotateY = state.rotationY ?? state.rotateY;
        const rotateZ = state.rotationZ ?? state.rotateZ;
        if (rotate !== undefined) parts.push("rotate(" + cssAngle(rotate) + ")");
        if (rotateX !== undefined) parts.push("rotateX(" + cssAngle(rotateX) + ")");
        if (rotateY !== undefined) parts.push("rotateY(" + cssAngle(rotateY) + ")");
        if (rotateZ !== undefined) parts.push("rotateZ(" + cssAngle(rotateZ) + ")");
        if (state.scale !== undefined) parts.push("scale(" + state.scale + ")");
        if (state.scaleX !== undefined) parts.push("scaleX(" + state.scaleX + ")");
        if (state.scaleY !== undefined) parts.push("scaleY(" + state.scaleY + ")");
        return parts.join(" ");
      }

      function setTweenState(target, vars) {
        for (const item of resolveTargets(target)) {
          if (!(item instanceof Element)) {
            Object.assign(item, vars);
            continue;
          }
          const state = transformState.get(item) ?? {};
          let changedTransform = false;
          for (const [key, value] of Object.entries(vars)) {
            if (key === "attr") {
              for (const [attrName, attrValue] of Object.entries(value))
                item.setAttribute(attrName, attrValue);
            } else if (key === "textContent") {
              item.textContent = value;
            } else if (key.startsWith("--")) {
              item.style.setProperty(key, value);
            } else if (transformKeys.has(key)) {
              state[key] = value;
              changedTransform = true;
            } else if (key === "opacity") {
              item.style.opacity = value;
            } else if (key === "backgroundColor") {
              item.style.backgroundColor = value;
            } else if (key === "boxShadow") {
              item.style.boxShadow = value;
            } else {
              item.style[key] = value;
            }
          }
          if (changedTransform) {
            transformState.set(item, state);
            item.style.transform = renderTransform(state);
          }
        }
      }

      function getTweenProperty(target, key) {
        const item = resolveTargets(target)[0];
        if (!item) return undefined;
        if (item instanceof Element && key.startsWith("--"))
          return getComputedStyle(item).getPropertyValue(key);
        if (item instanceof Element && transformKeys.has(key))
          return transformState.get(item)?.[key];
        return item[key];
      }

      function mapEase(ease) {
        if (typeof ease !== "string") return ease;
        const compact = ease.replace(/\s+/g, "");
        const table = {
          none: "linear",
          "power1.in": "inQuad",
          "power1.out": "outQuad",
          "power1.inOut": "inOutQuad",
          "power2.in": "inCubic",
          "power2.out": "outCubic",
          "power2.inOut": "inOutCubic",
          "power3.in": "inQuart",
          "power3.out": "outQuart",
          "power3.inOut": "inOutQuart",
          "power4.in": "inQuint",
          "power4.out": "outQuint",
          "power4.inOut": "inOutQuint",
          "sine.inOut": "inOutSine",
          "sine.out": "outSine",
          "expo.out": "outExpo",
          "expo.inOut": "inOutExpo",
        };
        if (table[compact]) return table[compact];
        const back = /^back\.(in|out|inOut)\(([^)]*)\)$/.exec(compact);
        if (back) return back[1] + "Back(" + back[2] + ")";
        return ease;
      }

      function normalizeStagger(stagger) {
        if (stagger === undefined) return undefined;
        if (typeof stagger === "number") return anime.stagger(ms(stagger));
        const span = stagger.each ?? stagger.amount;
        if (span === undefined) return undefined;
        const options = {};
        if (stagger.from !== undefined) options.from = stagger.from;
        if (stagger.grid !== undefined) options.grid = stagger.grid;
        if (stagger.axis !== undefined) options.axis = stagger.axis;
        if (stagger.start !== undefined) options.start = ms(stagger.start);
        if (stagger.ease !== undefined) options.ease = mapEase(stagger.ease);
        return anime.stagger(ms(span), options);
      }

      function normalizeTween(vars, fromVars, target, position) {
        const props = {};
        let driverKey = null;
        for (const [key, value] of Object.entries(vars)) {
          if (
            ["duration", "ease", "stagger", "repeat", "yoyo", "overwrite", "onUpdate"].includes(key)
          )
            continue;
          const animeKey = propMap.get(key) ?? key;
          const fromValue = fromVars?.[key];
          props[animeKey] = fromValue === undefined ? value : [fromValue, value];
          if (driverKey === null) driverKey = key;
        }
        props.duration = ms(vars.duration ?? 0.5);
        if (vars.ease !== undefined) props.ease = mapEase(vars.ease);
        const delay = normalizeStagger(vars.stagger);
        if (delay !== undefined) props.delay = delay;
        if (vars.repeat !== undefined)
          props.loop = vars.repeat === -1 ? true : Math.max(0, Math.floor(vars.repeat)) + 1;
        if (vars.yoyo === true) props.alternate = true;
        if (typeof vars.onUpdate === "function") {
          const userUpdate = vars.onUpdate;
          const durationSeconds = Number(vars.duration ?? 0.5);
          props.onUpdate = function (self) {
            const first = resolveTargets(target)[0];
            let progress = 0;
            if (driverKey !== null) {
              const raw = keyValue(first, driverKey);
              const start = Number(fromVars?.[driverKey] ?? 0);
              const end = Number(vars[driverKey]);
              const current = Number(raw);
              if (
                Number.isFinite(current) &&
                Number.isFinite(start) &&
                Number.isFinite(end) &&
                end !== start
              ) {
                progress = (current - start) / (end - start);
              }
            }
            adapterTime.current =
              Number(position || 0) + Math.max(0, Math.min(1, progress)) * durationSeconds;
            userUpdate.call(this, self);
          };
        }
        return props;
      }

      function keyValue(target, key) {
        if (!target) return undefined;
        if (target instanceof Element && key.startsWith("--"))
          return getComputedStyle(target).getPropertyValue(key);
        return target[key];
      }

      const adapterTime = { current: 0 };

      function createTimelineAdapter(timeline) {
        return {
          to(target, vars, position = 0) {
            timeline.add(target, normalizeTween(vars, undefined, target, position), ms(position));
            return this;
          },
          fromTo(target, fromVars, toVars, position = 0) {
            timeline.add(target, normalizeTween(toVars, fromVars, target, position), ms(position));
            return this;
          },
          set(target, vars, position = 0) {
            timeline.add(
              { tick: 0 },
              {
                tick: [0, 1],
                duration: 1,
                ease: "linear",
                onUpdate: () => setTweenState(target, vars),
              },
              ms(position),
            );
            return this;
          },
          time() {
            return adapterTime.current;
          },
        };
      }
      const tl = anime.createTimeline({ autoplay: false });
      const anim = createTimelineAdapter(tl);

      anim.to(
        ".bg",
        {
          scale: 1.07,
          x: 6,
          y: -4,
          duration: 3.5,
          ease: "sine.inOut",
        },
        0,
      );

      /* ----------------------------------------------------------------
         PHASE 2: Icon entries (staggered)
         ---------------------------------------------------------------- */
      ICONS.forEach(({ name, delay, entryEase }) => {
        // Scale + opacity + rotation entry
        anim.to(
          `.${name}-entry`,
          {
            scale: 1,
            opacity: 0.85,
            rotation: 0,
            duration: TIMING.entryDur,
            ease: entryEase,
          },
          delay,
        );
      });

      // Stroke-draw the outline circles/rect on clock, video, and play during their entries
      anim.to(
        ".clock-ring",
        {
          attr: { "stroke-dashoffset": 0 },
          duration: TIMING.entryDur,
          ease: "power2.out",
        },
        TIMING.clockEntryAt,
      );

      anim.to(
        ".video-frame",
        {
          attr: { "stroke-dashoffset": 0 },
          duration: TIMING.entryDur,
          ease: "power2.out",
        },
        TIMING.videoEntryAt,
      );

      anim.to(
        ".play-ring",
        {
          attr: { "stroke-dashoffset": 0 },
          duration: TIMING.entryDur,
          ease: "power2.out",
        },
        TIMING.playEntryAt,
      );

      /* ----------------------------------------------------------------
         PHASE 3: Counter (with 3D entry) + expansion
         ---------------------------------------------------------------- */
      // Counter 3D entry — translateZ + rotateY + scale + opacity, in parallel.
      anim.fromTo(
        "#counter-3d",
        { rotationY: 10, scale: 0.7, z: -300, opacity: 0 },
        {
          rotationY: 0,
          scale: 1.0,
          z: 0,
          opacity: 1,
          duration: TIMING.counterEntryDur,
          ease: "power3.out",
        },
        TIMING.counterEntryAt,
      );

      // Counter number + apparent size. Use discrete frame keyframes so
      // HyperFrames can seek directly to any sampled time.
      const counterEl = document.querySelector("#counter-number");
      const COUNT_STEPS = 30;
      const COUNT_START_SCALE = 0.2 / 0.42;

      for (let i = 0; i <= COUNT_STEPS; i += 1) {
        const p = i / COUNT_STEPS;
        const eased = 1 - Math.pow(1 - p, 2.5);
        const number = Math.round(eased * 90);
        const scale = COUNT_START_SCALE + eased * (1 - COUNT_START_SCALE);

        anim.set(
          counterEl,
          {
            textContent: String(number),
            scale,
          },
          TIMING.countAt + p * TIMING.countDur,
        );
      }

      // Percent symbol enters later with its own spring.
      anim.fromTo(
        "#counter-percent",
        { x: 60, rotation: 20, scale: 0.4, opacity: 0 },
        {
          x: 0,
          rotation: 0,
          scale: 1.0,
          opacity: 1,
          duration: TIMING.percentEntryDur,
          ease: "back.out(1.4)",
        },
        TIMING.percentEntryAt,
      );

      // Icon expansion — per-icon, same start/dur/ease as counter for lock-step sync.
      ICONS.forEach(({ sel }) => {
        anim.to(
          sel,
          {
            x: 0,
            y: 0,
            duration: TIMING.countDur,
            ease: "power2.out",
          },
          TIMING.countAt,
        );
      });

      /* ----------------------------------------------------------------
         PHASE 4: Multi-phase camera
         ---------------------------------------------------------------- */
      anim.to(
        ".camera",
        {
          scale: 1.0,
          duration: TIMING.cameraFocusDur,
          ease: "power2.out",
        },
        TIMING.cameraFocusAt,
      );

      anim.to(
        ".camera",
        {
          scale: 1.08,
          duration: TIMING.cameraPushDur,
          ease: "power2.out",
        },
        TIMING.cameraPushAt,
      );

      // Subtle deterministic pan from the the source camera micro-movement.
      anim.to(
        ".camera",
        {
          x: 3,
          y: 1.6,
          duration: 3.5,
          ease: "sine.inOut",
        },
        0,
      );

      /* ----------------------------------------------------------------
         CONTINUOUS INTERNAL SVG MOTION
         All four icons' inner animations are derived from anim.time() in
         a single shared onUpdate. Cheaper than 4-5 separate onUpdates,
         easier to inspect.
         ---------------------------------------------------------------- */
      const SCISSOR_SPEED = 0.12 * 30; // = 3.6 rad/sec (sin freq)
      const SCISSOR_AMP = 15;
      const REC_OPACITY_SPEED = 0.15 * 30; // = 4.5 rad/sec
      const REC_SCALE_SPEED = 0.1 * 30; // = 3.0 rad/sec
      const REC_OPACITY_AMP = 0.3;
      const REC_OPACITY_BASE = 0.7;
      const REC_SCALE_AMP = 0.15;
      const PLAY_PULSE_SPEED = 0.08 * 30; // = 2.4 rad/sec
      const PLAY_PULSE_AMP = 0.08;
      const CUTTING_FLOW_SPEED = 0.5 * 30; // = 15 units/sec (for stroke-dashoffset)

      const scissorUpper = document.querySelector(".scissor-upper");
      const scissorLower = document.querySelector(".scissor-lower");
      const recordDot = document.querySelector(".record-dot");
      const playTri = document.querySelector(".play-tri");
      const cuttingLine = document.querySelector(".cutting-line");

      anim.to(
        { tick: 0 },
        {
          tick: 1,
          duration: 3.5,
          ease: "none",
          onUpdate: function () {
            const t = anim.time();

            // Scissors — symmetric oscillation, anchored to scissors delay
            const sciT = t - TIMING.scissorsEntryAt;
            const sciAngle = sciT > 0 ? Math.sin(sciT * SCISSOR_SPEED) * SCISSOR_AMP : 0;
            setTweenState(scissorUpper, { rotation: sciAngle });
            setTweenState(scissorLower, { rotation: -sciAngle });

            // Cutting line — linear dash flow (negative = leftward drift)
            const cutT = t - TIMING.scissorsEntryAt;
            if (cutT > 0) {
              setTweenState(cuttingLine, {
                attr: { "stroke-dashoffset": -cutT * CUTTING_FLOW_SPEED },
              });
            }

            // Record dot — phase-offset opacity and scale
            const recT = t - TIMING.videoEntryAt;
            if (recT > 0) {
              const recOpacity =
                Math.sin(recT * REC_OPACITY_SPEED) * REC_OPACITY_AMP + REC_OPACITY_BASE;
              const recScale = 1 + Math.sin(recT * REC_SCALE_SPEED) * REC_SCALE_AMP;
              setTweenState(recordDot, { opacity: recOpacity, scale: recScale });
            }

            // Play triangle — gentle scale pulse
            const playT = t - TIMING.playEntryAt;
            if (playT > 0) {
              const playScale = 1 + Math.sin(playT * PLAY_PULSE_SPEED) * PLAY_PULSE_AMP;
              setTweenState(playTri, { scale: playScale });
            }
          },
        },
        0,
      );

      /* Clock minute hand — linear rotation, anchored to clock entry */
      anim.fromTo(
        ".clock-hand-min",
        { rotation: 0, svgOrigin: "12 12" },
        {
          rotation: 420, // 120 deg/sec × 3.5s, scaled for visible motion
          svgOrigin: "12 12",
          duration: 3.5 - TIMING.clockEntryAt,
          ease: "none",
        },
        TIMING.clockEntryAt,
      );
      hyperframesAnime.register("main", tl);
    </script>
  </body>
</html>
