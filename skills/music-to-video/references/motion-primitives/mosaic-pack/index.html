<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1920, height=1080" />
    <title>mosaic_pack</title>
    <script src="https://cdn.jsdelivr.net/npm/animejs@4.5.0/dist/bundles/anime.umd.min.js"></script>
    <style>
      :root {
        --hg-violet: #7c3aed;
        --hg-violet-2: #a855f7;
        --hg-bg: #0a0a0f;
        --hg-fg: #f5f5fa;
        --hg-dim: #6b6b78;
      }
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        width: 1920px;
        height: 1080px;
        overflow: hidden;
        background: var(--hg-bg);
        font-family: "Inter", system-ui, sans-serif;
        color: var(--hg-fg);
        -webkit-font-smoothing: antialiased;
      }
      #scene {
        position: absolute;
        inset: 0;
        width: 1920px;
        height: 1080px;
      }
      .stage {
        position: absolute;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .grid {
        display: grid;
        grid-template-columns: repeat(6, 200px);
        grid-template-rows: repeat(4, 200px);
        gap: 18px;
      }
      .tile {
        border-radius: 14px;
        will-change: transform, opacity;
      }
    </style>
  </head>
  <body>
    <div
      id="root"
      data-composition-id="main"
      data-start="0"
      data-duration="2.4"
      data-width="1920"
      data-height="1080"
    >
      <div id="scene" class="clip" data-start="0" data-duration="2.4" data-track-index="1">
        <div class="stage">
          <div class="grid" id="grid"></div>
        </div>
      </div>
    </div>
    <script>
      const tl = anime.createTimeline({ autoplay: false });

      // Deterministic palette + grid build (6x4 = 24 cells).
      const PALETTE = ["#7c3aed", "#a855f7", "#f5f5fa", "#2a2a3a", "#b56dff", "#6b6b78"];
      const COLS = 6;
      const ROWS = 4;
      const COUNT = COLS * ROWS;
      const grid = document.getElementById("grid");
      const tiles = [];
      for (let i = 0; i < COUNT; i++) {
        const tile = document.createElement("div");
        tile.className = "tile";
        tile.style.background = PALETTE[i % PALETTE.length];
        grid.appendChild(tile);
        tiles.push(tile);
      }

      // Scatter each tile from a deterministic offset/rotation, then pack into place.
      // Land order ripples diagonally (col + row) for a deterministic "assembling" feel.
      const STEP_MS = 70;
      for (let i = 0; i < COUNT; i++) {
        const col = i % COLS;
        const row = Math.floor(i / COLS);
        const dx = (((i * 53) % 200) - 100) * 9; // far-flung scatter X
        const dy = (((i * 89) % 200) - 100) * 7; // far-flung scatter Y
        const rot = ((i * 37) % 80) - 40; // deterministic tilt
        const order = col + row; // diagonal land sequence
        tl.add(
          tiles[i],
          {
            translateX: [dx, 0],
            translateY: [dy, 0],
            rotate: [rot, 0],
            scale: 1,
            opacity: [0.15, 1],
            visibility: ["visible", "visible"],
            duration: 600,
            ease: "outBack(1.6)",
          },
          100 + order * STEP_MS,
        );
      }

      // Settle the packed poster with a tiny breath so the loop seats cleanly.
      tl.add("#grid", { scale: 1.02, duration: 180, ease: "outCubic" }, 1900);
      tl.add("#grid", { scale: 1, duration: 320, ease: "inOutCubic" }, 2080);

      hyperframesAnime.register("main", tl);
    </script>
  </body>
</html>
