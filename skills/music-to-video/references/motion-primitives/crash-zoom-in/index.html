<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1920, height=1080" />
    <title>19 · crash_zoom_in</title>
    <script src="https://cdn.jsdelivr.net/npm/animejs@4.5.0/dist/bundles/anime.umd.min.js"></script>
    <style>
      :root {
        --hg-violet: #7c3aed;
        --hg-violet-2: #a855f7;
        --hg-bg: #0a0a0f;
        --hg-fg: #f5f5fa;
        --hg-dim: #6b6b78;
      }
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        width: 1920px;
        height: 1080px;
        overflow: hidden;
        background: var(--hg-bg);
        font-family: "Inter", system-ui, sans-serif;
        color: var(--hg-fg);
        -webkit-font-smoothing: antialiased;
      }
      #scene {
        position: absolute;
        inset: 0;
        width: 1920px;
        height: 1080px;
      }
      .zoom-stage {
        position: absolute;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        will-change: transform;
      }
      .radial-bg {
        position: absolute;
        inset: 0;
        background: radial-gradient(
          circle at center,
          rgba(168, 85, 247, 0.18) 0%,
          transparent 35%,
          rgba(0, 0, 0, 0.6) 80%
        );
        opacity: 0;
        will-change: opacity, transform;
      }
      .speed-lines {
        position: absolute;
        inset: 0;
        background: repeating-radial-gradient(
          circle at 50% 50%,
          transparent 0px,
          transparent 6px,
          rgba(255, 255, 255, 0.08) 7px,
          transparent 8px
        );
        opacity: 0;
        will-change: opacity;
        mix-blend-mode: screen;
      }
      .hero {
        font-weight: 900;
        font-size: 360px;
        letter-spacing: -0.05em;
        color: var(--hg-fg);
        white-space: nowrap;
        will-change: transform, filter;
      }
    </style>
  </head>
  <body>
    <div
      id="root"
      data-composition-id="main"
      data-start="0"
      data-duration="2"
      data-width="1920"
      data-height="1080"
    >
      <div id="scene" class="clip" data-start="0" data-duration="2" data-track-index="1">
        <div class="radial-bg"></div>
        <div class="speed-lines"></div>
        <div class="zoom-stage"><div class="hero">CRASH</div></div>
      </div>
    </div>
    <script>
      const tl = anime.createTimeline({ autoplay: false });
      tl.add(".hero", { scale: 0.03, filter: "blur(20px)", opacity: 0, duration: 0 }, 0);
      tl.add(
        ".hero",
        {
          scale: [0.03, 1],
          filter: ["blur(20px)", "blur(0px)"],
          opacity: [0, 1],
          duration: 320,
          ease: "inExpo",
        },
        450,
      );
      tl.add(
        ".radial-bg",
        { opacity: [0, 1], scale: [0.4, 1], duration: 320, ease: "inExpo" },
        450,
      );
      tl.add(
        ".speed-lines",
        { opacity: [0, 1], scale: [0.2, 1.4], duration: 320, ease: "inExpo" },
        450,
      );
      tl.add(".hero", { scale: [1, 0.96], duration: 80, ease: "outQuart" }, 770);
      tl.add(".hero", { scale: [0.96, 1], duration: 500, ease: "outElastic(1, .55)" }, 850);
      tl.add(
        ".zoom-stage",
        {
          translateX: "__raw:amp",
          translateY: "__raw:amp * 0.5 * (i % 2 ? -1 : 1)",
          duration: 30,
          ease: "steps(1)",
        },
        0,
      );
      tl.add(
        ".zoom-stage",
        {
          translateX: ["__raw:amp", 0],
          translateY: ["__raw:amp * 0.5 * (i % 2 ? -1 : 1)", 0],
          duration: 100,
          ease: "outCubic",
        },
        0,
      );
      tl.add(".speed-lines", { opacity: [1, 0], duration: 400, ease: "outCubic" }, 820);
      tl.add(".radial-bg", { opacity: [1, 0.5], duration: 500, ease: "outCubic" }, 770);
      hyperframesAnime.register("main", tl);
    </script>
  </body>
</html>
