<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1920, height=1080" />
    <title>typewriter_reveal</title>
    <script src="https://cdn.jsdelivr.net/npm/animejs@4.5.0/dist/bundles/anime.umd.min.js"></script>
    <style>
      :root {
        --hg-violet: #7c3aed;
        --hg-violet-2: #a855f7;
        --hg-bg: #0a0a0f;
        --hg-fg: #f5f5fa;
        --hg-dim: #6b6b78;
      }
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        width: 1920px;
        height: 1080px;
        overflow: hidden;
        background: var(--hg-bg);
        font-family: "Inter", system-ui, sans-serif;
        color: var(--hg-fg);
        -webkit-font-smoothing: antialiased;
      }
      #scene {
        position: absolute;
        inset: 0;
        width: 1920px;
        height: 1080px;
      }
      .stage {
        position: absolute;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .line {
        display: flex;
        align-items: baseline;
        font-family: "JetBrains Mono", ui-monospace, monospace;
        font-weight: 800;
        font-size: 200px;
        letter-spacing: 0.02em;
        line-height: 0.95;
        white-space: nowrap;
      }
      .char {
        display: inline-block;
        opacity: 0;
        will-change: opacity;
      }
      .char.space {
        width: 0.4em;
      }
      .caret {
        display: inline-block;
        width: 0.09em;
        height: 0.86em;
        margin-left: 0.06em;
        background: var(--hg-violet-2);
        will-change: opacity;
      }
    </style>
  </head>
  <body>
    <div
      id="root"
      data-composition-id="main"
      data-start="0"
      data-duration="2.4"
      data-width="1920"
      data-height="1080"
    >
      <div id="scene" class="clip" data-start="0" data-duration="2.4" data-track-index="1">
        <div class="stage">
          <div class="line" id="line">
            <span class="char">S</span><span class="char">Y</span><span class="char">S</span
            ><span class="char">T</span><span class="char">E</span><span class="char">M</span
            ><span class="char space">&nbsp;</span><span class="char">O</span
            ><span class="char">N</span><span class="char">L</span><span class="char">I</span
            ><span class="char">N</span><span class="char">E</span
            ><span class="caret" id="caret"></span>
          </div>
        </div>
      </div>
    </div>
    <script>
      const tl = anime.createTimeline({ autoplay: false });
      tl.add(".char", { opacity: 1, duration: 0 }, 0);
      tl.add("#caret", { opacity: 1, duration: 0 }, 0);
      tl.add(
        "#caret",
        { opacity: [1, 0], duration: 90, ease: "steps(1)", loop: 9, alternate: true },
        0,
      );
      tl.add("#caret", { opacity: 0, duration: 0 }, 2320);
      hyperframesAnime.register("main", tl);
    </script>
  </body>
</html>
