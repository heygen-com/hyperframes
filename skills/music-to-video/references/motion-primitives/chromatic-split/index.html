<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1920, height=1080" />
    <title>04 · chromatic_split</title>
    <script src="https://cdn.jsdelivr.net/npm/animejs@4.5.0/dist/bundles/anime.umd.min.js"></script>
    <style>
      :root {
        --hg-violet: #7c3aed;
        --hg-violet-2: #a855f7;
        --hg-bg: #0a0a0f;
        --hg-fg: #f5f5fa;
        --hg-dim: #6b6b78;
      }
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        width: 1920px;
        height: 1080px;
        overflow: hidden;
        background: var(--hg-bg);
        font-family: "Inter", system-ui, sans-serif;
        color: var(--hg-fg);
        -webkit-font-smoothing: antialiased;
      }
      #scene {
        position: absolute;
        inset: 0;
        width: 1920px;
        height: 1080px;
      }
      .stage {
        position: absolute;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .stack {
        position: relative;
        font-weight: 900;
        font-size: 280px;
        letter-spacing: -0.04em;
        line-height: 0.95;
        white-space: nowrap;
      }
      .layer {
        position: absolute;
        top: 0;
        left: 0;
        mix-blend-mode: screen;
        will-change: transform;
      }
      .layer.r {
        color: #ff2a4a;
      }
      .layer.g {
        color: #2afff0;
      }
      .layer.b {
        color: #b56dff;
      }
      .spacer {
        color: transparent;
      }
      .scanlines {
        position: absolute;
        inset: 0;
        background: repeating-linear-gradient(
          0deg,
          rgba(255, 255, 255, 0) 0px,
          rgba(255, 255, 255, 0) 3px,
          rgba(255, 255, 255, 0.04) 3px,
          rgba(255, 255, 255, 0.04) 4px
        );
        opacity: 0;
        pointer-events: none;
        will-change: opacity;
      }
    </style>
  </head>
  <body>
    <div
      id="root"
      data-composition-id="main"
      data-start="0"
      data-duration="2"
      data-width="1920"
      data-height="1080"
    >
      <div id="scene" class="clip" data-start="0" data-duration="2" data-track-index="1">
        <div class="stage">
          <div class="stack">
            <span class="spacer">GLITCH</span>
            <span class="layer r">GLITCH</span>
            <span class="layer g">GLITCH</span>
            <span class="layer b">GLITCH</span>
          </div>
        </div>
        <div class="scanlines"></div>
      </div>
    </div>
    <script>
      const tl = anime.createTimeline({ autoplay: false });
      tl.add(".stack", { opacity: [0, 1], scale: [0.95, 1], duration: 250, ease: "outCubic" }, 50);
      tl.add(".layer.r", { translateX: -2, duration: 0 }, 0);
      tl.add(".layer.g", { translateX: 2, duration: 0 }, 0);
      tl.add(".layer.b", { translateX: 0, duration: 0 }, 0);
      tl.add(".layer.r", { translateX: [-2, -14], duration: 60, ease: "steps(1)" }, 350);
      tl.add(".layer.g", { translateX: [2, 14], duration: 60, ease: "steps(1)" }, 350);
      tl.add(".layer.r", { translateX: [-14, -4], duration: 60, ease: "steps(1)" }, 500);
      tl.add(".layer.g", { translateX: [14, 4], duration: 60, ease: "steps(1)" }, 500);
      tl.add(".layer.r", { translateX: [-4, -22], duration: 40, ease: "steps(1)" }, 850);
      tl.add(".layer.g", { translateX: [4, 22], duration: 40, ease: "steps(1)" }, 850);
      tl.add(".layer.b", { translateX: [0, 6], duration: 40, ease: "steps(1)" }, 850);
      tl.add(".layer.r", { translateX: [-22, -6], duration: 40, ease: "steps(1)" }, 970);
      tl.add(".layer.g", { translateX: [22, 6], duration: 40, ease: "steps(1)" }, 970);
      tl.add(".layer.b", { translateX: [6, -2], duration: 40, ease: "steps(1)" }, 970);
      tl.add(".layer.r", { translateX: [-6, -3], duration: 400, ease: "outCubic" }, 1200);
      tl.add(".layer.g", { translateX: [6, 3], duration: 400, ease: "outCubic" }, 1200);
      tl.add(".layer.b", { translateX: [-2, 0], duration: 400, ease: "outCubic" }, 1200);
      tl.add(".scanlines", { opacity: [0, 0.85], duration: 60, ease: "steps(1)" }, 350);
      tl.add(".scanlines", { opacity: [0.85, 0.25], duration: 500, ease: "outCubic" }, 1000);
      hyperframesAnime.register("main", tl);
    </script>
  </body>
</html>
