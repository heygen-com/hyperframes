<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1920, height=1080" />
    <title>05 · mask_reveal</title>
    <script src="https://cdn.jsdelivr.net/npm/animejs@4.5.0/dist/bundles/anime.umd.min.js"></script>
    <style>
      :root {
        --hg-violet: #7c3aed;
        --hg-violet-2: #a855f7;
        --hg-bg: #0a0a0f;
        --hg-fg: #f5f5fa;
        --hg-dim: #6b6b78;
      }
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        width: 1920px;
        height: 1080px;
        overflow: hidden;
        background: var(--hg-bg);
        font-family: "Inter", system-ui, sans-serif;
        color: var(--hg-fg);
        -webkit-font-smoothing: antialiased;
      }
      #scene {
        position: absolute;
        inset: 0;
        width: 1920px;
        height: 1080px;
      }
      .stage {
        position: absolute;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .hero {
        font-weight: 900;
        font-size: 280px;
        letter-spacing: -0.04em;
        line-height: 0.95;
        color: var(--hg-fg);
        white-space: nowrap;
      }
      .mask-wrap {
        position: relative;
        overflow: hidden;
        padding: 0 60px;
      }
      .mask-clip {
        clip-path: inset(0 100% 0 0);
        will-change: clip-path;
      }
      .sweep {
        position: absolute;
        top: 0;
        bottom: 0;
        width: 8px;
        background: var(--hg-violet);
        box-shadow:
          0 0 40px var(--hg-violet),
          0 0 80px var(--hg-violet);
        left: 0;
        opacity: 0;
        will-change: transform, opacity;
      }
    </style>
  </head>
  <body>
    <div
      id="root"
      data-composition-id="main"
      data-start="0"
      data-duration="2"
      data-width="1920"
      data-height="1080"
    >
      <div id="scene" class="clip" data-start="0" data-duration="2" data-track-index="1">
        <div class="stage">
          <div class="mask-wrap">
            <div class="hero mask-clip">REVEAL</div>
            <div class="sweep"></div>
          </div>
        </div>
      </div>
    </div>
    <script>
      const tl = anime.createTimeline({ autoplay: false });
      tl.add(".mask-clip", { clipPath: "inset(0 100% 0 0)", duration: 0 }, 0);
      tl.add(".sweep", { translateX: 0, opacity: 0, duration: 0 }, 0);
      tl.add(".sweep", { opacity: [0, 1], duration: 80, ease: "outCubic" }, 100);
      tl.add(".sweep", { translateX: [0, 1300], duration: 750, ease: "outExpo" }, 150);
      tl.add(
        ".mask-clip",
        { clipPath: ["inset(0 100% 0 0)", "inset(0 0% 0 0)"], duration: 750, ease: "outExpo" },
        180,
      );
      tl.add(".sweep", { opacity: [1, 0], duration: 300, ease: "inCubic" }, 850);
      hyperframesAnime.register("main", tl);
    </script>
  </body>
</html>
