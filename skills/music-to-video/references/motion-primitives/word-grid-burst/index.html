<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1920, height=1080" />
    <title>word_grid_burst</title>
    <script src="https://cdn.jsdelivr.net/npm/animejs@4.5.0/dist/bundles/anime.umd.min.js"></script>
    <style>
      :root {
        --hg-violet: #7c3aed;
        --hg-violet-2: #a855f7;
        --hg-bg: #0a0a0f;
        --hg-fg: #f5f5fa;
        --hg-dim: #6b6b78;
      }
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        width: 1920px;
        height: 1080px;
        overflow: hidden;
        background: var(--hg-bg);
        font-family: "Inter", system-ui, sans-serif;
        color: var(--hg-fg);
        -webkit-font-smoothing: antialiased;
      }
      #scene {
        position: absolute;
        inset: 0;
        width: 1920px;
        height: 1080px;
      }
      .stage {
        position: absolute;
        inset: 0;
        display: grid;
        grid-template-columns: repeat(5, 1fr);
        grid-template-rows: repeat(3, 1fr);
        align-items: center;
        justify-items: center;
        padding: 140px 120px;
        gap: 24px;
      }
      .cell {
        font-weight: 900;
        font-size: 92px;
        letter-spacing: -0.03em;
        line-height: 0.95;
        color: var(--hg-fg);
        white-space: nowrap;
        will-change: transform, opacity;
      }
    </style>
  </head>
  <body>
    <div
      id="root"
      data-composition-id="main"
      data-start="0"
      data-duration="2.8"
      data-width="1920"
      data-height="1080"
    >
      <div id="scene" class="clip" data-start="0" data-duration="2.8" data-track-index="1">
        <div class="stage">
          <div class="cell">PULSE</div>
          <div class="cell">FORGE</div>
          <div class="cell">SURGE</div>
          <div class="cell">VOLT</div>
          <div class="cell">CORE</div>
          <div class="cell">FLUX</div>
          <div class="cell">SPARK</div>
          <div class="cell">DRIVE</div>
          <div class="cell">BLAZE</div>
          <div class="cell">WAVE</div>
          <div class="cell">SHIFT</div>
          <div class="cell">BOLT</div>
          <div class="cell">RUSH</div>
          <div class="cell">PEAK</div>
          <div class="cell">IGNITE</div>
        </div>
      </div>
    </div>
    <script>
      const tl = anime.createTimeline({ autoplay: false });
      tl.add(
        ".cell",
        {
          opacity: [0, 1],
          visibility: ["hidden", "visible"],
          scale: [0.8, 1],
          duration: 220,
          ease: "outBack(1.8)",
        },
        0,
      );
      tl.add(
        ".cell",
        { opacity: [1, 0.25], visibility: ["visible", "visible"], duration: 180, ease: "outCubic" },
        2300,
      );
      tl.add(
        ".cell",
        {
          opacity: [0.25, 1],
          visibility: ["visible", "visible"],
          scale: [1, 1.25],
          color: "var(--hg-violet-2)",
          duration: 220,
          ease: "outBack(2)",
        },
        2320,
      );
      hyperframesAnime.register("main", tl);
    </script>
  </body>
</html>
