<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>tier-1-title-card</title>
    <script src="https://cdn.jsdelivr.net/npm/animejs@4.5.0/dist/bundles/anime.umd.min.js"></script>
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        width: 1280px;
        height: 720px;
        overflow: hidden;
        background: #0a0a0a;
        font-family: Helvetica, Arial, sans-serif;
      }
      .title {
        position: absolute;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        color: #ffffff;
        font-size: 160px;
        font-weight: 800;
        letter-spacing: 0.05em;
        opacity: 0;
      }
    </style>
  </head>
  <body>
    <div
      id="stage"
      data-composition-id="tier-1-title-card"
      data-start="0"
      data-width="1280"
      data-height="720"
      data-duration="3"
      data-fps="30"
    >
      <div id="title" class="clip" data-start="0" data-duration="3" data-track-index="0">
        <div class="title">HELLO</div>
      </div>

      <script>
        // Translation of Remotion's
        //   interpolate(frame, [0, 15, 75, 90], [0, 1, 1, 0]) at fps=30
        // into a paused anime.js timeline keyed in milliseconds.
        // Frame ranges → time ranges:  0/30=0,  15/30=0.5,  75/30=2.5,  90/30=3.0
        const tl = anime.createTimeline({ autoplay: false });
        tl.add("#title .title", { opacity: 1, duration: 500, ease: "linear" }, 0);
        tl.add("#title .title", { opacity: [1, 1], duration: 2000, ease: "linear" }, 500);
        tl.add("#title .title", { opacity: [1, 0], duration: 500, ease: "linear" }, 2500);
        hyperframesAnime.register("tier-1-title-card", tl);
      </script>
    </div>
  </body>
</html>
