<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>tier-3-data-driven</title>
    <script src="https://cdn.jsdelivr.net/npm/animejs@4.5.0/dist/bundles/anime.umd.min.js"></script>
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        width: 1280px;
        height: 720px;
        overflow: hidden;
        background: #0a0a0a;
        font-family: Helvetica, Arial, sans-serif;
        color: #ffffff;
      }
      .scene {
        position: absolute;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        opacity: 0;
      }

      /* Scene 1 — Title */
      .scene-1 {
        flex-direction: column;
      }
      .scene-1 .title {
        font-size: 160px;
        font-weight: 900;
        letter-spacing: 0.05em;
        transform: scale(0);
      }
      .scene-1 .subtitle {
        font-size: 36px;
        font-weight: 400;
        color: #9ca3af;
        margin-top: 24px;
        opacity: 0;
      }

      /* Scene 2 — Stats */
      .scene-2 {
        gap: 48px;
      }
      .stat-card {
        width: 280px;
        height: 220px;
        background: #1a1a1a;
        border-radius: 16px;
        border: 2px solid var(--card-color);
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        opacity: 0;
        transform: scale(0);
      }
      .stat-card .number {
        font-size: 72px;
        font-weight: 800;
        color: var(--card-color);
        line-height: 1;
      }
      .stat-card .label {
        font-size: 24px;
        font-weight: 500;
        color: #9ca3af;
        margin-top: 16px;
        text-transform: uppercase;
        letter-spacing: 0.1em;
      }

      /* Scene 3 — Outro */
      .scene-3 .outro-wrap {
        position: relative;
        display: inline-block;
        opacity: 0;
      }
      .scene-3 .outro-text {
        font-size: 80px;
        font-weight: 600;
      }
      .scene-3 .outro-underline {
        position: absolute;
        left: 0;
        bottom: -8px;
        width: 100%;
        height: 6px;
        background: #fbbf24;
        border-radius: 3px;
        transform: scaleX(0);
        transform-origin: left center;
      }
    </style>
  </head>
  <body>
    <div
      id="stage"
      data-composition-id="tier-3-data-driven"
      data-start="0"
      data-width="1280"
      data-height="720"
      data-duration="10"
      data-fps="30"
      data-title="STARGAZED"
      data-subtitle="by HeyGen"
      data-outro="thanks for watching"
    >
      <!-- Scene 1: Title -->
      <div
        id="scene-1"
        class="scene scene-1 clip"
        data-start="0"
        data-duration="3"
        data-track-index="0"
      >
        <div class="title">STARGAZED</div>
        <div class="subtitle">by HeyGen</div>
      </div>

      <!-- Scene 2: Stats — three StatCards as repeated markup with per-instance data attrs -->
      <div
        id="scene-2"
        class="scene scene-2 clip"
        data-start="3"
        data-duration="4"
        data-track-index="0"
      >
        <div
          class="stat-card"
          data-stat-index="0"
          data-stat-value="1247"
          style="--card-color: #fbbf24"
        >
          <div class="number">0</div>
          <div class="label">Stars</div>
        </div>
        <div
          class="stat-card"
          data-stat-index="1"
          data-stat-value="312"
          style="--card-color: #60a5fa"
        >
          <div class="number">0</div>
          <div class="label">Forks</div>
        </div>
        <div
          class="stat-card"
          data-stat-index="2"
          data-stat-value="48"
          style="--card-color: #f87171"
        >
          <div class="number">0</div>
          <div class="label">Issues</div>
        </div>
      </div>

      <!-- Scene 3: Outro -->
      <div
        id="scene-3"
        class="scene scene-3 clip"
        data-start="7"
        data-duration="3"
        data-track-index="0"
      >
        <div class="outro-wrap">
          <div class="outro-text">thanks for watching</div>
          <div class="outro-underline"></div>
        </div>
      </div>

      <script>
        // ────────────────────────────────────────────────────────────────────
        // Translation of Stargazed.tsx
        //
        // Remotion structure:
        //   <Composition schema={zod} defaultProps={...} fps=30 dur=300>
        //     <Sequence 0..90>   <TitleScene title subtitle />
        //     <Sequence 90..210> <StatsScene stats />
        //     <Sequence 210..300><OutroScene text />
        //
        // HF structure:
        //   - root #stage carries data-* with the same props (title, subtitle, outro)
        //   - 3 scene divs with data-start/data-duration in seconds (frames/fps)
        //   - Custom React subcomponents inline as repeated HTML; their per-instance
        //     props become data-* attributes on the markup
        //   - Animation lives in a single paused anime.js timeline keyed by
        //     composition milliseconds (anime.js `.add()` position/duration
        //     are ms; comments below keep the source seconds for reference)
        //
        // Frame → time:
        //   Sequence(0,90)    → 0s..3s        (title)
        //   Sequence(90,210)  → 3s..7s        (stats; 4s window)
        //   Sequence(210,300) → 7s..10s       (outro)
        //   Stagger(i*12)     → i*0.4s        (12 frames at 30fps)
        // ────────────────────────────────────────────────────────────────────

        const tl = anime.createTimeline({ autoplay: false });

        // ─── Scene 1: Title ─────────────────────────────────────────────────
        const scene1 = document.querySelector("#scene-1");
        const title = scene1.querySelector(".title");
        const subtitle = scene1.querySelector(".subtitle");

        tl.add(scene1, { opacity: 1, duration: 0 }, 0);
        // spring({damping:12, stiffness:100, mass:1}) → outBack(1.4) ~0.7s
        tl.add(title, { scale: 1, duration: 700, ease: "outBack(1.4)" }, 0);
        // interpolate(frame, [20,40], [0,1]) at fps=30 → 0.667s..1.333s linear
        tl.add(subtitle, { opacity: [0, 1], duration: 667, ease: "linear" }, 667);
        tl.add(scene1, { opacity: 0, duration: 0 }, 3000);

        // ─── Scene 2: Stats ─────────────────────────────────────────────────
        const scene2 = document.querySelector("#scene-2");
        const cards = scene2.querySelectorAll(".stat-card");

        tl.add(scene2, { opacity: 1, duration: 0 }, 3000);

        cards.forEach((card, i) => {
          const stagger = i * 400; // i * 12 frames at 30 fps, in ms
          const start = 3000 + stagger;
          const value = Number(card.dataset.statValue);
          const numberEl = card.querySelector(".number");

          // StatCard entrance:
          //   spring({damping:14, stiffness:90, mass:1}) → outBack(1.2) ~0.7s
          //   interpolate(local, [0,12], [0,1]) → 0s..0.4s linear opacity
          tl.add(card, { scale: 1, duration: 700, ease: "outBack(1.2)" }, start);
          tl.add(card, { opacity: 1, duration: 400, ease: "linear" }, start);

          // AnimatedNumber: count from 0 → value with easeOutCubic over 45 frames (1.5s).
          // outCubic is anime.js's name for cubic easeOut (GSAP's power3.out).
          const counter = { v: 0 };
          tl.add(
            counter,
            {
              v: value,
              duration: 1500,
              ease: "outCubic",
              onUpdate: () => {
                numberEl.textContent = Math.round(counter.v).toLocaleString();
              },
            },
            start,
          );
        });

        tl.add(scene2, { opacity: 0, duration: 0 }, 7000);

        // ─── Scene 3: Outro ─────────────────────────────────────────────────
        const scene3 = document.querySelector("#scene-3");
        const outroWrap = scene3.querySelector(".outro-wrap");
        const underline = scene3.querySelector(".outro-underline");

        tl.add(scene3, { opacity: 1, duration: 0 }, 7000);
        // interpolate(frame, [0,12], [0,1]) → 0s..0.4s linear opacity
        tl.add(outroWrap, { opacity: 1, duration: 400, ease: "linear" }, 7000);
        // interpolate(frame, [10,40], [0,1]) for underline → starts at 7+0.333s, dur 1s
        tl.add(underline, { scaleX: 1, duration: 1000, ease: "linear" }, 7333);

        hyperframesAnime.register("tier-3-data-driven", tl);
      </script>
    </div>
  </body>
</html>
