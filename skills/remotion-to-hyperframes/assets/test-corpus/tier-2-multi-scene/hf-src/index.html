<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>tier-2-multi-scene</title>
    <script src="https://cdn.jsdelivr.net/npm/animejs@4.5.0/dist/bundles/anime.umd.min.js"></script>
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        width: 1280px;
        height: 720px;
        overflow: hidden;
        background: #0a0a0a;
        font-family: Helvetica, Arial, sans-serif;
      }
      .scene {
        position: absolute;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        opacity: 0;
      }
      .title {
        font-size: 140px;
        font-weight: 800;
        color: #ffffff;
        letter-spacing: 0.05em;
        transform: scale(0);
      }
      .square {
        width: 200px;
        height: 200px;
        opacity: 0;
        transform: scale(0.8);
      }
      .outro {
        font-size: 100px;
        font-weight: 600;
        color: #ffffff;
      }
    </style>
  </head>
  <body>
    <div
      id="stage"
      data-composition-id="tier-2-multi-scene"
      data-start="0"
      data-width="1280"
      data-height="720"
      data-duration="6"
      data-fps="30"
    >
      <div id="scene-1" class="scene clip" data-start="0" data-duration="2" data-track-index="0">
        <div class="title">Welcome</div>
      </div>

      <div id="scene-2" class="scene clip" data-start="2" data-duration="2" data-track-index="0">
        <img class="square" src="assets/square.png" alt="" />
      </div>

      <div id="scene-3" class="scene clip" data-start="4" data-duration="2" data-track-index="0">
        <div class="outro">Goodbye</div>
      </div>

      <audio
        id="bg-music"
        data-start="0"
        data-duration="6"
        data-track-index="1"
        data-volume="0.5"
        src="assets/music.wav"
      ></audio>

      <script>
        // Translation of Remotion's 3-Sequence MultiScene at fps=30, total 6s.
        //
        // Scene 1 (0-2s): TitleScene — spring scale on "Welcome".
        //   Remotion: spring({frame, fps, config: {damping:12, stiffness:100, mass:1}})
        //   anime.js equivalent: outBack(1.4) over ~0.7s. Spring → ease translation
        //   is approximate; expect minor differences in the tail of the curve.
        //
        // Scene 2 (2-4s): ImageScene — opacity 0→1 over 0-0.5s + scale 0.8→1.0 over 0-2.0s.
        //   Both Remotion interpolates use linear (default), match with ease:"linear".
        //
        // Scene 3 (4-6s): OutroScene — opacity 0→1 over 4-5s, linear.

        const tl = anime.createTimeline({ autoplay: false });
        tl.add("#scene-1", { opacity: 1, duration: 0 }, 0);
        tl.add(".title", { scale: 1, duration: 700, ease: "outBack(1.4)" }, 0);
        tl.add("#scene-1", { opacity: 0, duration: 0 }, 2000);
        tl.add("#scene-2", { opacity: 1, duration: 0 }, 2000);
        tl.add(".square", { opacity: 1, duration: 500, ease: "linear" }, 2000);
        tl.add(".square", { scale: 1, duration: 2000, ease: "linear" }, 2000);
        tl.add("#scene-2", { opacity: 0, duration: 0 }, 4000);
        tl.add("#scene-3", { opacity: 1, duration: 0 }, 4000);
        tl.add(".outro", { opacity: [0, 1], duration: 1000, ease: "linear" }, 4000);
        hyperframesAnime.register("tier-2-multi-scene", tl);
      </script>
    </div>
  </body>
</html>
