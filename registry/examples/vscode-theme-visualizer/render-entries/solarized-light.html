<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1920, height=1080" />
    <title>Solarized Light Render Entry</title>
    <script src="https://cdn.jsdelivr.net/npm/animejs@4.5.0/dist/bundles/anime.umd.min.js"></script>
    <style>
      html,
      body {
        margin: 0;
        width: 1920px;
        height: 1080px;
        overflow: hidden;
        background: #000000;
      }

      #render-solarized-light {
        position: relative;
        width: 1920px;
        height: 1080px;
        overflow: hidden;
        background: #000000;
      }
    </style>
  </head>
  <body>
    <div
      id="render-solarized-light"
      data-composition-id="render-solarized-light"
      data-start="0"
      data-duration="11"
      data-width="1920"
      data-height="1080"
    >
      <div
        id="clip-solarized-light"
        data-composition-id="vscode-solarized-light"
        data-composition-src="../compositions/solarized-light.html"
        data-start="0"
        data-duration="11"
        data-track-index="1"
      ></div>
      <script>
        hyperframesAnime.register(
          "render-solarized-light",
          anime.createTimeline({ autoplay: false }),
          { labels: {} },
        );
      </script>
    </div>
  </body>
</html>
