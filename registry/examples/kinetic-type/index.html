<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1920, height=1080" />
    <title>Kinetic Type</title>
    <script src="https://cdn.jsdelivr.net/npm/animejs@4.5.0/dist/bundles/anime.umd.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,400;0,700;0,900;1,400&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=block"
      rel="stylesheet"
    />
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      html,
      body {
        margin: 0;
        width: 1920px;
        height: 1080px;
        overflow: hidden;
        background-color: #0a0a0f;
        font-family: "Inter", sans-serif;
      }
    </style>
  </head>
  <body>
    <div
      id="root"
      data-composition-id="main"
      data-start="0"
      data-duration="15"
      data-width="1920"
      data-height="1080"
    >
      <!--
        A-Roll video. Media is only seeked/decoded when it is a DIRECT child of
        the host root, so the footage lives here (not inside the sub-composition
        template) and its per-scene reveal is driven on the main timeline below.
      -->
      <video
        id="a-roll-video"
        class="clip"
        src="https://gen-os-static.s3.us-east-2.amazonaws.com/astral_assets/uploaded_assets/67cf5a05_e134ec83a57042b38776c952da595870.mp4"
        data-start="0"
        data-duration="14.72"
        data-track-index="0"
        data-has-audio="true"
        playsinline
        style="
          position: absolute;
          left: 0;
          top: 0;
          width: 100%;
          height: 100%;
          object-fit: cover;
          z-index: 0;
          opacity: 0;
        "
      ></video>
      <div
        id="graphics-layer"
        data-composition-id="main-graphics"
        data-composition-src="compositions/main-graphics.html"
        data-start="0"
        data-duration="15"
        data-track-index="1"
        data-width="1920"
        data-height="1080"
        style="position: absolute; inset: 0; z-index: 1"
      ></div>
    </div>

    <script>
      const tl = anime.createTimeline({ autoplay: false });
      tl.add("#a-roll-video", { opacity: 0, duration: 0 }, 0);
      tl.add("#a-roll-video", { opacity: 1, duration: 0 }, 2200);
      tl.add("#a-roll-video", { opacity: [1, 0], duration: 400 }, 11700);
      tl.add("#a-roll-video", { opacity: 1, duration: 0 }, 13500);
      hyperframesAnime.register("main", tl, { labels: {} });
    </script>
  </body>
</html>
