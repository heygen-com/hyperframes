<template id="intro-template">
  <div
    id="intro-comp"
    data-composition-id="intro"
    data-start="0"
    data-duration="__VIDEO_DURATION__"
    data-width="1920"
    data-height="1080"
  >
    <div class="intro-container">
      <h1 class="title">HYPERFRAMES</h1>
    </div>

    <style>
      @import url("https://fonts.googleapis.com/css2?family=Nunito:wght@900&display=swap");

      [data-composition-id="intro"] .intro-container {
        width: 100%;
        height: 100%;
        display: flex;
        justify-content: center;
        align-items: center;
        pointer-events: none;
      }

      [data-composition-id="intro"] .title {
        font-family: "Nunito", sans-serif;
        font-weight: 900;
        font-size: 180px;
        color: #ff2d8a; /* Hot Pink */
        text-transform: uppercase;
        transform: rotate(-5deg); /* Tilted 5 degrees */
        margin: 0;
        padding: 20px;
        /* Layered offset shadow for depth without suffocating letterforms */
        filter: drop-shadow(8px 8px 0 #ffffff) drop-shadow(15px 15px 0 rgba(0, 0, 0, 0.1));
        /* opacity 0 hides the title until the timeline reveals it. Do NOT
           re-add the individual CSS `scale: 0` property here: anime.js
           animates scale via its own inline `transform`, which multiplies
           with (and never clears) the individual property -- the title
           stayed at scale 0 for the whole clip. GSAP folded individual
           transform properties into its transform management, which is why
           the original authoring worked there. */
        opacity: 0;
      }
    </style>

    <script src="https://cdn.jsdelivr.net/npm/animejs@4.5.0/dist/bundles/anime.umd.min.js"></script>
    <script>
      (function () {
        const tl = anime.createTimeline({ autoplay: false });

        // --- INTRO SEQUENCE ---
        // Animation: Scale-up bounce (0% to 110% to 100%) with elastic overshoot
        // Starts at 0.5s, lasts until 3s
        tl.add(
          '[data-composition-id="intro"] .title',
          {
            opacity: 1,
            scale: [0, 1.1],
            duration: 600,
            ease: "outBack(1.7)",
          },
          500,
        )
          .add(
            '[data-composition-id="intro"] .title',
            {
              scale: 1,
              duration: 400,
              ease: "outElastic(1, .3)",
            },
            1100,
          )
          // Ambient motion. Explicit 0deg from: the pinned GSAP baseline
          // renders the entrance UNTILTED (GSAP dropped the stylesheet's
          // rotate(-5deg) when it took over the transform -- its known
          // axis-loss behavior, reproduced here for parity), so the wobble
          // starts from 0, not from the CSS cascade's -5deg.
          .add(
            '[data-composition-id="intro"] .title',
            {
              rotate: ["0deg", "-3deg"],
              duration: 1000,
              loop: 2,
              alternate: true,
              ease: "inOutSine",
            },
            1000,
          )
          // Exit intro
          .add(
            '[data-composition-id="intro"] .title',
            {
              opacity: 0,
              scale: 0.5,
              duration: 300,
              ease: "inCubic",
            },
            1400,
          );

        // --- END CARD SEQUENCE ---
        // Appears at 14.619s (after Moment 3 finishes exiting at 14.239 + 0.3)
        tl.add(
          '[data-composition-id="intro"] .title',
          {
            opacity: 1,
            scale: 1.1,
            duration: 600,
            ease: "outBack(1.7)",
          },
          14619,
        ).add(
          '[data-composition-id="intro"] .title',
          {
            scale: 1,
            duration: 400,
            ease: "outElastic(1, .3)",
          },
          15219,
        );

        hyperframesAnime.register("intro", tl, { labels: {} });
      })();
    </script>
  </div>
</template>
