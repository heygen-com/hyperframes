<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Swiss Grid - Hyperframes</title>
    <script src="https://cdn.jsdelivr.net/npm/animejs@4.5.0/dist/bundles/anime.umd.min.js"></script>
    <style>
      body,
      html {
        margin: 0;
        padding: 0;
        width: 1920px;
        height: 1080px;
        background-color: #f2f2f2;
        overflow: hidden;
        font-family: "Helvetica", Arial, sans-serif;
      }

      #master-root {
        width: 1920px;
        height: 1080px;
        position: relative;
      }

      .background-grid {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: 0;
      }

      /* A-roll styling */
      #short_mag_cut_frame {
        position: absolute;
        border-radius: 8px; /* Required */
        z-index: 1;
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
        overflow: hidden;
        background: #000;
      }

      #short_mag_cut,
      #short_mag_cut_frame > img.__render_frame__,
      #short_mag_cut_frame > img.__preview_render_frame__ {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        object-fit: cover;
        object-position: center;
        display: block;
      }

      /* Overlay layers */
      .overlay-layer {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
      }

      #intro-comp {
        z-index: 2;
      }
      #graphics-comp {
        z-index: 3;
      }
      #captions-comp {
        z-index: 4;
      }
    </style>
  </head>
  <body>
    <div
      id="master-root"
      data-composition-id="master"
      data-width="1920"
      data-height="1080"
      data-start="0"
      data-duration="__VIDEO_DURATION__"
    >
      <!-- Background Grid -->
      <img id="bg-grid" class="background-grid" src="assets/swiss-grid.svg" alt="Grid" />

      <!-- Intro Sub-composition -->
      <div
        id="intro-comp"
        class="overlay-layer"
        data-composition-id="intro"
        data-composition-src="compositions/intro.html"
        data-start="0"
        data-duration="1.86"
        data-track-index="2"
      ></div>

      <!-- Graphics Sub-composition -->
      <div
        id="graphics-comp"
        class="overlay-layer"
        data-composition-id="graphics"
        data-composition-src="compositions/graphics.html"
        data-start="0"
        data-duration="__VIDEO_DURATION__"
        data-track-index="3"
      ></div>

      <!-- Captions Sub-composition -->
      <div
        id="captions-comp"
        class="overlay-layer"
        data-composition-id="captions"
        data-composition-src="compositions/captions.html"
        data-start="0"
        data-duration="__VIDEO_DURATION__"
        data-track-index="4"
      ></div>

      <script>
        const masterTL = anime.createTimeline({ autoplay: false });
        masterTL.add(
          "#short_mag_cut_frame",
          {
            translateX: [-1000, 480],
            translateY: [120, 120],
            width: [960, 960],
            height: [840, 840],
            duration: 800,
            ease: "outCubic",
          },
          0,
        );
        masterTL.add(
          "#short_mag_cut_frame",
          {
            translateX: [480, 1080],
            translateY: [120, 120],
            width: [960, 720],
            height: [840, 720],
            duration: 250,
            ease: "outExpo",
          },
          1860,
        );
        masterTL.add(
          "#short_mag_cut_frame",
          {
            translateX: [1080, 1080],
            translateY: [120, 60],
            width: [720, 780],
            height: [720, 780],
            duration: 250,
            ease: "outExpo",
          },
          4680,
        );
        masterTL.add(
          "#short_mag_cut_frame",
          {
            translateX: [1080, 120],
            translateY: [60, 120],
            width: [780, 720],
            height: [780, 720],
            duration: 250,
            ease: "outExpo",
          },
          8880,
        );
        masterTL.add(
          "#short_mag_cut_frame",
          {
            translateX: [120, 240],
            translateY: [120, 60],
            width: [720, 1440],
            height: [720, 810],
            duration: 500,
            ease: "outExpo",
          },
          14200,
        );
        hyperframesAnime.register("master", masterTL, { labels: {} });
      </script>
    </div>

    <!-- A-roll Video (direct child of body to avoid video_nested_in_timed_element) -->
    <div id="short_mag_cut_frame">
      <video
        id="short_mag_cut"
        src="__VIDEO_SRC__"
        muted
        playsinline
        data-start="0"
        data-duration="__VIDEO_DURATION__"
        data-track-index="1"
      ></video>
    </div>
    <audio
      id="a-roll-audio"
      src="__VIDEO_SRC__"
      data-start="0"
      data-duration="__VIDEO_DURATION__"
      data-track-index="5"
      data-volume="1"
    ></audio>
  </body>
</html>
