<template id="graphics-template">

      <div class="stat-content">

    <style>
      [data-composition-id="graphics"] {

        width: 1920px;
        height: 1080px;
        font-family: "Outfit", sans-serif;
        color: white;
        overflow: hidden;

      [data-composition-id="graphics"] .moment {
        position: absolute;
        display: flex;
        align-items: center;
        justify-content: center;
        opacity: 0;
        /* The timeline handles the centering and drift */
      }

      /* Moment 1: Forest Green Circle */
      [data-composition-id="graphics"] #moment-1 {
        width: 500px;
        height: 500px;
        background-color: #3b5e3a;
        border-radius: 50%;
        left: 1150px;
        top: 290px;
      }

      [data-composition-id="graphics"] .stat-content {
        display: flex;
        flex-direction: column;
        align-items: center;
        text-align: center;
      }

      [data-composition-id="graphics"] .stat-desc {
        font-size: 36px;
        font-weight: 400;
        margin-top: 10px;
        max-width: 300px;
        line-height: 1.2;
      }

      [data-composition-id="graphics"] #moment-2 {
        width: 500px;
        height: 220px;
        background-color: #cc8832;

      [data-composition-id="graphics"] #moment-3 {

        padding: 0 40px;
        justify-content: center;
        gap: 30px;
      }

      [data-composition-id="graphics"] .stat-text {
        font-size: 80px;
        font-weight: 700;
        letter-spacing: -2px;
      }

      [data-composition-id="graphics"] #moment-3 .stat-text {
        font-size: 54px;
        letter-spacing: -1px;
      }

      [data-composition-id="graphics"] .icon-shape {
        width: 80px;
        height: 80px;
        color: rgba(255, 255, 255, 0.9);
      }

      [data-composition-id="graphics"] .icon-shape svg {
        width: 100%;
        height: 100%;
      }
    </style>

    <script src="https://cdn.jsdelivr.net/npm/animejs@4.5.0/dist/bundles/anime.umd.min.js"></script>
    <script>
      (function () {
        const tl = anime.createTimeline({ autoplay: false });
        tl.add(
          "#moment-1",
          {
            opacity: [0, 1],
            translateX: ["+=40", 0],
            translateY: ["+=15", 0],
            scale: [0.8, 1],
            duration: 1200,
            ease: "outBack(1.7)",
          },
          1800,
        );
        tl.add(
          "#moment-1",
          { opacity: [1, 0], scale: [1, 0.8], duration: 300, ease: "inCubic" },
          4200,
        );
        tl.add(
          "#moment-2",
          {
            opacity: [0, 1],
            translateY: ["-=40", 0],
            translateX: ["+=10", 0],
            scale: [0.8, 1],
            duration: 1200,
            ease: "outBack(1.7)",
          },
          4600,
        );
        tl.add(
          "#moment-2",
          { opacity: [1, 0], scale: [1, 0.8], duration: 300, ease: "inCubic" },
          8300,
        );
        tl.add(
          "#moment-3",
          {
            opacity: [0, 1],
            translateX: ["-=40", 0],
            translateY: ["-=10", 0],
            scale: [0.8, 1],
            duration: 1200,
            ease: "outBack(1.7)",
          },
          8800,
        );
        tl.add("#moment-3", { opacity: [1, 0], duration: 500, ease: "inCubic" }, 13500);
        hyperframesAnime.register("graphics", tl, { labels: {} });
      })();
    </script>

</template>
