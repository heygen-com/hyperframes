<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Warm Grain - Hyperframes</title>
    <script src="https://cdn.jsdelivr.net/npm/animejs@4.5.0/dist/bundles/anime.umd.min.js"></script>
    <style>
      body,
      html {
        margin: 0;
        padding: 0;
        width: 1920px;
        height: 1080px;
        overflow: hidden;
        background-color: #f5f0e0; /* Cream background */
        font-family: "Outfit", sans-serif;
      }

      #main-composition {
        position: relative;
        width: 1920px;
        height: 1080px;
        overflow: hidden;
      }

      /* Paper texture and Grain overlay */
      #grain-overlay-comp {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
        z-index: 100;
      }

      /* Grain animation */
      @keyframes grain-noise {
        0%,
        100% {
          transform: translate(0, 0);
        }
        10% {
          transform: translate(-5%, -5%);
        }
        20% {
          transform: translate(-10%, 5%);
        }
        30% {
          transform: translate(5%, -10%);
        }
        40% {
          transform: translate(-5%, 15%);
        }
        50% {
          transform: translate(-10%, 5%);
        }
        60% {
          transform: translate(15%, 0);
        }
        70% {
          transform: translate(0, 10%);
        }
        80% {
          transform: translate(-15%, 0);
        }
        90% {
          transform: translate(10%, 5%);
        }
      }

      .grain-texture {
        position: absolute;
        top: -50%;
        left: -50%;
        width: 200%;
        height: 200%;
        background: url("https://www.transparenttextures.com/patterns/natural-paper.png");
        opacity: 0.15;
        animation: grain-noise 0.5s steps(1) infinite;
      }

      #a-roll {
        position: absolute;
        border-radius: 16px;
        object-fit: cover;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
      }

      .comp-layer {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
      }
    </style>
  </head>
  <body>
    <div
      id="main-composition"
      data-composition-id="main-video"
      data-width="1920"
      data-height="1080"
      data-start="0"
      data-duration="__VIDEO_DURATION__"
    >
      <!-- Background Layer -->
      <div
        id="grain-overlay-comp"
        data-composition-id="grain-overlay"
        data-width="1920"
        data-height="1080"
        data-start="0"
        data-duration="__VIDEO_DURATION__"
        data-track-index="100"
      >
        <div class="grain-texture"></div>
        <script>
          const grainTl = anime.createTimeline({ autoplay: false });
          hyperframesAnime.register("grain-overlay", grainTl, { labels: {} });
        </script>
      </div>

      <!-- A-Roll Video (muted — audio is separate) -->
      <video
        id="a-roll"
        src="__VIDEO_SRC__"
        muted
        playsinline
        data-start="0"
        data-duration="__VIDEO_DURATION__"
        data-track-index="0"
      ></video>
      <audio
        id="a-roll-audio"
        src="__VIDEO_SRC__"
        data-start="0"
        data-duration="__VIDEO_DURATION__"
        data-track-index="5"
        data-volume="1"
      ></audio>

      <!-- Compositions -->
      <div
        id="intro-layer"
        class="comp-layer"
        data-composition-id="intro"
        data-composition-src="compositions/intro.html"
        data-start="0"
        data-duration="2.5"
        data-track-index="1"
      ></div>

      <div
        id="graphics-layer"
        class="comp-layer"
        data-composition-id="graphics"
        data-composition-src="compositions/graphics.html"
        data-start="0"
        data-duration="__VIDEO_DURATION__"
        data-track-index="2"
      ></div>

      <div
        id="captions-layer"
        class="comp-layer"
        data-composition-id="captions"
        data-composition-src="compositions/captions.html"
        data-start="0"
        data-duration="__VIDEO_DURATION__"
        data-track-index="3"
      ></div>

      <script>
        const tl = anime.createTimeline({ autoplay: false });
        tl.add(
          "#a-roll",
          {
            translateX: "calc(-50% + 1100px)",
            translateY: "calc(-50% + 540px)",
            width: 1152,
            height: 648,
            duration: 0,
          },
          0,
        );
        tl.add(
          "#a-roll",
          {
            translateX: ["calc(-50% + 1100px)", "calc(-50% + 1200px)"],
            translateY: "calc(-50% + 540px)",
            width: [1152, 1536],
            height: [648, 864],
            duration: 1800,
            ease: "inOutCubic",
          },
          0,
        );
        tl.add(
          "#a-roll",
          {
            translateX: ["calc(-50% + 1200px)", "calc(-50% + 600px)"],
            translateY: ["calc(-50% + 540px)", "calc(-50% + 540px)"],
            width: [1536, 1344],
            height: [864, 756],
            duration: 500,
            ease: "inOutCubic",
          },
          1800,
        );
        tl.add(
          "#a-roll",
          {
            translateX: ["calc(-50% + 600px)", "calc(-50% + 960px)"],
            translateY: ["calc(-50% + 540px)", "calc(-50% + 750px)"],
            width: [1344, 1344],
            height: [756, 756],
            duration: 500,
            ease: "inOutCubic",
          },
          4600,
        );
        tl.add(
          "#a-roll",
          {
            translateX: ["calc(-50% + 960px)", "calc(-50% + 1320px)"],
            translateY: ["calc(-50% + 750px)", "calc(-50% + 540px)"],
            width: [1344, 1440],
            height: [756, 810],
            duration: 500,
            ease: "inOutCubic",
          },
          8800,
        );
        tl.add(
          "#a-roll",
          {
            translateX: ["calc(-50% + 1320px)", "calc(-50% + 960px)"],
            translateY: ["calc(-50% + 540px)", "calc(-50% + 540px)"],
            width: [1440, 1920],
            height: [810, 1080],
            duration: 1000,
            ease: "inOutCubic",
          },
          14000,
        );
        hyperframesAnime.register("main-video", tl, { labels: {} });
      </script>
    </div>
  </body>
</html>
