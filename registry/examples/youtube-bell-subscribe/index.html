<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1920, height=1080" />
    <meta data-composition-id="bell-subscribe" data-width="1920" data-height="1080" />
    <title>YouTube Bell Subscribe Alert</title>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        width: 1920px;
        height: 1080px;
        overflow: hidden;
        background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
        font-family:
          "Inter",
          -apple-system,
          sans-serif;
      }

      [data-composition-id="bell-subscribe"] {
        width: 100%;
        height: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .container {
        position: relative;
        width: 100%;
        height: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 80px;
      }

      .bell-wrapper {
        position: relative;
        width: 280px;
        height: 280px;
      }

      .bell-container {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 200px;
        height: 200px;
        background: #ff9f0d;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow: 0 30px 80px rgba(255, 159, 13, 0.4);
      }

      .bell-icon {
        font-size: 100px;
        filter: drop-shadow(0 5px 15px rgba(0, 0, 0, 0.2));
      }

      .glow-ring {
        position: absolute;
        width: 100%;
        height: 100%;
        border: 6px solid #ff9f0d;
        border-radius: 50%;
        opacity: 0;
      }

      .notification-dot {
        position: absolute;
        top: 20px;
        right: 20px;
        width: 50px;
        height: 50px;
        background: #ff3b3b;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 24px;
        font-weight: bold;
        color: white;
        opacity: 0;
        scale: 0;
      }

      .text-group {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 20px;
      }

      .main-text {
        font-size: 96px;
        font-weight: 900;
        color: #ff9f0d;
        opacity: 0;
        transform: translateX(-50px);
        text-transform: uppercase;
        letter-spacing: 3px;
      }

      .subtitle {
        font-size: 48px;
        color: #ffffff;
        font-weight: 300;
        opacity: 0;
        transform: translateX(50px);
        letter-spacing: 1px;
      }

      .button-text {
        font-size: 42px;
        color: #ff9f0d;
        font-weight: 700;
        opacity: 0;
        transform: scale(0.8);
        margin-top: 30px;
      }
    </style>
  </head>
  <body>
    <div
      id="root"
      data-composition-id="bell-subscribe"
      data-start="0"
      data-duration="7"
      data-width="1920"
      data-height="1080"
    >
      <div class="container">
        <div class="bell-wrapper">
          <div class="glow-ring" id="glow-1"></div>
          <div class="glow-ring" id="glow-2"></div>
          <div class="bell-container">
            <div class="bell-icon">🔔</div>
            <div class="notification-dot" id="dot">!</div>
          </div>
        </div>

        <div class="text-group">
          <div class="main-text" id="main-text">SUBSCRIBE</div>
          <div class="subtitle" id="subtitle">Never miss an upload</div>
          <div class="button-text" id="button-text">Turn on notifications →</div>
        </div>
      </div>
    </div>

    <script>
      const tl = gsap.timeline({ paused: true });

      // Bell shake entrance
      tl.from(
        ".bell-container",
        {
          scale: 0,
          opacity: 0,
          rotation: -180,
          duration: 0.6,
          ease: "back.out(2)",
        },
        0,
      );

      // Bell shake animation (left-right)
      tl.to(
        ".bell-container",
        {
          rotation: -15,
          duration: 0.15,
          ease: "power2.inOut",
        },
        0.2,
      );

      tl.to(".bell-container", {
        rotation: 15,
        duration: 0.15,
        ease: "power2.inOut",
      });

      tl.to(".bell-container", {
        rotation: -10,
        duration: 0.15,
        ease: "power2.inOut",
      });

      tl.to(".bell-container", {
        rotation: 0,
        duration: 0.15,
        ease: "power2.inOut",
      });

      // Notification dot pulse
      tl.to(
        "#dot",
        {
          opacity: 1,
          scale: 1,
          duration: 0.4,
          ease: "elastic.out(1, 0.6)",
        },
        0.3,
      );

      // Glow rings
      tl.to(
        "#glow-1",
        {
          scale: 1.3,
          opacity: 0,
          duration: 0.8,
          ease: "power1.out",
        },
        0.5,
      );

      tl.to(
        "#glow-2",
        {
          scale: 1.3,
          opacity: 0,
          duration: 0.8,
          ease: "power1.out",
        },
        0.7,
      );

      // Text animations
      tl.to(
        "#main-text",
        {
          opacity: 1,
          x: 0,
          duration: 0.6,
          ease: "back.out(1.5)",
        },
        0.8,
      );

      tl.to(
        "#subtitle",
        {
          opacity: 1,
          x: 0,
          duration: 0.6,
          ease: "back.out(1.5)",
        },
        1,
      );

      tl.to(
        "#button-text",
        {
          opacity: 1,
          scale: 1,
          duration: 0.5,
          ease: "back.out(1.5)",
        },
        1.3,
      );

      // Hold (2s)
      tl.to({}, {}, 3.5);

      // Exit
      tl.to(
        ".bell-container, #main-text, #subtitle, #button-text",
        {
          opacity: 0,
          y: -50,
          duration: 0.5,
          ease: "power2.in",
        },
        3.8,
      );

      window.__timelines = window.__timelines || {};
      window.__timelines["bell-subscribe"] = tl;
    </script>
  </body>
</html>
