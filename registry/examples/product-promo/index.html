<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1920, height=1080" />
    <title>Product Promo</title>
    <script src="https://cdn.jsdelivr.net/npm/animejs@4.5.0/dist/bundles/anime.umd.min.js"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;800&display=block"
      rel="stylesheet"
    />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        width: 1920px;
        height: 1080px;
        overflow: hidden;
        background: #0a0a0f;
        font-family: "Inter", sans-serif;
      }
      .scene {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
      }
      .caption-text-wrapper {
        position: absolute;
        bottom: 150px;
        left: 0;
        right: 0;
        display: flex;
        justify-content: center;
        pointer-events: none;
        overflow: hidden;
        padding: 10px 0;
      }
      .caption-line {
        color: white;
        font-size: 48px;
        font-weight: 600;
        letter-spacing: -0.02em;
        text-align: center;
        text-shadow: 0 4px 12px rgba(0, 0, 0, 0.5);
        transform: translateY(100%);
        opacity: 0;
      }
    </style>
  </head>
  <body>
    <div
      id="root"
      data-composition-id="main"
      data-start="0"
      data-duration="20"
      data-width="1920"
      data-height="1080"
    >
      <!-- Scene 1: Logo Intro -->
      <div
        id="scene-1"
        class="scene"
        data-composition-id="scene1-logo-intro"
        data-composition-src="compositions/scene1-logo-intro.html"
        data-start="0"
        data-duration="1.5"
        data-track-index="1"
        data-width="1920"
        data-height="1080"
      ></div>

      <!-- Scene 2-4: Continuous Canvas -->
      <div
        id="scene-2-4"
        class="scene"
        data-composition-id="scene2-4-canvas"
        data-composition-src="compositions/scene2-4-canvas.html"
        data-start="1.5"
        data-duration="12.5"
        data-track-index="1"
        data-width="1920"
        data-height="1080"
      ></div>

      <!-- Scene 5: Logo Outro -->
      <div
        id="scene-5"
        class="scene"
        data-composition-id="scene5-logo-outro"
        data-composition-src="compositions/scene5-logo-outro.html"
        data-start="14"
        data-duration="6"
        data-track-index="1"
        data-width="1920"
        data-height="1080"
      ></div>

      <!-- Captions -->
      <div
        id="captions-comp"
        data-composition-id="captions"
        data-start="1.5"
        data-duration="12.5"
        data-track-index="2"
        data-width="1920"
        data-height="1080"
      >
        <div class="caption-text-wrapper">
          <div id="caption-text" class="caption-line">Starting with a blank canvas.</div>
        </div>

        <script>
          (function () {
            const tl = anime.createTimeline({ autoplay: false });
            tl.add(
              "#caption-text",
              { opacity: 1, translateY: 0, duration: 800, ease: "outQuart" },
              0,
            );
            tl.add(
              "#caption-text",
              { opacity: [1, 0], translateY: [0, -20], duration: 300, ease: "inQuart" },
              3200,
            );
            tl.add(
              "#caption-text",
              { innerText: "Three cursors. One file. Zero meetings.", translateY: 40, duration: 0 },
              3500,
            );
            tl.add(
              "#caption-text",
              { opacity: [0, 1], translateY: [40, 0], duration: 600, ease: "outQuart" },
              3500,
            );
            tl.add(
              "#caption-text",
              { opacity: [1, 0], translateY: [0, -20], duration: 300, ease: "inQuart" },
              7700,
            );
            tl.add(
              "#caption-text",
              {
                innerText: "Components in. Feedback resolved. No one waited.",
                translateY: 40,
                duration: 0,
              },
              8000,
            );
            tl.add(
              "#caption-text",
              { opacity: [0, 1], translateY: [40, 0], duration: 600, ease: "outQuart" },
              8000,
            );
            tl.add(
              "#caption-text",
              { opacity: [1, 0], translateY: [0, -20], duration: 400, ease: "inQuart" },
              12100,
            );
            hyperframesAnime.register("captions", tl, { labels: {} });
          })();
        </script>
      </div>
    </div>

    <script>
      const mainTl = anime.createTimeline({ autoplay: false });

      mainTl.add("#scene-2-4", { scale: 1, filter: "blur(0px)", duration: 0 }, 1500);
      mainTl.add(
        "#scene-2-4",
        { duration: 250, scale: 0.94, filter: "blur(6px)", opacity: 0, ease: "inCubic" },
        13750,
      );

      hyperframesAnime.register("main", mainTl, { labels: {} });
    </script>
  </body>
</html>
