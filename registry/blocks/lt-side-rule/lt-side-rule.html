<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <script src="https://cdn.jsdelivr.net/npm/animejs@4.5.0/dist/bundles/anime.umd.min.js"></script>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        background: transparent;
        overflow: hidden;
      }
      body {
        width: 1920px;
        height: 1080px;
      }

      #root .lt {
        position: absolute;
        left: 130px;
        bottom: 120px;
        display: flex;
        align-items: stretch;
        gap: 26px;
      }
      #root .lt-bar {
        width: 8px;
        background: #46e5b7;
        border-radius: 4px;
        transform-origin: 50% 0%;
        flex-shrink: 0;
      }
      #root .lt-text {
        display: flex;
        flex-direction: column;
        justify-content: center;
        gap: 12px;
      }
      #root .lt-name {
        font-family: "League Gothic", sans-serif;
        font-size: 92px;
        font-weight: 400;
        color: #ffffff;
        line-height: 0.86;
        letter-spacing: 0.01em;
        text-transform: uppercase;
        white-space: nowrap;
        text-shadow: 0 2px 22px rgba(0, 0, 0, 0.5);
      }
      #root .lt-role {
        font-family: "JetBrains Mono", monospace;
        font-size: 26px;
        font-weight: 400;
        color: #e7eaf0;
        line-height: 1.2;
        letter-spacing: 0.04em;
        white-space: nowrap;
        text-shadow: 0 2px 16px rgba(0, 0, 0, 0.5);
      }
    </style>
  </head>
  <body>
    <div
      id="root"
      data-composition-id="lt-side-rule"
      data-width="1920"
      data-height="1080"
      data-start="0"
      data-duration="4.8"
    >
      <div id="lt-clip" class="clip" data-start="0" data-duration="4.8" data-track-index="0">
        <div id="lt" class="lt">
          <div id="lt-bar" class="lt-bar"></div>
          <div class="lt-text">
            <div id="lt-name" class="lt-name">Dr. Maya Chen</div>
            <div id="lt-role" class="lt-role">Host · Neuroscientist</div>
          </div>
        </div>
      </div>
    </div>

    <script>
      const tl = anime.createTimeline({ autoplay: false });
      tl.add("#lt-bar", { scaleY: [0, 1], duration: 500, ease: "outQuart" }, 100);
      tl.add(
        "#lt-name",
        { translateX: [-24, 0], opacity: [0, 1], duration: 500, ease: "outQuart" },
        260,
      );
      tl.add(
        "#lt-role",
        { translateX: [-24, 0], opacity: [0, 1], duration: 500, ease: "outQuart" },
        380,
      );
      tl.add("#lt-role", { opacity: [1, 0], duration: 300, ease: "inCubic" }, 4250);
      tl.add(
        "#lt-name",
        { translateY: -14, opacity: [1, 0], duration: 320, ease: "inCubic" },
        4300,
      );
      tl.add("#lt-bar", { scaleY: [1, 0], duration: 320, ease: "inCubic" }, 4320);
      hyperframesAnime.register("lt-side-rule", tl, { labels: {} });
    </script>
  </body>
</html>
