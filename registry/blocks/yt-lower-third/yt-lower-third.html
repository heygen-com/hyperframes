<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;700&display=block"
      rel="stylesheet"
    />
    <script src="https://cdn.jsdelivr.net/npm/animejs@4.5.0/dist/bundles/anime.umd.min.js"></script>
    <style>
      * {
        margin: 0;
        padding: 0;
      }
      html,
      body {
        background: transparent;
        overflow: hidden;
      }
      body {
        width: 1920px;
        height: 1080px;
        font-family: "DM Sans", sans-serif;
      }

      #root .lower-third-frame {
        position: absolute;
        bottom: 80px;
        left: 50%;
        transform: translateX(-50%);
      }

      #root .lower-third {
        position: relative;
        display: flex;
        align-items: center;
        gap: 28px;
        background: #ffffff;
        border-radius: 60px;
        padding: 20px 32px 20px 20px;
        box-shadow: 0 6px 32px rgba(0, 0, 0, 0.14);
      }

      #root .avatar {
        width: 96px;
        height: 96px;
        border-radius: 50%;
        object-fit: cover;
        flex-shrink: 0;
      }

      #root .channel-info {
        display: flex;
        flex-direction: column;
        gap: 2px;
        margin-right: 20px;
      }

      #root .channel-name {
        font-size: 34px;
        font-weight: 700;
        color: #0f0f0f;
        line-height: 1.3;
        letter-spacing: -0.01em;
      }

      #root .subscriber-count {
        font-size: 22px;
        font-weight: 400;
        color: #606060;
        line-height: 1.3;
      }

      #root .subscribe-btn {
        position: relative;
        width: 220px;
        height: 68px;
        border-radius: 34px;
        background: #0f0f0f;
        flex-shrink: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
      }

      #root .btn-text {
        position: absolute;
        font-family: "DM Sans", sans-serif;
        font-size: 24px;
        font-weight: 700;
        color: #ffffff;
        letter-spacing: 0.02em;
        white-space: nowrap;
      }

      #root .btn-text-subscribe {
        opacity: 1;
      }

      #root .btn-text-subscribed {
        opacity: 0;
        display: flex;
        align-items: center;
        gap: 8px;
      }

      #root .check-icon {
        display: inline-block;
        width: 24px;
        height: 24px;
      }

      #root .check-icon svg {
        width: 24px;
        height: 24px;
        display: block;
      }
    </style>
  </head>
  <body>
    <div
      id="root"
      data-composition-id="yt-lower-third"
      data-width="1920"
      data-height="1080"
      data-start="0"
      data-duration="4.5"
    >
      <div
        id="card-frame"
        class="clip lower-third-frame"
        data-start="0"
        data-duration="4.5"
        data-track-index="0"
      >
        <div id="card" class="lower-third">
          <img class="avatar" src="assets/avatar.jpg" alt="HeyGen" crossorigin="anonymous" />
          <div class="channel-info">
            <div class="channel-name">HeyGen</div>
            <div class="subscriber-count">82.2K subscribers</div>
          </div>
          <div id="subscribe-btn" class="subscribe-btn">
            <span id="btn-subscribe" class="btn-text btn-text-subscribe">Subscribe</span>
            <span id="btn-subscribed" class="btn-text btn-text-subscribed">
              <span class="check-icon"
                ><svg
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="#fff"
                  stroke-width="2.5"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                >
                  <polyline points="20 6 9 17 4 12"></polyline></svg
              ></span>
              Subscribed
            </span>
          </div>
        </div>
      </div>
    </div>

    <script>
      const tl = anime.createTimeline({ autoplay: false });
      tl.add(
        "#card",
        { translateY: [300, 0], opacity: [0, 1], duration: 500, ease: "outQuart" },
        100,
      );
      tl.add("#subscribe-btn", { scale: 0.92, duration: 150, ease: "outCubic" }, 1000);
      tl.add(
        "#subscribe-btn",
        { scale: [0.92, 1], duration: 400, ease: "outElastic(1, .4)" },
        1150,
      );
      tl.add("#btn-subscribe", { opacity: 0, duration: 80, ease: "linear" }, 1150);
      tl.add("#btn-subscribed", { opacity: 1, duration: 80, ease: "linear" }, 1180);
      tl.add(
        "#card",
        { translateY: [0, 300], opacity: [1, 0], duration: 250, ease: "inQuart" },
        3800,
      );
      hyperframesAnime.register("yt-lower-third", tl, { labels: {} });
    </script>
  </body>
</html>
