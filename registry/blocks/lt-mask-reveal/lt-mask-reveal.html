<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <script src="https://cdn.jsdelivr.net/npm/animejs@4.5.0/dist/bundles/anime.umd.min.js"></script>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        background: transparent;
        overflow: hidden;
      }
      body {
        width: 1920px;
        height: 1080px;
        font-family: "Montserrat", sans-serif;
      }

      #root .lt {
        position: absolute;
        left: 130px;
        bottom: 122px;
        display: flex;
        flex-direction: column;
        align-items: flex-start;
        gap: 14px;
      }
      #root .lt-namewrap {
        position: relative;
        overflow: hidden;
        padding: 2px 0;
      }
      #root .lt-name {
        font-size: 72px;
        font-weight: 900;
        color: #ffffff;
        line-height: 0.98;
        letter-spacing: -0.02em;
        white-space: nowrap;
        text-shadow: 0 2px 22px rgba(0, 0, 0, 0.45);
        will-change: clip-path;
      }
      #root .lt-sweep {
        position: absolute;
        top: 0;
        bottom: 0;
        left: 0;
        width: 8px;
        background: #ffd23f;
      }
      #root .lt-role {
        font-size: 28px;
        font-weight: 500;
        color: #e7eaf0;
        line-height: 1.2;
        letter-spacing: 0.02em;
        white-space: nowrap;
        text-shadow: 0 2px 16px rgba(0, 0, 0, 0.45);
      }
    </style>
  </head>
  <body>
    <div
      id="root"
      data-composition-id="lt-mask-reveal"
      data-width="1920"
      data-height="1080"
      data-start="0"
      data-duration="4.8"
    >
      <div id="lt-clip" class="clip" data-start="0" data-duration="4.8" data-track-index="0">
        <div id="lt" class="lt">
          <div class="lt-namewrap">
            <div id="lt-name" class="lt-name">Dr. Maya Chen</div>
            <div id="lt-sweep" class="lt-sweep"></div>
          </div>
          <div id="lt-role" class="lt-role">Host · Neuroscientist</div>
        </div>
      </div>
    </div>

    <script>
      const tl = anime.createTimeline({ autoplay: false });
      tl.add("#lt-sweep", { opacity: [0, 1], duration: 120, ease: "linear" }, 100);
      tl.add("#lt-sweep", { translateX: [0, 536], duration: 550, ease: "inOutCubic" }, 120);
      tl.add(
        "#lt-name",
        { clipPath: ["inset(0 100% 0 0)", "inset(0 0% 0 0)"], duration: 500, ease: "inOutCubic" },
        160,
      );
      tl.add("#lt-sweep", { opacity: [1, 0], duration: 150, ease: "linear" }, 600);
      tl.add(
        "#lt-role",
        { translateY: [14, 0], opacity: [0, 1], duration: 500, ease: "outQuart" },
        550,
      );
      tl.add("#lt-role", { opacity: [1, 0], duration: 300, ease: "inCubic" }, 4250);
      tl.add(
        "#lt-name",
        { clipPath: ["inset(0 0% 0 0)", "inset(0 0 0 100%)"], duration: 400, ease: "inCubic" },
        4300,
      );
      hyperframesAnime.register("lt-mask-reveal", tl, { labels: {} });
    </script>
  </body>
</html>
