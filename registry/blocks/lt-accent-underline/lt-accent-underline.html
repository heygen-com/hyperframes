<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <script src="https://cdn.jsdelivr.net/npm/animejs@4.5.0/dist/bundles/anime.umd.min.js"></script>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        background: transparent;
        overflow: hidden;
      }
      body {
        width: 1920px;
        height: 1080px;
      }

      #root .lt {
        position: absolute;
        left: 130px;
        bottom: 120px;
        display: flex;
        flex-direction: column;
        align-items: flex-start;
        gap: 14px;
      }
      #root .lt-name {
        font-family: "Oswald", sans-serif;
        font-size: 76px;
        font-weight: 700;
        color: #ffffff;
        line-height: 0.96;
        letter-spacing: 0.005em;
        text-transform: uppercase;
        white-space: nowrap;
        text-shadow: 0 2px 22px rgba(0, 0, 0, 0.45);
      }
      #root .lt-rule {
        height: 6px;
        width: 100%;
        background: #46e5b7;
        border-radius: 3px;
        transform-origin: 0% 50%;
      }
      #root .lt-role {
        font-family: "Space Mono", monospace;
        font-size: 28px;
        font-weight: 400;
        color: #e7eaf0;
        line-height: 1.2;
        letter-spacing: 0.04em;
        white-space: nowrap;
        text-shadow: 0 2px 16px rgba(0, 0, 0, 0.45);
      }
    </style>
  </head>
  <body>
    <div
      id="root"
      data-composition-id="lt-accent-underline"
      data-width="1920"
      data-height="1080"
      data-start="0"
      data-duration="4.8"
    >
      <div id="lt-clip" class="clip" data-start="0" data-duration="4.8" data-track-index="0">
        <div id="lt" class="lt">
          <div id="lt-name" class="lt-name">Dr. Maya Chen</div>
          <div id="lt-rule" class="lt-rule"></div>
          <div id="lt-role" class="lt-role">Host · Neuroscientist</div>
        </div>
      </div>
    </div>

    <script>
      const tl = anime.createTimeline({ autoplay: false });
      tl.add(
        "#lt-name",
        { translateY: [28, 0], opacity: [0, 1], duration: 550, ease: "outQuart" },
        100,
      );
      tl.add("#lt-rule", { scaleX: [0, 1], duration: 500, ease: "outQuint" }, 300);
      tl.add(
        "#lt-role",
        { translateY: [16, 0], opacity: [0, 1], duration: 500, ease: "outQuart" },
        460,
      );
      tl.add("#lt-role", { opacity: [1, 0], duration: 300, ease: "inCubic" }, 4250);
      tl.add("#lt-rule", { scaleX: [1, 0], duration: 300, ease: "inCubic" }, 4300);
      tl.add(
        "#lt-name",
        { translateY: [0, -16], opacity: [1, 0], duration: 320, ease: "inCubic" },
        4350,
      );
      hyperframesAnime.register("lt-accent-underline", tl, { labels: {} });
    </script>
  </body>
</html>
