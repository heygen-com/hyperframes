<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <script src="https://cdn.jsdelivr.net/npm/animejs@4.5.0/dist/bundles/anime.umd.min.js"></script>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        background: transparent;
        overflow: hidden;
      }
      body {
        width: 1920px;
        height: 1080px;
      }

      #root .lt {
        position: absolute;
        left: 120px;
        bottom: 116px;
      }
      #root .lt-block {
        background: #2756ff;
        padding: 20px 36px 24px 32px;
        box-shadow: 0 16px 44px rgba(39, 86, 255, 0.34);
        display: inline-flex;
        flex-direction: column;
        gap: 8px;
      }
      #root .lt-name {
        font-family: "League Gothic", sans-serif;
        font-size: 84px;
        font-weight: 400;
        color: #ffffff;
        line-height: 0.86;
        letter-spacing: 0.01em;
        text-transform: uppercase;
        white-space: nowrap;
      }
      #root .lt-role {
        font-family: "Space Mono", monospace;
        font-size: 24px;
        font-weight: 400;
        color: rgba(255, 255, 255, 0.86);
        line-height: 1.2;
        letter-spacing: 0.05em;
        white-space: nowrap;
      }
    </style>
  </head>
  <body>
    <div
      id="root"
      data-composition-id="lt-color-block"
      data-width="1920"
      data-height="1080"
      data-start="0"
      data-duration="4.8"
    >
      <div id="lt-clip" class="clip" data-start="0" data-duration="4.8" data-track-index="0">
        <div id="lt" class="lt">
          <div id="lt-block" class="lt-block">
            <div id="lt-name" class="lt-name">Dr. Maya Chen</div>
            <div id="lt-role" class="lt-role">Host · Neuroscientist</div>
          </div>
        </div>
      </div>
    </div>

    <script>
      const tl = anime.createTimeline({ autoplay: false });
      tl.add(
        "#lt-block",
        { translateX: [-80, 0], opacity: [0, 1], duration: 500, ease: "outBack(1.4)" },
        100,
      );
      tl.add(
        "#lt-name",
        { translateY: [24, 0], opacity: [0, 1], duration: 420, ease: "outQuart" },
        300,
      );
      tl.add(
        "#lt-role",
        { translateY: [18, 0], opacity: [0, 1], duration: 420, ease: "outQuart" },
        400,
      );
      tl.add(
        "#lt-block",
        { translateX: [0, -60], opacity: [1, 0], duration: 350, ease: "inCubic" },
        4300,
      );
      hyperframesAnime.register("lt-color-block", tl, { labels: {} });
    </script>
  </body>
</html>
