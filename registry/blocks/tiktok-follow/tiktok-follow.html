<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;700&display=block"
      rel="stylesheet"
    />
    <script src="https://cdn.jsdelivr.net/npm/animejs@4.5.0/dist/bundles/anime.umd.min.js"></script>
    <style>
      * {
        margin: 0;
        padding: 0;
      }
      html,
      body {
        background: transparent;
        overflow: hidden;
      }
      body {
        width: 1080px;
        height: 1920px;
        font-family: "DM Sans", sans-serif;
      }

      #root .lower-third {
        position: absolute;
        bottom: 160px;
        left: 50%;
        transform: translateX(-50%);
        display: flex;
        align-items: center;
        gap: 30px;
        background: #1a1a1a;
        border-radius: 75px;
        padding: 25px 40px 25px 25px;
        box-shadow: 0 8px 40px rgba(0, 0, 0, 0.4);
      }

      #root .avatar {
        width: 120px;
        height: 120px;
        border-radius: 50%;
        object-fit: cover;
        flex-shrink: 0;
        border: 3px solid #333;
      }

      #root .profile-info {
        display: flex;
        flex-direction: column;
        gap: 2px;
        margin-right: 20px;
      }

      #root .display-name {
        font-size: 42px;
        font-weight: 700;
        color: #ffffff;
        line-height: 1.3;
        letter-spacing: -0.01em;
      }

      #root .handle {
        font-size: 28px;
        font-weight: 400;
        color: #a0a0a0;
        line-height: 1.3;
      }

      #root .follower-count {
        font-size: 25px;
        font-weight: 400;
        color: #737373;
        line-height: 1.3;
      }

      #root .follow-btn {
        position: relative;
        width: 250px;
        height: 80px;
        border-radius: 40px;
        background: #fe2c55;
        flex-shrink: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
      }

      #root .btn-text {
        position: absolute;
        font-family: "DM Sans", sans-serif;
        font-size: 30px;
        font-weight: 700;
        color: #ffffff;
        letter-spacing: 0.02em;
        white-space: nowrap;
      }

      #root .btn-text-follow {
        opacity: 1;
      }

      #root .btn-text-following {
        opacity: 0;
        display: flex;
        align-items: center;
        gap: 8px;
      }

      #root .check-icon {
        display: inline-block;
        width: 22px;
        height: 22px;
      }

      #root .check-icon svg {
        width: 22px;
        height: 22px;
        display: block;
      }
    </style>
  </head>
  <body>
    <div
      id="root"
      data-composition-id="tiktok-follow"
      data-width="1080"
      data-height="1920"
      data-start="0"
      data-duration="4.5"
    >
      <div
        id="card"
        class="clip lower-third"
        data-start="0"
        data-duration="4.5"
        data-track-index="0"
      >
        <img class="avatar" src="assets/avatar.jpg" alt="HeyGen" crossorigin="anonymous" />
        <div class="profile-info">
          <div class="display-name">HeyGen</div>
          <div class="handle">@heygen.com</div>
          <div class="follower-count">1,999 followers</div>
        </div>
        <div id="follow-btn" class="follow-btn">
          <span id="btn-follow" class="btn-text btn-text-follow">Follow</span>
          <span id="btn-following" class="btn-text btn-text-following">
            <span>Following</span>
            <span class="check-icon"
              ><svg
                viewBox="0 0 24 24"
                fill="none"
                stroke="#fff"
                stroke-width="2.5"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <polyline points="20 6 9 17 4 12"></polyline></svg
            ></span>
          </span>
        </div>
      </div>
    </div>

    <script>
      const tl = anime.createTimeline({ autoplay: false });
      tl.add(
        "#card",
        { translateY: [300, 0], opacity: [0, 1], duration: 500, ease: "outQuart" },
        100,
      );
      tl.add("#follow-btn", { scale: 0.92, duration: 150, ease: "outCubic" }, 1000);
      tl.add("#follow-btn", { scale: [0.92, 1], duration: 400, ease: "outElastic(1, .4)" }, 1150);
      tl.add("#follow-btn", { backgroundColor: "#2f2f2f", duration: 120, ease: "linear" }, 1150);
      tl.add("#btn-follow", { opacity: 0, duration: 80, ease: "linear" }, 1150);
      tl.add("#btn-following", { opacity: 1, duration: 80, ease: "linear" }, 1180);
      tl.add(
        "#card",
        { translateY: [0, 300], opacity: [1, 0], duration: 250, ease: "inQuart" },
        3800,
      );
      hyperframesAnime.register("tiktok-follow", tl, { labels: {} });
    </script>
  </body>
</html>
