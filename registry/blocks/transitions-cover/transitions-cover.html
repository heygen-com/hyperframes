<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cover Transitions Showcase</title>
    <script src="https://cdn.jsdelivr.net/npm/animejs@4.5.0/dist/bundles/anime.umd.min.js"></script>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        background: #000;
        overflow: hidden;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      }

      /* Title Card */
      #title-card {
        position: absolute;
        inset: 0;
        z-index: 10;
        background: linear-gradient(135deg, #0d1b2a 0%, #1b263b 100%);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        opacity: 1;
      }
      #title-card h1 {
        font-size: 72px;
        font-weight: 800;
        color: #fff;
        letter-spacing: -1px;
        opacity: 0;
        transform: translateY(30px);
      }
      #title-card .subtitle {
        font-size: 28px;
        font-weight: 400;
        color: rgba(255, 255, 255, 0.5);
        margin-top: 12px;
        opacity: 0;
        transform: translateY(20px);
      }

      /* Scenes */
      #scene1,
      #scene2 {
        position: absolute;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
      }
      #scene1 {
        background: #1b263b;
        z-index: 2;
        opacity: 0;
      }
      #scene2 {
        background: #e07a5f;
        z-index: 1;
        opacity: 0;
      }

      .scene-number {
        font-size: 180px;
        font-weight: 900;
        line-height: 1;
        opacity: 0.12;
        letter-spacing: -6px;
      }
      #scene1 .scene-number {
        color: #fff;
      }
      #scene2 .scene-number {
        color: #000;
      }

      .scene-label {
        font-size: 48px;
        font-weight: 700;
        margin-top: -20px;
      }
      #scene1 .scene-label {
        color: #fff;
      }
      #scene2 .scene-label {
        color: #fff;
      }

      /* Info bar */
      .info-bar {
        position: absolute;
        bottom: 0;
        left: 0;
        right: 0;
        height: 80px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 48px;
      }
      #scene1 .info-bar {
        background: rgba(0, 0, 0, 0.3);
      }
      #scene2 .info-bar {
        background: rgba(0, 0, 0, 0.2);
      }
      .info-bar .label {
        font-size: 18px;
        font-weight: 600;
        color: rgba(255, 255, 255, 0.7);
        text-transform: uppercase;
        letter-spacing: 2px;
      }
      .info-bar .desc {
        font-size: 16px;
        color: rgba(255, 255, 255, 0.5);
        font-style: italic;
      }

      /* Outro */
      #outro {
        position: absolute;
        inset: 0;
        z-index: 10;
        background: linear-gradient(135deg, #0d1b2a 0%, #1b263b 100%);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        opacity: 0;
      }
      #outro h2 {
        font-size: 56px;
        font-weight: 800;
        color: #fff;
        opacity: 0;
        transform: translateY(20px);
      }
      #outro .tag {
        font-size: 22px;
        color: rgba(255, 255, 255, 0.4);
        margin-top: 10px;
        opacity: 0;
        transform: translateY(15px);
      }
    </style>
  </head>
  <body>
    <div
      id="comp"
      data-composition-id="main"
      data-start="0"
      data-duration="21"
      data-width="1920"
      data-height="1080"
      style="position: relative; width: 1920px; height: 1080px; overflow: hidden; background: #000"
    >
      <!-- Title Card -->
      <div id="title-card">
        <h1 id="title-h1">Cover Transitions</h1>
        <div class="subtitle" id="title-sub">3 transition styles</div>
      </div>

      <!-- Scene A -->
      <div id="scene1">
        <div class="scene-number">ONE</div>
        <div class="scene-label">SCENE A</div>
        <div class="info-bar">
          <span class="label" id="info-label-a"></span>
          <span class="desc" id="info-desc-a"></span>
        </div>
      </div>

      <!-- Scene B -->
      <div id="scene2">
        <div class="scene-number">TWO</div>
        <div class="scene-label">SCENE B</div>
        <div class="info-bar">
          <span class="label" id="info-label-b"></span>
          <span class="desc" id="info-desc-b"></span>
        </div>
      </div>

      <!-- Staggered Blocks Wipes -->
      <div
        id="wipe-a"
        style="
          position: absolute;
          inset: 0;
          background: #f72585;
          z-index: 50;
          transform: translateX(-1920px);
        "
      ></div>
      <div
        id="wipe-b"
        style="
          position: absolute;
          inset: 0;
          background: #7209b7;
          z-index: 49;
          transform: translateX(-1920px);
        "
      ></div>

      <!-- Horizontal Blinds Container -->
      <div
        id="blinds-container"
        style="position: absolute; inset: 0; z-index: 50; pointer-events: none"
      ></div>

      <!-- Vertical Blinds Container -->
      <div
        id="vblinds-container"
        style="position: absolute; inset: 0; z-index: 50; pointer-events: none"
      ></div>

      <!-- Outro -->
      <div id="outro">
        <h2 id="outro-h2">Cover Transitions</h2>
        <div class="tag" id="outro-tag">End of showcase</div>
      </div>
    </div>

    <script>
      (function () {
        // Generate horizontal blind strips
        var blindsHTML = "";
        for (var i = 0; i < 8; i++) {
          blindsHTML +=
            '<div id="blind-' +
            i +
            '" style="position:absolute; left:0; width:1920px; height:135px; top:' +
            i * 135 +
            "px; background:" +
            [
              "#3A0CA3",
              "#4361EE",
              "#4CC9F0",
              "#F72585",
              "#3A0CA3",
              "#4361EE",
              "#4CC9F0",
              "#F72585",
            ][i] +
            '; transform:translateX(-1920px);"></div>';
        }
        document.getElementById("blinds-container").innerHTML = blindsHTML;

        // Generate vertical blind strips
        var vblindsHTML = "";
        for (var i = 0; i < 8; i++) {
          vblindsHTML +=
            '<div id="vblind-' +
            i +
            '" style="position:absolute; top:0; height:1080px; width:240px; left:' +
            i * 240 +
            "px; background:" +
            [
              "#3A0CA3",
              "#4361EE",
              "#4CC9F0",
              "#F72585",
              "#3A0CA3",
              "#4361EE",
              "#4CC9F0",
              "#F72585",
            ][i] +
            '; transform:translateY(-1080px);"></div>';
        }
        document.getElementById("vblinds-container").innerHTML = vblindsHTML;

        const tl = anime.createTimeline({ autoplay: false });

        // ===== TITLE CARD (0s - 3s) =====
        tl.add("#title-h1", { opacity: 1, translateY: 0, duration: 600, ease: "outCubic" }, 300);
        tl.add("#title-sub", { opacity: 1, translateY: 0, duration: 500, ease: "outCubic" }, 600);
        tl.add("#title-card", { opacity: 0, duration: 400, ease: "inOutQuad" }, 2500);

        // ===== DEMO 1: STAGGERED BLOCKS (3s - 8s) =====
        tl.add("#scene1", { opacity: 1, duration: 0 }, 3000);
        tl.add("#scene2", { opacity: 0, duration: 0 }, 3000);
        tl.add("#info-label-a", { textContent: "STAGGERED BLOCKS", duration: 0 }, 3000);
        tl.add(
          "#info-desc-a",
          { textContent: "Use a staggered color blocks transition", duration: 0 },
          3000,
        );
        tl.add("#info-label-b", { textContent: "STAGGERED BLOCKS", duration: 0 }, 3000);
        tl.add(
          "#info-desc-b",
          { textContent: "Use a staggered color blocks transition", duration: 0 },
          3000,
        );
        tl.add("#wipe-a", { translateX: -1920, duration: 0 }, 3000);
        tl.add("#wipe-b", { translateX: -1920, duration: 0 }, 3000);
        for (var i = 0; i < 8; i++) {
          tl.add("#blind-" + i, { translateX: -1920, duration: 0 }, 3000);
        }
        for (var i = 0; i < 8; i++) {
          tl.add("#vblind-" + i, { translateY: -1080, duration: 0 }, 3000);
        }
        tl.add("#wipe-a", { translateX: -1920, duration: 0 }, 4990);
        tl.add("#wipe-b", { translateX: -1920, duration: 0 }, 4990);
        tl.add("#wipe-a", { translateX: 0, duration: 250, ease: "inOutQuart" }, 5000);
        tl.add("#wipe-b", { translateX: 0, duration: 250, ease: "inOutQuart" }, 5060);
        tl.add("#scene1", { opacity: 0, duration: 0 }, 5200);
        tl.add("#scene2", { opacity: 1, duration: 0 }, 5200);
        tl.add("#wipe-a", { translateX: 1920, duration: 250, ease: "inOutQuart" }, 5280);
        tl.add("#wipe-b", { translateX: 1920, duration: 250, ease: "inOutQuart" }, 5340);

        // ===== DEMO 2: HORIZONTAL BLINDS (8s - 13s) =====
        tl.add("#scene1", { opacity: 1, duration: 0 }, 8000);
        tl.add("#scene2", { opacity: 0, duration: 0 }, 8000);
        tl.add("#info-label-a", { textContent: "HORIZONTAL BLINDS", duration: 0 }, 8000);
        tl.add(
          "#info-desc-a",
          { textContent: "Use a horizontal blinds transition", duration: 0 },
          8000,
        );
        tl.add("#info-label-b", { textContent: "HORIZONTAL BLINDS", duration: 0 }, 8000);
        tl.add(
          "#info-desc-b",
          { textContent: "Use a horizontal blinds transition", duration: 0 },
          8000,
        );
        tl.add("#wipe-a", { translateX: -1920, duration: 0 }, 8000);
        tl.add("#wipe-b", { translateX: -1920, duration: 0 }, 8000);
        for (var i = 0; i < 8; i++) {
          tl.add("#blind-" + i, { translateX: -1920, duration: 0 }, 8000);
        }
        for (var i = 0; i < 8; i++) {
          tl.add("#vblind-" + i, { translateY: -1080, duration: 0 }, 8000);
        }
        for (var i = 0; i < 8; i++) {
          tl.add(
            "#blind-" + i,
            { translateX: [-1920, 0], duration: 200, ease: "inOutQuart" },
            10000 + i * 30,
          );
        }
        tl.add("#scene1", { opacity: 0, duration: 0 }, 10500);
        tl.add("#scene2", { opacity: 1, duration: 0 }, 10500);
        for (var i = 0; i < 8; i++) {
          tl.add(
            "#blind-" + i,
            { translateX: 1920, duration: 200, ease: "inOutQuart" },
            10550 + i * 30,
          );
        }

        // ===== DEMO 3: VERTICAL BLINDS (13s - 18s) =====
        tl.add("#scene1", { opacity: 1, duration: 0 }, 13000);
        tl.add("#scene2", { opacity: 0, duration: 0 }, 13000);
        tl.add("#info-label-a", { textContent: "VERTICAL BLINDS", duration: 0 }, 13000);
        tl.add(
          "#info-desc-a",
          { textContent: "Use a vertical blinds transition", duration: 0 },
          13000,
        );
        tl.add("#info-label-b", { textContent: "VERTICAL BLINDS", duration: 0 }, 13000);
        tl.add(
          "#info-desc-b",
          { textContent: "Use a vertical blinds transition", duration: 0 },
          13000,
        );
        tl.add("#wipe-a", { translateX: -1920, duration: 0 }, 13000);
        tl.add("#wipe-b", { translateX: -1920, duration: 0 }, 13000);
        for (var i = 0; i < 8; i++) {
          tl.add("#blind-" + i, { translateX: -1920, duration: 0 }, 13000);
        }
        for (var i = 0; i < 8; i++) {
          tl.add("#vblind-" + i, { translateY: -1080, duration: 0 }, 13000);
        }
        for (var i = 0; i < 8; i++) {
          tl.add(
            "#vblind-" + i,
            { translateY: [-1080, 0], duration: 200, ease: "inOutQuart" },
            15000 + i * 30,
          );
        }
        tl.add("#scene1", { opacity: 0, duration: 0 }, 15500);
        tl.add("#scene2", { opacity: 1, duration: 0 }, 15500);
        for (var i = 0; i < 8; i++) {
          tl.add(
            "#vblind-" + i,
            { translateY: 1080, duration: 200, ease: "inOutQuart" },
            15550 + i * 30,
          );
        }

        // ===== OUTRO (18s - 21s) =====
        tl.add("#scene1", { opacity: 0, duration: 300 }, 18000);
        tl.add("#scene2", { opacity: 0, duration: 300 }, 18000);
        tl.add("#outro", { opacity: 1, duration: 400, ease: "inOutQuad" }, 18200);
        tl.add("#outro-h2", { opacity: 1, translateY: 0, duration: 500, ease: "outCubic" }, 18500);
        tl.add("#outro-tag", { opacity: 1, translateY: 0, duration: 400, ease: "outCubic" }, 18800);

        hyperframesAnime.register("main", tl);
      })();
    </script>
  </body>
</html>
