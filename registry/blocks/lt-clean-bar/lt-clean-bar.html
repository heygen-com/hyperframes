<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <script src="https://cdn.jsdelivr.net/npm/animejs@4.5.0/dist/bundles/anime.umd.min.js"></script>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        background: transparent;
        overflow: hidden;
      }
      body {
        width: 1920px;
        height: 1080px;
        font-family: "Montserrat", sans-serif;
      }

      #root .lt {
        position: absolute;
        left: 120px;
        bottom: 110px;
        display: flex;
        align-items: stretch;
        border-radius: 16px;
        overflow: hidden;
        box-shadow: 0 14px 44px rgba(15, 17, 21, 0.18);
        will-change: clip-path;
      }
      #root .lt-tab {
        width: 12px;
        background: #ff5a36;
        flex-shrink: 0;
      }
      #root .lt-body {
        background: #ffffff;
        padding: 22px 40px 24px 30px;
        display: flex;
        flex-direction: column;
        gap: 7px;
      }
      #root .lt-name {
        font-size: 52px;
        font-weight: 700;
        color: #0f1115;
        line-height: 1.06;
        letter-spacing: -0.015em;
        white-space: nowrap;
      }
      #root .lt-role {
        font-size: 27px;
        font-weight: 400;
        color: #5a6170;
        line-height: 1.2;
        letter-spacing: 0.01em;
        white-space: nowrap;
      }
    </style>
  </head>
  <body>
    <div
      id="root"
      data-composition-id="lt-clean-bar"
      data-width="1920"
      data-height="1080"
      data-start="0"
      data-duration="4.8"
    >
      <div id="lt-clip" class="clip" data-start="0" data-duration="4.8" data-track-index="0">
        <div id="lt" class="lt">
          <div id="lt-tab" class="lt-tab"></div>
          <div class="lt-body">
            <div id="lt-name" class="lt-name">Dr. Maya Chen</div>
            <div id="lt-role" class="lt-role">Host · Neuroscientist</div>
          </div>
        </div>
      </div>
    </div>

    <script>
      const tl = anime.createTimeline({ autoplay: false });
      tl.add(
        "#lt",
        { clipPath: ["inset(0 100% 0 0)", "inset(0 0% 0 0)"], duration: 550, ease: "outQuart" },
        100,
      );
      tl.add("#lt-tab", { scaleY: [0, 1], duration: 450, ease: "outCubic" }, 280);
      tl.add(
        "#lt-name",
        { translateY: [22, 0], opacity: [0, 1], duration: 500, ease: "outQuart" },
        340,
      );
      tl.add(
        "#lt-role",
        { translateY: [22, 0], opacity: [0, 1], duration: 500, ease: "outQuart" },
        440,
      );
      tl.add("#lt", { translateY: 18, opacity: 0, duration: 350, ease: "inCubic" }, 4300);
      hyperframesAnime.register("lt-clean-bar", tl, { labels: {} });
    </script>
  </body>
</html>
