<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1920, height=1080" />
    <title>Apple Terminal Clear Dark</title>
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        width: 1920px;
        height: 1080px;
        overflow: hidden;
        background: #1a1a1a;
        font-family: "SF Mono", Menlo, Monaco, Consolas, "Courier New", monospace;
      }

      #scene {
        width: 1920px;
        height: 1080px;
        position: relative;
        display: flex;
        align-items: center;
        justify-content: center;
        background: linear-gradient(135deg, #1a1a1a 0%, #111111 100%);
      }

      .terminal-window {
        width: 1400px;
        height: 700px;
        border-radius: 10px;
        overflow: hidden;
        box-shadow:
          0 30px 80px rgba(0, 0, 0, 0.7),
          0 10px 30px rgba(0, 0, 0, 0.5);
        display: flex;
        flex-direction: column;
      }

      .titlebar {
        height: 38px;
        background: rgba(0, 0, 0, 0.4);
        display: flex;
        align-items: center;
        padding: 0 14px;
        flex-shrink: 0;
        border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        position: relative;
      }

      .traffic-lights {
        display: flex;
        gap: 8px;
        align-items: center;
      }

      .traffic-lights span {
        width: 13px;
        height: 13px;
        border-radius: 50%;
        display: inline-block;
      }

      .traffic-lights .close {
        background: #ff5f57;
        border: 1px solid #e0443e;
      }

      .traffic-lights .minimize {
        background: #ffbd2e;
        border: 1px solid #dfa123;
      }

      .traffic-lights .fullscreen {
        background: #28c840;
        border: 1px solid #1aab29;
      }

      .window-title {
        position: absolute;
        left: 50%;
        transform: translateX(-50%);
        font-size: 13px;
        color: #ffffff;
        font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif;
        font-weight: 500;
        letter-spacing: -0.1px;
      }

      .terminal-canvas {
        flex: 1;
        background: rgba(0, 0, 0, 0.7);
        padding: 18px 20px;
        overflow: hidden;
        font-size: 14px;
        line-height: 1.6;
        color: #ffffff;
      }

      .output-lines {
        margin-bottom: 4px;
      }

      .output-line {
        display: block;
        white-space: pre;
        opacity: 0;
        color: #ffffff;
      }

      .output-line.bold {
        font-weight: bold;
        color: #ffffff;
      }

      .output-line.dim {
        color: rgba(255, 255, 255, 0.6);
      }

      .input-line {
        display: flex;
        align-items: center;
        white-space: pre;
      }

      .prompt {
        color: #888888;
        font-weight: bold;
        user-select: none;
      }

      .typed-command {
        color: #ffffff;
      }

      .cursor-block {
        display: inline-block;
        width: 9px;
        height: 16px;
        background: #888888;
        vertical-align: text-bottom;
        margin-left: 1px;
      }
    </style>
  </head>
  <body>
    <div
      id="scene"
      data-composition-id="code-snippet-apple-terminal-clear-dark"
      data-start="0"
      data-width="1920"
      data-height="1080"
    >
      <div class="terminal-window">
        <div class="titlebar">
          <div class="traffic-lights">
            <span class="close"></span>
            <span class="minimize"></span>
            <span class="fullscreen"></span>
          </div>
          <span class="window-title">bash — 80×24</span>
        </div>
        <div class="terminal-canvas">
          <div class="output-lines">
            <span class="output-line dim">Last login: Mon Jun 2 09:14:22 on ttys002</span>
            <span class="output-line">Scanning dependencies...</span>
            <span class="output-line">Found 3 vulnerabilities (1 moderate, 2 low)</span>
            <span class="output-line dim"> package: lodash@4.17.20</span>
            <span class="output-line dim"> severity: moderate</span>
            <span class="output-line dim"> fix: lodash@4.17.21</span>
            <span class="output-line dim"> package: minimist@1.2.5</span>
            <span class="output-line dim"> severity: low</span>
            <span class="output-line dim"> fix: minimist@1.2.6</span>
            <span class="output-line bold">Run `npm audit fix` to fix them.</span>
          </div>
          <div class="input-line">
            <span class="prompt">user@Mac ~ % </span><span class="typed-command"></span
            ><span class="cursor-block"></span>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/animejs@4.5.0/dist/bundles/anime.umd.min.js"></script>
    <script>
      const command = "npm audit";
      const typedEl = document.querySelector(".typed-command");
      const cursorEl = document.querySelector(".cursor-block");
      const inputLine = document.querySelector(".input-line");
      const outputLines = [...document.querySelectorAll(".output-line")];
      const finalPrompt = document.createElement("div");
      finalPrompt.className = "input-line";
      finalPrompt.innerHTML =
        '<span class="prompt">user@Mac ~ % </span><span class="typed-command"></span><span class="cursor-block" id="final-cursor"></span>';
      inputLine.parentNode.appendChild(finalPrompt);
      const finalCursorEl = document.getElementById("final-cursor");
      const stateChangeTimes = [0];
      const charDuration = 1.5 / command.length;
      const hideCursorTimeMs = 2200;
      const clearCommandTimeMs = 2500;
      const promptTimeMs = 4200;
      const finalCursorStopMs = 6800;
      const outputStartMs = 2800;
      const outputStepMs = 100;
      const firstOutputMs = 2300;
      const skipFirstOutput = true;

      command.split("").forEach((_, i) => {
        stateChangeTimes.push((0.5 + i * charDuration) * 1000);
      });
      outputLines.forEach((_, i) => {
        stateChangeTimes.push(outputRevealTimeMs(i));
      });
      stateChangeTimes.push(hideCursorTimeMs, clearCommandTimeMs, promptTimeMs);
      const blinkTimes = [4.4, 4.8, 5.2, 5.6, 6, 6.4];
      blinkTimes.forEach((t) => {
        stateChangeTimes.push(t * 1000);
      });
      stateChangeTimes.push(finalCursorStopMs);

      function outputRevealTimeMs(index) {
        if (skipFirstOutput && index === 0) return firstOutputMs;
        return outputStartMs + index * outputStepMs;
      }

      function typedTextAt(timeMs) {
        if (timeMs >= clearCommandTimeMs) return "";
        if (timeMs < 500) return "";
        const charIndex = Math.floor((timeMs / 1000 - 0.5) / charDuration);
        return command.slice(0, Math.max(0, Math.min(command.length, charIndex + 1)));
      }

      function finalCursorOpacityAt(timeMs) {
        if (timeMs >= finalCursorStopMs) return "1";
        let opacity = "1";
        blinkTimes.forEach((t, i) => {
          if (timeMs >= t * 1000) opacity = i % 2 === 0 ? "0" : "1";
        });
        return opacity;
      }

      function renderStateFor(timeMs) {
        typedEl.textContent = typedTextAt(timeMs);
        cursorEl.style.opacity = timeMs >= hideCursorTimeMs ? "0" : "1";
        inputLine.style.display = timeMs >= promptTimeMs ? "none" : "flex";
        finalPrompt.style.display = timeMs >= promptTimeMs ? "flex" : "none";
        finalCursorEl.style.opacity = finalCursorOpacityAt(timeMs);

        outputLines.forEach((line, i) => {
          line.style.opacity = timeMs >= outputRevealTimeMs(i) ? "1" : "0";
        });
      }

      const stateChanges = stateChangeTimes
        .sort((a, b) => a - b)
        .map((t) => ({ t, apply: () => renderStateFor(t) }));

      function applyStateAt(timeMs) {
        for (let i = stateChanges.length - 1; i >= 0; i--) {
          if (timeMs >= stateChanges[i].t) {
            stateChanges[i].apply();
            break;
          }
        }
      }

      const tl = anime.createTimeline({ autoplay: false });
      const driver = { t: 0 };
      applyStateAt(0);
      tl.add(
        driver,
        {
          t: finalCursorStopMs,
          duration: finalCursorStopMs,
          ease: "linear",
          onUpdate: () => applyStateAt(driver.t),
        },
        0,
      );

      hyperframesAnime.register("code-snippet-apple-terminal-clear-dark", tl);
    </script>
  </body>
</html>
