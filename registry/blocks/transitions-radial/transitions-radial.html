<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1920" />
    <title>Radial Transitions</title>
    <script src="https://cdn.jsdelivr.net/npm/animejs@4.5.0/dist/bundles/anime.umd.min.js"></script>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        background: #000;
        overflow: hidden;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      }

      .scene {
        position: absolute;
        top: 0;
        left: 0;
        width: 1920px;
        height: 1080px;
        overflow: hidden;
      }

      .scene-inner {
        width: 100%;
        height: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-direction: column;
      }

      #scene1 {
        z-index: 1;
      }
      #scene2 {
        z-index: 2;
        opacity: 0;
      }

      #s1 {
        background: #1b263b;
      }
      #s2 {
        background: #e07a5f;
      }

      .big-text {
        font-size: 200px;
        font-weight: 900;
        line-height: 1;
        user-select: none;
        pointer-events: none;
      }
      #s1 .big-text {
        color: rgba(255, 255, 255, 0.08);
      }
      #s2 .big-text {
        color: rgba(255, 255, 255, 0.15);
      }

      .label {
        font-size: 32px;
        font-weight: 600;
        letter-spacing: 6px;
        text-transform: uppercase;
        margin-top: 12px;
      }
      #s1 .label {
        color: #778da9;
      }
      #s2 .label {
        color: #fff;
      }

      #info-bar {
        position: absolute;
        bottom: 0;
        left: 0;
        width: 1920px;
        height: 80px;
        background: rgba(0, 0, 0, 0.88);
        z-index: 100;
        display: flex;
        align-items: center;
        justify-content: center;
        opacity: 0;
      }
      #info-bar span {
        color: #fff;
        font-size: 22px;
        font-weight: 500;
        letter-spacing: 2px;
      }

      #title-card {
        position: absolute;
        top: 0;
        left: 0;
        width: 1920px;
        height: 1080px;
        background: #0d1b2a;
        z-index: 200;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-direction: column;
        opacity: 0;
      }
      #title-card .category {
        font-size: 64px;
        font-weight: 800;
        color: #fff;
        letter-spacing: 8px;
        text-transform: uppercase;
      }
      #title-card .subtitle {
        font-size: 24px;
        font-weight: 400;
        color: #778da9;
        margin-top: 16px;
        letter-spacing: 4px;
      }

      #outro-card {
        position: absolute;
        top: 0;
        left: 0;
        width: 1920px;
        height: 1080px;
        background: #0d1b2a;
        z-index: 200;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-direction: column;
        opacity: 0;
      }
      #outro-card .category {
        font-size: 48px;
        font-weight: 700;
        color: #778da9;
        letter-spacing: 6px;
        text-transform: uppercase;
      }
    </style>
  </head>
  <body>
    <div
      id="composition"
      data-composition-id="main"
      data-start="0"
      data-duration="20"
      data-width="1920"
      data-height="1080"
    >
      <div id="title-card">
        <div class="category">Radial Transitions</div>
        <div class="subtitle">3 Transitions</div>
      </div>

      <div id="scene1" class="scene">
        <div id="s1" class="scene-inner">
          <div class="big-text">ONE</div>
          <div class="label">Scene A</div>
        </div>
      </div>

      <div id="scene2" class="scene">
        <div id="s2" class="scene-inner">
          <div class="big-text">TWO</div>
          <div class="label">Scene B</div>
        </div>
      </div>

      <div id="info-bar"><span id="info-text">Transition Name</span></div>

      <div id="outro-card">
        <div class="category">End of Radial Transitions</div>
      </div>
    </div>

    <script>
      (function () {
        const tl = anime.createTimeline({ autoplay: false });

        /* ── Title card (3s) ── */
        tl.add("#title-card", { opacity: 1, duration: 0 }, 0);
        tl.add("#title-card", { opacity: 0, duration: 500 }, 2500);

        /* ── Demo 1: Circle Iris ── */
        tl.add(
          "#scene1",
          {
            opacity: 1,
            translateX: 0,
            translateY: 0,
            scale: 1,
            scaleX: 1,
            rotate: 0,
            rotateY: 0,
            filter: "none",
            clipPath: "none",
            zIndex: 1,
            skewX: 0,
            duration: 0,
          },
          3000,
        );
        tl.add(
          "#scene2",
          {
            opacity: 0,
            translateX: 0,
            translateY: 0,
            scale: 1,
            scaleX: 1,
            rotate: 0,
            rotateY: 0,
            filter: "none",
            clipPath: "none",
            zIndex: 2,
            skewX: 0,
            duration: 0,
          },
          3000,
        );
        tl.add(
          "#s1",
          {
            opacity: 1,
            translateX: 0,
            translateY: 0,
            scale: 1,
            rotate: 0,
            rotateY: 0,
            filter: "none",
            skewX: 0,
            clipPath: "none",
            duration: 0,
          },
          3000,
        );
        tl.add(
          "#s2",
          {
            opacity: 1,
            translateX: 0,
            translateY: 0,
            scale: 1,
            rotate: 0,
            rotateY: 0,
            filter: "none",
            skewX: 0,
            clipPath: "none",
            duration: 0,
          },
          3000,
        );
        tl.add("#info-text", { textContent: "Circle Iris", duration: 0 }, 3000);
        tl.add("#info-bar", { opacity: 1, duration: 300 }, 3000);
        tl.add("#scene2", { opacity: 1, clipPath: "circle(0% at 50% 50%)", duration: 0 }, 4500);
        tl.add(
          "#scene2",
          { clipPath: "circle(75% at 50% 50%)", duration: 500, ease: "outCubic" },
          4500,
        );
        tl.add("#scene1", { opacity: 0, duration: 0 }, 5000);
        tl.add("#scene2", { clipPath: "none", duration: 0 }, 5050);
        tl.add("#info-bar", { opacity: 0, duration: 300 }, 6000);

        /* ── Demo 2: Diamond Iris ── */
        tl.add(
          "#scene1",
          {
            opacity: 1,
            translateX: 0,
            translateY: 0,
            scale: 1,
            scaleX: 1,
            rotate: 0,
            rotateY: 0,
            filter: "none",
            clipPath: "none",
            zIndex: 1,
            skewX: 0,
            duration: 0,
          },
          6500,
        );
        tl.add(
          "#scene2",
          {
            opacity: 0,
            translateX: 0,
            translateY: 0,
            scale: 1,
            scaleX: 1,
            rotate: 0,
            rotateY: 0,
            filter: "none",
            clipPath: "none",
            zIndex: 2,
            skewX: 0,
            duration: 0,
          },
          6500,
        );
        tl.add(
          "#s1",
          {
            opacity: 1,
            translateX: 0,
            translateY: 0,
            scale: 1,
            rotate: 0,
            rotateY: 0,
            filter: "none",
            skewX: 0,
            clipPath: "none",
            duration: 0,
          },
          6500,
        );
        tl.add(
          "#s2",
          {
            opacity: 1,
            translateX: 0,
            translateY: 0,
            scale: 1,
            rotate: 0,
            rotateY: 0,
            filter: "none",
            skewX: 0,
            clipPath: "none",
            duration: 0,
          },
          6500,
        );
        tl.add("#info-text", { textContent: "Diamond Iris", duration: 0 }, 6500);
        tl.add("#info-bar", { opacity: 1, duration: 300 }, 6500);
        tl.add(
          "#scene2",
          {
            opacity: 1,
            clipPath: "polygon(50% 50%, 50% 50%, 50% 50%, 50% 50%)",
            duration: 0,
          },
          8000,
        );
        tl.add(
          "#scene2",
          {
            clipPath: "polygon(50% -20%, 120% 50%, 50% 120%, -20% 50%)",
            duration: 500,
            ease: "outCubic",
          },
          8000,
        );
        tl.add("#scene1", { opacity: 0, duration: 0 }, 8500);
        tl.add("#scene2", { clipPath: "none", duration: 0 }, 8550);
        tl.add("#info-bar", { opacity: 0, duration: 300 }, 9500);

        /* ── Demo 3: Diagonal Split ── */
        tl.add(
          "#scene1",
          {
            opacity: 1,
            translateX: 0,
            translateY: 0,
            scale: 1,
            scaleX: 1,
            rotate: 0,
            rotateY: 0,
            filter: "none",
            clipPath: "none",
            zIndex: 1,
            skewX: 0,
            duration: 0,
          },
          10000,
        );
        tl.add(
          "#scene2",
          {
            opacity: 0,
            translateX: 0,
            translateY: 0,
            scale: 1,
            scaleX: 1,
            rotate: 0,
            rotateY: 0,
            filter: "none",
            clipPath: "none",
            zIndex: 2,
            skewX: 0,
            duration: 0,
          },
          10000,
        );
        tl.add(
          "#s1",
          {
            opacity: 1,
            translateX: 0,
            translateY: 0,
            scale: 1,
            rotate: 0,
            rotateY: 0,
            filter: "none",
            skewX: 0,
            clipPath: "none",
            duration: 0,
          },
          10000,
        );
        tl.add(
          "#s2",
          {
            opacity: 1,
            translateX: 0,
            translateY: 0,
            scale: 1,
            rotate: 0,
            rotateY: 0,
            filter: "none",
            skewX: 0,
            clipPath: "none",
            duration: 0,
          },
          10000,
        );
        tl.add("#info-text", { textContent: "Diagonal Split", duration: 0 }, 10000);
        tl.add("#info-bar", { opacity: 1, duration: 300 }, 10000);
        tl.add("#scene2", { opacity: 1, zIndex: 1, duration: 0 }, 11500);
        tl.add(
          "#scene1",
          {
            zIndex: 10,
            clipPath: "polygon(0% 0%, 100% 0%, 100% 100%, 0% 100%)",
            duration: 0,
          },
          11500,
        );
        tl.add(
          "#scene1",
          {
            clipPath: "polygon(60% 0%, 100% 0%, 100% 40%, 60% 0%)",
            duration: 500,
            ease: "inOutQuart",
          },
          11500,
        );
        tl.add("#scene1", { opacity: 0, zIndex: 1, clipPath: "none", duration: 0 }, 12050);
        tl.add("#scene2", { zIndex: 2, duration: 0 }, 12050);
        tl.add("#info-bar", { opacity: 0, duration: 300 }, 13000);

        /* ── Outro (3s) ── */
        tl.add("#outro-card", { opacity: 1, duration: 0 }, 13500);
        tl.add("#outro-card", { opacity: 0, duration: 500 }, 16000);

        hyperframesAnime.register("main", tl);
      })();
    </script>
  </body>
</html>
