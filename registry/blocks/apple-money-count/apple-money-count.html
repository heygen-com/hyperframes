<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1920, height=1080" />
    <script src="https://cdn.jsdelivr.net/npm/animejs@4.5.0/dist/bundles/anime.umd.min.js"></script>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html,
      body {
        width: 1920px;
        height: 1080px;
        overflow: hidden;
        background: #fdfefe;
      }

      #root {
        position: relative;
        width: 1920px;
        height: 1080px;
        overflow: hidden;
        background: #fdfefe;
        color: #111315;
        font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", Arial, sans-serif;
      }

      .green-flash {
        position: absolute;
        inset: 0;
        z-index: 1;
        background: #30d158;
        opacity: 0;
      }

      .stage-content {
        position: relative;
        z-index: 5;
        display: flex;
        width: 100%;
        height: 100%;
        align-items: center;
        justify-content: center;
        padding: 120px 160px;
      }

      .amount-wrap {
        position: relative;
        display: flex;
        align-items: center;
        justify-content: center;
        min-width: 1080px;
        min-height: 260px;
      }

      .amount {
        position: relative;
        color: #111315;
        font-size: 190px;
        font-weight: 900;
        line-height: 0.9;
        letter-spacing: 0;
        font-variant-numeric: tabular-nums;
        text-align: center;
        white-space: nowrap;
        text-shadow:
          0 3px 0 rgba(255, 255, 255, 0.58),
          0 18px 36px rgba(17, 19, 21, 0.14),
          0 42px 92px rgba(17, 19, 21, 0.1);
        will-change: transform, color, opacity, text-shadow;
      }

      .money-burst {
        position: absolute;
        inset: 0;
        z-index: 8;
        pointer-events: none;
      }

      .money-anchor {
        position: absolute;
        left: 50%;
        top: 50%;
        transform: translate(-50%, -50%);
        transform-origin: 50% 50%;
      }

      .money-icon {
        display: grid;
        place-items: center;
        opacity: 0;
        filter: drop-shadow(0 20px 24px rgba(7, 84, 31, 0.2));
        transform: scale(0.18);
        transform-origin: 50% 50%;
        will-change: transform, opacity, filter;
      }

      .money-icon.bill {
        width: 96px;
        height: 52px;
        border-radius: 10px;
        background: #30d158;
        box-shadow:
          inset 0 0 0 3px rgba(7, 84, 31, 0.2),
          inset 0 -10px 18px rgba(7, 84, 31, 0.1),
          0 16px 26px rgba(7, 84, 31, 0.2),
          0 34px 64px rgba(7, 84, 31, 0.16);
      }

      .money-icon.bill::before {
        position: absolute;
        inset: 9px 16px;
        border: 2px solid rgba(7, 84, 31, 0.28);
        border-radius: 999px;
        content: "";
      }

      .money-icon.coin {
        width: 64px;
        height: 64px;
        border-radius: 50%;
        background: radial-gradient(circle at 34% 30%, #fff7a6 0%, #ffd54f 40%, #d9a514 100%);
        box-shadow:
          inset 0 0 0 4px rgba(111, 76, 0, 0.12),
          inset 0 -8px 14px rgba(111, 76, 0, 0.1),
          0 16px 30px rgba(111, 76, 0, 0.18),
          0 34px 58px rgba(111, 76, 0, 0.12);
      }

      .money-icon .mark {
        position: relative;
        z-index: 1;
        color: #07541f;
        font-size: 30px;
        font-weight: 900;
        line-height: 1;
      }

      .money-icon.coin .mark {
        color: #6f4c00;
        font-size: 28px;
      }
    </style>
  </head>
  <body>
    <div
      id="root"
      data-composition-id="apple-money-count"
      data-root="true"
      data-start="0"
      data-duration="5"
      data-width="1920"
      data-height="1080"
    >
      <div id="greenFlash" class="green-flash"></div>
      <div class="stage-content">
        <div class="amount-wrap">
          <div id="amount" class="amount">$0</div>
        </div>
      </div>
      <div id="moneyBurst" class="money-burst" data-layout-allow-overflow></div>
      <audio
        id="sfxTrack"
        data-start="0"
        data-duration="5"
        data-track-index="9"
        src="assets/sfx-production.wav"
        data-volume="0.92"
      ></audio>
    </div>

    <script>
      const amount = document.querySelector("#amount");
      const moneyBurst = document.querySelector("#moneyBurst");
      const countState = { value: 0 };

      function formatMoney(value) {
        const bounded = Math.max(0, Math.min(10000, value));
        const rounded = Math.round(bounded);
        return "$" + rounded.toLocaleString("en-US");
      }

      function renderAmount(value) {
        amount.textContent = formatMoney(value);
      }

      const moneyIcons = [];
      const moneySpecs = [];

      for (let i = 0; i < 62; i += 1) {
        const anchor = document.createElement("div");
        anchor.className = "money-anchor";
        const icon = document.createElement("div");
        const isCoin = i % 3 === 0;
        icon.className = "money-icon " + (isCoin ? "coin" : "bill");
        icon.innerHTML = '<span class="mark">$</span>';
        anchor.appendChild(icon);
        moneyBurst.appendChild(anchor);
        moneyIcons.push(icon);

        const angle = i * 2.399963229728653;
        const ring = i % 5;
        const radiusX = 260 + ring * 145 + (i % 7) * 12;
        const radiusY = 160 + ring * 78 + (i % 6) * 12;
        const offsetX = (i % 4) * 24 - 36;
        const offsetY = (i % 5) * 18 - 36;
        const x = Math.max(-865, Math.min(865, Math.cos(angle) * radiusX + offsetX));
        const y = Math.max(-465, Math.min(465, Math.sin(angle * 1.13) * radiusY + offsetY));

        moneySpecs.push({
          x,
          y,
          delay: (i % 8) * 25,
          duration: 740 + (i % 5) * 45,
          fadeDelay: (i % 5) * 50,
          rotation: ((i * 43) % 160) - 80,
          scale: isCoin ? 0.72 + (i % 4) * 0.08 : 0.68 + (i % 5) * 0.07,
        });
      }

      renderAmount(0);

      const tl = anime.createTimeline({ autoplay: false });

      tl.add(
        "#amount",
        {
          translateY: [26, 0],
          opacity: [0, 1],
          scale: [0.985, 1],
          duration: 450,
          ease: "outCubic",
        },
        0,
      );

      tl.add(
        countState,
        {
          value: 10000,
          duration: 3160,
          ease: "linear",
          onUpdate: () => renderAmount(countState.value),
          onComplete: () => renderAmount(10000),
        },
        0,
      );

      tl.add(
        "#amount",
        {
          color: "#30d158",
          textShadow:
            "0 3px 0 rgba(255,255,255,0.52), 0 18px 40px rgba(48,209,88,0.3), 0 46px 96px rgba(7,84,31,0.2)",
          duration: 180,
          ease: "outQuart",
        },
        3160,
      );
      tl.add("#amount", { scale: 1.06, duration: 160, ease: "outBack(2.2)" }, 3160);
      tl.add("#amount", { scale: 1, duration: 230, ease: "outCubic" }, 3330);

      tl.add("#greenFlash", { opacity: 0.34, duration: 80, ease: "linear" }, 3160);
      tl.add("#greenFlash", { opacity: 0.22, duration: 760, ease: "linear" }, 3240);
      tl.add("#greenFlash", { opacity: 0, duration: 160, ease: "outCubic" }, 4000);

      moneyIcons.forEach((icon, i) => {
        const spec = moneySpecs[i];
        tl.add(
          icon,
          {
            translateX: [0, spec.x],
            translateY: [0, spec.y],
            rotate: spec.rotation,
            scale: [0.18, spec.scale],
            opacity: [0, 1],
            duration: spec.duration,
            ease: "outQuint",
          },
          3280 + spec.delay,
        );
        tl.add(
          icon,
          {
            translateY: spec.y + (spec.y < 0 ? -58 : 58),
            scale: spec.scale * 0.54,
            opacity: 0,
            duration: 380,
            ease: "inCubic",
          },
          4180 + spec.fadeDelay,
        );
      });

      tl.add("#amount", { opacity: 0, scale: 0.985, duration: 280, ease: "inCubic" }, 4360);

      hyperframesAnime.register("apple-money-count", tl, { labels: {} });
    </script>
  </body>
</html>
