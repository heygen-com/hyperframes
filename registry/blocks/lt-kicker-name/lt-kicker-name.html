<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <script src="https://cdn.jsdelivr.net/npm/animejs@4.5.0/dist/bundles/anime.umd.min.js"></script>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        background: transparent;
        overflow: hidden;
      }
      body {
        width: 1920px;
        height: 1080px;
      }

      #root .lt {
        position: absolute;
        left: 130px;
        bottom: 122px;
        display: flex;
        flex-direction: column;
        align-items: flex-start;
        gap: 14px;
      }
      #root .lt-kickwrap {
        overflow: hidden;
      }
      #root .lt-kicker {
        display: inline-block;
        font-family: "Space Mono", monospace;
        font-size: 22px;
        font-weight: 700;
        color: #141518;
        background: #46e5b7;
        padding: 6px 14px;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        white-space: nowrap;
      }
      #root .lt-name {
        font-family: "Archivo Black", sans-serif;
        font-size: 70px;
        font-weight: 400;
        color: #ffffff;
        line-height: 0.98;
        letter-spacing: -0.015em;
        text-transform: uppercase;
        white-space: nowrap;
        text-shadow: 0 2px 22px rgba(0, 0, 0, 0.5);
      }
      #root .lt-baseline {
        height: 5px;
        width: 100%;
        background: #46e5b7;
        border-radius: 3px;
        transform-origin: 0% 50%;
      }
    </style>
  </head>
  <body>
    <div
      id="root"
      data-composition-id="lt-kicker-name"
      data-width="1920"
      data-height="1080"
      data-start="0"
      data-duration="4.8"
    >
      <div id="lt-clip" class="clip" data-start="0" data-duration="4.8" data-track-index="0">
        <div id="lt" class="lt">
          <div class="lt-kickwrap">
            <span id="lt-kicker" class="lt-kicker">Episode 47</span>
          </div>
          <div id="lt-name" class="lt-name">Maya Chen</div>
          <div id="lt-baseline" class="lt-baseline"></div>
        </div>
      </div>
    </div>

    <script>
      const tl = anime.createTimeline({ autoplay: false });
      tl.add("#lt-kicker", { translateY: [-40, 0], duration: 420, ease: "outBack(2)" }, 100);
      tl.add(
        "#lt-name",
        { translateY: [34, 0], opacity: [0, 1], duration: 450, ease: "outBack(1.5)" },
        320,
      );
      tl.add("#lt-baseline", { scaleX: [0, 1], duration: 500, ease: "outQuint" }, 500);
      tl.add("#lt-baseline", { scaleX: [1, 0], duration: 300, ease: "inCubic" }, 4250);
      tl.add(
        "#lt-name",
        { translateY: [0, -16], opacity: [1, 0], duration: 320, ease: "inCubic" },
        4300,
      );
      tl.add("#lt-kicker", { translateY: [0, -40], duration: 300, ease: "inCubic" }, 4320);
      hyperframesAnime.register("lt-kicker-name", tl, { labels: {} });
    </script>
  </body>
</html>
