<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <script src="https://cdn.jsdelivr.net/npm/animejs@4.5.0/dist/bundles/anime.umd.min.js"></script>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        background: transparent;
        overflow: hidden;
      }
      body {
        width: 1920px;
        height: 1080px;
        font-family: "Montserrat", sans-serif;
      }

      #root .lt {
        position: absolute;
        left: 120px;
        bottom: 110px;
      }
      #root .lt-card {
        background: #16181d;
        border-radius: 14px;
        padding: 24px 38px 26px 32px;
        box-shadow: 0 18px 50px rgba(0, 0, 0, 0.4);
        display: flex;
        flex-direction: column;
        gap: 12px;
      }
      #root .lt-name {
        font-size: 48px;
        font-weight: 700;
        color: #ffffff;
        line-height: 1.02;
        letter-spacing: -0.015em;
        white-space: nowrap;
      }
      #root .lt-underline {
        height: 4px;
        width: 100%;
        background: #f5b942;
        border-radius: 2px;
        transform-origin: 0% 50%;
      }
      #root .lt-role {
        font-size: 25px;
        font-weight: 400;
        color: #aeb6c2;
        line-height: 1.2;
        letter-spacing: 0.02em;
        white-space: nowrap;
      }
    </style>
  </head>
  <body>
    <div
      id="root"
      data-composition-id="lt-dark-card"
      data-width="1920"
      data-height="1080"
      data-start="0"
      data-duration="4.8"
    >
      <div id="lt-clip" class="clip" data-start="0" data-duration="4.8" data-track-index="0">
        <div id="lt" class="lt">
          <div id="lt-card" class="lt-card">
            <div id="lt-name" class="lt-name">Dr. Maya Chen</div>
            <div id="lt-underline" class="lt-underline"></div>
            <div id="lt-role" class="lt-role">Host · Neuroscientist</div>
          </div>
        </div>
      </div>
    </div>

    <script>
      const tl = anime.createTimeline({ autoplay: false });
      tl.add(
        "#lt-card",
        { translateY: [60, 0], opacity: [0, 1], duration: 500, ease: "outQuart" },
        100,
      );
      tl.add(
        "#lt-name",
        { translateY: [14, 0], opacity: [0, 1], duration: 450, ease: "outQuart" },
        260,
      );
      tl.add("#lt-underline", { scaleX: [0, 1], duration: 500, ease: "outQuint" }, 420);
      tl.add("#lt-role", { opacity: [0, 1], duration: 450, ease: "outCubic" }, 560);
      tl.add(
        "#lt-card",
        { translateY: [0, 24], opacity: [1, 0], duration: 350, ease: "inCubic" },
        4300,
      );
      hyperframesAnime.register("lt-dark-card", tl, { labels: {} });
    </script>
  </body>
</html>
