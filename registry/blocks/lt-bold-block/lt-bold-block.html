<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <script src="https://cdn.jsdelivr.net/npm/animejs@4.5.0/dist/bundles/anime.umd.min.js"></script>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        background: transparent;
        overflow: hidden;
      }
      body {
        width: 1920px;
        height: 1080px;
      }

      #root .lt {
        position: absolute;
        left: 120px;
        bottom: 116px;
      }
      #root .lt-block {
        background: #141518;
        padding: 18px 34px 22px 30px;
        display: inline-flex;
        flex-direction: column;
        gap: 12px;
        will-change: clip-path;
      }
      #root .lt-name {
        font-family: "Archivo Black", sans-serif;
        font-size: 58px;
        font-weight: 400;
        color: #ffffff;
        line-height: 0.98;
        letter-spacing: -0.015em;
        text-transform: uppercase;
        white-space: nowrap;
      }
      #root .lt-tagwrap {
        overflow: hidden;
      }
      #root .lt-tag {
        display: inline-block;
        background: #ffd23f;
        color: #141518;
        font-family: "Space Mono", monospace;
        font-size: 24px;
        font-weight: 700;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        padding: 7px 16px;
        white-space: nowrap;
      }
    </style>
  </head>
  <body>
    <div
      id="root"
      data-composition-id="lt-bold-block"
      data-width="1920"
      data-height="1080"
      data-start="0"
      data-duration="4.8"
    >
      <div id="lt-clip" class="clip" data-start="0" data-duration="4.8" data-track-index="0">
        <div id="lt" class="lt">
          <div id="lt-block" class="lt-block">
            <div id="lt-name" class="lt-name">Maya Chen</div>
            <div class="lt-tagwrap">
              <span id="lt-tag" class="lt-tag">Host · Neuroscientist</span>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script>
      const tl = anime.createTimeline({ autoplay: false });
      tl.add(
        "#lt-block",
        { clipPath: ["inset(0 100% 0 0)", "inset(0 0% 0 0)"], duration: 500, ease: "outQuint" },
        100,
      );
      tl.add(
        "#lt-name",
        { translateY: [30, 0], opacity: [0, 1], duration: 420, ease: "outBack(1.6)" },
        260,
      );
      tl.add("#lt-tag", { translateY: [40, 0], duration: 450, ease: "outBack(2)" }, 500);
      tl.add(
        "#lt-block",
        { clipPath: ["inset(0 0% 0 0)", "inset(0 0 0 100%)"], duration: 400, ease: "inQuart" },
        4300,
      );
      hyperframesAnime.register("lt-bold-block", tl, { labels: {} });
    </script>
  </body>
</html>
