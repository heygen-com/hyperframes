<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1920" />
    <script src="https://cdn.jsdelivr.net/npm/animejs@4.5.0/dist/bundles/anime.umd.min.js"></script>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        width: 1920px;
        height: 1080px;
        overflow: hidden;
        background: #000;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      }
      .scene {
        position: absolute;
        top: 0;
        left: 0;
        width: 1920px;
        height: 1080px;
        overflow: hidden;
      }
      .scene-inner {
        width: 100%;
        height: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-direction: column;
      }
      .info-bar {
        position: absolute;
        bottom: 0;
        left: 0;
        right: 0;
        z-index: 100;
        background: rgba(0, 0, 0, 0.88);
        padding: 24px 60px;
        display: flex;
        align-items: center;
        gap: 40px;
        opacity: 0;
      }
      .info-num {
        font-size: 14px;
        font-weight: 700;
        color: #e07a5f;
        letter-spacing: 0.1em;
      }
      .info-name {
        font-size: 20px;
        font-weight: 700;
        color: #fff;
      }
      .info-desc {
        font-size: 14px;
        color: rgba(255, 255, 255, 0.5);
      }
      #title-card {
        position: absolute;
        top: 0;
        left: 0;
        width: 1920px;
        height: 1080px;
        background: #0d1b2a;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-direction: column;
        z-index: 50;
      }
      #outro-card {
        position: absolute;
        top: 0;
        left: 0;
        width: 1920px;
        height: 1080px;
        background: #0d1b2a;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-direction: column;
        z-index: 50;
        opacity: 0;
      }
    </style>
  </head>
  <body>
    <div
      data-composition-id="main"
      data-start="0"
      data-duration="20"
      data-width="1920"
      data-height="1080"
    >
      <!-- Title Card -->
      <div id="title-card">
        <div
          id="title-label"
          style="
            font-size: 14px;
            font-weight: 700;
            color: #e07a5f;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            opacity: 0;
          "
        >
          TRANSITION CATALOG
        </div>
        <div
          id="title-main"
          style="font-size: 72px; font-weight: 900; color: #fff; margin-top: 16px; opacity: 0"
        >
          Other Transitions
        </div>
        <div
          id="title-count"
          style="
            font-size: 24px;
            font-weight: 400;
            color: rgba(255, 255, 255, 0.4);
            margin-top: 12px;
            opacity: 0;
          "
        >
          3 transitions
        </div>
      </div>

      <!-- Scene A -->
      <div id="scene1" class="scene" style="z-index: 1">
        <div class="scene-inner" id="s1" style="background: #1b263b">
          <div style="font-size: 200px; font-weight: 900; color: rgba(255, 255, 255, 0.08)">
            ONE
          </div>
          <div
            style="
              font-size: 32px;
              font-weight: 700;
              color: #778da9;
              letter-spacing: 0.15em;
              margin-top: -20px;
            "
          >
            SCENE A
          </div>
        </div>
      </div>

      <!-- Scene B -->
      <div id="scene2" class="scene" style="z-index: 2; opacity: 0">
        <div class="scene-inner" id="s2" style="background: #e07a5f">
          <div style="font-size: 200px; font-weight: 900; color: rgba(255, 255, 255, 0.15)">
            TWO
          </div>
          <div
            style="
              font-size: 32px;
              font-weight: 700;
              color: #fff;
              letter-spacing: 0.15em;
              margin-top: -20px;
            "
          >
            SCENE B
          </div>
        </div>
      </div>

      <!-- Flash Overlay -->
      <div
        id="flash-overlay"
        style="
          position: absolute;
          inset: 0;
          background: #fff;
          z-index: 50;
          opacity: 0;
          pointer-events: none;
        "
      ></div>

      <!-- Morph Circle -->
      <div
        id="morph-circle"
        style="
          position: absolute;
          top: 50%;
          left: 50%;
          width: 50px;
          height: 50px;
          border-radius: 50%;
          transform: translate(-50%, -50%) scale(0);
          z-index: 50;
          opacity: 0;
          pointer-events: none;
          background: #e07a5f;
        "
      ></div>

      <!-- Info Bars -->
      <div id="info-1" class="info-bar">
        <div class="info-num">01</div>
        <div class="info-name">Flash Cut</div>
        <div class="info-desc">Use a flash cut transition</div>
      </div>
      <div id="info-2" class="info-bar">
        <div class="info-num">02</div>
        <div class="info-name">Gravity Drop</div>
        <div class="info-desc">Use a gravity drop transition</div>
      </div>
      <div id="info-3" class="info-bar">
        <div class="info-num">03</div>
        <div class="info-name">Morph Circle</div>
        <div class="info-desc">Use a morph circle expanding transition</div>
      </div>

      <!-- Outro Card -->
      <div id="outro-card">
        <div
          id="outro-label"
          style="
            font-size: 14px;
            font-weight: 700;
            color: #e07a5f;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            opacity: 0;
          "
        >
          OTHER TRANSITIONS
        </div>
        <div
          id="outro-main"
          style="font-size: 56px; font-weight: 900; color: #fff; margin-top: 16px; opacity: 0"
        >
          3 Transitions
        </div>
      </div>
    </div>

    <script>
      (function () {
        const tl = anime.createTimeline({ autoplay: false });

        // === TITLE CARD (3s) ===
        tl.add("#title-label", { opacity: 1, translateY: 0, duration: 400, ease: "outCubic" }, 300);
        tl.add(
          "#title-main",
          { opacity: [0, 1], translateY: [20, 0], duration: 500, ease: "outCubic" },
          600,
        );
        tl.add("#title-count", { opacity: [0, 1], duration: 400, ease: "outCubic" }, 1000);
        tl.add("#title-card", { opacity: 0, duration: 400, ease: "inOutCubic" }, 2400);

        // === TRANSITION 1: Flash Cut ===
        tl.add(
          "#scene1",
          {
            opacity: 1,
            translateX: 0,
            translateY: 0,
            scale: 1,
            scaleX: 1,
            rotate: 0,
            filter: "none",
            clipPath: "none",
            zIndex: 1,
            skewX: 0,
            duration: 0,
          },
          3000,
        );
        tl.add(
          "#scene2",
          {
            opacity: 0,
            translateX: 0,
            translateY: 0,
            scale: 1,
            scaleX: 1,
            rotate: 0,
            filter: "none",
            clipPath: "none",
            zIndex: 2,
            skewX: 0,
            duration: 0,
          },
          3000,
        );
        tl.add(
          "#s1",
          {
            opacity: 1,
            translateX: 0,
            translateY: 0,
            scale: 1,
            rotate: 0,
            filter: "none",
            skewX: 0,
            scaleX: 1,
            transformOrigin: "50% 50%",
            duration: 0,
          },
          3000,
        );
        tl.add(
          "#s2",
          {
            opacity: 1,
            translateX: 0,
            translateY: 0,
            scale: 1,
            rotate: 0,
            filter: "none",
            skewX: 0,
            scaleX: 1,
            transformOrigin: "50% 50%",
            duration: 0,
          },
          3000,
        );
        tl.add("#info-1", { opacity: 1, duration: 300 }, 3200);
        tl.add("#flash-overlay", { opacity: 1, duration: 30, ease: "outQuint" }, 4500);
        tl.add("#scene1", { opacity: 0, duration: 0 }, 4530);
        tl.add("#scene2", { opacity: 1, duration: 0 }, 4530);
        tl.add("#flash-overlay", { opacity: 0, duration: 100, ease: "outCubic" }, 4550);
        tl.add("#info-1", { opacity: 0, duration: 200 }, 7000);

        // === TRANSITION 2: Gravity Drop ===
        tl.add(
          "#scene1",
          {
            opacity: 1,
            translateX: 0,
            translateY: 0,
            scale: 1,
            scaleX: 1,
            rotate: 0,
            filter: "none",
            clipPath: "none",
            zIndex: 1,
            skewX: 0,
            duration: 0,
          },
          7500,
        );
        tl.add(
          "#scene2",
          {
            opacity: 0,
            translateX: 0,
            translateY: 0,
            scale: 1,
            scaleX: 1,
            rotate: 0,
            filter: "none",
            clipPath: "none",
            zIndex: 2,
            skewX: 0,
            duration: 0,
          },
          7500,
        );
        tl.add(
          "#s1",
          {
            opacity: 1,
            translateX: 0,
            translateY: 0,
            scale: 1,
            rotate: 0,
            filter: "none",
            skewX: 0,
            scaleX: 1,
            transformOrigin: "50% 50%",
            duration: 0,
          },
          7500,
        );
        tl.add(
          "#s2",
          {
            opacity: 1,
            translateX: 0,
            translateY: 0,
            scale: 1,
            rotate: 0,
            filter: "none",
            skewX: 0,
            scaleX: 1,
            transformOrigin: "50% 50%",
            duration: 0,
          },
          7500,
        );
        tl.add("#info-2", { opacity: 1, duration: 300 }, 7700);
        tl.add("#scene2", { opacity: 1, zIndex: 1, duration: 0 }, 9000);
        tl.add("#scene1", { zIndex: 10, duration: 0 }, 9000);
        tl.add("#s1", { translateY: 1200, rotate: 4, duration: 500, ease: "inQuart" }, 9000);
        tl.add("#scene1", { opacity: 0, zIndex: 1, duration: 0 }, 9550);
        tl.add("#scene2", { zIndex: 2, duration: 0 }, 9550);
        tl.add("#info-2", { opacity: 0, duration: 200 }, 11500);

        // === TRANSITION 3: Morph Circle ===
        tl.add(
          "#scene1",
          {
            opacity: 1,
            translateX: 0,
            translateY: 0,
            scale: 1,
            scaleX: 1,
            rotate: 0,
            filter: "none",
            clipPath: "none",
            zIndex: 1,
            skewX: 0,
            duration: 0,
          },
          12000,
        );
        tl.add(
          "#scene2",
          {
            opacity: 0,
            translateX: 0,
            translateY: 0,
            scale: 1,
            scaleX: 1,
            rotate: 0,
            filter: "none",
            clipPath: "none",
            zIndex: 2,
            skewX: 0,
            duration: 0,
          },
          12000,
        );
        tl.add(
          "#s1",
          {
            opacity: 1,
            translateX: 0,
            translateY: 0,
            scale: 1,
            rotate: 0,
            filter: "none",
            skewX: 0,
            scaleX: 1,
            transformOrigin: "50% 50%",
            duration: 0,
          },
          12000,
        );
        tl.add(
          "#s2",
          {
            opacity: 1,
            translateX: 0,
            translateY: 0,
            scale: 1,
            rotate: 0,
            filter: "none",
            skewX: 0,
            scaleX: 1,
            transformOrigin: "50% 50%",
            duration: 0,
          },
          12000,
        );
        tl.add("#info-3", { opacity: 1, duration: 300 }, 12200);
        tl.add("#morph-circle", { opacity: 1, scale: 0, duration: 0 }, 13500);
        tl.add("#morph-circle", { scale: 60, duration: 500, ease: "inQuart" }, 13500);
        tl.add("#scene1", { opacity: 0, duration: 0 }, 13900);
        tl.add("#scene2", { opacity: 1, duration: 0 }, 13900);
        tl.add("#morph-circle", { opacity: 0, duration: 150, ease: "outCubic" }, 14000);
        tl.add("#morph-circle", { scale: 0, duration: 0 }, 14200);
        tl.add("#info-3", { opacity: 0, duration: 200 }, 16000);

        // === OUTRO (3s) ===
        tl.add("#scene1", { opacity: 0, duration: 0 }, 16500);
        tl.add("#scene2", { opacity: 0, duration: 0 }, 16500);
        tl.add("#outro-card", { opacity: 1, duration: 400, ease: "inOutCubic" }, 16500);
        tl.add("#outro-label", { opacity: 1, duration: 400, ease: "outCubic" }, 16800);
        tl.add(
          "#outro-main",
          { opacity: [0, 1], translateY: [20, 0], duration: 500, ease: "outCubic" },
          17100,
        );
        tl.add("#outro-card", { opacity: 0, duration: 400, ease: "inOutCubic" }, 18900);

        hyperframesAnime.register("main", tl);
      })();
    </script>
  </body>
</html>
