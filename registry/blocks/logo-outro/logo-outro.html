<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1920, height=1080" />
    <title>Logo Outro</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=block"
      rel="stylesheet"
    />
    <script src="https://cdn.jsdelivr.net/npm/animejs@4.5.0/dist/bundles/anime.umd.min.js"></script>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        width: 1920px;
        height: 1080px;
        overflow: hidden;
        background: #0a0a0f;
      }
    </style>
  </head>
  <body>
    <div
      id="logo-outro"
      data-composition-id="logo-outro"
      data-width="1920"
      data-height="1080"
      data-start="0"
      data-duration="6"
    >
      <div class="canvas">
        <!-- Glow effect behind the logo -->
        <div class="logo-glow"></div>

        <!-- Logo Container -->
        <div class="logo-container">
          <svg viewBox="0 0 160 240" width="160" height="240" class="logo-svg">
            <!-- Replace these paths with your own logo SVG -->
            <path
              class="logo-piece logo-tl"
              d="M 0 40 C 0 17.9 17.9 0 40 0 L 80 0 L 80 80 L 40 80 C 17.9 80 0 62.1 0 40 Z"
              fill="#F24E1E"
            />
            <path
              class="logo-piece logo-tr"
              d="M 80 0 L 120 0 C 142.1 0 160 17.9 160 40 C 160 62.1 142.1 80 120 80 L 80 80 L 80 0 Z"
              fill="#A259FF"
            />
            <path
              class="logo-piece logo-ml"
              d="M 0 120 C 0 97.9 17.9 80 40 80 L 80 80 L 80 160 L 40 160 C 17.9 160 0 142.1 0 120 Z"
              fill="#FF7262"
            />
            <circle class="logo-piece logo-mr" cx="120" cy="120" r="40" fill="#1ABCFE" />
            <path
              class="logo-piece logo-bl"
              d="M 0 200 C 0 177.9 17.9 160 40 160 L 80 160 L 80 200 C 80 222.1 62.1 240 40 240 C 17.9 240 0 222.1 0 200 Z"
              fill="#0ACF83"
            />
          </svg>
        </div>

        <div class="text-container">
          <div class="tagline">Nothing great is made alone.</div>
          <div class="url-pill">
            <span class="url-text">figma.com</span>
          </div>
        </div>
      </div>

      <style>
        #logo-outro .canvas {
          width: 1920px;
          height: 1080px;
          background: #0a0a0f;
          position: relative;
          overflow: hidden;
          font-family: "Inter", sans-serif;
        }

        #logo-outro .logo-container {
          position: absolute;
          left: 880px;
          top: 380px;
          width: 160px;
          height: 240px;
          z-index: 2;
        }

        #logo-outro .logo-piece {
          transform-origin: center center;
          opacity: 0;
        }

        #logo-outro .logo-glow {
          position: absolute;
          left: 760px;
          top: 300px;
          width: 400px;
          height: 400px;
          background: radial-gradient(circle, rgba(162, 89, 255, 0.25) 0%, rgba(10, 10, 15, 0) 70%);
          border-radius: 50%;
          opacity: 0;
          pointer-events: none;
          z-index: 1;
        }

        #logo-outro .text-container {
          position: absolute;
          top: 720px;
          width: 100%;
          display: flex;
          flex-direction: column;
          align-items: center;
          z-index: 3;
        }

        #logo-outro .tagline {
          font-size: 44px;
          font-weight: 500;
          color: white;
          opacity: 0;
          margin-bottom: 32px;
          text-align: center;
        }

        #logo-outro .url-pill {
          background: #1a1a1f;
          border: 1px solid #2c2c2c;
          border-radius: 100px;
          padding: 8px 24px;
          opacity: 0;
          display: flex;
          align-items: center;
          justify-content: center;
        }

        #logo-outro .url-text {
          font-size: 18px;
          color: #666;
          letter-spacing: 0.5px;
        }
      </style>

      <script>
        (function () {
          const tl = anime.createTimeline({ autoplay: false });
          tl.add(
            "#logo-outro .logo-tl",
            { translateX: [1920, 0], opacity: [0, 1], duration: 1200, ease: "outQuint" },
            0,
          );
          tl.add(
            "#logo-outro .logo-tr",
            { translateX: [1920, 0], opacity: [0, 1], duration: 1200, ease: "outQuint" },
            80,
          );
          tl.add(
            "#logo-outro .logo-ml",
            { translateX: [1920, 0], opacity: [0, 1], duration: 1200, ease: "outQuint" },
            160,
          );
          tl.add(
            "#logo-outro .logo-mr",
            { translateX: [1920, 0], opacity: [0, 1], duration: 1200, ease: "outQuint" },
            240,
          );
          tl.add(
            "#logo-outro .logo-bl",
            { translateX: [1920, 0], opacity: [0, 1], duration: 1200, ease: "outQuint" },
            320,
          );
          tl.add(
            "#logo-outro .logo-tl, #logo-outro .logo-tr, #logo-outro .logo-ml, #logo-outro .logo-mr, #logo-outro .logo-bl",
            {
              scale: 1.15,
              duration: 500,
              ease: "outBack(1.7)",
              delay: anime.stagger(20),
            },
            1200,
          );
          tl.add(
            "#logo-outro .logo-tl, #logo-outro .logo-tr, #logo-outro .logo-ml, #logo-outro .logo-mr, #logo-outro .logo-bl",
            { scale: [1.15, 1], duration: 400, ease: "inOutCubic" },
            1500,
          );
          tl.add(
            "#logo-outro .logo-glow",
            { opacity: [0, 1], scale: [0.5, 1.2], duration: 400, ease: "outCubic" },
            1200,
          );
          tl.add(
            "#logo-outro .logo-glow",
            { opacity: [1, 0], scale: [1.2, 1.8], duration: 1200, ease: "outCubic" },
            1600,
          );
          tl.add(
            "#logo-outro .tagline",
            { opacity: [0, 1], translateY: [20, 0], duration: 1000, ease: "outQuart" },
            2000,
          );
          tl.add(
            "#logo-outro .url-pill",
            { opacity: [0, 1], translateY: [15, 0], duration: 800, ease: "outQuart" },
            2400,
          );
          hyperframesAnime.register("logo-outro", tl, { labels: {} });
        })();
      </script>
    </div>
  </body>
</html>
