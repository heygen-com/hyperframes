<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <script src="https://cdn.jsdelivr.net/npm/animejs@4.5.0/dist/bundles/anime.umd.min.js"></script>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        background: transparent;
        overflow: hidden;
      }
      body {
        width: 1920px;
        height: 1080px;
        font-family: "Montserrat", sans-serif;
      }

      #root .lt {
        position: absolute;
        left: 120px;
        bottom: 120px;
      }
      #root .lt-pill {
        display: flex;
        align-items: center;
        gap: 22px;
        background: #ffffff;
        border-radius: 999px;
        padding: 20px 40px 20px 26px;
        box-shadow: 0 16px 46px rgba(15, 17, 21, 0.2);
        transform-origin: 0% 100%;
        will-change: transform;
      }
      #root .lt-dot {
        width: 18px;
        height: 18px;
        border-radius: 50%;
        background: #ff5a36;
        flex-shrink: 0;
      }
      #root .lt-text {
        display: flex;
        flex-direction: column;
        gap: 4px;
      }
      #root .lt-name {
        font-size: 46px;
        font-weight: 700;
        color: #0f1115;
        line-height: 1.04;
        letter-spacing: -0.015em;
        white-space: nowrap;
      }
      #root .lt-role {
        font-size: 25px;
        font-weight: 400;
        color: #5a6170;
        line-height: 1.2;
        letter-spacing: 0.01em;
        white-space: nowrap;
      }
    </style>
  </head>
  <body>
    <div
      id="root"
      data-composition-id="lt-soft-pill"
      data-width="1920"
      data-height="1080"
      data-start="0"
      data-duration="4.8"
    >
      <div id="lt-clip" class="clip" data-start="0" data-duration="4.8" data-track-index="0">
        <div id="lt" class="lt">
          <div id="lt-pill" class="lt-pill">
            <div id="lt-dot" class="lt-dot"></div>
            <div class="lt-text">
              <div id="lt-name" class="lt-name">Dr. Maya Chen</div>
              <div id="lt-role" class="lt-role">Host · Neuroscientist</div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script>
      const tl = anime.createTimeline({ autoplay: false });
      tl.add(
        "#lt-pill",
        {
          scale: [0.88, 1],
          translateY: [18, 0],
          opacity: [0, 1],
          duration: 550,
          ease: "outBack(1.7)",
        },
        100,
      );
      tl.add("#lt-dot", { scale: [0, 1], duration: 400, ease: "outBack(3)" }, 400);
      tl.add("#lt-name", { opacity: 1, translateX: 0, duration: 450, ease: "outQuart" }, 420);
      tl.add("#lt-role", { opacity: 1, translateX: 0, duration: 450, ease: "outQuart" }, 500);
      tl.add(
        "#lt-pill",
        { scale: [1, 0.94], translateY: [0, 14], opacity: [1, 0], duration: 350, ease: "inCubic" },
        4300,
      );
      hyperframesAnime.register("lt-soft-pill", tl, { labels: {} });
    </script>
  </body>
</html>
