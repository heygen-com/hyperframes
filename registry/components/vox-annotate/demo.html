<!doctype html>
<!--
  vox-annotate demo. This standalone composition mounts the primitive through
  data-composition-src. Non-default text, keyword, note, style, accent, and
  cue prove the variable path while the primitive remains elastic to its host.
-->
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1920, height=1080" />
    <title>Vox Annotate Demo</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html,
      body {
        width: 1920px;
        height: 1080px;
        overflow: hidden;
        background: var(--bg, #0b0c0e);
      }

      #root {
        --bg: #0b0c0e;
        --fg: #f8fafc;
        --muted: #94a3b8;
        --surface: #14171c;
        --border: #343a46;
        --brand: #71f5a7;
        --accent: #61a8ff;
        --accent-2: #c5a3ff;
        --font-display: Inter, system-ui, sans-serif;
        --font-mono: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
        position: relative;
        width: 1920px;
        height: 1080px;
        overflow: hidden;
        background: radial-gradient(
          ellipse at 50% 44%,
          #12151b 0%,
          var(--bg, #0b0c0e) 74%
        );
      }

      .mount-card {
        position: absolute;
        width: 78%;
        height: 62%;
        left: 11%;
        top: 19%;
        container-type: size;
        overflow: hidden;
        border-radius: 28px;
      }
    </style>
  </head>
  <body>
    <div
      id="root"
      data-composition-id="vox-annotate-demo"
      data-start="0"
      data-width="1920"
      data-height="1080"
      data-duration="4"
      data-fps="30"
    >
      <div
        id="vox-annotate-mount"
        class="mount-card clip"
        data-composition-id="vox-annotate"
        data-composition-src="./vox-annotate.html"
        data-variable-values='{"text":"Numbers need context to land","keyword":"context","note":"this is the point","style":"circle","accent":"violet","draw_at":1.2}'
        data-start="0"
        data-duration="4"
        data-track-index="0"
        data-width="1497"
        data-height="670"
      ></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      window.__timelines = window.__timelines || {};
      window.__timelines["vox-annotate-demo"] = gsap.timeline({ paused: true });
    </script>
  </body>
</html>
