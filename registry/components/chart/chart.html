<!--
  Chart - remocn-inspired UI primitive for HyperFrames.

  Paste the markup and CSS into a composition. Animate the CSS variables
  from a paused GSAP timeline for deterministic video renders.
-->

<figure class="hf-ui-chart">
  <div>
    <span style="--h: 0.42"></span><span style="--h: 0.7"></span><span style="--h: 0.55"></span
    ><span style="--h: 0.88"></span>
  </div>
  <figcaption>Weekly usage</figcaption>
</figure>

<style>
  .hf-ui-chart {
    display: grid;
    gap: 12px;
    width: 360px;
    padding: 20px;
    border: 1px solid #e4e4e7;
    border-radius: 14px;
    background: #fff;
    color: #18181b;
    font-family: Inter, system-ui, sans-serif;
  }
  .hf-ui-chart div {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    align-items: end;
    gap: 12px;
    height: 160px;
  }
  .hf-ui-chart span {
    display: block;
    height: calc(var(--h) * var(--hf-chart-progress, 1) * 100%);
    border-radius: 10px 10px 4px 4px;
    background: linear-gradient(180deg, #0ea5e9, #2563eb);
  }
  .hf-ui-chart figcaption {
    margin: 0;
    color: #71717a;
    font-weight: 850;
  }
</style>

<!--
  Timeline integration:
  tl.fromTo('.hf-ui-chart', { '--hf-chart-progress': 0 }, { '--hf-chart-progress': 1, duration: 0.72, ease: 'power2.out' }, startTime);
-->
