      </section>

      <script>
        const tl = gsap.timeline({ paused: true });
        tl.addLabel("start", 0);
        tl.set(".hf-ui-demo-stage", { opacity: 1 }, 0);
        tl.fromTo(
          ".hf-ui-chart",
          { "--hf-chart-progress": 0 },
          { "--hf-chart-progress": 1, duration: 0.72, ease: "power2.out" },
          0.3,
        );
        tl.addLabel("end", 4);
        tl.set(".hf-ui-demo-stage", { opacity: 1 }, "end");
        window.__timelines = window.__timelines || {};
        window.__timelines["chart-demo"] = tl;
