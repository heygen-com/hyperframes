<!doctype html>
<!--
  browser-device-stage demo. Large centered mount (90% x 88%) on a light token
  block (near-white bg, white surface, hairline borders) so the skeleton
  chrome reads at app scale; browser chrome, screen swap at 2.2s, violet accent.
-->
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1920, height=1080" />
    <title>browser-device-stage Demo</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html,
      body {
        width: 1920px;
        height: 1080px;
        overflow: hidden;
        background: var(--bg, #eef0f3);
      }

      #root {
        --bg: #eef0f3;
        --fg: #14161b;
        --surface: #ffffff;
        --border: #d3d8e0;
        --brand: #1d4ed8;
        --accent: #0284c7;
        --font-mono: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
        position: relative;
        width: 1920px;
        height: 1080px;
        overflow: hidden;
        background: radial-gradient(
          ellipse at 50% 40%,
          #f7f8fa 0%,
          var(--bg, #eef0f3) 70%
        );
      }

      .mount-stage {
        width: 90%;
        height: 88%;
        left: 5%;
        top: 6%;
        container-type: size;
        overflow: hidden;
      }
    </style>
  </head>
  <body>
    <div
      id="root"
      data-composition-id="browser-device-stage-demo"
      data-start="0"
      data-width="1920"
      data-height="1080"
      data-duration="5"
      data-fps="30"
    >
      <div
        id="browser-device-stage-mount"
        class="mount-stage clip"
        data-composition-id="browser-device-stage"
        data-composition-src="./browser-device-stage.html"
        data-variable-values='{"chrome":"browser","title":"app.example.com","swap_at":2.2,"accent":"violet"}'
        data-start="0"
        data-duration="5"
        data-track-index="0"
        data-width="1728"
        data-height="950"
      ></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      window.__timelines = window.__timelines || {};
      window.__timelines["browser-device-stage-demo"] = gsap.timeline({ paused: true });
    </script>
  </body>
</html>
