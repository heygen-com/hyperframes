<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1920, height=1080" />
    <title>Line-by-Line Slide - Demo</title>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        width: 1920px;
        height: 1080px;
        overflow: hidden;
      }
      #demo {
        width: 1920px;
        height: 1080px;
        display: grid;
        place-items: center;
        background: #f7f7f8;
        font-family: Inter, system-ui, sans-serif;
      }
      .demo-frame {
        display: grid;
        place-items: center;
        min-width: 900px;
        min-height: 500px;
        padding: 64px;
        /* ponytail: scale wrapper — not a GSAP target, so CSS transform is safe */
        transform: scale(2.8);
        transform-origin: center center;
      }
      .hf-remocn-line-by-line-slide {
        color: #18181b;
        font-family: Inter, system-ui, sans-serif;
        font-weight: 900;
        letter-spacing: -0.04em;
      }
      .hf-remocn-line-by-line-slide {
        display: grid;
        gap: 10px;
        font-size: 64px;
        line-height: 1.05;
        overflow: hidden;
      }
      .hf-remocn-line-by-line-slide span {
        display: block;
        transform: translate(var(--hf-line-x, 0px), var(--hf-line-y, 0px));
        filter: blur(var(--hf-line-blur, 0px));
        will-change: transform, filter, opacity;
      }
    </style>
  </head>
  <body>
    <div
      id="demo"
      data-composition-id="line-by-line-slide-demo"
      data-start="0"
      data-width="1920"
      data-height="1080"
      data-duration="5"
    >
      <div class="demo-frame">
        <div class="hf-remocn-line-by-line-slide">
          <span>Design faster</span><span>Render cleaner</span><span>Ship louder</span>
        </div>
      </div>
      <script>
        const tl = gsap.timeline({ paused: true });
        const startTime = 0.5;
        tl.fromTo(
          ".hf-remocn-line-by-line-slide span",
          { opacity: 0, "--hf-line-x": "-36px", "--hf-line-y": "18px", "--hf-line-blur": "6px" },
          {
            opacity: 1,
            "--hf-line-x": "0px",
            "--hf-line-y": "0px",
            "--hf-line-blur": "0px",
            duration: 0.34,
            stagger: 0.08,
            ease: "power3.out",
          },
          startTime,
        );
        tl.set({}, {}, 5);
        window.__timelines = window.__timelines || {};
        window.__timelines["line-by-line-slide-demo"] = tl;
      </script>
    </div>
  </body>
</html>
