<!-- vox-caption-chip: black small-caps caption bar that slides in from a frame edge and
     stays resident in a corner (Vox archive/atlas grammar). 2-6 words, factual register.
     Variants: default black, .mono (typewriter, archive pages), .accent (colored, atlas events).
     Entrance: gsap fromTo x (slide from the nearest edge), NOT fade. -->
<style>
  .vox-chip { display: inline-block; background: #111; color: #f4f1e8; padding: 10px 18px 9px;
    font-family: "Bebas Neue", sans-serif; font-size: 30px; line-height: 1; letter-spacing: 2.5px;
    text-transform: uppercase; box-shadow: 3px 4px 0 rgba(0,0,0,.22); }
  .vox-chip.mono { font-family: "Courier Prime", "Courier New", monospace; font-size: 22px;
    letter-spacing: 1.5px; padding: 11px 16px; }
  .vox-chip.accent { background: #D2382B; color: #FBF7EC; }
</style>
<div class="vox-chip mono">HAROLD GILLIES, 1917</div>
