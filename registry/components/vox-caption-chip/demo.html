<!doctype html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=720, height=1280">
<title>Vox Caption Chip demo</title><style>html,body{width:720px;height:1280px;margin:0;overflow:hidden;background:#181512;display:grid;place-items:center}
.col{display:flex;flex-direction:column;gap:36px;align-items:flex-start}</style></head>
<body>
<style>
  .vox-chip { display: inline-block; background: #111; color: #f4f1e8; padding: 10px 18px 9px;
    font-family: "Bebas Neue", sans-serif; font-size: 30px; line-height: 1; letter-spacing: 2.5px;
    text-transform: uppercase; box-shadow: 3px 4px 0 rgba(0,0,0,.22); }
  .vox-chip.mono { font-family: "Courier Prime", "Courier New", monospace; font-size: 22px;
    letter-spacing: 1.5px; padding: 11px 16px; }
  .vox-chip.accent { background: #D2382B; color: #FBF7EC; }
</style>
<div class="col">
  <span class="vox-chip" style="background:#f4f1e8;color:#111">3 WARS</span>
  <span class="vox-chip mono">HAROLD GILLIES, 1917</span>
  <span class="vox-chip accent">IRANIAN REVOLUTION</span>
</div>
</body></html>
