<!-- vox-boil: call voxBoil(tl, selector, fromT, toT, {baseRotation}) inside your timeline script.
     Entrance goes on a wrapper element; boil on the inner element (never stack transforms). -->
<script>
  function voxBoil(tl, selector, fromT, toT, opts) {
    opts = opts || {};
    var seed = opts.seed || 20260716, base = opts.baseRotation || 0, fps = 6;
    function mulberry32(a){return function(){a|=0;a=(a+0x6d2b79f5)|0;var t=Math.imul(a^(a>>>15),1|a);t=(t+Math.imul(t^(t>>>7),61|t))^t;return((t^(t>>>14))>>>0)/4294967296;};}
    var rnd = mulberry32(seed);
    for (var i = Math.ceil(fromT * fps); i / fps < toT; i++) {
      tl.set(selector, { x: (rnd()-.5)*4, y: (rnd()-.5)*4, rotation: base + (rnd()-.5)*1.1 }, i / fps);
    }
  }
</script>
