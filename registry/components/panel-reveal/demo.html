<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1920, height=1080" />
    <title>Panel Reveal - Demo</title>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        width: 1920px;
        height: 1080px;
        overflow: hidden;
      }
      #demo {
        width: 1920px;
        height: 1080px;
        display: grid;
        place-items: center;
        background: #f7f7f8;
        font-family: Inter, system-ui, sans-serif;
      }
      .demo-frame {
        display: grid;
        place-items: center;
        min-width: 760px;
        min-height: 480px;
        padding: 56px;
        /* ponytail: scale wrapper — GSAP targets .hf-transition-panel-reveal, not this element */
        transform: scale(2.6);
        transform-origin: center center;
      }
      .hf-transition-panel-reveal {
        --hf-panel-open: 1;
        width: 380px;
        overflow: hidden;
        border: 1px solid #e4e4e7;
        border-radius: 14px;
        background: #fff;
        color: #18181b;
        font-family: Inter, system-ui, sans-serif;
        box-shadow: 0 24px 70px rgba(24, 24, 27, 0.10);
      }
      .hf-transition-panel-reveal header {
        padding: 18px 20px 14px;
        font-size: 16px;
        font-weight: 600;
        letter-spacing: -0.01em;
      }
      .hf-transition-panel-reveal div {
        max-height: calc(var(--hf-panel-open) * 120px);
        opacity: var(--hf-panel-open);
        padding: 0 20px calc(var(--hf-panel-open) * 20px);
        overflow: hidden;
      }
      .hf-transition-panel-reveal p {
        margin: 0 0 8px;
        color: #71717a;
        font-size: 15px;
      }
    </style>
  </head>
  <body>
    <div
      id="demo"
      data-composition-id="panel-reveal-demo"
      data-start="0"
      data-width="1920"
      data-height="1080"
      data-duration="5"
    >
      <div class="demo-frame">
        <section class="hf-transition-panel-reveal">
          <header>Motion tokens</header>
          <div>
            <p>Duration 420ms</p>
            <p>Easing power3.out</p>
          </div>
        </section>
      </div>
      <script>
        const tl = gsap.timeline({ paused: true });
        const startTime = 0.5;
        tl.fromTo(
          ".hf-transition-panel-reveal",
          { "--hf-panel-open": 0 },
          { "--hf-panel-open": 1, duration: 0.44, ease: "power3.inOut" },
          startTime,
        );
        tl.set({}, {}, 5);
        window.__timelines = window.__timelines || {};
        window.__timelines["panel-reveal-demo"] = tl;
      </script>
    </div>
  </body>
</html>
