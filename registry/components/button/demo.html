        const buttonLabel = document.querySelector(".hf-ui-button-label");
        const buttonSpinner = document.querySelector(".hf-ui-button-spinner");
        const buttonCheck = document.querySelector(".hf-ui-button-check");
        gsap.set(button, { willChange: "auto" });
        tl.addLabel("start", 0);
        tl.set(button, { attr: { "data-state": "idle", "aria-busy": "false" } }, 0);
        tl.set(button, { "--hf-button-y": "0px", "--hf-button-scale": 1, opacity: 1 }, 0);

        tl.set(buttonSpinner, { opacity: 0, rotation: 0 }, 0);
        tl.set(buttonCheck, { opacity: 0 }, 0);
        tl.addLabel("press", 0.8);
        tl.set(button, { attr: { "data-state": "press" } }, 0.8);
        tl.set(button, { "--hf-button-y": "1px", "--hf-button-scale": 0.98 }, 0.8);
        tl.fromTo(
          button,
          { "--hf-button-y": "1px", "--hf-button-scale": 0.98 },
          {
            "--hf-button-y": "0px",
            "--hf-button-scale": 1,
            duration: 0.12,
            ease: "power3.out",
            immediateRender: false,
          },
          0.92,
        );
        tl.addLabel("loading", 1.3);
        tl.set(button, { attr: { "data-state": "loading", "aria-busy": "true" } }, 1.3);
        tl.fromTo(
          buttonLabel,
          { opacity: 1 },
          { opacity: 0, duration: 0.16, immediateRender: false },
          1.3,
        );
        tl.fromTo(
          buttonSpinner,
          { opacity: 0 },
          { opacity: 1, duration: 0.16, immediateRender: false },
          1.3,
        );
        tl.fromTo(
          buttonSpinner,
          { rotation: 0 },
          { rotation: 360, duration: 0.8, ease: "none", immediateRender: false },
          1.46,
        );
        tl.addLabel("success", 2.6);
        tl.set(button, { attr: { "data-state": "success", "aria-busy": "false" } }, 2.6);
        tl.fromTo(
          buttonSpinner,
          { opacity: 1 },
          { opacity: 0, duration: 0.14, immediateRender: false },
          2.6,
        );
        tl.fromTo(
          buttonCheck,
          { opacity: 0 },
          { opacity: 1, duration: 0.16, immediateRender: false },
          2.6,
        );
        tl.addLabel("end", 3.99);
        tl.fromTo(
          button,
          { opacity: 1 },
          { opacity: 1, duration: 0.01, immediateRender: false },
          3.99,
        );
