<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1920, height=1080" />
    <title>Page Slide - Demo</title>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        width: 1920px;
        height: 1080px;
        overflow: hidden;
      }
      #demo {
        width: 1920px;
        height: 1080px;
        display: grid;
        place-items: center;
        background: #f5f5f4;
        font-family: Inter, system-ui, sans-serif;
      }
      .demo-frame {
        display: grid;
        place-items: center;
        min-width: 760px;
        min-height: 480px;
        padding: 56px;
        /* ponytail: scale wrapper (not the GSAP target) to fill ~63% of frame */
        transform: scale(2.2);
        transform-origin: center center;
      }
      .hf-transition-page-slide {
        position: relative;
        width: 560px;
        height: 320px;
        overflow: hidden;
        border-radius: 30px;
        background: #111827;
        box-shadow: 0 28px 90px rgba(0, 0, 0, 0.22);
        font-family: Inter, system-ui, sans-serif;
      }
      .hf-transition-page {
        position: absolute;
        inset: 0;
        display: grid;
        place-items: center;
      }
      .hf-transition-page span {
        padding: 14px 20px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.14);
        color: #ffffff;
        font-size: 28px;
        font-weight: 900;
      }
      .hf-transition-page.old {
        background: linear-gradient(135deg, #0f172a, #334155);
      }
      .hf-transition-page.new {
        background: linear-gradient(135deg, #155e75, #10b981);
      }
    </style>
  </head>
  <body>
    <div
      id="demo"
      data-composition-id="page-slide-demo"
      data-start="0"
      data-width="1920"
      data-height="1080"
      data-duration="5"
    >
      <div class="demo-frame">
        <div class="hf-transition-page-slide">
          <section class="hf-transition-page old"><span>Dashboard</span></section>
          <section class="hf-transition-page new"><span>Analytics</span></section>
        </div>
      </div>
      <script>
        const tl = gsap.timeline({ paused: true });
        tl.fromTo(
          ".hf-transition-page-slide",
          { opacity: 0, y: 24 },
          { opacity: 1, y: 0, duration: 0.3, ease: "power2.out" },
          0.25,
        );
        tl.fromTo(
          ".hf-transition-page.new",
          { xPercent: 100 },
          { xPercent: 0, duration: 0.74, ease: "power3.inOut" },
          0.78,
        );
        tl.to(
          ".hf-transition-page.old",
          { xPercent: -28, scale: 0.94, duration: 0.74, ease: "power3.inOut" },
          0.78,
        );
        tl.fromTo(
          ".hf-transition-page.new span",
          { y: 24, opacity: 0 },
          { y: 0, opacity: 1, duration: 0.28, ease: "power2.out" },
          1.24,
        );
        tl.set({}, {}, 5);
        window.__timelines = window.__timelines || {};
        window.__timelines["page-slide-demo"] = tl;
      </script>
    </div>
  </body>
</html>
