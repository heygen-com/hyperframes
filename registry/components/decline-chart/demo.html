<!doctype html>
<!--
  decline-chart demo. This standalone composition mounts the primitive with
  non-default copy and values inside a dark neutral stage.
-->
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1920, height=1080" />
    <title>Decline Chart Demo</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html,
      body {
        width: 1920px;
        height: 1080px;
        overflow: hidden;
        background: #0b0c0e;
      }

      #root {
        --fg: #f8fafc;
        --font-display: Inter, system-ui, sans-serif;
        --font-body: Inter, system-ui, sans-serif;
        position: relative;
        width: 1920px;
        height: 1080px;
        overflow: hidden;
        background: radial-gradient(circle at 50% 42%, #171a1f 0%, #0b0c0e 70%);
      }

      .mount-card {
        width: 68%;
        height: 70%;
        left: 16%;
        top: 15%;
        container-type: size;
        overflow: hidden;
        border: 1px solid rgba(148, 163, 184, 0.18);
        border-radius: 32px;
        box-shadow: 0 44px 100px rgba(0, 0, 0, 0.5);
      }
    </style>
  </head>
  <body>
    <div
      id="root"
      data-composition-id="decline-chart-demo"
      data-start="0"
      data-width="1920"
      data-height="1080"
      data-duration="4"
      data-fps="30"
    >
      <div
        id="decline-chart-mount"
        class="mount-card clip"
        data-composition-id="decline-chart"
        data-composition-src="./decline-chart.html"
        data-variable-values='{"label":"Weekly retention","start_value":91,"end_value":26}'
        data-start="0"
        data-duration="4"
        data-track-index="0"
        data-width="1306"
        data-height="756"
      ></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      window.__timelines = window.__timelines || {};
      window.__timelines["decline-chart-demo"] = gsap.timeline({ paused: true });
    </script>
  </body>
</html>
