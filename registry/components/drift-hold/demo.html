<!doctype html>
<!--
  drift-hold demo. This standalone composition mounts drift-hold.html through
  data-composition-src. Non-default text and whisper intensity prove that both
  variables flow through the elastic host mount.
-->
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1920, height=1080" />
    <title>Drift Hold Demo</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html,
      body {
        width: 1920px;
        height: 1080px;
        overflow: hidden;
        background: #0b0c0e;
      }

      #root {
        --bg: #0b0c0e;
        --surface: #172033;
        --fg: #f8fafc;
        --muted: #94a3b8;
        --accent: #38bdf8;
        --border: #475569;
        --radius: 3.2cqmin;
        --font-display: Inter, system-ui, sans-serif;
        --font-body: Inter, system-ui, sans-serif;
        --space-3: 5cqmin;
        position: relative;
        width: 1920px;
        height: 1080px;
        overflow: hidden;
        background: radial-gradient(ellipse at 50% 42%, #142038 0%, #0b0c0e 72%);
      }

      .mount-card {
        width: 58%;
        height: 54%;
        left: 21%;
        top: 23%;
        container-type: size;
        overflow: hidden;
      }
    </style>
  </head>
  <body>
    <div
      id="root"
      data-composition-id="drift-hold-demo"
      data-start="0"
      data-width="1920"
      data-height="1080"
      data-duration="4"
      data-fps="30"
    >
      <div
        id="drift-hold-mount"
        class="mount-card clip"
        data-composition-id="drift-hold"
        data-composition-src="./drift-hold.html"
        data-variable-values='{"text":"Quiet momentum","intensity":"whisper"}'
        data-start="0"
        data-duration="4"
        data-track-index="0"
        data-width="1114"
        data-height="583"
      ></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      window.__timelines = window.__timelines || {};
      window.__timelines["drift-hold-demo"] = gsap.timeline({ paused: true });
    </script>
  </body>
</html>
