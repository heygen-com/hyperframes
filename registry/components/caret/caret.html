<style>

      system-ui,
      sans-serif;

  .hf-ui-caret-value {
    display: inline-block;
    overflow: hidden;
    white-space: nowrap;
  }
  .hf-ui-caret {
    display: inline-block;
    width: 3px;
    height: 32px;
    margin-left: 4px;
    border-radius: 999px;
    background: #18181b;
