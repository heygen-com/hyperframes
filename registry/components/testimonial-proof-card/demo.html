<!doctype html>
<!--
  testimonial-proof-card demo. This standalone composition mounts the
  primitive through data-composition-src. Non-default quote, attribution,
  emphasis, and accent values prove the variable path while the primitive
  remains elastic to its host.
-->
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1920, height=1080" />
    <title>Testimonial Proof Card Demo</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html,
      body {
        width: 1920px;
        height: 1080px;
        overflow: hidden;
        background: var(--bg, #0b0c0e);
      }

      #root {
        --bg: #0b0c0e;
        --fg: #f8fafc;
        --muted: #94a3b8;
        --surface: #14171c;
        --border: #343a46;
        --brand: #71f5a7;
        --accent: #61a8ff;
        --accent-2: #c5a3ff;
        --font-display: Inter, system-ui, sans-serif;
        --font-mono: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
        position: relative;
        width: 1920px;
        height: 1080px;
        overflow: hidden;
        background: radial-gradient(
          ellipse at 50% 42%,
          var(--bg, #171a20) 0%,
          var(--bg, #0b0c0e) 74%
        );
      }

      .mount-stage {
        width: 66%;
        height: 72%;
        left: 17%;
        top: 14%;
        container-type: size;
        overflow: hidden;
      }
    </style>
  </head>
  <body>
    <div
      id="root"
      data-composition-id="testimonial-proof-card-demo"
      data-start="0"
      data-width="1920"
      data-height="1080"
      data-duration="4.5"
      data-fps="30"
    >
      <div
        id="testimonial-proof-card-mount"
        class="mount-stage clip"
        data-composition-id="testimonial-proof-card"
        data-composition-src="./testimonial-proof-card.html"
        data-variable-values='{"quote":"The render pipeline paid for itself in one week","emphasis":"one week","name":"Ana Ferreira","role":"VP Engineering","company":"LUMENWORKS","accent":"violet"}'
        data-start="0"
        data-duration="4.5"
        data-track-index="0"
        data-width="1267"
        data-height="778"
      ></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      window.__timelines = window.__timelines || {};
      window.__timelines["testimonial-proof-card-demo"] = gsap.timeline({ paused: true });
    </script>
  </body>
</html>
