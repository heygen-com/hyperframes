<!--
  Bezier Callout Route - advanced HyperFrames primitive.

  This is intentionally seekable: drive it from a paused GSAP timeline.
  MotionPath examples require GSAP MotionPathPlugin. Three.js examples expose
  a render(progress) adapter instead of a free-running requestAnimationFrame loop.
-->

<div class="hf-advanced-bezier-callout-route">
  <svg viewBox="0 0 760 430" aria-hidden="true">
    <path
      id="bezier-callout-route-path-a"
      class="path"
      d="M104 310 C178 110, 334 74, 442 178 S592 306, 668 120"
    />
    <path id="bezier-callout-route-path-b" class="path" d="M118 142 C224 300, 410 330, 642 206" />
  </svg>
  <div class="core">Bezier Callout Route</div>
  <div class="chip chip-a"><span class="dot"></span>Plan</div>
  <div class="chip chip-b"><span class="dot"></span>Render</div>
</div>

<style>
  .hf-advanced-bezier-callout-route {
    color: #111827;
    font-family: Inter, system-ui, sans-serif;
  }
  .hf-advanced-bezier-callout-route {
    position: relative;
    width: 760px;
    height: 430px;
    border-radius: 30px;
    overflow: hidden;
    background: radial-gradient(circle at 50% 20%, #dbeafe, #f8fafc 54%, #e0e7ff);
    box-shadow: 0 28px 80px rgba(15, 23, 42, 0.18);
  }
  .hf-advanced-bezier-callout-route svg {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    overflow: visible;
  }
  .hf-advanced-bezier-callout-route .path {
    fill: none;
    stroke: rgba(37, 99, 235, 0.28);
    stroke-width: 3;
    stroke-dasharray: 10 12;
  }
  .hf-advanced-bezier-callout-route .core {
    position: absolute;
    left: 50%;
    top: 50%;
    width: 176px;
    height: 176px;
    margin: -88px 0 0 -88px;
    border-radius: 42px;
    background: #111827;
    color: #fff;
    display: grid;
    place-items: center;
    text-align: center;
    font-weight: 900;
    letter-spacing: -0.04em;
    box-shadow: 0 22px 54px rgba(15, 23, 42, 0.25);
  }
  .hf-advanced-bezier-callout-route .chip {
    position: absolute;
    left: 0;
    top: 0;
    display: inline-flex;
    align-items: center;
    gap: 8px;
    height: 42px;
    padding: 0 16px;
    border-radius: 999px;
    background: #fff;
    box-shadow: 0 16px 42px rgba(15, 23, 42, 0.14);
    font-weight: 800;
    transform-origin: 50% 50%;
  }
  .hf-advanced-bezier-callout-route .dot {
    width: 10px;
    height: 10px;
    border-radius: 999px;
    background: #2563eb;
  }
</style>
