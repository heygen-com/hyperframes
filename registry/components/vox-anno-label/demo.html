<!doctype html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=720, height=1280">
<title>Vox Annotation Label demo</title><style>html,body{width:720px;height:1280px;margin:0;overflow:hidden;background:#fbf9f4;display:grid;place-items:center;position:relative}</style></head>
<body>
<div style="display:flex;flex-direction:column;gap:40px;align-items:center"><!-- vox-anno-label: the OTHER half of Vox's two-tier text system.
     Tier 1 (this): plain uppercase letterspaced label, NO background — used for annotations
       (BEFORE / AFTER / LOST AT 16 PX / CROSSBAR / THIS FONT). Sits near its target, often
       paired with a thin hand arrow.
     Tier 2 (vox-caption-chip): dark chip — used for WORDS inside kinetic sentences and event
       callouts, never for anatomy annotations.
     Mixing the tiers up is the #1 register mistake (measured against the Cooper Black reference). -->
<style>
  .vox-lbl { display: inline-block; font-family: "Archivo", "Helvetica Neue", sans-serif;
    font-weight: 600; font-size: 26px; letter-spacing: .16em; color: #1a1a1a; text-transform: uppercase; }
  .vox-lbl.dim { color: rgba(26,26,26,.72); font-size: 20px; letter-spacing: .18em; }
</style>
<span class="vox-lbl">Lost at 16 px</span>

<span style="font-family:'Archivo','Helvetica Neue',sans-serif;font-weight:600;font-size:26px;letter-spacing:.16em">BEFORE</span>
<span style="display:inline-block;background:#1a1a1a;color:#fbf9f4;font-size:28px;letter-spacing:.1em;padding:10px 18px;border-radius:2px;font-family:'Archivo',sans-serif;font-weight:600">REBUILT</span></div>
</body></html>
