<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1920, height=1080" />
    <title>Text Stagger - Demo</title>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        width: 1920px;
        height: 1080px;
        overflow: hidden;
      }
      #demo {
        width: 1920px;
        height: 1080px;
        display: grid;
        place-items: center;
        background: #fafafa;
        font-family: Inter, system-ui, sans-serif;
      }
      .demo-frame {
        display: grid;
        place-items: center;
        gap: 28px;
        /* ponytail: scale on non-GSAP wrapper; text was ~7% frame height, now fills ~55% */
        transform: scale(2.6);
        transform-origin: center center;
      }
      .demo-label {
        font-size: 11px;
        font-weight: 500;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: #a1a1aa;
      }
      .hf-transition-text-stagger {
        display: flex;
        flex-wrap: wrap;
        gap: 0.24em;
        color: #18181b;
        font:
          900 74px/0.95 Inter,
          system-ui,
          sans-serif;
        letter-spacing: -0.045em;
      }
      .hf-transition-text-stagger span {
        display: inline-block;
        background: linear-gradient(90deg, #18181b, #18181b, #71717a, #18181b);
        background-size: 240% 100%;
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
        will-change: transform, opacity, filter, background-position;
      }
    </style>
  </head>
  <body>
    <div
      id="demo"
      data-composition-id="text-stagger-demo"
      data-start="0"
      data-width="1920"
      data-height="1080"
      data-duration="5"
    >
      <div class="demo-frame">
        <div class="demo-label">text-stagger</div>
        <div class="hf-transition-text-stagger">
          <span>Build</span>
          <span>motion</span>
          <span>systems</span>
          <span>fast</span>
        </div>
      </div>
      <script>
        const tl = gsap.timeline({ paused: true });
        tl.fromTo(
          ".hf-transition-text-stagger span",
          { opacity: 0, y: 48, filter: "blur(14px)" },
          {
            opacity: 1,
            y: 0,
            filter: "blur(0px)",
            duration: 0.54,
            stagger: 0.09,
            ease: "power3.out",
          },
          0.35,
        );
        tl.to(
          ".hf-transition-text-stagger span",
          { backgroundPosition: "100% 0%", duration: 0.72, stagger: 0.04, ease: "power2.inOut" },
          1.05,
        );
        tl.set({}, {}, 5);
        window.__timelines = window.__timelines || {};
        window.__timelines["text-stagger-demo"] = tl;
      </script>
    </div>
  </body>
</html>
