<!doctype html>
<!--
  grid-card-assemble demo. Large centered mount (88% x 78%) on a light
  editorial backdrop: the six-card grid gets room to assemble at real scale
  instead of being crushed into a text strip.
-->
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1920, height=1080" />
    <title>grid-card-assemble Demo</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html,
      body {
        width: 1920px;
        height: 1080px;
        overflow: hidden;
        background: var(--bg, #f4f6f9);
      }

      #root {
        --bg: #f4f6f9;
        --fg: #14161b;
        --surface: #ffffff;
        --border: #dfe4ec;
        --brand: #1d4ed8;
        --accent: #0284c7;
        --font-mono: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
        position: relative;
        width: 1920px;
        height: 1080px;
        overflow: hidden;
        background: radial-gradient(
          ellipse at 50% 40%,
          #ffffff 0%,
          var(--bg, #f4f6f9) 70%
        );
      }

      .mount-stage {
        width: 88%;
        height: 78%;
        left: 6%;
        top: 11%;
        container-type: size;
        overflow: hidden;
      }
    </style>
  </head>
  <body>
    <div
      id="root"
      data-composition-id="grid-card-assemble-demo"
      data-start="0"
      data-width="1920"
      data-height="1080"
      data-duration="4.5"
      data-fps="30"
    >
      <div
        id="grid-card-assemble-mount"
        class="mount-stage clip"
        data-composition-id="grid-card-assemble"
        data-composition-src="./grid-card-assemble.html"
        data-variable-values='{"items":"Permissions,Audit trail,Deploy,Search,Drafts,Citations","layout":"grid","columns":3,"accent":"violet"}'
        data-start="0"
        data-duration="4.5"
        data-track-index="0"
        data-width="1690"
        data-height="842"
      ></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      window.__timelines = window.__timelines || {};
      window.__timelines["grid-card-assemble-demo"] = gsap.timeline({ paused: true });
    </script>
  </body>
</html>
