<!doctype html>
<!--
  swipe-rail demo. This standalone composition mounts swipe-rail.html through
  data-composition-src. Non-default values prove that all three variables
  flow through the mount while the primitive remains sized by its host box.
-->
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1920, height=1080" />
    <title>Swipe Rail Demo</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html,
      body {
        width: 1920px;
        height: 1080px;
        overflow: hidden;
        background: #0b0c0e;
      }

      #root {
        position: relative;
        width: 1920px;
        height: 1080px;
        overflow: hidden;
        background: radial-gradient(ellipse at 50% 45%, #20232a 0%, #0b0c0e 72%);
      }

      .mount-card {
        width: 76%;
        height: 64%;
        left: 12%;
        top: 18%;
        container-type: size;
        overflow: hidden;
        border: 2px solid rgba(148, 163, 184, 0.24);
        border-radius: 34px;
        background: #111827;
        box-shadow: 0 44px 110px rgba(0, 0, 0, 0.48);
      }
    </style>
  </head>
  <body>
    <div
      id="root"
      data-composition-id="swipe-rail-demo"
      data-start="0"
      data-width="1920"
      data-height="1080"
      data-duration="4"
      data-fps="30"
    >
      <div
        id="swipe-rail-mount"
        class="mount-card clip"
        data-composition-id="swipe-rail"
        data-composition-src="./swipe-rail.html"
        data-variable-values='{"card_count":5,"accent":"violet","card_label_prefix":"Chapter"}'
        data-start="0"
        data-duration="4"
        data-track-index="0"
        data-width="1460"
        data-height="691"
      ></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      window.__timelines = window.__timelines || {};
      window.__timelines["swipe-rail-demo"] = gsap.timeline({ paused: true });
    </script>
  </body>
</html>
