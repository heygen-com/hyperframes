<!doctype html>
<!--
  trust-strip demo. This standalone composition mounts the primitive
  through data-composition-src. Non-default text, accent, and style values
  prove the variable path while the primitive remains elastic to its host.
-->
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1920, height=1080" />
    <title>trust-strip Demo</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html,
      body {
        width: 1920px;
        height: 1080px;
        overflow: hidden;
        background: var(--bg, #0b0c0e);
      }

      #root {
        --bg: #0b0c0e;
        --fg: #f8fafc;
        --surface: #14171c;
        --border: #343a46;
        --brand: #71f5a7;
        --accent: #c5a3ff;
        --font-mono: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
        position: relative;
        width: 1920px;
        height: 1080px;
        overflow: hidden;
        background: radial-gradient(
          ellipse at 50% 44%,
          var(--bg, #171a20) 0%,
          var(--bg, #0b0c0e) 72%
        );
      }

      .mount-card {
        width: 76%;
        height: 40%;
        left: 12%;
        top: 30%;
        container-type: size;
        overflow: hidden;
        border: 1px solid color-mix(in srgb, var(--border, #94a3b8) 20%, transparent);
        border-radius: 30px;
        background: color-mix(in srgb, var(--surface, #101318) 72%, transparent);
        box-shadow: 0 40px 100px color-mix(in srgb, var(--bg, #000000) 48%, transparent);
      }
    </style>
  </head>
  <body>
    <div
      id="root"
      data-composition-id="trust-strip-demo"
      data-start="0"
      data-width="1920"
      data-height="1080"
      data-duration="3.5"
      data-fps="30"
    >
      <div
        id="trust-strip-mount"
        class="mount-card clip"
        data-composition-id="trust-strip"
        data-composition-src="./trust-strip.html"
        data-variable-values='{"marks":"NORTHWIND,ACME CORP,GLOBEX,INITECH,UMBRA","tone":"muted"}'
        data-start="0"
        data-duration="3.5"
        data-track-index="0"
        data-width="1459"
        data-height="432"
      ></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      window.__timelines = window.__timelines || {};
      window.__timelines["trust-strip-demo"] = gsap.timeline({ paused: true });
    </script>
  </body>
</html>
