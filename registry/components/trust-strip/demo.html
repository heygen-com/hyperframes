<!doctype html>
<!--
  trust-strip demo. Generous wide mount (90% x 50%, centered vertically) on a
  light editorial backdrop: the five logo marks spread across the frame with
  real presence instead of being pinched into a narrow band.
-->
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1920, height=1080" />
    <title>trust-strip Demo</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html,
      body {
        width: 1920px;
        height: 1080px;
        overflow: hidden;
        background: var(--bg, #f4f6f9);
      }

      #root {
        --bg: #f4f6f9;
        --fg: #14161b;
        --surface: #ffffff;
        --border: #dfe4ec;
        --brand: #1d4ed8;
        --accent: #0284c7;
        --font-mono: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
        position: relative;
        width: 1920px;
        height: 1080px;
        overflow: hidden;
        background: radial-gradient(
          ellipse at 50% 40%,
          #ffffff 0%,
          var(--bg, #f4f6f9) 70%
        );
      }

      .mount-stage {
        width: 90%;
        height: 50%;
        left: 5%;
        top: 25%;
        container-type: size;
        overflow: hidden;
      }
    </style>
  </head>
  <body>
    <div
      id="root"
      data-composition-id="trust-strip-demo"
      data-start="0"
      data-width="1920"
      data-height="1080"
      data-duration="3.5"
      data-fps="30"
    >
      <div
        id="trust-strip-mount"
        class="mount-stage clip"
        data-composition-id="trust-strip"
        data-composition-src="./trust-strip.html"
        data-variable-values='{"marks":"NORTHWIND,ACME CORP,GLOBEX,INITECH,UMBRA","tone":"muted"}'
        data-start="0"
        data-duration="3.5"
        data-track-index="0"
        data-width="1728"
        data-height="540"
      ></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      window.__timelines = window.__timelines || {};
      window.__timelines["trust-strip-demo"] = gsap.timeline({ paused: true });
    </script>
  </body>
</html>
