<!doctype html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=720, height=1280">
<title>Vox Pie Callout demo</title><style>html,body{width:720px;height:1280px;margin:0;overflow:hidden;background:#1E1B18;display:grid;place-items:center}</style></head>
<body>
<style>
  .vpc { position: relative; width: 620px; height: 460px; font-family: "Bebas Neue", sans-serif; color: #f4f1e8;
    display: flex; align-items: center; gap: 40px; }
  .vpc svg { width: 300px; height: 300px; transform: rotate(-90deg); }
  .vpc .vpc-track { fill: none; stroke: #4a463f; stroke-width: 34; }
  .vpc .vpc-wedge { fill: none; stroke: #FFD21E; stroke-width: 34; stroke-linecap: butt;
    stroke-dasharray: 263.9; stroke-dashoffset: 102.9; }
  .vpc .vpc-fig { font-size: 130px; line-height: .9; }
  .vpc .vpc-fig .u { font-size: 64px; }
  .vpc .vpc-cap { display: block; font-size: 26px; letter-spacing: 2px; text-transform: uppercase;
    color: rgba(244,241,232,.7); margin-top: 6px; }
</style>
<div class="vpc" data-pct="61">
  <svg viewBox="0 0 120 120">
    <circle class="vpc-track" cx="60" cy="60" r="42"/>
    <circle class="vpc-wedge" cx="60" cy="60" r="42"/>
  </svg>
  <div><span class="vpc-fig"><span class="vpc-num">61</span><span class="u">%</span></span>
    <span class="vpc-cap">Starlink revenue</span></div>
</div>
</body></html>
