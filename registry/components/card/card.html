<!--
  Card - remocn-inspired UI primitive for HyperFrames.

  Paste the markup and CSS into a composition. Animate the CSS variables
  from a paused GSAP timeline for deterministic video renders.
-->

<article class="hf-ui-card">
  <div class="hf-ui-card-header">
    <span class="hf-ui-card-kicker">Workspace</span>
    <strong>Launch recap</strong>
  </div>
  <p>12 scenes passed lint and are ready for render.</p>
  <div class="hf-ui-card-footer">
    <span>4K export</span>
    <span>Ready</span>
  </div>
</article>

<style>
  .hf-ui-card {
    --hf-card-y: 0px;
    --hf-card-scale: 1;
    display: grid;
    gap: 18px;
    width: 360px;
    padding: 22px;
    border: 1px solid #e4e4e7;
    border-radius: 14px;
    background: #ffffff;
    color: #18181b;
    font-family: Inter, system-ui, sans-serif;
    box-shadow: 0 24px 70px rgba(24, 24, 27, 0.12);
    transform: translateY(var(--hf-card-y)) scale(var(--hf-card-scale));
    will-change: transform, opacity;
  }
  .hf-ui-card-header {
    display: grid;
    gap: 6px;
  }
  .hf-ui-card-kicker {
    color: #71717a;
    font-size: 12px;
    font-weight: 850;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }
  .hf-ui-card strong {
    font-size: 25px;
    letter-spacing: 0;
  }
  .hf-ui-card p {
    margin: 0;
    color: #52525b;
    font-size: 15px;
    line-height: 1.45;
  }
  .hf-ui-card-footer {
    display: flex;
    justify-content: space-between;
    gap: 16px;
    padding-top: 14px;
    border-top: 1px solid #f1f1f4;
    font-size: 13px;
    font-weight: 800;
  }
</style>

<!--
  Timeline integration:
  tl.fromTo('.hf-ui-card', { opacity: 0, '--hf-card-y': '28px', '--hf-card-scale': 0.96 }, { opacity: 1, '--hf-card-y': '0px', '--hf-card-scale': 1, duration: 0.46, ease: 'back.out(1.35)' }, startTime);
-->
