<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1920, height=1080" />
    <title>Card - Demo</title>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        width: 1920px;
        height: 1080px;
        overflow: hidden;
      }
      #demo {
        width: 1920px;
        height: 1080px;
        display: grid;
        place-items: center;
        background: #f7f7f8;
        font-family: Inter, system-ui, sans-serif;
      }
      .demo-frame {
        display: grid;
        place-items: center;
        min-width: 760px;
        min-height: 480px;
        padding: 56px;
        transform: scale(2.8); /* ponytail: scale wrapper only — GSAP targets .hf-ui-card, not .demo-frame */
      }
      .hf-ui-card {
        --hf-card-y: 0px;
        --hf-card-scale: 1;
        display: grid;
        gap: 18px;
        width: 360px;
        padding: 22px;
        border: 1px solid #e4e4e7;
        border-radius: 14px;
        background: #ffffff;
        color: #18181b;
        font-family: Inter, system-ui, sans-serif;
        box-shadow: 0 24px 70px rgba(24, 24, 27, 0.12);
        transform: translateY(var(--hf-card-y)) scale(var(--hf-card-scale));
        will-change: transform, opacity;
      }
      .hf-ui-card-header {
        display: grid;
        gap: 6px;
      }
      .hf-ui-card-kicker {
        color: #71717a;
        font-size: 12px;
        font-weight: 850;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }
      .hf-ui-card strong {
        font-size: 25px;
        letter-spacing: 0;
      }
      .hf-ui-card p {
        margin: 0;
        color: #52525b;
        font-size: 15px;
        line-height: 1.45;
      }
      .hf-ui-card-footer {
        display: flex;
        justify-content: space-between;
        gap: 16px;
        padding-top: 14px;
        border-top: 1px solid #f1f1f4;
        font-size: 13px;
        font-weight: 800;
      }
    </style>
  </head>
  <body>
    <div
      id="demo"
      data-composition-id="card-demo"
      data-start="0"
      data-width="1920"
      data-height="1080"
      data-duration="5"
    >
      <div class="demo-frame">
        <article class="hf-ui-card">
          <div class="hf-ui-card-header">
            <span class="hf-ui-card-kicker">Workspace</span>
            <strong>Launch recap</strong>
          </div>
          <p>12 scenes passed lint and are ready for render.</p>
          <div class="hf-ui-card-footer">
            <span>4K export</span>
            <span>Ready</span>
          </div>
        </article>
      </div>
      <script>
        const tl = gsap.timeline({ paused: true });
        const startTime = 0.45;
        tl.fromTo(
          ".hf-ui-card",
          { opacity: 0, "--hf-card-y": "28px", "--hf-card-scale": 0.96 },
          {
            opacity: 1,
            "--hf-card-y": "0px",
            "--hf-card-scale": 1,
            duration: 0.46,
            ease: "back.out(1.35)",
          },
          startTime,
        );
        tl.set({}, {}, 5);
        window.__timelines = window.__timelines || {};
        window.__timelines["card-demo"] = tl;
      </script>
    </div>
  </body>
</html>
