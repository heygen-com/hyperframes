<style>
  .hf-ui-settings-flow {

    border-radius: 28px;

  }

    padding: 0 16px;

  .hf-ui-settings-row div {
    display: grid;
    gap: 4px;

  .hf-ui-settings-row strong {

  .hf-ui-settings-row span {

</style>
