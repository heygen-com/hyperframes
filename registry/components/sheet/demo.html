<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1920, height=1080" />
    <title>Sheet - Demo</title>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        width: 1920px;
        height: 1080px;
        overflow: hidden;
      }
      #demo {
        width: 1920px;
        height: 1080px;
        display: grid;
        place-items: center;
        background: #f8fafc;
        font-family: Inter, system-ui, sans-serif;
      }
      .demo-frame {
        display: grid;
        place-items: center;
        min-width: 760px;
        min-height: 480px;
        padding: 56px;
        /* ponytail: scale non-animated wrapper to fill ~65% of 1080px frame height */
        transform: scale(1.85);
        transform-origin: center center;
      }
      .hf-ui-sheet-scene {
        position: relative;
        width: 620px;
        height: 380px;
        overflow: hidden;
        border-radius: 28px;
        background: #e4e4e7;
        font-family: Inter, system-ui, sans-serif;
      }
      /* faux app content behind the sheet overlay */
      .hf-ui-sheet-scene::before {
        content: "";
        position: absolute;
        inset: 24px 340px 24px 24px;
        background: #d4d4d8;
        border-radius: 12px;
        opacity: 0.6;
      }
      .hf-ui-sheet-overlay {
        position: absolute;
        inset: 0;
        background: rgba(24, 24, 27, 0.38);
      }
      .hf-ui-sheet {
        position: absolute;
        right: 0;
        top: 0;
        display: grid;
        align-content: start;
        gap: 16px;
        width: 320px;
        height: 100%;
        padding: 32px;
        background: #ffffff;
        color: #18181b;
        box-shadow: -20px 0 70px rgba(0, 0, 0, 0.18);
      }
      .hf-ui-sheet h3 {
        margin: 0;
        font-size: 26px;
      }
      .hf-ui-sheet p {
        margin: 0 0 12px;
        color: #71717a;
        line-height: 1.45;
      }
      .hf-ui-sheet-field {
        display: flex;
        justify-content: space-between;
        padding: 14px 0;
        border-top: 1px solid #e4e4e7;
        font-size: 14px;
        font-weight: 600;
      }
    </style>
  </head>
  <body>
    <div
      id="demo"
      data-composition-id="sheet-demo"
      data-start="0"
      data-width="1920"
      data-height="1080"
      data-duration="5"
    >
      <div class="demo-frame">
        <div class="hf-ui-sheet-scene">
          <div class="hf-ui-sheet-overlay"></div>
          <aside class="hf-ui-sheet">
            <h3>Layer settings</h3>
            <p>Adjust timing, opacity, and easing for this composition element.</p>
            <div class="hf-ui-sheet-field"><span>Opacity</span><strong>82%</strong></div>
            <div class="hf-ui-sheet-field"><span>Duration</span><strong>4.0s</strong></div>
          </aside>
        </div>
      </div>
      <script>
        const tl = gsap.timeline({ paused: true });
        tl.fromTo(
          ".hf-ui-sheet-overlay",
          { opacity: 0 },
          { opacity: 1, duration: 0.25, ease: "power2.out" },
          0.25,
        );
        tl.fromTo(".hf-ui-sheet", { x: 340 }, { x: 0, duration: 0.48, ease: "power3.out" }, 0.38);
        tl.fromTo(
          ".hf-ui-sheet-field",
          { x: 20, opacity: 0 },
          { x: 0, opacity: 1, duration: 0.24, stagger: 0.08, ease: "power2.out" },
          0.78,
        );
        tl.set({}, {}, 5);
        window.__timelines = window.__timelines || {};
        window.__timelines["sheet-demo"] = tl;
      </script>
    </div>
  </body>
</html>
