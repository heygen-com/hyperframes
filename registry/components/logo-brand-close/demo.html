<!doctype html>
<!--
  logo-brand-close demo. Full-bleed mount on the light editorial token set:
  the brand close owns the whole 1920x1080 frame, proving the display-scale
  wordmark, readable tagline, and mono url land with end-card presence.
  Non-default text and a violet accent prove the variable path.
-->
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1920, height=1080" />
    <title>logo-brand-close Demo</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html,
      body {
        width: 1920px;
        height: 1080px;
        overflow: hidden;
        background: var(--bg, #e9e1d2);
      }

      #root {
        --bg: #e9e1d2;
        --fg: #202725;
        --muted: #6c746f;
        --surface: #f8f1e5;
        --border: #c9bfad;
        --brand: #246b63;
        --accent: #31776f;
        --accent-2: #8a6549;
        --font-display: Georgia, "Times New Roman", serif;
        --font-body: "Iowan Old Style", "Palatino Linotype", Palatino, Georgia, serif;
        --font-mono: "SFMono-Regular", Consolas, "Liberation Mono", monospace;
        --radius: 0.9cqmin;
        --space-1: 1.1cqmin;
        --space-2: 2.2cqmin;
        --space-3: 3.8cqmin;
        --dur-beat: 0.48s;
        --ease-standard: cubic-bezier(0.22, 0.61, 0.36, 1);
        --ease-emphasis: cubic-bezier(0.16, 1, 0.3, 1);
        position: relative;
        width: 1920px;
        height: 1080px;
        overflow: hidden;
        background: radial-gradient(
          ellipse at 50% 42%,
          var(--surface, #f8f1e5) 0%,
          var(--bg, #e9e1d2) 72%
        );
      }

      .mount-stage {
        width: 100%;
        height: 100%;
        left: 0;
        top: 0;
        container-type: size;
        overflow: hidden;
      }
    </style>
  </head>
  <body>
    <div
      id="root"
      data-composition-id="logo-brand-close-demo"
      data-start="0"
      data-width="1920"
      data-height="1080"
      data-duration="4"
      data-fps="30"
    >
      <div
        id="logo-brand-close-mount"
        class="mount-stage clip"
        data-composition-id="logo-brand-close"
        data-composition-src="./logo-brand-close.html"
        data-variable-values='{"wordmark":"FIELDNOTE","tagline":"Slow journalism for fast times.","url":"fieldnote.press","accent":"violet"}'
        data-start="0"
        data-duration="4"
        data-track-index="0"
        data-width="1920"
        data-height="1080"
      ></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      window.__timelines = window.__timelines || {};
      window.__timelines["logo-brand-close-demo"] = gsap.timeline({ paused: true });
    </script>
  </body>
</html>
