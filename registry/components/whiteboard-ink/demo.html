<!doctype html>
<!--
  whiteboard-ink demo. This standalone composition mounts the primitive with
  non-default sketch, caption, and accent values while leaving the pen visible.
-->
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1920, height=1080" />
    <title>Whiteboard Ink Demo</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html,
      body {
        width: 1920px;
        height: 1080px;
        overflow: hidden;
        background: #0b0c0e;
      }

      #root {
        --bg: #0b0c0e;
        --fg: #f8fafc;
        --muted: #94a3b8;
        --surface: #171a20;
        --border: #343a46;
        --brand: #71f5a7;
        --accent: #61a8ff;
        --accent-2: #c5a3ff;
        --font-display: Inter, system-ui, sans-serif;
        --font-body: Inter, system-ui, sans-serif;
        --space-1: 1.8cqh;
        position: relative;
        width: 1920px;
        height: 1080px;
        overflow: hidden;
        background: radial-gradient(circle at 50% 44%, #20242b 0%, #0b0c0e 70%);
      }

      .mount-card {
        --bg: #f5f0e5;
        --fg: #20242b;
        --muted: #667085;
        --surface: #fffdf8;
        width: 62%;
        height: 72%;
        left: 19%;
        top: 14%;
        container-type: size;
        overflow: hidden;
        border: 1px solid color-mix(in srgb, var(--border, #343a46) 44%, transparent);
        border-radius: 28px;
        background: var(--bg, #f5f0e5);
        box-shadow: 0 42px 110px rgba(0, 0, 0, 0.46);
      }
    </style>
  </head>
  <body>
    <div
      id="root"
      data-composition-id="whiteboard-ink-demo"
      data-start="0"
      data-width="1920"
      data-height="1080"
      data-duration="5"
      data-fps="30"
    >
      <div
        id="wbi-mount"
        class="mount-card clip"
        data-composition-id="whiteboard-ink"
        data-composition-src="./whiteboard-ink.html"
        data-variable-values='{"sketch":"rocket","caption":"Sketch the launch","pen":"show","accent":"violet"}'
        data-start="0"
        data-duration="5"
        data-track-index="0"
        data-width="1190"
        data-height="778"
      ></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      window.__timelines = window.__timelines || {};
      window.__timelines["whiteboard-ink-demo"] = gsap.timeline({ paused: true });
    </script>
  </body>
</html>
