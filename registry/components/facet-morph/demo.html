<!doctype html>
<!--
  facet-morph demo. FULL-BLEED mount on a LIGHT token stage: the faceted
  mass reshapes badge to blob to mark with the violet accent and hold_last
  false, proving the forms sequence, the breathing hold, and flat shading
  that reads on a light background (the reference's own register).
-->
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1920, height=1080" />
    <title>facet-morph Demo</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html,
      body {
        width: 1920px;
        height: 1080px;
        overflow: hidden;
        background: var(--bg, #eef0f3);
      }

      #root {
        --bg: #eef0f3;
        --fg: #14171c;
        --muted: #626873;
        --surface: #fbfcfd;
        --border: #d3d8df;
        --brand: #16a34a;
        --accent: #0284c7;
        --accent-2: #7c5cff;
        --font-display: Inter, system-ui, sans-serif;
        --font-body: Inter, system-ui, sans-serif;
        --radius: 22px;
        --space-1: 8px;
        --space-2: 16px;
        --space-3: 32px;
        position: relative;
        width: 1920px;
        height: 1080px;
        overflow: hidden;
        background: linear-gradient(128deg, #f4f5f7 0%, var(--bg, #eef0f3) 48%, #e2e5ea 100%);
      }

      .mount-stage {
        width: 100%;
        height: 100%;
        left: 0;
        top: 0;
        container-type: size;
        overflow: hidden;
      }
    </style>
  </head>
  <body>
    <div
      id="root"
      data-composition-id="facet-morph-demo"
      data-start="0"
      data-width="1920"
      data-height="1080"
      data-duration="5"
      data-fps="30"
    >
      <div
        id="facet-morph-mount"
        class="mount-stage clip"
        data-composition-id="facet-morph"
        data-composition-src="./facet-morph.html"
        data-variable-values='{"forms":"badge,blob,mark","hold_last":false,"accent":"violet"}'
        data-start="0"
        data-duration="5"
        data-track-index="0"
        data-width="1920"
        data-height="1080"
      ></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      window.__timelines = window.__timelines || {};
      window.__timelines["facet-morph-demo"] = gsap.timeline({ paused: true });
    </script>
  </body>
</html>
