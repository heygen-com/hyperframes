<!--
  Separator - remocn-inspired UI primitive for HyperFrames.

  Paste the markup and CSS into a composition. Animate the CSS variables
  from a paused GSAP timeline for deterministic video renders.
-->

<div class="hf-ui-separator" role="separator"><span></span></div>

<style>
  .hf-ui-separator {
    --hf-separator-progress: 1;
    width: 360px;
    height: 1px;
    background: #e4e4e7;
    overflow: hidden;
  }
  .hf-ui-separator span {
    display: block;
    width: calc(var(--hf-separator-progress) * 100%);
    height: 100%;
    background: #18181b;
    transform-origin: left center;
  }
  .hf-ui-separator[data-orientation="vertical"] {
    width: 1px;
    height: 180px;
  }
</style>

<!--
  Timeline integration:
  tl.fromTo('.hf-ui-separator', { '--hf-separator-progress': 0 }, { '--hf-separator-progress': 1, duration: 0.42, ease: 'power2.out' }, startTime);
-->
