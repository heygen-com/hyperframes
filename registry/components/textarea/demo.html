<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1920, height=1080" />
    <title>Textarea - Demo</title>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        width: 1920px;
        height: 1080px;
        overflow: hidden;
      }
      #demo {
        width: 1920px;
        height: 1080px;
        display: grid;
        place-items: center;
        background: #f7f7f8;
        font-family: Inter, system-ui, sans-serif;
      }
      .demo-frame {
        display: grid;
        place-items: center;
        min-width: 760px;
        min-height: 480px;
        padding: 56px;
        /* ponytail: scale the non-animated wrapper; GSAP only touches textarea */
        transform: scale(2.6);
      }
      .hf-ui-textarea-field {
        display: grid;
        gap: 10px;
        width: 480px;
        color: #18181b;
        font-family: Inter, system-ui, sans-serif;
      }
      .hf-ui-textarea-field span {
        font-size: 14px;
        font-weight: 600;
        color: #3f3f46;
      }
      .hf-ui-textarea-field textarea {
        width: 100%;
        min-height: 130px;
        padding: 14px 16px;
        border: 1px solid #e4e4e7;
        border-radius: 12px;
        background: #fff;
        color: #18181b;
        font:
          500 15px/1.55 Inter,
          system-ui,
          sans-serif;
        resize: none;
        box-shadow: 0 0 0 var(--hf-textarea-ring, 0px) rgba(24, 24, 27, 0.12),
          0 2px 8px rgba(0, 0, 0, 0.06);
      }
    </style>
  </head>
  <body>
    <div
      id="demo"
      data-composition-id="textarea-demo"
      data-start="0"
      data-width="1920"
      data-height="1080"
      data-duration="5"
    >
      <div class="demo-frame">
        <label class="hf-ui-textarea-field">
          <span>Scene notes</span>
          <textarea readonly>Open with the hero card, then reveal the dashboard metrics.</textarea>
        </label>
      </div>
      <script>
        const tl = gsap.timeline({ paused: true });
        const startTime = 0.45;
        tl.fromTo(
          ".hf-ui-textarea-field textarea",
          { "--hf-textarea-ring": "0px", opacity: 0, y: 12 },
          { "--hf-textarea-ring": "5px", opacity: 1, y: 0, duration: 0.36, ease: "power2.out" },
          startTime,
        );
        tl.set({}, {}, 5);
        window.__timelines = window.__timelines || {};
        window.__timelines["textarea-demo"] = tl;
      </script>
    </div>
  </body>
</html>
