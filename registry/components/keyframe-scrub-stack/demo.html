<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1920, height=1080" />
    <title>Keyframe Scrub Stack - Demo</title>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.15.0/dist/gsap.min.js"></script>
    <style>
      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        width: 1920px;
        height: 1080px;
        overflow: hidden;
      }
      #demo {
        width: 1920px;
        height: 1080px;
        display: grid;
        place-items: center;
        background: #f7f7f8;
        font-family: Inter, system-ui, sans-serif;
      }
      .hf-advanced-keyframe-scrub-stack {
        color: #18181b;
        font-family: Inter, system-ui, sans-serif;
        /* ponytail: scale wrapper — GSAP only targets .card, not this element */
        transform: scale(2);
        transform-origin: center center;
        width: 560px;
        min-height: 360px;
        border-radius: 20px;
        padding: 32px;
        background: #ffffff;
        box-shadow: 0 24px 70px rgba(0, 0, 0, 0.10);
        border: 1px solid #e4e4e7;
        display: grid;
        place-items: center;
      }
      .hf-advanced-keyframe-scrub-stack .stack {
        position: relative;
        width: 460px;
        height: 240px;
      }
      .hf-advanced-keyframe-scrub-stack .card {
        position: absolute;
        inset: 0;
        border-radius: 14px;
        background: linear-gradient(145deg, #f8fafc 0%, #dbeafe 100%);
        border: 1px solid #e4e4e7;
        box-shadow: 0 8px 32px rgba(15, 23, 42, 0.10);
        transform: translateY(var(--hf-card-y, 0px)) scale(var(--hf-card-scale, 1));
        opacity: var(--hf-card-opacity, 1);
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        padding: 20px 22px 16px;
      }
      .hf-advanced-keyframe-scrub-stack .card-header {
        display: flex;
        align-items: center;
        gap: 10px;
      }
      .hf-advanced-keyframe-scrub-stack .card-dot {
        width: 10px;
        height: 10px;
        border-radius: 50%;
        background: #3b82f6;
        flex-shrink: 0;
      }
      .hf-advanced-keyframe-scrub-stack .card-label {
        font-size: 13px;
        font-weight: 600;
        color: #18181b;
        letter-spacing: -0.01em;
      }
      .hf-advanced-keyframe-scrub-stack .card-sub {
        font-size: 11px;
        font-weight: 400;
        color: #71717a;
        margin-top: 2px;
      }
      .hf-advanced-keyframe-scrub-stack .card-bars {
        display: flex;
        gap: 5px;
        align-items: flex-end;
        height: 36px;
      }
      .hf-advanced-keyframe-scrub-stack .bar {
        width: 8px;
        border-radius: 3px;
        background: linear-gradient(180deg, #93c5fd, #3b82f6);
      }
      /* back cards are slightly desaturated */
      .hf-advanced-keyframe-scrub-stack .card:nth-child(2) {
        background: linear-gradient(145deg, #f1f5f9 0%, #e0e7ff 100%);
      }
      .hf-advanced-keyframe-scrub-stack .card:nth-child(3) {
        background: linear-gradient(145deg, #f8fafc 0%, #ede9fe 100%);
      }
    </style>
  </head>
  <body>
    <div
      id="demo"
      data-composition-id="keyframe-scrub-stack-demo"
      data-start="0"
      data-width="1920"
      data-height="1080"
      data-duration="5"
    >
      <div class="hf-advanced-keyframe-scrub-stack">
        <div class="stack">
          <div class="card" style="--i: 0">
            <div class="card-header">
              <span class="card-dot"></span>
              <div>
                <div class="card-label">Keyframe 3</div>
                <div class="card-sub">t = 1.00s · ease-out</div>
              </div>
            </div>
            <div class="card-bars">
              <div class="bar" style="height:28px"></div>
              <div class="bar" style="height:36px"></div>
              <div class="bar" style="height:20px"></div>
              <div class="bar" style="height:32px"></div>
              <div class="bar" style="height:14px"></div>
              <div class="bar" style="height:24px"></div>
            </div>
          </div>
          <div class="card" style="--i: 1">
            <div class="card-header">
              <span class="card-dot" style="background:#7c3aed"></span>
              <div>
                <div class="card-label">Keyframe 2</div>
                <div class="card-sub">t = 0.50s · back.out</div>
              </div>
            </div>
            <div class="card-bars">
              <div class="bar" style="height:18px;background:linear-gradient(180deg,#c4b5fd,#7c3aed)"></div>
              <div class="bar" style="height:30px;background:linear-gradient(180deg,#c4b5fd,#7c3aed)"></div>
              <div class="bar" style="height:36px;background:linear-gradient(180deg,#c4b5fd,#7c3aed)"></div>
              <div class="bar" style="height:22px;background:linear-gradient(180deg,#c4b5fd,#7c3aed)"></div>
            </div>
          </div>
          <div class="card" style="--i: 2">
            <div class="card-header">
              <span class="card-dot" style="background:#71717a"></span>
              <div>
                <div class="card-label">Keyframe 1</div>
                <div class="card-sub">t = 0.00s · linear</div>
              </div>
            </div>
            <div class="card-bars">
              <div class="bar" style="height:12px;background:linear-gradient(180deg,#d4d4d8,#71717a)"></div>
              <div class="bar" style="height:12px;background:linear-gradient(180deg,#d4d4d8,#71717a)"></div>
              <div class="bar" style="height:12px;background:linear-gradient(180deg,#d4d4d8,#71717a)"></div>
              <div class="bar" style="height:12px;background:linear-gradient(180deg,#d4d4d8,#71717a)"></div>
              <div class="bar" style="height:12px;background:linear-gradient(180deg,#d4d4d8,#71717a)"></div>
            </div>
          </div>
        </div>
      </div>
    </div>
    <script>
      const tl = gsap.timeline({ paused: true });
      const startTime = 0.5;
      tl.fromTo(
        ".hf-advanced-keyframe-scrub-stack .card",
        { "--hf-card-y": "42px", "--hf-card-scale": 0.88, "--hf-card-opacity": 0 },
        {
          "--hf-card-y": (i) => i * 26 + "px",
          "--hf-card-scale": (i) => 1 - i * 0.04,
          "--hf-card-opacity": 1,
          duration: 0.48,
          stagger: 0.12,
          ease: "back.out(1.6)",
        },
        startTime,
      );
      tl.set({}, {}, 5);
      window.__timelines = window.__timelines || {};
      window.__timelines["keyframe-scrub-stack-demo"] = tl;
    </script>
  </body>
</html>
