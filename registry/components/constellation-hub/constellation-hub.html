<!doctype html>
<!--
  constellation-hub: HyperFrames video primitive (feature tour / exhibit)

  Feature nodes form an orbit around one fixed hub. Each connector draws
  from the hub to its node in narration order while that node brightens,
  then every element settles into one readable lockup.

  Variables:
    - hub_label (string, default "Product"): text inside the fixed hub.
    - nodes (string, default "Capture,Compose,Render,Share"): comma-separated
      feature labels introduced from first to last.
    - accent (green | blue | violet, default "green"): highlight token route.

  Envelope, fixed IN and OUT with elastic HOLD only:
    IN_BASE  = 2.40s, hub arrival plus ordered connector and node reveals
    HOLD     = max(0, D - IN - OUT), subtle orbital drift around the fixed hub
    OUT_BASE = 0.50s, the completed lockup scales down and fades
    If D is shorter than IN_BASE + OUT_BASE, IN and OUT compress together.
    The timeline is never time-scaled.

  Draw contract: each connector reads its real SVG getTotalLength() during
  synchronous construction. That value owns both dash array and initial dash
  offset, and GSAP draws the connector by tweening the offset to zero.

  Mount contract: the runtime clones only this template. #root fills the host
  box, uses cqw and cqh for elastic sizing, carries no data-width or
  data-height, and registers one paused timeline under the literal
  constellation-hub key.
-->
<html
  lang="en"
  data-composition-id="constellation-hub"
  data-composition-duration="4.5"
  data-composition-variables='[
    { "id": "hub_label", "type": "string", "role": "content", "label": "Hub label", "description": "Text displayed inside the fixed central hub.", "default": "Product" },
    { "id": "nodes", "type": "string", "role": "content", "label": "Feature nodes", "description": "Comma-separated feature labels introduced in narration order.", "default": "Capture,Compose,Render,Share" },
    { "id": "accent", "type": "enum", "role": "style", "label": "Accent", "description": "Highlight color used by the hub, connectors, and active nodes.", "default": "green", "options": [{ "value": "green", "label": "Green" }, { "value": "blue", "label": "Blue" }, { "value": "violet", "label": "Violet" }] }
  ]'
>
  <head>
    <meta charset="UTF-8" />
    <title>Constellation Hub</title>
  </head>
  <body>
    <template>
      <div id="root" data-composition-id="constellation-hub" data-duration="4.5" data-fps="30">
        <style>
          *,
          *::before,
          *::after {
            box-sizing: border-box;
          }

          #root {
            position: absolute;
            inset: 0;
            overflow: hidden;
            container-type: size;
            isolation: isolate;
            color: var(--fg, #f8fafc);
            font-family: var(--font-body, Inter, system-ui, sans-serif);
            pointer-events: none;
          }

          .ch-clip {
            position: absolute;
            inset: 0;
            display: grid;
            place-items: center;
            overflow: hidden;
            background: var(--bg, transparent);
          }

          .ch-lockup {
            position: relative;
            width: 100cqw;
            height: 100cqh;
            opacity: 0;
          }

          .ch-orbit {
            position: absolute;
            left: 0;
            top: 0;
            width: 100cqw;
            height: 100cqh;
            transform-origin: 50cqw 50cqh;
            will-change: transform;
          }

          .ch-connectors {
            position: absolute;
            left: 0;
            top: 0;
            width: 100cqw;
            height: 100cqh;
            overflow: visible;
          }

          .ch-connector {
            fill: none;
            stroke: var(--ch-accent);
            stroke-width: 0.72;
            stroke-linecap: round;
            opacity: 0.72;
          }

          .ch-node-position {
            position: absolute;
            width: var(--ch-node-width, 21cqw);
            transform: translate(-50%, -50%);
          }

          .ch-node {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            min-height: 10cqh;
            padding: var(--space-1, 1.2cqh) var(--space-2, 2.4cqw);
            overflow: hidden;
            border: 0.14cqw solid color-mix(in srgb, var(--ch-accent) 54%, var(--border, #334155));
            border-radius: var(--radius, 2.4cqw);
            background: color-mix(in srgb, var(--surface, #151a24) 90%, var(--ch-accent));
            box-shadow: 0 1.8cqh 4.8cqh color-mix(in srgb, var(--bg, #05070d) 38%, transparent);
            color: var(--fg, #f8fafc);
            font-family: var(--font-body, Inter, system-ui, sans-serif);
            font-size: var(--ch-node-font-size, 2.25cqw);
            font-weight: 680;
            line-height: 1.1;
            letter-spacing: -0.01em;
            text-align: center;
            text-overflow: ellipsis;
            white-space: nowrap;
            will-change: transform, opacity;
          }

          .ch-hub {
            position: absolute;
            left: 50cqw;
            top: 50cqh;
            z-index: 2;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 21cqw;
            min-height: 18cqh;
            padding: var(--space-2, 2.4cqh) var(--space-2, 2.4cqw);
            overflow: hidden;
            border: 0.22cqw solid var(--ch-accent);
            border-radius: var(--radius, 2.4cqw);
            background: color-mix(in srgb, var(--surface, #151a24) 78%, var(--ch-accent));
            box-shadow:
              0 0 7cqh color-mix(in srgb, var(--ch-accent) 24%, transparent),
              0 2.4cqh 6cqh color-mix(in srgb, var(--bg, #05070d) 46%, transparent);
            color: var(--fg, #f8fafc);
            font-family: var(--font-display, Inter, system-ui, sans-serif);
            font-size: 3.05cqw;
            font-weight: 760;
            line-height: 1;
            letter-spacing: -0.03em;
            text-align: center;
            text-overflow: ellipsis;
            white-space: nowrap;
            transform: translate(-50%, -50%);
            will-change: transform, opacity;
          }
        </style>

        <div
          id="constellation-hub-clip"
          class="ch-clip clip"
          data-start="0"
          data-duration="4.5"
          data-track-index="0"
        >
          <div class="ch-lockup" role="img">
            <div class="ch-orbit">
              <svg
                class="ch-connectors"
                viewBox="0 0 100 100"
                preserveAspectRatio="none"
                aria-hidden="true"
              ></svg>
              <div class="ch-nodes"></div>
            </div>
            <div class="ch-hub"></div>
          </div>
        </div>

        <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
        <script>
          (function () {
            "use strict";

            var root = document.getElementById("root");
            var lockup = root.querySelector(".ch-lockup");
            var orbit = root.querySelector(".ch-orbit");
            var connectorsLayer = root.querySelector(".ch-connectors");
            var nodesLayer = root.querySelector(".ch-nodes");
            var hub = root.querySelector(".ch-hub");
            var vars =
              window.__hyperframes && window.__hyperframes.getVariables
                ? window.__hyperframes.getVariables()
                : {};

            var hubLabel = vars.hub_label == null ? "Product" : String(vars.hub_label).trim();
            var nodeSource =
              vars.nodes == null ? "Capture,Compose,Render,Share" : String(vars.nodes);
            var nodeLabels = nodeSource
              .split(",")
              .map(function (label) {
                return label.trim();
              })
              .filter(function (label) {
                return label.length > 0;
              });

            if (nodeLabels.length === 0) nodeLabels = ["Feature"];

            var accentColors = {
              green: "var(--brand, #71f5a7)",
              blue: "var(--accent, #61a8ff)",
              violet: "var(--accent-2, #c5a3ff)",
            };
            var accent = Object.prototype.hasOwnProperty.call(accentColors, vars.accent)
              ? vars.accent
              : "green";

            var nodeWidth = Math.max(12, Math.min(21, 78 / Math.max(4, nodeLabels.length) + 2));
            var nodeFontSize = nodeLabels.length > 6 ? 1.75 : 2.25;

            root.style.setProperty("--ch-accent", accentColors[accent]);
            root.style.setProperty("--ch-node-width", nodeWidth.toFixed(2) + "cqw");
            root.style.setProperty("--ch-node-font-size", nodeFontSize.toFixed(2) + "cqw");
            hub.textContent = hubLabel;
            lockup.setAttribute(
              "aria-label",
              "Hub " + hubLabel + " connected to " + nodeLabels.join(", "),
            );

            var svgNamespace = "http://www.w3.org/2000/svg";
            var connectors = [];
            var nodes = [];
            var connectorFragment = document.createDocumentFragment();
            var nodeFragment = document.createDocumentFragment();

            nodeLabels.forEach(function (label, index) {
              var angle = -Math.PI / 2 + (index / nodeLabels.length) * Math.PI * 2;
              var x = 50 + Math.cos(angle) * 38;
              var y = 50 + Math.sin(angle) * 39;
              var connector = document.createElementNS(svgNamespace, "path");
              connector.setAttribute("class", "ch-connector");
              connector.setAttribute("d", "M 50 50 L " + x.toFixed(3) + " " + y.toFixed(3));
              connectorFragment.appendChild(connector);
              connectors.push(connector);

              var position = document.createElement("div");
              position.className = "ch-node-position";
              position.style.left = x.toFixed(3) + "cqw";
              position.style.top = y.toFixed(3) + "cqh";

              var node = document.createElement("div");
              node.className = "ch-node";
              node.textContent = label;
              position.appendChild(node);
              nodeFragment.appendChild(position);
              nodes.push(node);
            });

            connectorsLayer.appendChild(connectorFragment);
            nodesLayer.appendChild(nodeFragment);

            connectors.forEach(function (connector) {
              var length = connector.getTotalLength();
              connector.style.strokeDasharray = length + " " + length;
              connector.style.strokeDashoffset = String(length);
            });

            var IN_BASE = 2.4;
            var OUT_BASE = 0.5;
            var HUB_IN_BASE = 0.46;
            var SEQUENCE_START_BASE = 0.34;
            var DRAW_BASE = 0.5;
            var NODE_UP_BASE = 0.3;
            var NODE_DOWN_BASE = 0.2;
            var SETTLE_BASE = 0.28;
            var STILLNESS = 0.24;
            var durationValue = Number(root.dataset.duration);
            var duration =
              Number.isFinite(durationValue) && durationValue > 0 ? durationValue : 4.5;
            var phaseScale = duration < IN_BASE + OUT_BASE ? duration / (IN_BASE + OUT_BASE) : 1;
            var IN = IN_BASE * phaseScale;
            var OUT = OUT_BASE * phaseScale;
            var HUB_IN = HUB_IN_BASE * phaseScale;
            var SEQUENCE_START = SEQUENCE_START_BASE * phaseScale;
            var DRAW = DRAW_BASE * phaseScale;
            var NODE_UP = NODE_UP_BASE * phaseScale;
            var NODE_DOWN = NODE_DOWN_BASE * phaseScale;
            var SETTLE = SETTLE_BASE * phaseScale;
            var HOLD = Math.max(0, duration - IN - OUT);
            var HOLD_START = IN;
            var OUT_START = IN + HOLD;
            var SETTLE_START = Math.max(SEQUENCE_START, IN - SETTLE);
            var LAST_DRAW_START = Math.max(SEQUENCE_START, SETTLE_START - DRAW);
            var STEP =
              nodeLabels.length > 1
                ? (LAST_DRAW_START - SEQUENCE_START) / (nodeLabels.length - 1)
                : 0;

            gsap.set(lockup, { opacity: 0, scale: 0.985 });
            gsap.set(hub, { opacity: 0, scale: 0.86 });
            gsap.set(orbit, { rotation: -4 });
            gsap.set(nodes, { opacity: 0.24, scale: 0.92 });

            var tl = gsap.timeline({ paused: true });

            tl.to(lockup, { opacity: 1, scale: 1, duration: HUB_IN, ease: "power2.out" }, 0);
            tl.to(hub, { opacity: 1, scale: 1, duration: HUB_IN, ease: "back.out(1.7)" }, 0);
            tl.to(orbit, { rotation: 0, duration: IN, ease: "power3.out" }, 0);

            connectors.forEach(function (connector, index) {
              var start = SEQUENCE_START + index * STEP;
              var node = nodes[index];

              tl.to(connector, { strokeDashoffset: 0, duration: DRAW, ease: "power2.out" }, start);
              tl.to(
                node,
                { opacity: 1, scale: 1.055, duration: NODE_UP, ease: "power3.out" },
                start,
              );
              tl.to(
                node,
                { opacity: 0.82, scale: 1, duration: NODE_DOWN, ease: "power2.out" },
                start + NODE_UP,
              );
            });

            tl.to(
              nodes,
              { opacity: 0.88, scale: 1, duration: SETTLE, ease: "power2.out" },
              SETTLE_START,
            );
            tl.to(
              connectors,
              { opacity: 0.62, duration: SETTLE, ease: "power2.out" },
              SETTLE_START,
            );

            var driftHalf = Math.max(0, HOLD - STILLNESS) / 2;
            if (driftHalf > 0) {
              tl.to(
                orbit,
                { rotation: 1.1, duration: driftHalf, ease: "sine.inOut", yoyo: true, repeat: 1 },
                HOLD_START,
              );
            }

            tl.to(lockup, { opacity: 0, scale: 0.97, duration: OUT, ease: "power2.in" }, OUT_START);

            tl.seek(0);
            window.__timelines = window.__timelines || {};
            window.__timelines["constellation-hub"] = tl;
          })();
        </script>
      </div>
    </template>
  </body>
</html>
