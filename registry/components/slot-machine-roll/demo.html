<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1920, height=1080" />
    <title>Slot Machine Roll - Demo</title>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        width: 1920px;
        height: 1080px;
        overflow: hidden;
      }
      #demo {
        width: 1920px;
        height: 1080px;
        display: grid;
        place-items: center;
        background: #f7f7f8;
        font-family: Inter, system-ui, sans-serif;
      }
      .demo-frame {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 32px;
        /* ponytail: scale on non-GSAP wrapper — safe, GSAP only animates --hf-slot-y on inner <i> */
        transform: scale(1.85);
        transform-origin: center center;
      }
      .slot-card {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 24px;
        background: #ffffff;
        border: 1px solid #e4e4e7;
        border-radius: 14px;
        padding: 40px 56px;
        box-shadow: 0 24px 70px rgba(0, 0, 0, 0.10);
      }
      .slot-label {
        font-family: Inter, system-ui, sans-serif;
        font-size: 11px;
        font-weight: 500;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: #71717a;
      }
      .hf-remocn-slot-machine-roll {
        color: #18181b;
        font-family: Inter, system-ui, sans-serif;
        font-weight: 900;
        letter-spacing: -0.04em;
      }
      .hf-remocn-slot-machine-roll {
        display: inline-flex;
        gap: 6px;
        height: 74px;
        overflow: hidden;
        font:
          900 74px/1 ui-monospace,
          SFMono-Regular,
          Menlo,
          monospace;
      }
      .hf-remocn-slot-machine-roll span {
        display: block;
        height: 74px;
        overflow: hidden;
      }
      .hf-remocn-slot-machine-roll i {
        display: block;
        font-style: normal;
        transform: translateY(var(--hf-slot-y, 0px));
      }
    </style>
  </head>
  <body>
    <div
      id="demo"
      data-composition-id="slot-machine-roll-demo"
      data-start="0"
      data-width="1920"
      data-height="1080"
      data-duration="5"
    >
      <div class="demo-frame">
        <div class="slot-card">
          <div class="slot-label">Slot Machine Roll</div>
          <div class="hf-remocn-slot-machine-roll">
            <span
              ><i>0<br />A</i></span
            ><span
              ><i>0<br />7</i></span
            ><span
              ><i>0<br />K</i></span
            >
          </div>
        </div>
      </div>
      <script>
        const tl = gsap.timeline({ paused: true });
        const startTime = 0.5;
        tl.fromTo(
          ".hf-remocn-slot-machine-roll i",
          { "--hf-slot-y": "0px" },
          { "--hf-slot-y": "-74px", duration: 0.52, stagger: 0.06, ease: "power3.inOut" },
          startTime,
        );
        tl.set({}, {}, 5);
        window.__timelines = window.__timelines || {};
        window.__timelines["slot-machine-roll-demo"] = tl;
      </script>
    </div>
  </body>
</html>
