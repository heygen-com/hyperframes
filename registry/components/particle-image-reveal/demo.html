<!doctype html>
<!--
  particle-image-reveal demo. This standalone composition mounts the
  primitive through data-composition-src. Non-default direction, density,
  and accent values prove the variable path; the default token monogram
  fills the image slot while the primitive stays elastic to its host.
-->
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1920, height=1080" />
    <title>Particle Image Reveal Demo</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html,
      body {
        width: 1920px;
        height: 1080px;
        overflow: hidden;
        background: var(--bg, #0b0c0e);
      }

      #root {
        --bg: #0b0c0e;
        --fg: #f8fafc;
        --surface: #14171c;
        --border: #343a46;
        --brand: #71f5a7;
        --accent: #61a8ff;
        --accent-2: #c5a3ff;
        --font-display: "Inter", system-ui, sans-serif;
        position: relative;
        width: 1920px;
        height: 1080px;
        overflow: hidden;
        background: radial-gradient(
          ellipse at 50% 44%,
          var(--bg, #171a20) 0%,
          var(--bg, #0b0c0e) 72%
        );
      }

      .mount-card {
        width: 62%;
        height: 72%;
        left: 19%;
        top: 14%;
        container-type: size;
        overflow: hidden;
        border: 1px solid color-mix(in srgb, var(--border, #94a3b8) 20%, transparent);
        border-radius: 30px;
        background: color-mix(in srgb, var(--surface, #101318) 72%, transparent);
        box-shadow: 0 40px 100px color-mix(in srgb, var(--bg, #000000) 48%, transparent);
      }
    </style>
  </head>
  <body>
    <div
      id="root"
      data-composition-id="particle-image-reveal-demo"
      data-start="0"
      data-width="1920"
      data-height="1080"
      data-duration="4"
      data-fps="30"
    >
      <div
        id="particle-image-reveal-mount"
        class="mount-card clip"
        data-composition-id="particle-image-reveal"
        data-composition-src="./particle-image-reveal.html"
        data-variable-values='{"direction":"center","accent":"violet","density":"high"}'
        data-start="0"
        data-duration="4"
        data-track-index="0"
        data-width="1190"
        data-height="778"
      ></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      window.__timelines = window.__timelines || {};
      window.__timelines["particle-image-reveal-demo"] = gsap.timeline({ paused: true });
    </script>
  </body>
</html>
