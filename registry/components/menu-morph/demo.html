<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1920, height=1080" />
    <title>Menu Morph - Demo</title>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        width: 1920px;
        height: 1080px;
        overflow: hidden;
      }
      #demo {
        width: 1920px;
        height: 1080px;
        display: grid;
        place-items: center;
        background: #f4f4f5;
        font-family: Inter, system-ui, sans-serif;
      }
      .demo-frame {
        display: grid;
        place-items: center;
        min-width: 760px;
        min-height: 480px;
        padding: 56px;
        /* ponytail: zoom on the wrapper — GSAP animates children, not this element */
        zoom: 3.4;
      }
      .hf-transition-menu-morph {
        position: relative;
        display: grid;
        place-items: center;
        width: 360px;
        height: 280px;
        font-family: Inter, system-ui, sans-serif;
      }
      .hf-transition-menu-button {
        z-index: 2;
        display: grid;
        place-items: center;
        gap: 5px;
        width: 68px;
        height: 68px;
        border: 0;
        border-radius: 999px;
        background: #18181b;
        box-shadow: 0 22px 58px rgba(0, 0, 0, 0.22);
      }
      .hf-transition-menu-button span {
        width: 24px;
        height: 3px;
        border-radius: 999px;
        background: #ffffff;
        transform-origin: center;
      }
      .hf-transition-menu-actions {
        position: absolute;
        display: flex;
        gap: 10px;
        bottom: 20px;
      }
      .hf-transition-menu-actions div {
        padding: 10px 16px;
        border-radius: 999px;
        background: #ffffff;
        color: #18181b;
        font-size: 14px;
        font-weight: 700;
        box-shadow: 0 14px 34px rgba(0, 0, 0, 0.12);
        border: 1px solid #e4e4e7;
      }
    </style>
  </head>
  <body>
    <div
      id="demo"
      data-composition-id="menu-morph-demo"
      data-start="0"
      data-width="1920"
      data-height="1080"
      data-duration="5"
    >
      <div class="demo-frame">
        <div class="hf-transition-menu-morph">
          <button class="hf-transition-menu-button" type="button" aria-label="Menu">
            <span></span><span></span><span></span>
          </button>
          <div class="hf-transition-menu-actions">
            <div>Text</div>
            <div>Image</div>
            <div>Audio</div>
          </div>
        </div>
      </div>
      <script>
        const tl = gsap.timeline({ paused: true });
        tl.fromTo(
          ".hf-transition-menu-button",
          { scale: 0.72, opacity: 0 },
          { scale: 1, opacity: 1, duration: 0.34, ease: "back.out(1.8)" },
          0.3,
        );
        tl.to(
          ".hf-transition-menu-button span:nth-child(1)",
          { y: 8, rotation: 45, duration: 0.24, ease: "power2.inOut" },
          0.78,
        );
        tl.to(
          ".hf-transition-menu-button span:nth-child(2)",
          { opacity: 0, duration: 0.18, ease: "power1.out" },
          0.78,
        );
        tl.to(
          ".hf-transition-menu-button span:nth-child(3)",
          { y: -8, rotation: -45, duration: 0.24, ease: "power2.inOut" },
          0.78,
        );
        tl.fromTo(
          ".hf-transition-menu-actions div",
          { y: 28, opacity: 0, scale: 0.86 },
          { y: 0, opacity: 1, scale: 1, duration: 0.26, stagger: 0.06, ease: "back.out(1.6)" },
          0.96,
        );
        tl.set({}, {}, 5);
        window.__timelines = window.__timelines || {};
        window.__timelines["menu-morph-demo"] = tl;
      </script>
    </div>
  </body>
</html>
