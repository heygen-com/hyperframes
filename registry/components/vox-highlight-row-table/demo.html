<!doctype html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=720, height=1280">
<title>Vox Highlight Row Table demo</title><style>html,body{width:720px;height:1280px;margin:0;overflow:hidden;background:#EFE6CE;display:grid;place-items:center}</style></head>
<body>
<style>
  .vrt { display: inline-block; font-family: "Courier Prime", "Courier New", monospace; color: #14110e;
    border-top: 2px solid #14110e; border-bottom: 2px solid #14110e; min-width: 560px; }
  .vrt .vrt-row { position: relative; display: grid; grid-template-columns: 110px 1fr auto; align-items: center; }
  .vrt .vrt-head { font-family: "Bebas Neue", sans-serif; letter-spacing: 2px; text-transform: uppercase;
    border-bottom: 1px solid rgba(20,17,14,.4); }
  .vrt .vrt-head .vrt-cell { font-size: 22px; padding: 10px 18px; }
  .vrt .vrt-cell { font-size: 22px; padding: 12px 18px; position: relative; z-index: 1; }
  .vrt .vrt-cell:last-child { text-align: right; font-variant-numeric: tabular-nums; }
  .vrt .vrt-bar { position: absolute; inset: 0; background: #FFD21E; transform: scaleX(1); transform-origin: 0 50%; z-index: 0; }
</style>
<div class="vrt">
  <div class="vrt-row vrt-head"><span class="vrt-cell">Year</span><span class="vrt-cell">Event</span><span class="vrt-cell">Value</span></div>
  <div class="vrt-row"><span class="vrt-cell">1914</span><span class="vrt-cell">War breaks out</span><span class="vrt-cell">&mdash;</span></div>
  <div class="vrt-row"><span class="vrt-cell">1917</span><span class="vrt-cell">First facial plates</span><span class="vrt-cell">~200</span></div>
  <div class="vrt-row"><div class="vrt-bar"></div><span class="vrt-cell">1918</span><span class="vrt-cell">Studio at scale</span><span class="vrt-cell">2,000+</span></div>
  <div class="vrt-row"><span class="vrt-cell">1919</span><span class="vrt-cell">War ends</span><span class="vrt-cell">&mdash;</span></div>
</div>
</body></html>
