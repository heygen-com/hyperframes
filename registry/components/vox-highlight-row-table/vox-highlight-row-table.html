<!-- vox-highlight-row-table: archive/data grammar. A compact data "table" (CSS grid, not <table> —
     so the highlight bar can span the full row cleanly) where one focal row sweeps a marker bar and
     flips its text to ink to draw the eye. Light (archive desk) and .on-dark (data) variants.
       voxTableFocus(tl, selector, rowIndex, atT)  — sweep the bar on row rowIndex (0-based, data rows)
     Seek-safe: fromTo on the bar's scaleX + a color flip on the focal row's text. -->
<style>
  .vrt { display: inline-block; font-family: "Courier Prime", "Courier New", monospace; color: #14110e;
    border-top: 2px solid #14110e; border-bottom: 2px solid #14110e; min-width: 520px; }
  .vrt .vrt-row { position: relative; display: grid; grid-template-columns: 110px 1fr auto; align-items: center; }
  .vrt .vrt-head { font-family: "Bebas Neue", sans-serif; letter-spacing: 2px; text-transform: uppercase;
    border-bottom: 1px solid rgba(20,17,14,.4); }
  .vrt .vrt-head .vrt-cell { font-size: 22px; padding: 10px 18px; }
  .vrt .vrt-cell { font-size: 22px; padding: 12px 18px; position: relative; z-index: 1; }
  .vrt .vrt-cell:last-child { text-align: right; font-variant-numeric: tabular-nums; }
  .vrt .vrt-bar { position: absolute; inset: 0; background: #FFD21E; transform: scaleX(0);
    transform-origin: 0 50%; z-index: 0; }
  .vrt.on-dark { color: #f4f1e8; border-color: rgba(244,241,232,.6); }
  .vrt.on-dark .vrt-head { border-bottom-color: rgba(244,241,232,.3); }
  /* Focal bar is marker-yellow in both variants; voxTableFocus flips the focal row's text to ink
     as the bar lands (full-row bar → dark-on-yellow everywhere, WCAG AA). A partial red wash with
     off-white text only reached 4.28:1. */
</style>
<div class="vrt">
  <div class="vrt-row vrt-head"><span class="vrt-cell">Year</span><span class="vrt-cell">Event</span><span class="vrt-cell">Value</span></div>
  <div class="vrt-row"><span class="vrt-cell">1914</span><span class="vrt-cell">War breaks out</span><span class="vrt-cell">&mdash;</span></div>
  <div class="vrt-row"><span class="vrt-cell">1917</span><span class="vrt-cell">First facial plates</span><span class="vrt-cell">~200</span></div>
  <div class="vrt-row"><span class="vrt-cell">1918</span><span class="vrt-cell">Studio at scale</span><span class="vrt-cell">2,000+</span></div>
  <div class="vrt-row"><span class="vrt-cell">1919</span><span class="vrt-cell">War ends</span><span class="vrt-cell">&mdash;</span></div>
</div>
<script>
  function voxTableFocus(tl, selector, rowIndex, atT) {
    var rows = document.querySelectorAll(selector + " .vrt-row:not(.vrt-head)");
    var row = rows[rowIndex];
    if (!row) return;
    var bar = row.querySelector(".vrt-bar");
    if (!bar) { bar = document.createElement("div"); bar.className = "vrt-bar"; row.prepend(bar); }
    tl.set(bar, { scaleX: 0, transformOrigin: "0 50%" }, 0);
    tl.fromTo(bar, { scaleX: 0 }, { scaleX: 1, duration: 0.45, ease: "power3.out" }, atT);
    // flip focal-row text to ink as the yellow bar lands (no-op on the light variant, already dark)
    tl.to(row.querySelectorAll(".vrt-cell"), { color: "#14110e", duration: 0.2 }, atT + 0.2);
  }
</script>
