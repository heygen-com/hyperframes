<!-- vox-highlight-row-table: archive/data grammar. A compact data table where one focal row
     inverts to draw the eye (the Vox "look at THIS year" move). Works on light (archive desk) or
     dark (data) pages via the .on-dark modifier.
       voxTableFocus(tl, selector, rowIndex, atT)  — invert row rowIndex (0-based over <tbody> rows)
     Seek-safe: the highlight is a fromTo on a background bar's scaleX. -->
<style>
  .vrt { font-family: "Courier Prime", "Courier New", monospace; color: #14110e;
    border-top: 2px solid #14110e; border-bottom: 2px solid #14110e; min-width: 520px; }
  .vrt table { border-collapse: collapse; width: 100%; }
  .vrt th { font-family: "Bebas Neue", sans-serif; font-size: 22px; letter-spacing: 2px;
    text-transform: uppercase; text-align: left; padding: 10px 18px; border-bottom: 1px solid rgba(20,17,14,.4); }
  .vrt td { font-size: 22px; padding: 12px 18px; position: relative; }
  .vrt tbody tr { position: relative; }
  .vrt .vrt-bar { position: absolute; inset: 0; background: #FFD21E; transform: scaleX(0);
    transform-origin: 0 50%; z-index: 0; }
  .vrt td span { position: relative; z-index: 1; }
  .vrt td:last-child { text-align: right; font-variant-numeric: tabular-nums; }
  .vrt.on-dark { color: #f4f1e8; border-color: rgba(244,241,232,.6); }
  .vrt.on-dark th { border-bottom-color: rgba(244,241,232,.3); }
  .vrt.on-dark .vrt-bar { background: #D2382B; }
</style>
<div class="vrt">
  <table>
    <thead><tr><th>Year</th><th>Event</th><th>Value</th></tr></thead>
    <tbody>
      <tr><td><span>1914</span></td><td><span>War breaks out</span></td><td><span>—</span></td></tr>
      <tr><td><span>1917</span></td><td><span>First facial plates</span></td><td><span>~200</span></td></tr>
      <tr><td><div class="vrt-bar"></div><span>1918</span></td><td><span>Studio at scale</span></td><td><span>2,000+</span></td></tr>
      <tr><td><span>1919</span></td><td><span>War ends</span></td><td><span>—</span></td></tr>
    </tbody>
  </table>
</div>
<script>
  function voxTableFocus(tl, selector, rowIndex, atT) {
    var rows = document.querySelectorAll(selector + " tbody tr");
    var row = rows[rowIndex];
    if (!row) return;
    var bar = row.querySelector(".vrt-bar");
    if (!bar) { bar = document.createElement("div"); bar.className = "vrt-bar"; row.firstElementChild.prepend(bar); }
    tl.set(bar, { scaleX: 0, transformOrigin: "0 50%" }, 0);
    tl.fromTo(bar, { scaleX: 0 }, { scaleX: 1, duration: 0.45, ease: "power3.out" }, atT);
  }
</script>
