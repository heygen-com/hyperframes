<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1920, height=1080" />
    <title>Registry - Demo</title>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        width: 1920px;
        height: 1080px;
        overflow: hidden;
      }
      #demo {
        width: 1920px;
        height: 1080px;
        display: grid;
        place-items: center;
        background: #f7f7f8;
        font-family: Inter, system-ui, sans-serif;
      }
      .demo-frame {
        display: grid;
        place-items: center;
        padding: 52px;
        transform: scale(2.2); /* ponytail: scale non-animated wrapper to fill ~65% frame width */
      }
      .hf-remocn-registry {
        --hf-accent: #2563eb;
        --hf-ink: #18181b;
        --hf-muted: #71717a;
        --hf-surface: #ffffff;
        color: var(--hf-ink);
        font-family: Inter, system-ui, sans-serif;
      }
      .hf-remocn-registry {
        width: 560px;
        border-radius: 20px;
        background: #ffffff;
        padding: 24px;
        box-shadow: 0 24px 70px rgba(0, 0, 0, 0.10);
        border: 1px solid #e4e4e7;
        display: grid;
        gap: 10px;
      }
      .hf-remocn-registry .row {
        height: 56px;
        border-radius: 12px;
        background: #f4f4f5;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 18px;
        border: 1px solid transparent;
        transform: translateX(var(--hf-row-x, 0px));
        opacity: var(--hf-row-opacity, 1);
      }
      .hf-remocn-registry .row.row--selected {
        background: #f0f4ff;
        border-color: #c7d7fd;
      }
      .hf-remocn-registry .label {
        font-weight: 600;
        font-size: 15px;
        color: #18181b;
      }
      .hf-remocn-registry .hint {
        color: #71717a;
        font-size: 13px;
        background: #e4e4e7;
        padding: 3px 10px;
        border-radius: 6px;
        font-weight: 500;
      }
      .hf-remocn-registry .row.row--selected .hint {
        background: #dbeafe;
        color: #1d4ed8;
      }
    </style>
  </head>
  <body>
    <div
      id="demo"
      data-composition-id="registry-demo"
      data-start="0"
      data-width="1920"
      data-height="1080"
      data-duration="5"
    >
      <div class="demo-frame">
        <div class="hf-remocn-registry">
          <div class="row"><span class="label">Registry</span><span class="hint">Ctrl K</span></div>
          <div class="row row--selected"><span class="label">Selected</span><span class="hint">active</span></div>
          <div class="row">
            <span class="label">Disabled</span><span class="hint">pending</span>
          </div>
        </div>
      </div>
      <script>
        const tl = gsap.timeline({ paused: true });
        const startTime = 0.5;
        tl.fromTo(
          ".hf-remocn-registry .row",
          { "--hf-row-x": "-16px", "--hf-row-opacity": 0 },
          {
            "--hf-row-x": "0px",
            "--hf-row-opacity": 1,
            duration: 0.22,
            stagger: 0.07,
            ease: "power2.out",
          },
          startTime,
        );
        tl.set({}, {}, 5);
        window.__timelines = window.__timelines || {};
        window.__timelines["registry-demo"] = tl;
      </script>
    </div>
  </body>
</html>
