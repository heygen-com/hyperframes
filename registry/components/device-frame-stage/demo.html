<!doctype html>
<html
  lang="en"
  data-composition-id="device-frame-stage"
  data-composition-duration="5"
  data-composition-variables='[
    { "id": "device", "type": "enum", "role": "layout", "label": "Device kind", "default": "tablet", "options": [{ "value": "phone", "label": "Phone" }, { "value": "tablet", "label": "Tablet" }] },
    { "id": "cutout", "type": "enum", "role": "layout", "label": "Camera cutout", "default": "island", "options": [{ "value": "none", "label": "None" }, { "value": "island", "label": "Island" }, { "value": "notch", "label": "Notch" }] },
    { "id": "body", "type": "enum", "role": "style", "label": "Body material", "default": "silver", "options": [{ "value": "graphite", "label": "Graphite" }, { "value": "silver", "label": "Silver" }] }
  ]'
>
  <!-- Device Frame Stage - Demo. Non-default variables (tablet / island / silver)
       exercise all three variables away from the primitive's defaults
       (phone / none / graphite); see device-frame-stage.html for the full
       header (concept, envelope, sync points, sound cues). -->
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1920, height=1080" />
    <title>Device Frame Stage - Demo</title>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        width: 1920px;
        height: 1080px;
        overflow: hidden;
      }

      #device-frame-stage {
        position: relative;
        width: 1920px;
        height: 1080px;
        overflow: hidden;
        background: transparent;
      }

      .demo-backdrop {
        position: absolute;
        inset: 0;
        background: radial-gradient(120% 120% at 50% 18%, #222b40 0%, #05070d 65%);
      }

      /* ---- reusable primitive (identical to device-frame-stage.html) ---- */

      .hf-device-frame-stage {
        position: relative;
        width: 100%;
        height: 100%;
        container-type: size;
        isolation: isolate;
      }

      .device-stage {
        --stage-perspective: 1600px;
        position: absolute;
        inset: 0;
        perspective: var(--stage-perspective);
        perspective-origin: 50% 50%;
      }

      .device-frame {
        --device-color: #1b1d22;
        --device-color-hi: #343740;
        --device-color-dark: #111318;
        --device-radius: 46px;
        --device-bezel: 9px;
        --screen-radius: calc(var(--device-radius) - var(--device-bezel));
        --device-aspect: 9 / 19.5;
        --device-y: 18cqh;
        --device-scale: 0.94;

        position: absolute;
        left: 50%;
        top: 50%;
        height: 86cqh;
        aspect-ratio: var(--device-aspect);
        border-radius: var(--device-radius);
        padding: var(--device-bezel);
        background: linear-gradient(145deg, var(--device-color-hi), var(--device-color) 42%, var(--device-color-dark));
        border: 1px solid rgba(255, 255, 255, 0.22);
        box-shadow:
          0 52px 110px rgba(7, 10, 20, 0.3),
          0 18px 38px rgba(7, 10, 20, 0.22),
          0 3px 9px rgba(7, 10, 20, 0.16),
          inset 0 1px 0 rgba(255, 255, 255, 0.24),
          inset 0 0 0 1px rgba(0, 0, 0, 0.48);
        transform: translate(-50%, calc(-50% + var(--device-y))) scale(var(--device-scale));
        transform-style: preserve-3d;
        transform-origin: 50% 88%;
        will-change: transform;
      }

      .device-frame[data-kind="tablet"] {
        --device-radius: 48px;
        --device-bezel: 16px;
        --screen-radius: 34px;
        --device-aspect: 3 / 4;
        height: 82cqh;
      }

      .device-frame[data-body="silver"] {
        --device-color: #c9cdd3;
        --device-color-hi: #eef1f4;
        --device-color-dark: #9a9ea6;
      }

      .device-screen {
        position: relative;
        width: 100%;
        height: 100%;
        overflow: hidden;
        border-radius: var(--screen-radius);
        background: var(--surface, #f5f6f8);
        box-shadow: inset 0 0 0 1px rgba(0, 0, 0, 0.42);
        isolation: isolate;
        container-type: size;
      }

      .screen-viewport {
        position: absolute;
        left: 0;
        top: 0;
        width: calc(var(--logical-width, 390) * 1px);
        height: calc(var(--logical-height, 844) * 1px);
        transform-origin: 0 0;
        transform: scale(var(--screen-scale, 1));
      }

      .screen-safe-area {
        height: 100%;
        box-sizing: border-box;
        padding-top: calc(var(--logical-height, 844) * 1px * 0.03);
      }

      .device-frame[data-cutout="island"] .screen-safe-area {
        padding-top: calc(var(--logical-height, 844) * 1px * 0.075);
      }

      .device-frame[data-cutout="notch"] .screen-safe-area {
        padding-top: calc(var(--logical-height, 844) * 1px * 0.06);
      }

      .device-screen-slot {
        position: relative;
        width: 100%;
        height: 100%;
      }

      .device-screen-slot:empty {
        display: flex;
        align-items: center;
        justify-content: center;
        border: 1px dashed var(--border, rgba(15, 23, 42, 0.16));
        border-radius: calc(var(--screen-radius) * 0.4);
      }

      .device-screen-slot:empty::before {
        content: "screen slot: replace with reconstructed UI";
        padding: var(--space-2, 16px);
        color: var(--muted, #94a3b8);
        font-family: var(--font-body, Inter, system-ui, sans-serif);
        font-size: 15px;
        text-align: center;
      }

      .device-cutout {
        position: absolute;
        left: 50%;
        top: 0;
        z-index: 50;
        width: 0;
        height: 0;
        background: #050607;
        pointer-events: none;
        transform: translateX(-50%);
      }

      .device-frame[data-cutout="island"] .device-cutout {
        top: 1.4%;
        width: 28%;
        height: 3.2%;
        border-radius: 999px;
      }

      .device-frame[data-cutout="notch"] .device-cutout {
        top: 0;
        width: 52%;
        height: 3.8%;
        border-radius: 0 0 18px 18px;
      }

      /* ---- demo-only placeholder screen UI (stands in for a real
         installed product screen; not part of the reusable primitive) ---- */

      .demo-screen-ui {
        display: flex;
        flex-direction: column;
        gap: 20px;
        height: 100%;
        padding: 0 24px 24px;
        font-family: Inter, system-ui, sans-serif;
        color: #0f172a;
      }

      .demo-status-row {
        display: flex;
        justify-content: space-between;
        font-size: 13px;
        font-weight: 700;
        letter-spacing: 0.02em;
        color: #475569;
      }

      .demo-greeting {
        font-size: 26px;
        font-weight: 800;
      }

      .demo-card {
        display: flex;
        flex-direction: column;
        gap: 6px;
        padding: 20px;
        border-radius: 20px;
        background: #ffffff;
        box-shadow: 0 12px 30px rgba(15, 23, 42, 0.1);
      }

      .demo-card-title {
        font-size: 14px;
        font-weight: 700;
        color: #64748b;
      }

      .demo-card-value {
        font-size: 30px;
        font-weight: 800;
      }

      .demo-card-sub {
        font-size: 14px;
        font-weight: 700;
        color: #12883e;
      }

      .demo-cta {
        margin-top: auto;
        padding: 14px;
        border: 0;
        border-radius: 999px;
        background: #2563eb;
        color: #ffffff;
        font: 800 16px/1 Inter, system-ui, sans-serif;
      }
    </style>
  </head>
  <body>
    <div
      id="device-frame-stage"
      data-composition-id="device-frame-stage"
      data-start="0"
      data-width="1920"
      data-height="1080"
      data-duration="5"
      data-fps="30"
    >
      <div class="demo-backdrop"></div>
      <div class="hf-device-frame-stage">
        <div class="device-stage">
          <div class="device-frame" data-kind="phone" data-cutout="none" data-body="graphite">
            <div class="device-screen">
              <div class="screen-viewport">
                <div class="screen-safe-area">
                  <div class="device-screen-slot" data-screen-slot>
                    <div class="demo-screen-ui">
                      <div class="demo-status-row"><span>9:41</span><span>Wi-Fi 100%</span></div>
                      <div class="demo-greeting">Good afternoon</div>
                      <div class="demo-card">
                        <div class="demo-card-title">Today's summary</div>
                        <div class="demo-card-value">$4,280.12</div>
                        <div class="demo-card-sub">+12.4% this week</div>
                      </div>
                      <button class="demo-cta" type="button">Continue</button>
                    </div>
                  </div>
                </div>
              </div>
            </div>
            <div class="device-cutout" aria-hidden="true"></div>
          </div>
        </div>
      </div>
    </div>

    <script>
      (function () {
        "use strict";

        var html = document.documentElement;
        var root = document.getElementById("device-frame-stage");
        var frame = root.querySelector(".device-frame");
        var screen = root.querySelector(".device-screen");
        var viewport = root.querySelector(".screen-viewport");

        var declared = {};
        try {
          JSON.parse(html.getAttribute("data-composition-variables") || "[]").forEach(function (variable) {
            declared[variable.id] = variable.default;
          });
        } catch (error) {}
        var vars = Object.assign({}, declared, window.__hfVariables || {});

        var device = vars.device === "tablet" ? "tablet" : "phone";
        var cutout = vars.cutout === "island" || vars.cutout === "notch" ? vars.cutout : "none";
        var body = vars.body === "silver" ? "silver" : "graphite";

        frame.setAttribute("data-kind", device);
        frame.setAttribute("data-cutout", cutout);
        frame.setAttribute("data-body", body);

        var LOGICAL = { phone: [390, 844], tablet: [768, 1024] };
        var logicalWidth = LOGICAL[device][0];
        var logicalHeight = LOGICAL[device][1];
        viewport.style.setProperty("--logical-width", String(logicalWidth));
        viewport.style.setProperty("--logical-height", String(logicalHeight));

        function updateScreenScale() {
          var rect = screen.getBoundingClientRect();
          if (rect.width > 0) viewport.style.setProperty("--screen-scale", String(rect.width / logicalWidth));
        }
        updateScreenScale();
        if (typeof ResizeObserver !== "undefined") {
          new ResizeObserver(updateScreenScale).observe(screen);
        }

        var compositionId = root.getAttribute("data-composition-id");
        var duration = Math.max(
          0.001,
          parseFloat(root.dataset.duration || html.getAttribute("data-composition-duration") || "5"),
        );

        var IN_DELAY = 0.18;
        var IN_RISE = 0.72;
        var IN_SETTLE = 0.18;
        var IN_BASE = IN_DELAY + IN_RISE + IN_SETTLE;
        var OUT_BASE = 0.56;
        var totalBase = IN_BASE + OUT_BASE;
        var IN = IN_BASE;
        var OUT = OUT_BASE;
        if (duration < totalBase) {
          var shrink = duration / totalBase;
          IN = IN_BASE * shrink;
          OUT = OUT_BASE * shrink;
        }
        var HOLD = Math.max(0, duration - (IN + OUT));
        var OUT_AT = IN + HOLD;

        function easeOutCubic(x) {
          return 1 - Math.pow(1 - x, 3);
        }
        function easeInOutQuad(x) {
          return x < 0.5 ? 2 * x * x : 1 - Math.pow(-2 * x + 2, 2) / 2;
        }
        function easeInQuad(x) {
          return x * x;
        }

        function setPose(yCqh, scaleValue) {
          frame.style.setProperty("--device-y", yCqh.toFixed(3) + "cqh");
          frame.style.setProperty("--device-scale", scaleValue.toFixed(4));
        }

        function renderIn(t) {
          var delayEnd = IN_DELAY * (IN / IN_BASE);
          var riseEnd = delayEnd + IN_RISE * (IN / IN_BASE);
          if (t <= delayEnd) {
            setPose(18, 0.94);
            return;
          }
          if (t <= riseEnd) {
            var p = easeOutCubic(Math.min(1, (t - delayEnd) / Math.max(0.0001, riseEnd - delayEnd)));
            setPose(18 + (-1.2 - 18) * p, 0.94 + (1.01 - 0.94) * p);
            return;
          }
          var p2 = easeInOutQuad(Math.min(1, (t - riseEnd) / Math.max(0.0001, IN - riseEnd)));
          setPose(-1.2 + (0 - -1.2) * p2, 1.01 + (1 - 1.01) * p2);
        }

        function renderHold(holdT) {
          var period = 3.2;
          var amp = 0.6;
          var phase = ((holdT % period) / period) * Math.PI * 2;
          setPose(Math.sin(phase) * amp, 1);
        }

        function renderOut(p) {
          var e = easeInQuad(Math.min(1, p));
          setPose(0 + 18 * e, 1 + (0.96 - 1) * e);
        }

        function render(t) {
          if (t <= IN) renderIn(t);
          else if (t < OUT_AT) renderHold(t - IN);
          else renderOut((t - OUT_AT) / Math.max(0.0001, OUT));
        }

        function fireSfx(id, atTime) {
          root.dispatchEvent(new CustomEvent("hf:sfx", { detail: { id: id, t: atTime }, bubbles: true }));
        }

        var proxy = { t: 0 };
        var tl = gsap.timeline({ paused: true });
        tl.to(proxy, {
          t: duration,
          duration: duration,
          ease: "none",
          onUpdate: function () {
            render(proxy.t);
          },
        });
        tl.call(
          function () {
            fireSfx("device-settle-soft", IN);
          },
          [],
          IN,
        );
        tl.to({}, { duration: Math.max(0, duration - tl.duration()) });
        render(0);
        tl.seek(0);
        window.__timelines = window.__timelines || {};
        window.__timelines[compositionId] = tl;
      })();
    </script>
  </body>
</html>
