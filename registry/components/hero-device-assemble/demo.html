<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1920, height=1080" />
    <title>Hero Device Assemble - Demo</title>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        width: 1920px;
        height: 1080px;
        overflow: hidden;
      }
      #demo {
        width: 1920px;
        height: 1080px;
        display: grid;
        place-items: center;
        background: #f7f7f8;
        font-family: Inter, system-ui, sans-serif;
      }
      .demo-frame {
        display: grid;
        place-items: center;
        padding: 52px;
        transform: scale(0.84);
        transform-origin: center center;
      }
      .hf-remocn-hero-device-assemble {
        --hf-accent: #2563eb;
        --hf-ink: #111827;
        --hf-muted: #6b7280;
        --hf-surface: #ffffff;
        color: var(--hf-ink);
        font-family: Inter, system-ui, sans-serif;
      }
      .hf-remocn-hero-device-assemble {
        width: 820px;
        min-height: 460px;
        border-radius: 28px;
        padding: 28px;
        background: #f5f5f4;
        border: 1px solid #e4e4e7;
        box-shadow: 0 24px 70px rgba(0, 0, 0, 0.10);
        display: grid;
        grid-template-columns: 280px 1fr;
        gap: 22px;
        overflow: hidden;
      }
      .hf-remocn-hero-device-assemble .panel {
        border: 1px solid #e4e4e7;
        border-radius: 16px;
        background: #ffffff;
        padding: 22px;
      }
      .hf-remocn-hero-device-assemble .prompt {
        display: grid;
        gap: 12px;
        align-content: start;
      }
      .hf-remocn-hero-device-assemble .pill {
        height: 40px;
        border-radius: 999px;
        background: #18181b;
        color: #fff;
        display: flex;
        align-items: center;
        padding: 0 18px;
        font-size: 13px;
        font-weight: 600;
        letter-spacing: -0.01em;
        transform: translateX(var(--hf-pill-x, 0px));
      }
      .hf-remocn-hero-device-assemble .preview {
        display: grid;
        gap: 14px;
      }
      .hf-remocn-hero-device-assemble .card {
        min-height: 78px;
        border-radius: 12px;
        background: #fff;
        border: 1px solid #e4e4e7;
        box-shadow: 0 4px 16px rgba(0, 0, 0, 0.06);
        padding: 14px 16px;
        display: flex;
        flex-direction: column;
        gap: 8px;
        justify-content: center;
        transform: translate(var(--hf-card-x, 0px), var(--hf-card-y, 0px))
          scale(var(--hf-card-scale, 1));
        opacity: var(--hf-card-opacity, 1);
      }
      .hf-remocn-hero-device-assemble .card-line {
        height: 8px;
        border-radius: 4px;
        background: #e4e4e7;
      }
      .hf-remocn-hero-device-assemble .card-line.short {
        width: 55%;
      }
      .hf-remocn-hero-device-assemble .card-line.medium {
        width: 75%;
      }
      .hf-remocn-hero-device-assemble .card-line.long {
        width: 90%;
      }
      .hf-remocn-hero-device-assemble h3 {
        margin: 0 0 10px;
        font-size: 24px;
        font-weight: 700;
        letter-spacing: -0.03em;
        color: #18181b;
        line-height: 1.2;
      }
      .hf-remocn-hero-device-assemble p {
        margin: 0 0 14px;
        font-size: 13px;
        color: #71717a;
        line-height: 1.5;
      }
    </style>
  </head>
  <body>
    <div
      id="demo"
      data-composition-id="hero-device-assemble-demo"
      data-start="0"
      data-width="1920"
      data-height="1080"
      data-duration="5"
    >
      <div class="demo-frame">
        <div class="hf-remocn-hero-device-assemble">
          <div class="panel prompt">
            <h3>Hero Device Assemble</h3>
            <p>A landing-page device hero assembles from layers.</p>
            <div class="pill">Generate scene</div>
            <div class="pill">Refine motion</div>
            <div class="pill">Export</div>
          </div>
          <div class="panel preview">
            <div class="card">
              <div class="card-line long"></div>
              <div class="card-line medium"></div>
            </div>
            <div class="card">
              <div class="card-line medium"></div>
              <div class="card-line short"></div>
            </div>
            <div class="card">
              <div class="card-line long"></div>
              <div class="card-line medium"></div>
            </div>
          </div>
        </div>
      </div>
      <script>
        const tl = gsap.timeline({ paused: true });
        const startTime = 0.5;
        tl.fromTo(
          ".hf-remocn-hero-device-assemble .pill",
          { "--hf-pill-x": "-18px", opacity: 0 },
          { "--hf-pill-x": "0px", opacity: 1, duration: 0.25, stagger: 0.08, ease: "power2.out" },
          startTime,
        );
        tl.fromTo(
          ".hf-remocn-hero-device-assemble .card",
          { "--hf-card-y": "28px", "--hf-card-scale": 0.96, "--hf-card-opacity": 0 },
          {
            "--hf-card-y": "0px",
            "--hf-card-scale": 1,
            "--hf-card-opacity": 1,
            duration: 0.42,
            stagger: 0.12,
            ease: "power3.out",
          },
          startTime + 0.2,
        );
        tl.set({}, {}, 5);
        window.__timelines = window.__timelines || {};
        window.__timelines["hero-device-assemble-demo"] = tl;
      </script>
    </div>
  </body>
</html>
