<!doctype html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=720, height=1280">
<title>Vox Source Footnote demo</title><style>html,body{width:720px;height:1280px;margin:0;overflow:hidden;background:#F4F1EA}
.corner{position:absolute;left:40px;bottom:48px}.dark{position:absolute;left:0;right:0;top:0;height:50%;background:#181512}
.corner2{position:absolute;left:40px;top:48px}</style></head>
<body>
<style>
  .vox-src { display: inline-block; font-family: "Courier Prime", "Courier New", monospace;
    font-size: 15px; letter-spacing: 1px; text-transform: uppercase; color: rgba(20,18,14,.55);
    border-left: 3px solid rgba(20,18,14,.30); padding: 2px 0 2px 8px; }
  .vox-src.on-dark { color: rgba(244,241,232,.55); border-left-color: rgba(244,241,232,.30); }
</style>
<div class="dark"></div>
<span class="vox-src on-dark corner2">Source: Emojipedia, 2017</span>
<span class="vox-src corner">Source: Imperial War Museums</span>
</body></html>
