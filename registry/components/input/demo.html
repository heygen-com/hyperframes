      body {
        margin: 0;
        width: 1920px;
        height: 1080px;
        overflow: hidden;

        background: #0a0a0a;
      }

        width: 1920px;
        height: 1080px;
        box-sizing: border-box;
        display: grid;
        grid-template-rows: 1fr auto;
        place-items: center;
        padding: 96px;
        background: #0a0a0a;
        color: #e5e5e5;
        font-family:
          ui-sans-serif,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
      }
      .hf-ui-demo-stage {
        display: grid;
        place-items: center;
        min-width: 0;
        max-width: 100%;
      }
      .hf-ui-demo-caption {
        justify-self: start;
        color: #929292;
        font:
          500 18px/1.4 ui-monospace,
          "SFMono-Regular",
          Menlo,
          Consolas,
          monospace;
        letter-spacing: 0.01em;
      }
    </style>

  <body>
    <main
      class="hf-ui-demo-canvas"
      data-composition-id="input-demo"
      data-start="0"
      data-width="1920"
      data-height="1080"
      data-duration="4"
      data-hf-rendering="true"
      data-hf-theme="dark"
    >
      <!-- prettier-ignore -->
      <section class="hf-ui-demo-stage" aria-label="Input specimen" inert>
        <!-- hf-ui:canonical:start -->
<!--
  Input - shadcn-style text field primitive for HyperFrames.

  Animate --hf-input-focus and --hf-input-value-progress from a paused GSAP
  timeline to move from empty to focused to typed states.
-->

<label data-hf-ui-root class="hf-ui-input-field">
  <span class="hf-ui-input-label">Project name</span>
  <span class="hf-ui-input-shell">
    <span class="hf-ui-input-value">Launch recap</span>
    <span class="hf-ui-input-caret" aria-hidden="true"></span>
  </span>
  <span class="hf-ui-input-helper">Visible in the workspace and exported renders.</span>
</label>

      <script>
        const tl = gsap.timeline({ paused: true });
        tl.fromTo(
          ".hf-ui-demo-stage",
          { opacity: 0 },
          { opacity: 1, duration: 0.21, ease: "power3.out" },
          0,
        );
        window.__timelines = window.__timelines || {};
