<!doctype html>
<!--
  ascii-render-pass demo. A full-bleed 1920x1080 LIGHT host mounts the
  primitive through data-composition-src with non-default variables
  (fine grid, earlier resolve, blue accent) and supplies the scene slot
  to prove the snapshot raster path while the primitive stays elastic.
-->
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1920, height=1080" />
    <title>ASCII Render Pass Demo</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html,
      body {
        width: 1920px;
        height: 1080px;
        overflow: hidden;
        background: var(--bg, #f5f6f8);
      }

      #root {
        --bg: #f5f6f8;
        --fg: #101318;
        --muted: #5b6472;
        --surface: #ffffff;
        --border: #d7dce4;
        --brand: #14a35e;
        --accent: #2f6fed;
        --accent-2: #7a5cd6;
        --radius: 24px;
        --font-display: "Inter", system-ui, sans-serif;
        --font-mono: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
        position: relative;
        width: 1920px;
        height: 1080px;
        overflow: hidden;
        background: var(--bg);
      }

      .mount-stage {
        position: absolute;
        inset: 0;
        container-type: size;
        overflow: hidden;
      }

      .ascii-demo-scene {
        display: grid;
        place-items: center;
        gap: 20px;
      }

      .ascii-demo-scene .panel {
        display: grid;
        place-items: center;
        gap: 16px;
        width: 860px;
        height: 460px;
        border-radius: 32px;
        background: #101318;
      }

      .ascii-demo-scene .word {
        color: #ffffff;
        font-family: system-ui, sans-serif;
        font-size: 132px;
        font-weight: 600;
        letter-spacing: -0.01em;
      }

      .ascii-demo-scene .tag {
        color: #9aa5b4;
        font-family: ui-monospace, Menlo, monospace;
        font-size: 30px;
        letter-spacing: 0.16em;
        text-transform: uppercase;
      }
    </style>
  </head>
  <body>
    <template data-slot="ascii-render-pass-scene">
      <div class="ascii-demo-scene">
        <div class="panel">
          <span class="word">SHIP IT</span>
          <span class="tag">build 4.2.0</span>
        </div>
      </div>
    </template>

    <div
      id="root"
      data-composition-id="ascii-render-pass-demo"
      data-start="0"
      data-width="1920"
      data-height="1080"
      data-duration="4"
      data-fps="30"
    >
      <div
        id="ascii-render-pass-mount"
        class="mount-stage clip"
        data-composition-id="ascii-render-pass"
        data-composition-src="./ascii-render-pass.html"
        data-variable-values='{"grid":"fine","resolve_at":1.2,"accent":"blue"}'
        data-start="0"
        data-duration="4"
        data-track-index="0"
        data-width="1920"
        data-height="1080"
      ></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      window.__timelines = window.__timelines || {};
      window.__timelines["ascii-render-pass-demo"] = gsap.timeline({ paused: true });
    </script>
  </body>
</html>
