<!doctype html>
<!--
  pull-back-reveal demo. This standalone composition mounts the primitive
  through data-composition-src. Non-default copy and accent prove all three
  variables flow through the host-sized mount.
-->
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1920, height=1080" />
    <title>Pull Back Reveal Demo</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html,
      body {
        width: 1920px;
        height: 1080px;
        overflow: hidden;
        background: #0b0c0e;
      }

      #root {
        --bg: #0b0c0e;
        --fg: #f8fafc;
        --muted: #a7b0c0;
        --surface: #1b2230;
        --border: #3b4558;
        --radius: 2.4cqw;
        --font-display: Inter, system-ui, sans-serif;
        --font-body: Inter, system-ui, sans-serif;
        position: relative;
        width: 1920px;
        height: 1080px;
        overflow: hidden;
        background: radial-gradient(ellipse at 50% 44%, #171c28 0%, #0b0c0e 72%);
      }

      .mount-card {
        width: 78%;
        height: 74%;
        left: 11%;
        top: 13%;
        container-type: size;
        overflow: hidden;
        border: 0.1cqw solid rgba(148, 163, 184, 0.26);
        border-radius: 2.2cqw;
        background: var(--bg);
        box-shadow: 0 5cqh 12cqh rgba(0, 0, 0, 0.56);
      }
    </style>
  </head>
  <body>
    <div
      id="root"
      data-composition-id="pull-back-reveal-demo"
      data-start="0"
      data-width="1920"
      data-height="1080"
      data-duration="4.5"
      data-fps="30"
    >
      <div
        id="pull-back-reveal-mount"
        class="mount-card clip"
        data-composition-id="pull-back-reveal"
        data-composition-src="./pull-back-reveal.html"
        data-variable-values='{"detail_text":"+428%","headline":"Momentum scales","accent":"violet"}'
        data-start="0"
        data-duration="4.5"
        data-track-index="0"
        data-width="1498"
        data-height="799"
      ></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      window.__timelines = window.__timelines || {};
      window.__timelines["pull-back-reveal-demo"] = gsap.timeline({ paused: true });
    </script>
  </body>
</html>
