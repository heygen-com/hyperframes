<!doctype html>
<!--
  match-cut demo. This standalone composition mounts match-cut.html inside a
  sized host clip. Non-default labels and accent prove all variables flow
  through the mount while the primitive remains elastic to the host box.
-->
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1920, height=1080" />
    <title>Match Cut Demo</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html,
      body {
        width: 1920px;
        height: 1080px;
        overflow: hidden;
        background: #0b0c0e;
      }

      #root {
        position: relative;
        width: 1920px;
        height: 1080px;
        overflow: hidden;
        background: radial-gradient(ellipse at 50% 44%, #171a20 0%, #0b0c0e 72%);
      }

      .mount-card {
        width: 72%;
        height: 72%;
        left: 14%;
        top: 14%;
        container-type: size;
        overflow: hidden;
        border: 2px solid rgba(148, 163, 184, 0.22);
        border-radius: 32px;
        background: #0d121d;
        box-shadow: 0 48px 120px rgba(0, 0, 0, 0.5);
      }
    </style>
  </head>
  <body>
    <div
      id="root"
      data-composition-id="match-cut-demo"
      data-start="0"
      data-width="1920"
      data-height="1080"
      data-duration="4"
      data-fps="30"
    >
      <div
        id="match-cut-mount"
        class="mount-card clip"
        data-composition-id="match-cut"
        data-composition-src="./match-cut.html"
        data-variable-values='{"accent":"violet","label_a":"Launch","label_b":"Complete"}'
        data-start="0"
        data-duration="4"
        data-track-index="0"
        data-width="1382"
        data-height="778"
      ></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      window.__timelines = window.__timelines || {};
      window.__timelines["match-cut-demo"] = gsap.timeline({ paused: true });
    </script>
  </body>
</html>
