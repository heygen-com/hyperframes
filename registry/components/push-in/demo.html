<!doctype html>
<!--
  push-in demo. This standalone composition mounts push-in.html through
  data-composition-src. Non-default text and bold intensity prove both
  variables flow through the mount while the primitive remains host-sized.
-->
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1920, height=1080" />
    <title>Push In Demo</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html,
      body {
        width: 1920px;
        height: 1080px;
        overflow: hidden;
        background: #0b0c0e;
      }

      #root {
        --bg: #0b0c0e;
        --fg: #f8fafc;
        --surface: #343b4d;
        --border: #3f4658;
        --font-display: Inter, system-ui, sans-serif;
        position: relative;
        width: 1920px;
        height: 1080px;
        overflow: hidden;
        background: #0b0c0e;
      }

      .mount-card {
        width: 76%;
        height: 72%;
        left: 12%;
        top: 14%;
        container-type: size;
        overflow: hidden;
        border: 1px solid rgba(148, 163, 184, 0.24);
        border-radius: 32px;
        background: var(--bg);
        box-shadow: 0 48px 120px rgba(0, 0, 0, 0.52);
      }
    </style>
  </head>
  <body>
    <div
      id="root"
      data-composition-id="push-in-demo"
      data-start="0"
      data-width="1920"
      data-height="1080"
      data-duration="4"
      data-fps="30"
    >
      <div
        id="push-in-mount"
        class="mount-card clip"
        data-composition-id="push-in"
        data-composition-src="./push-in.html"
        data-variable-values='{"text":"Look closer","intensity":"bold"}'
        data-start="0"
        data-duration="4"
        data-track-index="0"
        data-width="1459"
        data-height="778"
      ></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      window.__timelines = window.__timelines || {};
      window.__timelines["push-in-demo"] = gsap.timeline({ paused: true });
    </script>
  </body>
</html>
