<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1920, height=1080" />
    <title>Field - Demo</title>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        width: 1920px;
        height: 1080px;
        overflow: hidden;
      }
      #demo {
        width: 1920px;
        height: 1080px;
        display: grid;
        place-items: center;
        background: #f7f7f8;
        font-family: Inter, system-ui, sans-serif;
      }
      .demo-frame {
        display: grid;
        place-items: center;
        min-width: 760px;
        min-height: 480px;
        padding: 56px;
        /* ponytail: scale-up wrapper — GSAP targets .hf-ui-field > *, not this element */
        transform: scale(2.8);
      }
      .hf-ui-field {
        display: grid;
        gap: 10px;
        width: 420px;
        color: #18181b;
        font-family: Inter, system-ui, sans-serif;
      }
      .hf-ui-field label {
        font-size: 16px;
        font-weight: 700;
      }
      .hf-ui-field-control {
        height: 46px;
        display: flex;
        align-items: center;
        padding: 0 16px;
        border: 1px solid #e4e4e7;
        border-radius: 12px;
        background: #fff;
        font-size: 15px;
        font-weight: 500;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
      }
      .hf-ui-field p {
        margin: 0;
        color: #71717a;
        font-size: 14px;
        line-height: 1.4;
      }
    </style>
  </head>
  <body>
    <div
      id="demo"
      data-composition-id="field-demo"
      data-start="0"
      data-width="1920"
      data-height="1080"
      data-duration="5"
    >
      <div class="demo-frame">
        <div class="hf-ui-field">
          <label>Email</label>
          <div class="hf-ui-field-control">maya@example.com</div>
          <p>Used for render notifications.</p>
        </div>
      </div>
      <script>
        const tl = gsap.timeline({ paused: true });
        const startTime = 0.45;
        tl.fromTo(
          ".hf-ui-field > *",
          { opacity: 0, y: 8 },
          { opacity: 1, y: 0, duration: 0.2, stagger: 0.05, ease: "power2.out" },
          startTime,
        );
        tl.set({}, {}, 5);
        window.__timelines = window.__timelines || {};
        window.__timelines["field-demo"] = tl;
      </script>
    </div>
  </body>
</html>
