<!doctype html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=720, height=1280">
<title>Vox Numbered Step demo</title><style>html,body{width:720px;height:1280px;margin:0;overflow:hidden;background:#241f19;display:grid;place-items:center}
.col{display:flex;flex-direction:column;gap:30px;align-items:flex-start}</style></head>
<body>
<style>
  .vox-step { display: inline-flex; align-items: stretch; box-shadow: 3px 4px 0 rgba(0,0,0,.22); }
  .vox-step .vs-num { background: #D2382B; color: #FBF7EC; font-family: "Bebas Neue", sans-serif;
    font-size: 34px; line-height: 1; padding: 10px 14px 8px; letter-spacing: 1px; }
  .vox-step .vs-text { background: #111; color: #f4f1e8; font-family: "Courier Prime", "Courier New", monospace;
    font-size: 24px; line-height: 1; letter-spacing: 1.5px; text-transform: uppercase;
    padding: 13px 18px 11px; white-space: nowrap; }
</style>
<div class="col">
  <div class="vox-step"><span class="vs-num">1.</span><span class="vs-text">Facial cast</span></div>
  <div class="vox-step"><span class="vs-num">2.</span><span class="vs-text">Sculpt the plate</span></div>
  <div class="vox-step"><span class="vs-num">3.</span><span class="vs-text">Paint to match</span></div>
</div>
</body></html>
