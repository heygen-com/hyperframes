<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1920, height=1080" />
    <title>SVG Line Draw Loader - Demo</title>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.15.0/dist/gsap.min.js"></script>
    <style>
      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        width: 1920px;
        height: 1080px;
        overflow: hidden;
      }
      #demo {
        width: 1920px;
        height: 1080px;
        display: grid;
        place-items: center;
        background: #f4f4f5;
        font-family: Inter, system-ui, sans-serif;
      }
      .hf-advanced-svg-line-draw-loader {
        color: #18181b;
        font-family: Inter, system-ui, sans-serif;
      }
      .hf-advanced-svg-line-draw-loader {
        width: 720px;
        min-height: 420px;
        border-radius: 16px;
        padding: 48px;
        background: #ffffff;
        box-shadow: 0 24px 70px rgba(0, 0, 0, 0.10), 0 1px 0 #e4e4e7 inset;
        border: 1px solid #e4e4e7;
        display: grid;
        place-items: center;
        /* ponytail: scale wrapper — GSAP only targets path, not this element */
        transform: scale(1.7);
      }
      .hf-advanced-svg-line-draw-loader .grid {
        display: grid;
        grid-template-columns: repeat(8, 46px);
        gap: 10px;
      }
      .hf-advanced-svg-line-draw-loader .cell {
        width: 46px;
        height: 46px;
        border-radius: 14px;
        background: linear-gradient(135deg, #60a5fa, #7c3aed);
        transform: translateY(var(--hf-cell-y, 0px)) scale(var(--hf-cell-scale, 1));
        opacity: var(--hf-cell-opacity, 1);
      }
      .hf-advanced-svg-line-draw-loader svg {
        width: 520px;
        height: 220px;
        overflow: visible;
      }
      .hf-advanced-svg-line-draw-loader path {
        fill: none;
        stroke: #2563eb;
        stroke-width: 12;
        stroke-linecap: round;
        stroke-dasharray: 900;
        stroke-dashoffset: var(--hf-dash, 0);
      }
      .hf-advanced-svg-line-draw-loader .stack {
        position: relative;
        width: 520px;
        height: 260px;
      }
      .hf-advanced-svg-line-draw-loader .card {
        position: absolute;
        inset: 0;
        border-radius: 26px;
        background: linear-gradient(135deg, #f8fafc, #dbeafe);
        border: 1px solid rgba(15, 23, 42, 0.08);
        box-shadow: 0 20px 54px rgba(15, 23, 42, 0.14);
        transform: translateY(var(--hf-card-y, 0px)) scale(var(--hf-card-scale, 1));
        opacity: var(--hf-card-opacity, 1);
      }
    </style>
  </head>
  <body>
    <div
      id="demo"
      data-composition-id="svg-line-draw-loader-demo"
      data-start="0"
      data-width="1920"
      data-height="1080"
      data-duration="5"
    >
      <div class="hf-advanced-svg-line-draw-loader">
        <svg viewBox="0 0 520 220">
          <path d="M24 160 C90 28, 188 40, 228 128 S356 234, 494 68" />
        </svg>
      </div>
    </div>
    <script>
      const tl = gsap.timeline({ paused: true });
      const startTime = 0.5;
      tl.fromTo(
        ".hf-advanced-svg-line-draw-loader path",
        { "--hf-dash": 900 },
        { "--hf-dash": 0, duration: 1.35, ease: "power3.inOut" },
        startTime,
      );
      tl.set({}, {}, 5);
      window.__timelines = window.__timelines || {};
      window.__timelines["svg-line-draw-loader-demo"] = tl;
    </script>
  </body>
</html>
