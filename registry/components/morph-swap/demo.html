<!doctype html>
<!--
  morph-swap demo. This standalone composition mounts the primitive through
  data-composition-src. Non-default register, swap timing, and accent values
  prove the variable path while the primitive remains elastic to its host.
-->
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1920, height=1080" />
    <title>morph-swap Demo</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html,
      body {
        width: 1920px;
        height: 1080px;
        overflow: hidden;
        background: var(--bg, #0b0c0e);
      }

      #root {
        --bg: #0b0c0e;
        --fg: #f8fafc;
        --surface: #14171c;
        --border: #343a46;
        --brand: #71f5a7;
        --accent: #c5a3ff;
        --font-mono: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
        position: relative;
        width: 1920px;
        height: 1080px;
        overflow: hidden;
        background: radial-gradient(
          ellipse at 50% 44%,
          var(--bg, #171a20) 0%,
          var(--bg, #0b0c0e) 72%
        );
      }

      .mount-card {
        width: 52%;
        height: 66%;
        left: 24%;
        top: 17%;
        container-type: size;
        overflow: hidden;
        border: 1px solid color-mix(in srgb, var(--border, #94a3b8) 20%, transparent);
        border-radius: 30px;
        background: color-mix(in srgb, var(--surface, #101318) 72%, transparent);
        box-shadow: 0 40px 100px color-mix(in srgb, var(--bg, #000000) 48%, transparent);
      }
    </style>
  </head>
  <body>
    <div
      id="root"
      data-composition-id="morph-swap-demo"
      data-start="0"
      data-width="1920"
      data-height="1080"
      data-duration="3.5"
      data-fps="30"
    >
      <div
        id="morph-swap-mount"
        class="mount-card clip"
        data-composition-id="morph-swap"
        data-composition-src="./morph-swap.html"
        data-variable-values='{"register":"reshape","swap_at":0.9,"accent":"violet"}'
        data-start="0"
        data-duration="3.5"
        data-track-index="0"
        data-width="998"
        data-height="713"
      ></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      window.__timelines = window.__timelines || {};
      window.__timelines["morph-swap-demo"] = gsap.timeline({ paused: true });
    </script>
  </body>
</html>
