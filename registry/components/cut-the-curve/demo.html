<!doctype html>
<!--
  cut-the-curve -- demo. Standalone 1920x1080 token-themed stage that mounts
  cut-the-curve.html through data-composition-src. The 70% mount card makes
  the outgoing throw, hard cut, and incoming settle easy to screen while
  proving that the primitive fills a host-owned box without root dimensions.
-->
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1920, height=1080" />
    <title>Cut the Curve - Demo</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html,
      body {
        width: 1920px;
        height: 1080px;
        overflow: hidden;
        background: #05070d;
      }

      #root {
        --bg: #080b14;
        --fg: #f8fafc;
        --muted: #94a3b8;
        --surface: #182033;
        --border: #3b4863;
        --brand: #8b5cf6;
        --accent: #22d3ee;
        --transparent: transparent;
        --font-display: Inter, system-ui, sans-serif;
        --font-body: Inter, system-ui, sans-serif;
        --radius: 26px;
        --space-1: 8px;
        --space-2: 16px;
        --space-3: 32px;
        --dur-beat: 0.4s;
        --ease-standard: cubic-bezier(0.215, 0.61, 0.355, 1);
        --ease-whip: cubic-bezier(0.23, 1, 0.32, 1);

        position: relative;
        width: 1920px;
        height: 1080px;
        overflow: hidden;
        background: radial-gradient(ellipse at 50% 42%, #151c32 0%, #05070d 72%);
      }

      .mount-card {
        width: 70%;
        height: 70%;
        left: 15%;
        top: 15%;
        overflow: hidden;
        border: 1px solid rgba(148, 163, 184, 0.25);
        border-radius: 30px;
        box-shadow: 0 40px 90px rgba(0, 0, 0, 0.45);
      }
    </style>
  </head>
  <body>
    <div
      id="root"
      data-composition-id="cut-the-curve-demo"
      data-start="0"
      data-width="1920"
      data-height="1080"
      data-duration="1"
      data-fps="30"
    >
      <div
        id="cut-the-curve-mount"
        class="mount-card clip"
        data-composition-id="cut-the-curve"
        data-composition-src="./cut-the-curve.html"
        data-variable-values='{"subject":"card","direction":"left","cutFraction":0.33,"blurPx":12}'
        data-start="0"
        data-duration="1"
        data-track-index="0"
        data-width="1344"
        data-height="756"
      ></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      window.__timelines = window.__timelines || {};
      window.__timelines["cut-the-curve-demo"] = gsap.timeline({ paused: true });
    </script>
  </body>
</html>
