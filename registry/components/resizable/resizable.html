<style>

    --hf-resizable-left: 58%;

    grid-template-columns: var(--hf-resizable-left) 10px 1fr;
    width: 620px;
    height: 280px;
    padding: 10px;
    border: 1px solid #e4e4e7;
    border-radius: 24px;
    background: #ffffff;
    color: #18181b;
    font-family: Inter, system-ui, sans-serif;
    box-shadow: 0 22px 70px rgba(0, 0, 0, 0.1);
  }
  .hf-ui-resizable-pane {
    display: grid;
    place-items: center;
    border-radius: 16px;
    font-weight: 850;
  }
  .hf-ui-resizable-pane.primary {
    background: #18181b;
    color: #ffffff;
  }
  .hf-ui-resizable-pane.secondary {
    background: #f4f4f5;
    color: #52525b;
  }
  .hf-ui-resizable-handle {
    align-self: stretch;
    justify-self: center;
