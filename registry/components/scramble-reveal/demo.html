<!doctype html>
<!--
  scramble-reveal demo. This standalone composition mounts the primitive
  through data-composition-src. Non-default text, accent, and style values
  prove the variable path while the primitive remains elastic to its host.
-->
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1920, height=1080" />
    <title>Scramble Reveal Demo</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html,
      body {
        width: 1920px;
        height: 1080px;
        overflow: hidden;
        background: #0b0c0e;
      }

      #root {
        --bg: #0b0c0e;
        --fg: #f8fafc;
        --surface: #14171c;
        --border: #343a46;
        --brand: #71f5a7;
        --accent: #c5a3ff;
        --font-mono: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
        position: relative;
        width: 1920px;
        height: 1080px;
        overflow: hidden;
        background: radial-gradient(ellipse at 50% 44%, #171a20 0%, #0b0c0e 72%);
      }

      .mount-card {
        width: 76%;
        height: 40%;
        left: 12%;
        top: 30%;
        container-type: size;
        overflow: hidden;
        border: 1px solid rgba(148, 163, 184, 0.2);
        border-radius: 30px;
        background: rgba(16, 19, 24, 0.72);
        box-shadow: 0 40px 100px rgba(0, 0, 0, 0.48);
      }
    </style>
  </head>
  <body>
    <div
      id="root"
      data-composition-id="scramble-reveal-demo"
      data-start="0"
      data-width="1920"
      data-height="1080"
      data-duration="3"
      data-fps="30"
    >
      <div
        id="scramble-reveal-mount"
        class="mount-card clip"
        data-composition-id="scramble-reveal"
        data-composition-src="./scramble-reveal.html"
        data-variable-values='{"text":"SEEK SAFE","accent":"violet","style":"clean"}'
        data-start="0"
        data-duration="3"
        data-track-index="0"
        data-width="1459"
        data-height="432"
      ></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      window.__timelines = window.__timelines || {};
      window.__timelines["scramble-reveal-demo"] = gsap.timeline({ paused: true });
    </script>
  </body>
</html>
