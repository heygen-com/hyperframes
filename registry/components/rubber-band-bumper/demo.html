<!doctype html>
<!--
  rubber-band-bumper demo. This standalone composition mounts the primitive
  through data-composition-src. Left and violet are non-default values that
  prove both variables flow through the elastic host box.
-->
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1920, height=1080" />
    <title>Rubber Band Bumper Demo</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html,
      body {
        width: 1920px;
        height: 1080px;
        overflow: hidden;
        background: #0b0c0e;
      }

      #root {
        --bg: #0b0c0e;
        --fg: #f8fafc;
        --font-display: Inter, system-ui, sans-serif;
        --font-body: Inter, system-ui, sans-serif;
        --font-mono: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
        position: relative;
        width: 1920px;
        height: 1080px;
        overflow: hidden;
        background: radial-gradient(circle at 50% 45%, #1b2130 0%, #0b0c0e 66%);
      }

      .mount-card {
        width: 76%;
        height: 74%;
        left: 12%;
        top: 13%;
        container-type: size;
        overflow: hidden;
        border: 1px solid rgba(148, 163, 184, 0.26);
        border-radius: 34px;
        background: #111827;
        box-shadow: 0 48px 120px rgba(0, 0, 0, 0.52);
      }
    </style>
  </head>
  <body>
    <div
      id="root"
      data-composition-id="rubber-band-bumper-demo"
      data-start="0"
      data-width="1920"
      data-height="1080"
      data-duration="2.5"
      data-fps="30"
    >
      <div
        id="rubber-band-bumper-mount"
        class="mount-card clip"
        data-composition-id="rubber-band-bumper"
        data-composition-src="./rubber-band-bumper.html"
        data-variable-values='{"direction":"left","accent":"violet"}'
        data-start="0"
        data-duration="2.5"
        data-track-index="0"
        data-width="1459"
        data-height="799"
      ></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      window.__timelines = window.__timelines || {};
      window.__timelines["rubber-band-bumper-demo"] = gsap.timeline({ paused: true });
    </script>
  </body>
</html>
