<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1920, height=1080" />
    <title>Stagger Lattice - Demo</title>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.15.0/dist/gsap.min.js"></script>
    <style>
      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        width: 1920px;
        height: 1080px;
        overflow: hidden;
      }
      #demo {
        width: 1920px;
        height: 1080px;
        display: grid;
        place-items: center;
        background: #f4f4f5;
        font-family: Inter, system-ui, sans-serif;
      }
      .hf-advanced-stagger-lattice {
        color: #111827;
        font-family: Inter, system-ui, sans-serif;
      }
      .hf-advanced-stagger-lattice {
        width: 720px;
        min-height: 420px;
        border-radius: 30px;
        padding: 36px;
        background: #fff;
        box-shadow: 0 28px 80px rgba(15, 23, 42, 0.16);
        display: grid;
        place-items: center;
        /* ponytail: zoom scales the wrapper without touching GSAP transform targets (.cell) */
        zoom: 1.7;
      }
      .hf-advanced-stagger-lattice .grid {
        display: grid;
        grid-template-columns: repeat(8, 46px);
        gap: 10px;
      }
      .hf-advanced-stagger-lattice .cell {
        width: 46px;
        height: 46px;
        border-radius: 14px;
        background: linear-gradient(135deg, #60a5fa, #7c3aed);
        transform: translateY(var(--hf-cell-y, 0px)) scale(var(--hf-cell-scale, 1));
        opacity: var(--hf-cell-opacity, 1);
      }
      .hf-advanced-stagger-lattice svg {
        width: 520px;
        height: 220px;
        overflow: visible;
      }
      .hf-advanced-stagger-lattice path {
        fill: none;
        stroke: #2563eb;
        stroke-width: 14;
        stroke-linecap: round;
        stroke-dasharray: 900;
        stroke-dashoffset: var(--hf-dash, 0);
      }
      .hf-advanced-stagger-lattice .stack {
        position: relative;
        width: 520px;
        height: 260px;
      }
      .hf-advanced-stagger-lattice .card {
        position: absolute;
        inset: 0;
        border-radius: 26px;
        background: linear-gradient(135deg, #f8fafc, #dbeafe);
        border: 1px solid rgba(15, 23, 42, 0.08);
        box-shadow: 0 20px 54px rgba(15, 23, 42, 0.14);
        transform: translateY(var(--hf-card-y, 0px)) scale(var(--hf-card-scale, 1));
        opacity: var(--hf-card-opacity, 1);
      }
    </style>
  </head>
  <body>
    <div
      id="demo"
      data-composition-id="stagger-lattice-demo"
      data-start="0"
      data-width="1920"
      data-height="1080"
      data-duration="5"
    >
      <div class="hf-advanced-stagger-lattice">
        <div class="grid">
          <span class="cell"></span><span class="cell"></span><span class="cell"></span
          ><span class="cell"></span><span class="cell"></span><span class="cell"></span
          ><span class="cell"></span><span class="cell"></span><span class="cell"></span
          ><span class="cell"></span><span class="cell"></span><span class="cell"></span
          ><span class="cell"></span><span class="cell"></span><span class="cell"></span
          ><span class="cell"></span><span class="cell"></span><span class="cell"></span
          ><span class="cell"></span><span class="cell"></span><span class="cell"></span
          ><span class="cell"></span><span class="cell"></span><span class="cell"></span
          ><span class="cell"></span><span class="cell"></span><span class="cell"></span
          ><span class="cell"></span><span class="cell"></span><span class="cell"></span
          ><span class="cell"></span><span class="cell"></span><span class="cell"></span
          ><span class="cell"></span><span class="cell"></span><span class="cell"></span
          ><span class="cell"></span><span class="cell"></span><span class="cell"></span
          ><span class="cell"></span>
        </div>
      </div>
    </div>
    <script>
      const tl = gsap.timeline({ paused: true });
      const startTime = 0.5;
      tl.fromTo(
        ".hf-advanced-stagger-lattice .cell",
        { "--hf-cell-y": "24px", "--hf-cell-scale": 0.72, "--hf-cell-opacity": 0 },
        {
          "--hf-cell-y": "0px",
          "--hf-cell-scale": 1,
          "--hf-cell-opacity": 1,
          duration: 0.28,
          stagger: { each: 0.018, from: "center", grid: [5, 8] },
          ease: "power2.out",
        },
        startTime,
      );
      tl.set({}, {}, 5);
      window.__timelines = window.__timelines || {};
      window.__timelines["stagger-lattice-demo"] = tl;
    </script>
  </body>
</html>
