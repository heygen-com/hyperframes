<!--
  Aspect Ratio - remocn-inspired UI primitive for HyperFrames.

  Paste the markup and CSS into a composition. Animate the CSS variables
  from a paused GSAP timeline for deterministic video renders.
-->

<div class="hf-ui-aspect-ratio"><span>16:9 Preview</span></div>

<style>
  .hf-ui-aspect-ratio {
    display: grid;
    place-items: center;
    width: 420px;
    aspect-ratio: 16 / 9;
    border: 1px solid #e4e4e7;
    border-radius: 14px;
    background: linear-gradient(135deg, #f4f4f5, #e0f2fe);
    color: #18181b;
    font:
      850 18px/1 Inter,
      system-ui,
      sans-serif;
    overflow: hidden;
  }
  .hf-ui-aspect-ratio span {
    padding: 9px 12px;
    border-radius: 999px;
    background: rgba(255, 255, 255, 0.76);
    backdrop-filter: blur(8px);
  }
</style>

  Timeline integration:
  tl.fromTo('.hf-ui-aspect-ratio', { opacity: 0, scale: 0.96 }, { opacity: 1, scale: 1, duration: 0.32, ease: 'power2.out' }, startTime);
