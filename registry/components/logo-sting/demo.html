<!doctype html>
<!--
  logo-sting demo. This standalone composition mounts logo-sting.html through
  data-composition-src. Non-default values prove both variables flow through
  the mount while the primitive remains sized by its host box.
-->
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1920, height=1080" />
    <title>Logo Sting Demo</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html,
      body {
        width: 1920px;
        height: 1080px;
        overflow: hidden;
        background: #0b0c0e;
      }

      #root {
        --bg: #0b0c0e;
        --fg: #f8fafc;
        --font-display: Inter, system-ui, sans-serif;
        position: relative;
        width: 1920px;
        height: 1080px;
        overflow: hidden;
        background: #0b0c0e;
      }

      .mount-card {
        width: 76%;
        height: 52%;
        left: 12%;
        top: 24%;
        container-type: size;
        overflow: hidden;
      }
    </style>
  </head>
  <body>
    <div
      id="root"
      data-composition-id="logo-sting-demo"
      data-start="0"
      data-width="1920"
      data-height="1080"
      data-duration="2.2"
      data-fps="30"
    >
      <div
        id="logo-sting-mount"
        class="mount-card clip"
        data-composition-id="logo-sting"
        data-composition-src="./logo-sting.html"
        data-variable-values='{"wordmark":"MOTION LAB","accent":"violet"}'
        data-start="0"
        data-duration="2.2"
        data-track-index="0"
        data-width="1459"
        data-height="562"
      ></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      window.__timelines = window.__timelines || {};
      window.__timelines["logo-sting-demo"] = gsap.timeline({ paused: true });
    </script>
  </body>
</html>
