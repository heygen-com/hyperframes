<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1920, height=1080" />
    <title>Label - Demo</title>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        width: 1920px;
        height: 1080px;
        overflow: hidden;
      }
      #demo {
        width: 1920px;
        height: 1080px;
        display: grid;
        place-items: center;
        background: #f7f7f8;
        font-family: Inter, system-ui, sans-serif;
      }
      .demo-frame {
        display: flex;
        flex-direction: column;
        gap: 10px;
        background: #ffffff;
        border: 1px solid #e4e4e7;
        border-radius: 14px;
        padding: 40px 48px;
        box-shadow: 0 24px 70px rgba(0, 0, 0, 0.08);
        min-width: 320px;
        transform: scale(3.2); /* qa-scale */
      }
      .hf-ui-label {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        color: #18181b;
        font:
          600 14px/1 Inter,
          system-ui,
          sans-serif;
      }
      .hf-ui-label span {
        padding: 3px 7px;
        border-radius: 999px;
        background: #f4f4f5;
        color: #71717a;
        font-size: 11px;
        font-weight: 500;
        text-transform: uppercase;
        letter-spacing: 0.04em;
      }
      .demo-input {
        width: 100%;
        padding: 8px 12px;
        border: 1px solid #e4e4e7;
        border-radius: 8px;
        font: 400 14px/1.4 Inter, system-ui, sans-serif;
        color: #a1a1aa;
        background: #fafafa;
        outline: none;
        pointer-events: none;
      }
    </style>
  </head>
  <body>
    <div
      id="demo"
      data-composition-id="label-demo"
      data-start="0"
      data-width="1920"
      data-height="1080"
      data-duration="5"
    >
      <div class="demo-frame">
        <label class="hf-ui-label">Workspace name <span>Required</span></label>
        <input class="demo-input" type="text" placeholder="e.g. Acme Corp" disabled />
      </div>
      <script>
        const tl = gsap.timeline({ paused: true });
        const startTime = 0.45;
        tl.fromTo(
          ".hf-ui-label",
          { opacity: 0, y: 8 },
          { opacity: 1, y: 0, duration: 0.24, ease: "power2.out" },
          startTime,
        );
        tl.set({}, {}, 5);
        window.__timelines = window.__timelines || {};
        window.__timelines["label-demo"] = tl;
      </script>
    </div>
  </body>
</html>
