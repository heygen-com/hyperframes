<!--
  Tracking In - letter-spacing reveal.

  Add class="hf-tracking-in" to text elements, then animate the CSS variable
  from wide tracking to the final value in your composition timeline.
-->

<style>
  .hf-tracking-in {
    opacity: 0;
    letter-spacing: var(--hf-tracking-value, 0.28em);
    transform: translateY(var(--hf-tracking-y, 8px));
    will-change: opacity, letter-spacing, transform;
  }
</style>
