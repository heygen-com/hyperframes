<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1920, height=1080" />
    <title>Hover Card - Demo</title>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        width: 1920px;
        height: 1080px;
        overflow: hidden;
      }
      #demo {
        width: 1920px;
        height: 1080px;
        display: grid;
        place-items: center;
        background: #f7f7f8;
        font-family: Inter, system-ui, sans-serif;
      }
      .demo-frame {
        display: grid;
        place-items: center;
        min-width: 760px;
        min-height: 480px;
        padding: 56px;
        /* ponytail: scale wrapper (not a GSAP target) to fill ~65% of 1080p frame */
        transform: scale(3.2);
        transform-origin: center center;
      }
      .hf-ui-hover-card {
        position: relative;
        display: inline-grid;
        font-family: Inter, system-ui, sans-serif;
        color: #18181b;
      }
      .hf-ui-hover-card button {
        height: 38px;
        padding: 0 14px;
        border: 1px solid #e4e4e7;
        border-radius: 999px;
        background: #fff;
        font-size: 14px;
        font-weight: 700;
        cursor: default;
      }
      .hf-ui-hover-card aside {
        position: absolute;
        top: 50px;
        left: 0;
        display: grid;
        gap: 6px;
        width: 260px;
        padding: 16px;
        border: 1px solid #e4e4e7;
        border-radius: 13px;
        background: #fff;
        opacity: var(--hf-hover-open, 1);
        transform: translateY(var(--hf-hover-y, 0px));
        box-shadow: 0 20px 56px rgba(24, 24, 27, 0.14);
      }
      .hf-ui-hover-card strong {
        font-size: 15px;
        font-weight: 600;
        color: #18181b;
      }
      .hf-ui-hover-card span,
      .hf-ui-hover-card p {
        color: #71717a;
      }
      .hf-ui-hover-card span {
        font-size: 13px;
      }
      .hf-ui-hover-card p {
        margin: 0;
        font-size: 13px;
        line-height: 1.5;
      }
    </style>
  </head>
  <body>
    <div
      id="demo"
      data-composition-id="hover-card-demo"
      data-start="0"
      data-width="1920"
      data-height="1080"
      data-duration="5"
    >
      <div class="demo-frame">
        <div class="hf-ui-hover-card">
          <button type="button">@maya</button>
          <aside>
            <strong>Maya Chen</strong><span>Motion designer</span>
            <p>Building reusable launch scenes.</p>
          </aside>
        </div>
      </div>
      <script>
        const tl = gsap.timeline({ paused: true });
        const startTime = 0.45;
        tl.fromTo(
          ".hf-ui-hover-card aside",
          { "--hf-hover-open": 0, "--hf-hover-y": "10px" },
          { "--hf-hover-open": 1, "--hf-hover-y": "0px", duration: 0.28, ease: "power2.out" },
          startTime,
        );
        tl.set({}, {}, 5);
        window.__timelines = window.__timelines || {};
        window.__timelines["hover-card-demo"] = tl;
      </script>
    </div>
  </body>
</html>
