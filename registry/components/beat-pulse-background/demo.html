<!doctype html>
<!--
  beat-pulse-background demo. This standalone composition mounts the
  primitive through data-composition-src. The irregular violet club grid
  proves all variables flow through the mount while the background remains
  sized by its host box.
-->
<html lang="en" data-composition-id="beat-pulse-background-demo" data-composition-duration="4">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1920, height=1080" />
    <title>Beat Pulse Background Demo</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html,
      body {
        width: 1920px;
        height: 1080px;
        overflow: hidden;
        background: var(--bg, #0b0c0e);
      }

      #root {
        --bg: #080a12;
        --surface: #17191f;
        --fg: #f8fafc;
        --muted: #94a3b8;
        --accent: #38bdf8;
        --accent-2: #a78bfa;
        --brand: #34d399;
        --border: #334155;
        position: relative;
        width: 1920px;
        height: 1080px;
        overflow: hidden;
        background: radial-gradient(
          ellipse at 50% 42%,
          var(--bg, #17191f) 0%,
          var(--bg, #0b0c0e) 72%
        );
      }

      .mount-card {
        width: 75%;
        height: 70%;
        left: 12.5%;
        top: 15%;
        overflow: hidden;
        border: 1px solid color-mix(in srgb, var(--border, #ffffff) 14%, transparent);
        border-radius: 28px;
        background: var(--bg, #080a12);
        box-shadow: 0 5cqh 14cqh color-mix(in srgb, var(--bg, #000000) 52%, transparent);
      }
    </style>
  </head>
  <body>
    <div
      id="root"
      data-composition-id="beat-pulse-background-demo"
      data-start="0"
      data-width="1920"
      data-height="1080"
      data-duration="4"
      data-fps="30"
    >
      <div
        id="beat-pulse-background-mount"
        class="mount-card clip"
        data-composition-id="beat-pulse-background"
        data-composition-src="./beat-pulse-background.html"
        data-variable-values='{"beats":"0.25,0.75,1.5,2.25,3.25","accent":"violet","intensity":"club"}'
        data-start="0"
        data-duration="4"
        data-track-index="0"
        data-width="1440"
        data-height="756"
      ></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      window.__timelines = window.__timelines || {};
      window.__timelines["beat-pulse-background-demo"] = gsap.timeline({ paused: true });
    </script>
  </body>
</html>
