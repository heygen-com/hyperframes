<!doctype html>
<!--
  focus-swap demo: standalone 1920x1080 composition that mounts the primitive
  through data-composition-src. The host owns the stage and mount dimensions;
  focus-swap.html owns only the attention shift inside that box.
-->
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1920, height=1080" />
    <title>Focus Swap - Demo</title>
    <style>
      :root {
        --bg: #070a12;
        --fg: #f8fafc;
        --muted: #94a3b8;
        --surface: #151c2c;
        --border: #34405a;
        --brand: #8b5cf6;
        --accent: #22d3ee;
        --font-display: Inter, system-ui, sans-serif;
        --font-body: Inter, system-ui, sans-serif;
        --font-mono: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
        --radius: 22px;
        --space-1: 8px;
        --space-2: 16px;
        --space-3: 32px;
        --dur-beat: 0.4s;
        --ease-standard: cubic-bezier(0.215, 0.61, 0.355, 1);
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html,
      body {
        width: 1920px;
        height: 1080px;
        overflow: hidden;
        background: var(--bg);
      }

      #root {
        position: relative;
        width: 1920px;
        height: 1080px;
        overflow: hidden;
        background: radial-gradient(
          ellipse at 50% 45%,
          color-mix(in srgb, var(--surface) 78%, var(--bg)),
          var(--bg) 72%
        );
      }

      .mount-card {
        width: 70%;
        height: 60%;
        left: 15%;
        top: 20%;
        overflow: hidden;
        border: 1px solid color-mix(in srgb, var(--border) 75%, transparent);
        border-radius: calc(var(--radius) * 1.4);
        box-shadow: 0 40px 90px color-mix(in srgb, var(--bg) 78%, transparent);
      }
    </style>
  </head>
  <body>
    <div
      id="root"
      data-composition-id="focus-swap-demo"
      data-start="0"
      data-width="1920"
      data-height="1080"
      data-duration="1.5"
      data-fps="30"
    >
      <div
        id="focus-swap-mount"
        class="mount-card clip"
        data-composition-id="focus-swap"
        data-composition-src="./focus-swap.html"
        data-variable-values='{"focus":"b","blurPx":6,"dim":0.5}'
        data-start="0"
        data-duration="1.5"
        data-track-index="0"
        data-width="1344"
        data-height="648"
      ></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      window.__timelines = window.__timelines || {};
      window.__timelines["focus-swap-demo"] = gsap.timeline({ paused: true });
    </script>
  </body>
</html>
