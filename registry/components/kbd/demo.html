<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1920, height=1080" />
    <title>Kbd - Demo</title>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        width: 1920px;
        height: 1080px;
        overflow: hidden;
      }
      #demo {
        width: 1920px;
        height: 1080px;
        display: grid;
        place-items: center;
        background: #f7f7f8;
        font-family: Inter, system-ui, sans-serif;
      }
      .demo-frame {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 28px;
        padding: 56px 72px;
        background: #ffffff;
        border: 1px solid #e4e4e7;
        border-radius: 16px;
        box-shadow: 0 24px 70px rgba(0, 0, 0, 0.08);
        transform: scale(3.4); /* qa-scale */
      }
      .demo-label {
        font: 500 12px/1 Inter, system-ui, sans-serif;
        color: #71717a;
        letter-spacing: 0.02em;
        user-select: none;
      }
      .kbd-row {
        display: inline-flex;
        align-items: center;
        gap: 6px;
      }
      .kbd-sep {
        font: 500 13px/1 Inter, system-ui, sans-serif;
        color: #a1a1aa;
        user-select: none;
      }
      .hf-ui-kbd {
        --hf-kbd-y: 0px;
        display: inline-flex;
        align-items: center;
        height: 34px;
        padding: 0 11px;
        border: 1px solid #d4d4d8;
        border-bottom-width: 3px;
        border-radius: 8px;
        background: #fafafa;
        color: #18181b;
        font:
          850 13px/1 ui-monospace,
          SFMono-Regular,
          Menlo,
          monospace;
        transform: translateY(var(--hf-kbd-y));
        box-shadow: 0 8px 18px rgba(24, 24, 27, 0.1);
      }
    </style>
  </head>
  <body>
    <div
      id="demo"
      data-composition-id="kbd-demo"
      data-start="0"
      data-width="1920"
      data-height="1080"
      data-duration="5"
    >
      <div class="demo-frame">
        <span class="demo-label">Open command palette</span>
        <div class="kbd-row">
          <kbd class="hf-ui-kbd">⌘</kbd>
          <span class="kbd-sep">+</span>
          <kbd class="hf-ui-kbd">K</kbd>
        </div>
      </div>
      <script>
        const tl = gsap.timeline({ paused: true });
        const startTime = 0.45;
        tl.to(
          ".hf-ui-kbd",
          { "--hf-kbd-y": "2px", duration: 0.08, yoyo: true, repeat: 1, ease: "power1.inOut" },
          startTime,
        );
        tl.set({}, {}, 5);
        window.__timelines = window.__timelines || {};
        window.__timelines["kbd-demo"] = tl;
      </script>
    </div>
  </body>
</html>
