<!doctype html>
<!--
  code-terminal-run demo. This standalone composition mounts the primitive
  through data-composition-src. Non-default glyph, cadence, cues, and accent
  values prove the variable path while the primitive remains elastic to its
  host.
-->
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1920, height=1080" />
    <title>Code Terminal Run Demo</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html,
      body {
        width: 1920px;
        height: 1080px;
        overflow: hidden;
        background: var(--bg, #0b0c0e);
      }

      #root {
        --bg: #0b0c0e;
        --fg: #f8fafc;
        --muted: #94a3b8;
        --surface: #14171c;
        --border: #343a46;
        --brand: #71f5a7;
        --accent: #61a8ff;
        --accent-2: #c5a3ff;
        --font-mono: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
        position: relative;
        width: 1920px;
        height: 1080px;
        overflow: hidden;
        background: radial-gradient(
          ellipse at 50% 44%,
          var(--bg, #171a20) 0%,
          var(--bg, #0b0c0e) 72%
        );
      }

      .mount-card {
        width: 72%;
        height: 66%;
        left: 14%;
        top: 17%;
        container-type: size;
        overflow: hidden;
        border-radius: 30px;
      }
    </style>
  </head>
  <body>
    <div
      id="root"
      data-composition-id="code-terminal-run-demo"
      data-start="0"
      data-width="1920"
      data-height="1080"
      data-duration="5"
      data-fps="30"
    >
      <div
        id="code-terminal-run-mount"
        class="mount-card clip"
        data-composition-id="code-terminal-run"
        data-composition-src="./code-terminal-run.html"
        data-variable-values='{"prompt_glyph":"&gt;","cadence":"uniform","cues":"2.7,3,3.3,3.7","accent":"blue"}'
        data-start="0"
        data-duration="5"
        data-track-index="0"
        data-width="1382"
        data-height="713"
      ></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      window.__timelines = window.__timelines || {};
      window.__timelines["code-terminal-run-demo"] = gsap.timeline({ paused: true });
    </script>
  </body>
</html>
