<!doctype html>
<!--
  line-swap demo. This standalone composition mounts the primitive through
  data-composition-src. Non-default lines, swap beat, underline word, and
  accent prove the variable path while the primitive stays elastic to its
  host box.
-->
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1920, height=1080" />
    <title>Line Swap Demo</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html,
      body {
        width: 1920px;
        height: 1080px;
        overflow: hidden;
        background: var(--bg, #0b0c0e);
      }

      #root {
        --bg: #0b0c0e;
        --fg: #f8fafc;
        --brand: #71f5a7;
        --accent: #61a8ff;
        --accent-2: #c5a3ff;
        position: relative;
        width: 1920px;
        height: 1080px;
        overflow: hidden;
      }

      .mount-box {
        position: absolute;
        width: 80%;
        height: 52%;
        left: 10%;
        top: 24%;
        container-type: size;
        overflow: hidden;
      }
    </style>
  </head>
  <body>
    <div
      id="root"
      data-composition-id="line-swap-demo"
      data-start="0"
      data-width="1920"
      data-height="1080"
      data-duration="3.5"
      data-fps="30"
    >
      <div
        id="line-swap-mount"
        class="mount-box clip"
        data-composition-id="line-swap"
        data-composition-src="./line-swap.html"
        data-variable-values='{"line_a":"Everyone ships demos.","line_b":"Almost nobody ships proof.","underline_word":"proof","swap_at":1.3,"accent":"blue"}'
        data-start="0"
        data-duration="3.5"
        data-track-index="0"
        data-width="1536"
        data-height="562"
      ></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      window.__timelines = window.__timelines || {};
      window.__timelines["line-swap-demo"] = gsap.timeline({ paused: true });
    </script>
  </body>
</html>
