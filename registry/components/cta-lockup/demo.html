<!doctype html>
<!--
  cta-lockup demo. This standalone composition mounts cta-lockup.html through
  data-composition-src. Non-default copy and accent values prove that every
  variable flows through the mount while the primitive stays host-sized.
-->
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1920, height=1080" />
    <title>CTA Lockup Demo</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html,
      body {
        width: 1920px;
        height: 1080px;
        overflow: hidden;
        background: #0b0c0e;
      }

      #root {
        --bg: #0b0c0e;
        --fg: #f8fafc;
        --muted: #aeb7c5;
        --surface: #15181d;
        --border: #303640;
        --font-display: Inter, system-ui, sans-serif;
        --font-body: Inter, system-ui, sans-serif;
        position: relative;
        width: 1920px;
        height: 1080px;
        overflow: hidden;
        background: radial-gradient(ellipse at 50% 44%, #171a20 0%, var(--bg) 70%);
      }

      .mount-card {
        width: 48%;
        height: 48%;
        left: 26%;
        top: 26%;
        container-type: size;
        overflow: hidden;
        border: 0.12cqmin solid color-mix(in srgb, var(--border) 72%, transparent);
        border-radius: 3cqmin;
        background: color-mix(in srgb, var(--surface) 82%, transparent);
        box-shadow: 0 4cqh 10cqh color-mix(in srgb, var(--bg) 68%, transparent);
      }
    </style>
  </head>
  <body>
    <div
      id="root"
      data-composition-id="cta-lockup-demo"
      data-start="0"
      data-width="1920"
      data-height="1080"
      data-duration="4"
      data-fps="30"
    >
      <div
        id="cta-lockup-mount"
        class="mount-card clip"
        data-composition-id="cta-lockup"
        data-composition-src="./cta-lockup.html"
        data-variable-values='{"action_line":"Build your next video","button_label":"Try it now","microcopy":"No credit card required","accent":"violet"}'
        data-start="0"
        data-duration="4"
        data-track-index="0"
        data-width="922"
        data-height="518"
      ></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      window.__timelines = window.__timelines || {};
      window.__timelines["cta-lockup-demo"] = gsap.timeline({ paused: true });
    </script>
  </body>
</html>
