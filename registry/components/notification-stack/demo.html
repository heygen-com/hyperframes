<!doctype html>
<!--
  notification-stack demo. This standalone composition mounts the primitive
  through data-composition-src. Non-default titles, bodies, expand, cues,
  and accent values prove the variable path while the primitive remains
  elastic to its host.
-->
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1920, height=1080" />
    <title>notification-stack Demo</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html,
      body {
        width: 1920px;
        height: 1080px;
        overflow: hidden;
        background: var(--bg, #0b0c0e);
      }

      #root {
        --bg: #0b0c0e;
        --fg: #f8fafc;
        --muted: #8b95a6;
        --surface: #14171c;
        --border: #343a46;
        --brand: #71f5a7;
        --accent: #61a8ff;
        --accent-2: #c5a3ff;
        --font-body: system-ui, -apple-system, "Segoe UI", sans-serif;
        position: relative;
        width: 1920px;
        height: 1080px;
        overflow: hidden;
        background: radial-gradient(
          ellipse at 50% 44%,
          var(--bg, #171a20) 0%,
          var(--bg, #0b0c0e) 72%
        );
      }

      .mount-card {
        width: 42%;
        height: 76%;
        left: 29%;
        top: 12%;
        container-type: size;
        overflow: hidden;
        border: 1px solid color-mix(in srgb, var(--border, #94a3b8) 20%, transparent);
        border-radius: 30px;
        background: color-mix(in srgb, var(--surface, #101318) 72%, transparent);
        box-shadow: 0 40px 100px color-mix(in srgb, var(--bg, #000000) 48%, transparent);
      }
    </style>
  </head>
  <body>
    <div
      id="root"
      data-composition-id="notification-stack-demo"
      data-start="0"
      data-width="1920"
      data-height="1080"
      data-duration="4"
      data-fps="30"
    >
      <div
        id="notification-stack-mount"
        class="mount-card clip"
        data-composition-id="notification-stack"
        data-composition-src="./notification-stack.html"
        data-variable-values='{"titles":"Upload received,Transcode started,Scenes detected,Draft ready","bodies":"clip_final_v3.mp4 landed in the inbox,1080p and 4K renditions in flight,14 scenes cut on speech pauses,Storyboard open for review","expand":1,"cues":"0.2,0.8,1.4,2.0","accent":"blue"}'
        data-start="0"
        data-duration="4"
        data-track-index="0"
        data-width="806"
        data-height="821"
      ></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      window.__timelines = window.__timelines || {};
      window.__timelines["notification-stack-demo"] = gsap.timeline({ paused: true });
    </script>
  </body>
</html>
