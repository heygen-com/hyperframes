<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1920, height=1080" />
    <title>Grid Pixelate Wipe — Demo</title>
    <script src="https://cdn.jsdelivr.net/npm/animejs@4.5.0/dist/bundles/anime.umd.min.js"></script>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        width: 1920px;
        height: 1080px;
        overflow: hidden;
      }
    </style>
  </head>
  <body>
    <div
      id="demo"
      data-composition-id="grid-pixelate-wipe-demo"
      data-width="1920"
      data-height="1080"
      data-duration="8"
    >
      <!-- Scene A -->
      <div id="scene-a" class="demo-scene scene-a">
        <div style="text-align: center; color: white">
          <div style="font-size: 80px; font-weight: 800">Scene A</div>
          <div style="font-size: 32px; margin-top: 20px; opacity: 0.7">
            The grid wipe dissolves this away
          </div>
        </div>
      </div>

      <!-- Scene B (hidden initially) -->
      <div id="scene-b" class="demo-scene scene-b">
        <div style="text-align: center; color: white">
          <div style="font-size: 80px; font-weight: 800">Scene B</div>
          <div style="font-size: 32px; margin-top: 20px; opacity: 0.7">Revealed from the grid</div>
        </div>
      </div>

      <!-- Grid Pixelate Wipe overlay -->
      <div
        id="grid-pixelate-overlay"
        style="
          position: absolute;
          top: 0;
          left: 0;
          width: 100%;
          height: 100%;
          pointer-events: none;
          z-index: 999;
          display: grid;
        "
      ></div>

      <style>
        #grid-pixelate-overlay {
          --grid-color: black;
        }

        #grid-pixelate-overlay .grid-cell {
          background: var(--grid-color);
          transform: scale(0);
          transform-origin: center center;
        }
      </style>

      <style>
        .demo-scene {
          position: absolute;
          width: 1920px;
          height: 1080px;
          display: flex;
          justify-content: center;
          align-items: center;
          font-family: "Inter", sans-serif;
        }

        .scene-a {
          background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        .scene-b {
          background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
          opacity: 0;
        }
      </style>

      <script>
        (function () {
          const COLS = 16;
          const ROWS = 9;
          const overlay = document.getElementById("grid-pixelate-overlay");

          overlay.style.gridTemplateColumns = `repeat(${COLS}, 1fr)`;
          overlay.style.gridTemplateRows = `repeat(${ROWS}, 1fr)`;

          for (let i = 0; i < COLS * ROWS; i++) {
            const cell = document.createElement("div");
            cell.className = "grid-cell";
            overlay.appendChild(cell);
          }

          const cellCount = COLS * ROWS;
          const scatterDelay = (amount) => (_el, i) => {
            return (((i * 37) % cellCount) / (cellCount - 1)) * amount;
          };

          const tl = anime.createTimeline({ autoplay: false });

          // Scene A visible for 2 seconds
          // Grid covers screen (transition out of A)
          tl.add(
            ".grid-cell",
            {
              scale: [0, 1],
              duration: 600,
              delay: anime.stagger([0, 600], { grid: [COLS, ROWS], from: "center" }),
              ease: "inOutCubic",
            },
            2000,
          );

          // Swap scenes at midpoint
          tl.set("#scene-a", { opacity: 0 }, 3000);
          tl.set("#scene-b", { opacity: 1 }, 3000);

          // Grid reveals scene B
          tl.add(
            ".grid-cell",
            {
              scale: [1, 0],
              duration: 600,
              delay: anime.stagger([0, 600], { grid: [COLS, ROWS], from: "edges" }),
              ease: "inOutCubic",
            },
            3000,
          );

          // Second transition: back to A using a deterministic scatter pattern
          tl.add(
            ".grid-cell",
            {
              scale: [0, 1],
              duration: 500,
              delay: scatterDelay(500),
              ease: "inOutCubic",
            },
            5500,
          );

          tl.set("#scene-b", { opacity: 0 }, 6300);
          tl.set("#scene-a", { opacity: 1 }, 6300);

          tl.add(
            ".grid-cell",
            {
              scale: [1, 0],
              duration: 500,
              delay: scatterDelay(500),
              ease: "inOutCubic",
            },
            6300,
          );

          hyperframesAnime.register("grid-pixelate-wipe-demo", tl, {});
        })();
      </script>
    </div>
  </body>
</html>
