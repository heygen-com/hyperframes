<!doctype html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=720, height=1280">
<title>Vox Cutout Label demo</title><style>html,body{width:720px;height:1280px;margin:0;overflow:hidden;background:#E7D7B5;display:grid;place-items:center}</style></head>
<body><!-- vox-cutout-label: 1-3 word ALL-CAPS label. Variants: default cream, .red inverse. -->
<style>
  .vox-label { display: inline-block; background: #f2ecd9; padding: 8px 36px 2px;
    font-family: "Bebas Neue", "Arial Narrow", sans-serif; font-size: 104px; line-height: .96;
    letter-spacing: 3px; color: #0c0c0c; text-align: center;
    clip-path: polygon(.8% 2%, 12% .5%, 30% 2.5%, 52% .8%, 73% 2.8%, 90% .6%, 99.3% 2.2%, 99.7% 50%, 99.1% 97%, 84% 99.4%, 62% 97.5%, 40% 99.6%, 18% 97.8%, .5% 99.2%, 1.2% 55%);
    filter: drop-shadow(5px 6px 0 rgba(0,0,0,.25)); transform: rotate(-1.4deg); }
  .vox-label.red { background: #D2382B; color: #FBF7EC; font-size: 54px; transform: rotate(1.1deg); }
</style>
<div class="vox-label">UNSEEN</div></body></html>
