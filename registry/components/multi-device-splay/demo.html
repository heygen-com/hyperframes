<!doctype html>
<!--
  multi-device-splay demo. This standalone composition mounts the primitive
  through data-composition-src. The violet override proves the accent enum
  flows through the mount while the primitive sizes itself from the host box.
-->
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1920, height=1080" />
    <title>Multi Device Splay Demo</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html,
      body {
        width: 1920px;
        height: 1080px;
        overflow: hidden;
        background: #0b0c0e;
      }

      #root {
        --bg: #0b0c0e;
        --fg: #f8fafc;
        --muted: #94a3b8;
        --surface: #15181f;
        --border: rgba(226, 232, 240, 0.16);
        --brand: #8b5cf6;
        --accent: #a78bfa;
        --font-display: Inter, system-ui, sans-serif;
        --font-body: Inter, system-ui, sans-serif;
        --font-mono: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
        --radius: 24px;
        --space-1: 8px;
        --space-2: 16px;
        --space-3: 32px;
        --dur-beat: 0.4s;
        position: relative;
        width: 1920px;
        height: 1080px;
        overflow: hidden;
        background:
          radial-gradient(ellipse at 50% 42%, rgba(139, 92, 246, 0.13), transparent 44%),
          radial-gradient(ellipse at 50% 55%, #1a1d24, #0b0c0e 68%);
      }

      .mount-stage {
        width: 88%;
        height: 76%;
        left: 6%;
        top: 12%;
        container-type: size;
        overflow: hidden;
        border: 1px solid rgba(226, 232, 240, 0.08);
        border-radius: 30px;
        background: rgba(255, 255, 255, 0.018);
        box-shadow: 0 50px 120px rgba(0, 0, 0, 0.34);
      }
    </style>
  </head>
  <body>
    <div
      id="root"
      data-composition-id="multi-device-splay-demo"
      data-start="0"
      data-width="1920"
      data-height="1080"
      data-duration="4.5"
      data-fps="30"
    >
      <div
        id="multi-device-splay-mount"
        class="mount-stage clip"
        data-composition-id="multi-device-splay"
        data-composition-src="./multi-device-splay.html"
        data-variable-values='{"accent":"violet"}'
        data-start="0"
        data-duration="4.5"
        data-track-index="0"
        data-width="1690"
        data-height="821"
      ></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      window.__timelines = window.__timelines || {};
      window.__timelines["multi-device-splay-demo"] = gsap.timeline({ paused: true });
    </script>
  </body>
</html>
