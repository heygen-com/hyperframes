<!--
  Animated Line Chart - remocn component ported to HyperFrames authoring format.

  Paste the markup and CSS into a composition. Drive the timeline integration
  from a paused GSAP timeline so renders remain deterministic.
-->

<div class="hf-remocn-animated-line-chart">
  <header>
    <div>
      <h3>Animated Line Chart</h3>
      <p>A line chart draws across the card with endpoint emphasis.</p>
    </div>
    <strong>+42%</strong>
  </header>
  <div class="bars">
    <span class="bar" style="--h: 42%"></span><span class="bar" style="--h: 72%"></span
    ><span class="bar" style="--h: 56%"></span><span class="bar" style="--h: 88%"></span
    ><span class="bar" style="--h: 64%"></span><span class="bar" style="--h: 95%"></span
    ><span class="bar" style="--h: 78%"></span>
  </div>
  <svg viewBox="0 0 700 210">
    <path
      d="M20 172 C120 90, 190 118, 260 74 S430 112, 508 42 S620 82, 680 30"
      fill="none"
      stroke="#2563eb"
      stroke-width="10"
      stroke-linecap="round"
    />
  </svg>
</div>

<style>
  .hf-remocn-animated-line-chart {
    --hf-accent: #2563eb;
    --hf-ink: #111827;
    --hf-muted: #6b7280;
    --hf-surface: #ffffff;
    color: var(--hf-ink);
    font-family: Inter, system-ui, sans-serif;
  }
  .hf-remocn-animated-line-chart {
    width: 760px;
    min-height: 420px;
    border-radius: 28px;
    background: #fff;
    padding: 34px;
    box-shadow: 0 28px 80px rgba(15, 23, 42, 0.16);
    display: grid;
    gap: 22px;
  }
  .hf-remocn-animated-line-chart header {
    display: flex;
    justify-content: space-between;
    align-items: end;
  }
  .hf-remocn-animated-line-chart h3 {
    margin: 0;
    font-size: 34px;
    letter-spacing: -0.04em;
  }
  .hf-remocn-animated-line-chart strong {
    font-size: 54px;
    letter-spacing: -0.06em;
  }
  .hf-remocn-animated-line-chart .bars {
    height: 210px;
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    align-items: end;
    gap: 14px;
  }
  .hf-remocn-animated-line-chart .bar {
    height: calc(var(--h) * var(--hf-grow, 1));
    border-radius: 14px 14px 5px 5px;
    background: linear-gradient(180deg, #60a5fa, #2563eb);
  }
  .hf-remocn-animated-line-chart svg {
    width: 100%;
    height: 210px;
    overflow: visible;
  }
  .hf-remocn-animated-line-chart path {
    stroke-dasharray: 900;
    stroke-dashoffset: var(--hf-dash, 0);
  }
</style>

<!--
  Timeline integration:
  tl.fromTo('.hf-remocn-animated-line-chart', { '--hf-grow': 0, '--hf-dash': 900 }, { '--hf-grow': 1, '--hf-dash': 0, duration: 1.2, ease: 'power3.out' }, startTime);
-->
