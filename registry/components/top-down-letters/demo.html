<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1920, height=1080" />
    <title>Top-Down Letters - Demo</title>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        width: 1920px;
        height: 1080px;
        overflow: hidden;
      }
      #demo {
        width: 1920px;
        height: 1080px;
        display: grid;
        place-items: center;
        background: #f7f7f8;
        font-family: Inter, system-ui, sans-serif;
      }
      .demo-frame {
        display: grid;
        place-items: center;
        min-width: 900px;
        min-height: 500px;
        padding: 64px;
        /* ponytail: scale wrapper (not a GSAP target) to fill ~65% of frame width */
        transform: scale(3.2);
      }
      .hf-remocn-top-down-letters {
        color: #18181b;
        font-family: Inter, system-ui, sans-serif;
        font-weight: 900;
        letter-spacing: -0.04em;
      }
      .hf-remocn-top-down-letters {
        display: inline-flex;
        gap: 1px;
        font-size: 74px;
        line-height: 0.9;
        overflow: hidden;
      }
      .hf-remocn-top-down-letters span {
        display: inline-block;
        transform: translateY(var(--hf-char-y, 0px));
        will-change: transform, opacity;
      }
    </style>
  </head>
  <body>
    <div
      id="demo"
      data-composition-id="top-down-letters-demo"
      data-start="0"
      data-width="1920"
      data-height="1080"
      data-duration="5"
    >
      <div class="demo-frame">
        <div class="hf-remocn-top-down-letters">
          <span>C</span><span>A</span><span>S</span><span>C</span><span>A</span><span>D</span
          ><span>E</span>
        </div>
      </div>
      <script>
        const tl = gsap.timeline({ paused: true });
        const startTime = 0.5;
        tl.fromTo(
          ".hf-remocn-top-down-letters span",
          { opacity: 0, "--hf-char-y": "-42px" },
          { opacity: 1, "--hf-char-y": "0px", duration: 0.22, stagger: 0.035, ease: "power3.out" },
          startTime,
        );
        tl.set({}, {}, 5);
        window.__timelines = window.__timelines || {};
        window.__timelines["top-down-letters-demo"] = tl;
      </script>
    </div>
  </body>
</html>
