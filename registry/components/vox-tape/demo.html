<!doctype html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=720, height=1280">
<title>Vox Tape Strip demo</title><style>html,body{width:720px;height:1280px;margin:0;overflow:hidden;background:#E7D7B5;display:grid;place-items:center}</style></head>
<body><!-- vox-tape: rotate freely; multiply blend sits naturally on any paper tone. -->
<style>
  .vox-tape { position: absolute; width: 150px; height: 42px; background: rgba(210,56,43,.85);
    mix-blend-mode: multiply; box-shadow: 2px 3px 0 rgba(0,0,0,.10); transform: rotate(-38deg); }
</style>
<div class="vox-tape"></div></body></html>
