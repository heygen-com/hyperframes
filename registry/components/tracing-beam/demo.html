<!doctype html>
<!--
  tracing-beam demo. This standalone composition mounts tracing-beam.html
  through data-composition-src. Non-default labels and accent prove variable
  overrides while the primitive remains sized by its host clip.
-->
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1920, height=1080" />
    <title>Tracing Beam Demo</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html,
      body {
        width: 1920px;
        height: 1080px;
        overflow: hidden;
        background: #0b0c0e;
      }

      #root {
        --bg: #0b0c0e;
        --fg: #f8fafc;
        --muted: #94a3b8;
        --surface: #171923;
        --border: #3d4152;
        --font-display: Inter, system-ui, sans-serif;
        --font-body: Inter, system-ui, sans-serif;
        --font-mono: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
        --radius: 2.8cqmin;
        position: relative;
        width: 1920px;
        height: 1080px;
        overflow: hidden;
        background: radial-gradient(ellipse at 50% 44%, #1b1830 0%, #0b0c0e 70%);
      }

      .mount-card {
        width: 76%;
        height: 58%;
        left: 12%;
        top: 21%;
        container-type: size;
        overflow: hidden;
        border: 1px solid rgba(167, 139, 250, 0.22);
        border-radius: 34px;
        background: rgba(19, 20, 29, 0.88);
        box-shadow: 0 44px 110px rgba(0, 0, 0, 0.48);
      }
    </style>
  </head>
  <body>
    <div
      id="root"
      data-composition-id="tracing-beam-demo"
      data-start="0"
      data-width="1920"
      data-height="1080"
      data-duration="4.5"
      data-fps="30"
    >
      <div
        id="tracing-beam-mount"
        class="mount-card clip"
        data-composition-id="tracing-beam"
        data-composition-src="./tracing-beam.html"
        data-variable-values='{"labels":"Capture,Compose,Render","accent":"violet"}'
        data-start="0"
        data-duration="4.5"
        data-track-index="0"
        data-width="1459"
        data-height="626"
      ></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      window.__timelines = window.__timelines || {};
      window.__timelines["tracing-beam-demo"] = gsap.timeline({ paused: true });
    </script>
  </body>
</html>
