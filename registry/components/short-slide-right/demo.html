<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1920, height=1080" />
    <title>Short Slide Right - Demo</title>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        width: 1920px;
        height: 1080px;
        overflow: hidden;
      }
      #demo {
        width: 1920px;
        height: 1080px;
        display: grid;
        place-items: center;
        background: #f4f4f5;
        font-family: Inter, system-ui, sans-serif;
      }
      /* ponytail: scale on .demo-frame (not a GSAP target) fills the frame without touching animated spans */
      .demo-frame {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 32px;
        background: #ffffff;
        border-radius: 16px;
        border: 1px solid #e4e4e7;
        box-shadow: 0 24px 70px rgba(0, 0, 0, 0.10);
        padding: 72px 96px;
        min-width: 760px;
        transform: scale(1.9);
      }
      .demo-label {
        font-size: 13px;
        font-weight: 500;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: #71717a;
      }
      .hf-remocn-short-slide-right {
        color: #18181b;
        font-family: Inter, system-ui, sans-serif;
        font-weight: 800;
        letter-spacing: -0.04em;
        display: inline-flex;
        gap: 14px;
        font-size: 56px;
        line-height: 1;
      }
      .hf-remocn-short-slide-right span {
        display: inline-block;
        transform: translate(var(--hf-word-x, 0px), var(--hf-word-y, 0px))
          scale(var(--hf-word-scale, 1));
        filter: blur(var(--hf-word-blur, 0px));
        will-change: transform, filter, opacity;
      }
      .demo-subtext {
        font-size: 14px;
        font-weight: 400;
        color: #a1a1aa;
        letter-spacing: 0;
      }
    </style>
  </head>
  <body>
    <div
      id="demo"
      data-composition-id="short-slide-right-demo"
      data-start="0"
      data-width="1920"
      data-height="1080"
      data-duration="5"
    >
      <div class="demo-frame">
        <p class="demo-label">Motion Primitive</p>
        <div class="hf-remocn-short-slide-right">
          <span>Short</span><span>slide</span><span>right</span>
        </div>
        <p class="demo-subtext">Word-by-word staggered entrance</p>
      </div>
      <script>
        const tl = gsap.timeline({ paused: true });
        const startTime = 0.5;
        tl.fromTo(
          ".hf-remocn-short-slide-right span",
          { opacity: 0, "--hf-word-y": "22px", "--hf-word-scale": 0.92, "--hf-word-blur": "5px" },
          {
            opacity: 1,
            "--hf-word-y": "0px",
            "--hf-word-scale": 1,
            "--hf-word-blur": "0px",
            duration: 0.3,
            stagger: 0.055,
            ease: "power3.out",
          },
          startTime,
        );
        tl.set({}, {}, 5);
        window.__timelines = window.__timelines || {};
        window.__timelines["short-slide-right-demo"] = tl;
      </script>
    </div>
  </body>
</html>
