<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1920, height=1080" />
    <title>Carousel - Demo</title>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        width: 1920px;
        height: 1080px;
        overflow: hidden;
      }
      #demo {
        width: 1920px;
        height: 1080px;
        display: grid;
        place-items: center;
        background: #f7f7f8;
        font-family: Inter, system-ui, sans-serif;
      }
      .demo-frame {
        display: grid;
        place-items: center;
        min-width: 760px;
        min-height: 480px;
        padding: 56px;
        /* ponytail: scale-up only — demo-frame is not a GSAP target */
        transform: scale(2.5);
      }
      .hf-ui-carousel {
        position: relative;
        width: 420px;
        height: 240px;
        font-family: Inter, system-ui, sans-serif;
      }
      .hf-ui-carousel section {
        position: absolute;
        inset: 0;
        display: grid;
        place-items: center;
        border-radius: 18px;
        background: linear-gradient(135deg, #111827, #2563eb);
        color: #fff;
        font-size: 28px;
        font-weight: 900;
        box-shadow: 0 24px 70px rgba(37, 99, 235, 0.2);
      }
      .hf-ui-carousel section:first-child {
        transform: translateX(-34px) scale(0.88);
        opacity: 0.45;
      }
      .hf-ui-carousel nav {
        position: absolute;
        left: 50%;
        bottom: -24px;
        display: flex;
        gap: 6px;
        transform: translateX(-50%);
      }
      .hf-ui-carousel nav span {
        width: 7px;
        height: 7px;
        border-radius: 999px;
        background: #d4d4d8;
      }
      .hf-ui-carousel nav .active {
        width: 22px;
        background: #18181b;
      }
    </style>
  </head>
  <body>
    <div
      id="demo"
      data-composition-id="carousel-demo"
      data-start="0"
      data-width="1920"
      data-height="1080"
      data-duration="5"
    >
      <div class="demo-frame">
        <div class="hf-ui-carousel">
          <section>Scene 01</section>
          <section>Scene 02</section>
          <nav><span></span><span class="active"></span><span></span></nav>
        </div>
      </div>
      <script>
        const tl = gsap.timeline({ paused: true });
        const startTime = 0.45;
        tl.fromTo(
          ".hf-ui-carousel section:last-of-type",
          { x: 46, opacity: 0, scale: 0.9 },
          { x: 0, opacity: 1, scale: 1, duration: 0.46, ease: "power3.out" },
          startTime,
        );
        tl.set({}, {}, 5);
        window.__timelines = window.__timelines || {};
        window.__timelines["carousel-demo"] = tl;
      </script>
    </div>
  </body>
</html>
