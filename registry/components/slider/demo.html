<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1920, height=1080" />
    <title>Slider - Demo</title>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        width: 1920px;
        height: 1080px;
        overflow: hidden;
      }
      #demo {
        width: 1920px;
        height: 1080px;
        display: grid;
        place-items: center;
        background: #f6f7fb;
        font-family: Inter, system-ui, sans-serif;
      }
      .panel {
        width: 720px;
        padding: 58px;
        border: 1px solid #e4e4e7;
        border-radius: 28px;
        background: #fff;
        box-shadow: 0 24px 70px rgba(0, 0, 0, 0.11);
        /* ponytail: zoom scales the panel without touching GSAP's transform on .hf-ui-slider */
        zoom: 1.75;
      }
      .hf-ui-slider {
        --hf-slider-value: 0.22;
        display: grid;
        grid-template-columns: minmax(200px, 1fr) auto;
        gap: 26px;
        align-items: center;
        width: 100%;
        font-family: Inter, system-ui, sans-serif;
        color: #18181b;
      }
      .hf-ui-slider-track {
        position: relative;
        height: 16px;
        border-radius: 999px;
        background: #e4e4e7;
      }
      .hf-ui-slider-fill {
        position: absolute;
        inset: 0 auto 0 0;
        width: calc(var(--hf-slider-value) * 100%);
        border-radius: inherit;
        background: #18181b;
      }
      .hf-ui-slider-thumb {
        position: absolute;
        top: 50%;
        left: calc(var(--hf-slider-value) * 100%);
        width: 42px;
        height: 42px;
        border: 6px solid #fff;
        border-radius: 999px;
        background: #18181b;
        transform: translate(-50%, -50%);
        box-shadow: 0 14px 30px rgba(0, 0, 0, 0.24);
      }
      .hf-ui-slider-value {
        min-width: 78px;
        text-align: right;
        color: #71717a;
        font-size: 30px;
        font-weight: 850;
      }
    </style>
  </head>
  <body>
    <div
      id="demo"
      data-composition-id="slider-demo"
      data-start="0"
      data-width="1920"
      data-height="1080"
      data-duration="5"
    >
      <div class="panel">
        <div class="hf-ui-slider">
          <span class="hf-ui-slider-track"
            ><span class="hf-ui-slider-fill"></span><span class="hf-ui-slider-thumb"></span></span
          ><span class="hf-ui-slider-value">72%</span>
        </div>
      </div>
      <script>
        const tl = gsap.timeline({ paused: true });
        tl.to(
          ".hf-ui-slider",
          { "--hf-slider-value": 0.72, duration: 0.82, ease: "power3.out" },
          0.6,
        );
        window.__timelines = window.__timelines || {};
        window.__timelines["slider-demo"] = tl;
      </script>
    </div>
  </body>
</html>
