<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1920, height=1080" />
    <title>Item - Demo</title>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        width: 1920px;
        height: 1080px;
        overflow: hidden;
      }
      #demo {
        width: 1920px;
        height: 1080px;
        display: grid;
        place-items: center;
        background: #f7f7f8;
        font-family: Inter, system-ui, sans-serif;
      }
      .demo-frame {
        display: grid;
        place-items: center;
        min-width: 760px;
        min-height: 480px;
        padding: 56px;
        /* ponytail: scale up the static wrapper; GSAP targets .hf-ui-item, not this element */
        transform: scale(2.8);
      }
      .hf-ui-item {
        display: grid;
        grid-template-columns: 42px 1fr auto;
        align-items: center;
        gap: 12px;
        width: 420px;
        padding: 14px;
        border: 1px solid #e4e4e7;
        border-radius: 14px;
        background: #fff;
        color: #18181b;
        font-family: Inter, system-ui, sans-serif;
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.08), 0 1px 4px rgba(0, 0, 0, 0.04);
      }
      .hf-ui-item-icon {
        display: grid;
        place-items: center;
        width: 42px;
        height: 42px;
        border-radius: 10px;
        background: #eef2ff;
        color: #4338ca;
        font-weight: 900;
      }
      .hf-ui-item p {
        margin: 3px 0 0;
        color: #71717a;
        font-size: 14px;
      }
      .hf-ui-item em {
        color: #71717a;
        font-style: normal;
        font-size: 13px;
        font-weight: 600;
      }
    </style>
  </head>
  <body>
    <div
      id="demo"
      data-composition-id="item-demo"
      data-start="0"
      data-width="1920"
      data-height="1080"
      data-duration="5"
    >
      <div class="demo-frame">
        <div class="hf-ui-item">
          <span class="hf-ui-item-icon">A</span>
          <div>
            <strong>Audio synced</strong>
            <p>Beat grid detected</p>
          </div>
          <em>Now</em>
        </div>
      </div>
      <script>
        const tl = gsap.timeline({ paused: true });
        const startTime = 0.45;
        tl.fromTo(
          ".hf-ui-item",
          { opacity: 0, x: -14 },
          { opacity: 1, x: 0, duration: 0.26, ease: "power2.out" },
          startTime,
        );
        tl.set({}, {}, 5);
        window.__timelines = window.__timelines || {};
        window.__timelines["item-demo"] = tl;
      </script>
    </div>
  </body>
</html>
