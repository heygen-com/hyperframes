<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1920, height=1080" />
    <title>Per Character Rise - Demo</title>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        width: 1920px;
        height: 1080px;
        overflow: hidden;
      }
      #demo {
        width: 1920px;
        height: 1080px;
        display: grid;
        place-items: center;
        background: #f7f7f8;
        font-family: Inter, system-ui, sans-serif;
      }
      .demo-frame {
        display: grid;
        place-items: center;
        min-width: 900px;
        min-height: 500px;
        padding: 64px;
      }
      .hf-remocn-per-character-rise {
        color: #18181b;
        font-family: Inter, system-ui, sans-serif;
        font-weight: 900;
        letter-spacing: -0.05em;
      }
      .hf-remocn-per-character-rise {
        display: inline-flex;
        gap: 2px;
        /* ponytail: scale via font-size; GSAP only animates span children, not this element */
        font-size: 140px;
        line-height: 0.88;
        overflow: hidden;
      }
      .hf-remocn-per-character-rise span {
        display: inline-block;
        transform: translateY(var(--hf-char-y, 0px));
        will-change: transform, opacity;
      }
    </style>
  </head>
  <body>
    <div
      id="demo"
      data-composition-id="per-character-rise-demo"
      data-start="0"
      data-width="1920"
      data-height="1080"
      data-duration="5"
    >
      <div class="demo-frame">
        <div class="hf-remocn-per-character-rise">
          <span>P</span><span>R</span><span>I</span><span>M</span><span>I</span><span>T</span
          ><span>I</span><span>V</span><span>E</span>
        </div>
      </div>
      <script>
        const tl = gsap.timeline({ paused: true });
        const startTime = 0.5;
        tl.fromTo(
          ".hf-remocn-per-character-rise span",
          { opacity: 0, "--hf-char-y": "-120px" },
          { opacity: 1, "--hf-char-y": "0px", duration: 0.28, stagger: 0.05, ease: "power3.out" },
          startTime,
        );
        tl.set({}, {}, 5);
        window.__timelines = window.__timelines || {};
        window.__timelines["per-character-rise-demo"] = tl;
      </script>
    </div>
  </body>
</html>
