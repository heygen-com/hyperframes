<div class="hf-advanced-shader-displacement-panel">

<style>
  .hf-advanced-shader-displacement-panel {
    color: #111827;

    position: relative;
    width: 760px;
    height: 430px;
    perspective: 900px;
    border-radius: 30px;
    overflow: hidden;
    background: linear-gradient(135deg, #0f172a, #312e81);

  .hf-advanced-shader-displacement-panel .panel {

    backdrop-filter: blur(18px);
    transform: rotateY(var(--hf-rotate-y, -16deg)) rotateX(var(--hf-rotate-x, 9deg))

    text-align: center;
