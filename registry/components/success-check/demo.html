<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1920, height=1080" />
    <title>Success Check - Demo</title>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        width: 1920px;
        height: 1080px;
        overflow: hidden;
      }
      #demo {
        width: 1920px;
        height: 1080px;
        display: grid;
        place-items: center;
        background: #f7f7f8;
        font-family: Inter, system-ui, sans-serif;
      }
      .demo-frame {
        display: grid;
        place-items: center;
        min-width: 760px;
        min-height: 480px;
        padding: 56px;
      }
      .hf-transition-success-check {
        display: grid;
        place-items: center;
        /* ponytail: sized up from 82px to fill ~55% of frame height at 1080p */
        width: 340px;
        height: 340px;
        border-radius: 999px;
        background: #dcfce7;
        color: #16a34a;
        box-shadow: 0 24px 80px rgba(22, 163, 74, 0.18), 0 4px 16px rgba(22, 163, 74, 0.10);
      }
      .hf-transition-success-check svg {
        width: 220px;
        height: 220px;
        fill: none;
        stroke: currentColor;
        stroke-width: 3.5;
        stroke-linecap: round;
        stroke-linejoin: round;
        filter: blur(var(--hf-check-blur, 0px));
        transform: rotate(var(--hf-check-rotate, 0deg)) scale(var(--hf-check-scale, 1));
      }
      .hf-transition-success-check circle {
        opacity: 0.28;
      }
      .hf-transition-success-check path {
        stroke-dasharray: 36;
        stroke-dashoffset: var(--hf-check-dash, 0);
      }
    </style>
  </head>
  <body>
    <div
      id="demo"
      data-composition-id="success-check-demo"
      data-start="0"
      data-width="1920"
      data-height="1080"
      data-duration="5"
    >
      <div class="demo-frame">
        <div class="hf-transition-success-check" aria-label="Success">
          <svg viewBox="0 0 64 64">
            <circle cx="32" cy="32" r="27" />
            <path d="M20 33.5l8 8L45 23" />
          </svg>
        </div>
      </div>
      <script>
        const tl = gsap.timeline({ paused: true });
        const startTime = 0.5;
        tl.fromTo(
          ".hf-transition-success-check svg",
          {
            opacity: 0,
            "--hf-check-scale": 0.72,
            "--hf-check-rotate": "-18deg",
            "--hf-check-blur": "7px",
          },
          {
            opacity: 1,
            "--hf-check-scale": 1,
            "--hf-check-rotate": "0deg",
            "--hf-check-blur": "0px",
            duration: 0.34,
            ease: "back.out(1.8)",
          },
          startTime,
        );
        tl.fromTo(
          ".hf-transition-success-check path",
          { "--hf-check-dash": 36 },
          { "--hf-check-dash": 0, duration: 0.42, ease: "power2.out" },
          startTime + 0.12,
        );
        tl.set({}, {}, 5);
        window.__timelines = window.__timelines || {};
        window.__timelines["success-check-demo"] = tl;
      </script>
    </div>
  </body>
</html>
