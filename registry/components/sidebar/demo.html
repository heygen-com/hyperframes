<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1920, height=1080" />
    <title>Sidebar - Demo</title>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        width: 1920px;
        height: 1080px;
        overflow: hidden;
      }
      #demo {
        width: 1920px;
        height: 1080px;
        display: grid;
        place-items: center;
        background: #f7f7f8;
        font-family: Inter, system-ui, sans-serif;
      }
      .demo-frame {
        display: grid;
        place-items: center;
        /* ponytail: scale on .demo-frame (not a GSAP target); .hf-ui-sidebar is the GSAP target */
        transform: scale(2.8);
      }
      .hf-ui-sidebar {
        display: grid;
        align-content: start;
        gap: 8px;
        width: 230px;
        padding: 16px;
        border: 1px solid #e4e4e7;
        border-radius: 16px;
        background: #fff;
        color: #18181b;
        font-family: Inter, system-ui, sans-serif;
        box-shadow: 0 24px 70px rgba(24, 24, 27, 0.1);
      }
      .hf-ui-sidebar strong {
        margin-bottom: 10px;
        font-size: 18px;
      }
      .hf-ui-sidebar a {
        display: block;
        padding: 11px 12px;
        border-radius: 10px;
        color: #52525b;
        font-weight: 600;
      }
      .hf-ui-sidebar [aria-current="page"] {
        background: #18181b;
        color: #fff;
      }
    </style>
  </head>
  <body>
    <div
      id="demo"
      data-composition-id="sidebar-demo"
      data-start="0"
      data-width="1920"
      data-height="1080"
      data-duration="5"
    >
      <div class="demo-frame">
        <aside class="hf-ui-sidebar">
          <strong>HyperFrames</strong><a aria-current="page">Projects</a><a>Assets</a><a>Renders</a>
        </aside>
      </div>
      <script>
        const tl = gsap.timeline({ paused: true });
        const startTime = 0.45;
        tl.fromTo(
          ".hf-ui-sidebar",
          { opacity: 0, x: -32 },
          { opacity: 1, x: 0, duration: 0.38, ease: "power3.out" },
          startTime,
        );
        tl.set({}, {}, 5);
        window.__timelines = window.__timelines || {};
        window.__timelines["sidebar-demo"] = tl;
      </script>
    </div>
  </body>
</html>
