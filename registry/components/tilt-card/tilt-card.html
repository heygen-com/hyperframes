<!--
  Tilt Card - transitions.dev-inspired primitive for HyperFrames.

  Paste the markup and CSS into a composition. Use the timeline integration
  note at the bottom as the starting point for deterministic GSAP animation.
-->

<div class="hf-transition-tilt-card">
  <div class="hf-transition-tilt-glow"></div>
  <div class="hf-transition-tilt-content">
    <span>Primitive</span>
    <strong>Agent-ready motion</strong>
  </div>
</div>

<style>
  .hf-transition-tilt-card {
    position: relative;
    width: 420px;
    height: 260px;
    overflow: hidden;
    border: 1px solid rgba(255, 255, 255, 0.18);
    border-radius: 30px;
    background: linear-gradient(135deg, #18181b, #312e81);
    color: #ffffff;
    font-family: Inter, system-ui, sans-serif;
    transform-style: preserve-3d;
    box-shadow: 0 32px 90px rgba(49, 46, 129, 0.34);
  }
  .hf-transition-tilt-glow {
    position: absolute;
    inset: -30%;
    background: radial-gradient(circle at 30% 20%, rgba(125, 211, 252, 0.5), transparent 36%);
  }
  .hf-transition-tilt-content {
    position: relative;
    display: grid;
    align-content: end;
    gap: 10px;
    height: 100%;
    padding: 34px;
    transform: translateZ(38px);
  }
  .hf-transition-tilt-content span {
    color: #a5b4fc;
    font-size: 13px;
    font-weight: 900;
    letter-spacing: 0.12em;
    text-transform: uppercase;
  }
  .hf-transition-tilt-content strong {
    max-width: 280px;
    font-size: 34px;
    line-height: 0.96;
  }
</style>
