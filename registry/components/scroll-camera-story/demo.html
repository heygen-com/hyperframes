<!doctype html>
<!--
  scroll-camera-story demo. This standalone composition mounts the primitive
  FULL-BLEED on a light token theme through data-composition-src. Non-default
  sections, travel, cues, and accent values prove the variable path while the
  primitive remains elastic to its host.
-->
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1920, height=1080" />
    <title>scroll-camera-story Demo</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html,
      body {
        width: 1920px;
        height: 1080px;
        overflow: hidden;
        background: var(--bg, #f2f4f7);
      }

      #root {
        --bg: #f2f4f7;
        --fg: #12161d;
        --muted: #5b6472;
        --surface: #ffffff;
        --border: #d4d9e2;
        --brand: #0e9f5a;
        --accent: #2f6bff;
        --accent-2: #7a4ddb;
        --font-mono: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
        position: relative;
        width: 1920px;
        height: 1080px;
        overflow: hidden;
        background: var(--bg, #f2f4f7);
      }

      .mount-stage {
        position: absolute;
        inset: 0;
        container-type: size;
        overflow: hidden;
      }
    </style>
  </head>
  <body>
    <div
      id="root"
      data-composition-id="scroll-camera-story-demo"
      data-start="0"
      data-width="1920"
      data-height="1080"
      data-duration="5.5"
      data-fps="30"
    >
      <div
        id="scroll-camera-story-mount"
        class="mount-stage clip"
        data-composition-id="scroll-camera-story"
        data-composition-src="./scroll-camera-story.html"
        data-variable-values='{"sections":4,"travel":300,"cues":"1.7,2.9,4.0","accent":"blue"}'
        data-start="0"
        data-duration="5.5"
        data-track-index="0"
        data-width="1920"
        data-height="1080"
      ></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      window.__timelines = window.__timelines || {};
      window.__timelines["scroll-camera-story-demo"] = gsap.timeline({ paused: true });
    </script>
  </body>
</html>
