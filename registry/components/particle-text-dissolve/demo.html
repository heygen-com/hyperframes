<!doctype html>
<!--
  particle-text-dissolve demo. This standalone composition mounts the
  primitive FULL-BLEED through data-composition-src on the dark register.
  Non-default text, density, and accent values prove the variable path;
  direction stays "in" so the watch-page hold lands on the crisp line.
-->
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1920, height=1080" />
    <title>Particle Text Dissolve Demo</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html,
      body {
        width: 1920px;
        height: 1080px;
        overflow: hidden;
        background: var(--bg, #0b0c0e);
      }

      #root {
        --bg: #0b0c0e;
        --fg: #f8fafc;
        --muted: #94a3b8;
        --surface: #14171c;
        --border: #343a46;
        --brand: #71f5a7;
        --accent: #61a8ff;
        --accent-2: #c5a3ff;
        --font-display: "Inter", system-ui, sans-serif;
        position: relative;
        width: 1920px;
        height: 1080px;
        overflow: hidden;
        background: radial-gradient(
          ellipse at 50% 44%,
          #171a20 0%,
          var(--bg, #0b0c0e) 72%
        );
      }

      .mount-bleed {
        position: absolute;
        inset: 0;
        container-type: size;
        overflow: hidden;
      }
    </style>
  </head>
  <body>
    <div
      id="root"
      data-composition-id="particle-text-dissolve-demo"
      data-start="0"
      data-width="1920"
      data-height="1080"
      data-duration="4"
      data-fps="30"
    >
      <div
        id="particle-text-dissolve-mount"
        class="mount-bleed clip"
        data-composition-id="particle-text-dissolve"
        data-composition-src="./particle-text-dissolve.html"
        data-variable-values='{"text":"Particles","density":"high","accent":"violet"}'
        data-start="0"
        data-duration="4"
        data-track-index="0"
        data-width="1920"
        data-height="1080"
      ></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      window.__timelines = window.__timelines || {};
      window.__timelines["particle-text-dissolve-demo"] = gsap.timeline({ paused: true });
    </script>
  </body>
</html>
