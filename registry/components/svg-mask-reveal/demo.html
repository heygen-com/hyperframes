<!doctype html>
<!--
  svg-mask-reveal -- mounted demo. This standalone composition owns the stage
  and theme tokens, then mounts svg-mask-reveal.html through
  data-composition-src. A successful runtime check and snapshot therefore
  prove the template transport, host sizing, variable flow, and hardcoded
  timeline key together. The demo is not installed by hyperframes add.
-->
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1920, height=1080" />
    <title>SVG Mask Reveal - Demo</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html,
      body {
        width: 1920px;
        height: 1080px;
        overflow: hidden;
      }

      #root {
        --bg: #07111f;
        --fg: #f8fafc;
        --muted: #8da2b8;
        --surface: #101d31;
        --border: rgba(248, 250, 252, 0.22);
        --brand: #ff7a33;
        --accent: #22d3ee;
        --font-display: Inter, system-ui, sans-serif;
        --font-body: Inter, system-ui, sans-serif;
        --font-mono: ui-monospace, "SFMono-Regular", Consolas, monospace;
        --radius: 24px;
        --space-1: 8px;
        --space-2: 16px;
        --space-3: 32px;
        --dur-beat: 0.4s;
        --ease-standard: cubic-bezier(0.215, 0.61, 0.355, 1);
        --ease-emphasis: cubic-bezier(0.19, 1, 0.22, 1);

        position: relative;
        width: 1920px;
        height: 1080px;
        overflow: hidden;
        background: radial-gradient(circle at 50% 42%, var(--surface), var(--bg) 68%);
        color: var(--fg);
        font-family: var(--font-body);
      }

      .mount-card {
        --bg: var(--surface);
        position: absolute;
        width: 70%;
        height: 44%;
        left: 15%;
        top: 28%;
        overflow: hidden;
        border: 1px solid var(--border);
        border-radius: var(--radius);
        box-shadow: 0 40px 100px color-mix(in srgb, var(--bg) 72%, transparent);
        container-type: size;
        isolation: isolate;
      }
    </style>
  </head>
  <body>
    <div
      id="root"
      data-composition-id="svg-mask-reveal-demo"
      data-start="0"
      data-width="1920"
      data-height="1080"
      data-duration="4"
      data-fps="30"
    >
      <div
        id="svg-mask-reveal-mount"
        class="mount-card clip"
        data-composition-id="svg-mask-reveal"
        data-composition-src="./svg-mask-reveal.html"
        data-variable-values='{"text":"REVEAL","revealProgress":100,"featherPx":24}'
        data-start="0"
        data-duration="4"
        data-track-index="0"
        data-width="1344"
        data-height="475"
      ></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      window.__timelines = window.__timelines || {};
      window.__timelines["svg-mask-reveal-demo"] = gsap.timeline({ paused: true });
    </script>
  </body>
</html>
