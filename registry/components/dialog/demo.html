<!--
  Dialog - centered modal primitive.

<div

>

    <button class="hf-ui-dialog-close" type="button" aria-label="Close">x</button>

    <p>Make changes to your profile here. Click save when you are done.</p>
    <div class="hf-ui-dialog-actions">
      <button class="hf-ui-dialog-cancel" type="button">Cancel</button>
      <button class="hf-ui-dialog-action" type="button">Save changes</button>
