<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1920, height=1080" />
    <title>Spinner - Demo</title>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        width: 1920px;
        height: 1080px;
        overflow: hidden;
      }
      #demo {
        width: 1920px;
        height: 1080px;
        display: grid;
        place-items: center;
        background: #f6f7fb;
        font-family: Inter, system-ui, sans-serif;
      }
      .hf-ui-spinner {
        display: inline-flex;
        align-items: center;
        gap: 22px;
        padding: 34px 42px;
        border: 1px solid #e4e4e7;
        border-radius: 999px;
        background: #fff;
        box-shadow: 0 24px 70px rgba(0, 0, 0, 0.1);
        font-family: Inter, system-ui, sans-serif;
        color: #18181b;
        font:
          850 34px/1 Inter,
          system-ui,
          sans-serif;
      }
      .hf-ui-spinner-ring {
        width: 48px;
        height: 48px;
        border: 6px solid #e4e4e7;
        border-top-color: #18181b;
        border-radius: 999px;
      }
      .hf-ui-spinner { zoom: 2.04; } /* qa-zoom */
    </style>
  </head>
  <body>
    <div
      id="demo"
      data-composition-id="spinner-demo"
      data-start="0"
      data-width="1920"
      data-height="1080"
      data-duration="5"
    >
      <div class="hf-ui-spinner">
        <span class="hf-ui-spinner-ring"></span><span>Rendering</span>
      </div>
      <script>
        const tl = gsap.timeline({ paused: true });
        tl.to(".hf-ui-spinner-ring", { rotate: 1080, duration: 2.4, ease: "none" }, 0.2);
        window.__timelines = window.__timelines || {};
        window.__timelines["spinner-demo"] = tl;
      </script>
    </div>
  </body>
</html>
