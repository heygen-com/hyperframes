<!doctype html>
<!--
  typed-prompt demo. Generous centered mount (88% x 70%) on a light editorial
  backdrop: the prompt card gets real presence in the frame while the human
  cadence and non-default text prove the variable path.
-->
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1920, height=1080" />
    <title>typed-prompt Demo</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html,
      body {
        width: 1920px;
        height: 1080px;
        overflow: hidden;
        background: var(--bg, #f4f6f9);
      }

      #root {
        --bg: #f4f6f9;
        --fg: #14161b;
        --surface: #ffffff;
        --border: #dfe4ec;
        --brand: #1d4ed8;
        --accent: #0284c7;
        --font-mono: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
        position: relative;
        width: 1920px;
        height: 1080px;
        overflow: hidden;
        background: radial-gradient(
          ellipse at 50% 40%,
          #ffffff 0%,
          var(--bg, #f4f6f9) 70%
        );
      }

      .mount-card {
        width: 88%;
        height: 70%;
        left: 6%;
        top: 15%;
        container-type: size;
        overflow: hidden;
        border: 1px solid var(--border, #dfe4ec);
        border-radius: 28px;
        background: var(--surface, #ffffff);
        box-shadow: 0 30px 80px rgba(20, 22, 27, 0.1);
      }
    </style>
  </head>
  <body>
    <div
      id="root"
      data-composition-id="typed-prompt-demo"
      data-start="0"
      data-width="1920"
      data-height="1080"
      data-duration="4"
      data-fps="30"
    >
      <div
        id="typed-prompt-mount"
        class="mount-card clip"
        data-composition-id="typed-prompt"
        data-composition-src="./typed-prompt.html"
        data-variable-values='{"text":"Summarize the Q3 revenue report","cadence":"human","accent":"violet"}'
        data-start="0"
        data-duration="4"
        data-track-index="0"
        data-width="1690"
        data-height="756"
      ></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      window.__timelines = window.__timelines || {};
      window.__timelines["typed-prompt-demo"] = gsap.timeline({ paused: true });
    </script>
  </body>
</html>
