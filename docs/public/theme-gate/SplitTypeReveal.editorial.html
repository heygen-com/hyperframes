<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1920, height=1080" />
    <title>Staggered Fade Up - Demo</title>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        width: 1920px;
        height: 1080px;
        overflow: hidden;
      }
      #demo {
        width: 1920px;
        height: 1080px;
        display: grid;
        place-items: center;
        background: var(--bg, #f5f5f4);
        font-family: var(--font-body, Inter, system-ui, sans-serif);
      }
      /* ponytail: zoom on .demo-frame (not a GSAP target) to fill ~65% of frame */
      .demo-frame {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 28px;
        padding: 72px 96px;
        zoom: 1.9;
      }
      .demo-label {
        font-size: 13px;
        font-weight: 500;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        color: var(--muted, #71717a);
      }
      .hf-remocn-staggered-fade-up {
        color: var(--fg, #18181b);
        font-family: var(--font-display, Inter, system-ui, sans-serif);
        font-weight: 900;
        letter-spacing: -0.04em;
      }
      .hf-remocn-staggered-fade-up {
        display: flex;
        flex-wrap: wrap;
        gap: 14px 18px;
        font-size: 72px;
        line-height: 1.05;
        max-width: 680px;
        justify-content: center;
      }
      .hf-remocn-staggered-fade-up span {
        display: inline-block;
        transform: translate(var(--hf-word-x, 0px), var(--hf-word-y, 0px))
          scale(var(--hf-word-scale, 1));
        filter: blur(var(--hf-word-blur, 0px));
        will-change: transform, filter, opacity;
      }
    </style>
    <style data-hyperframes-theme="editorial">
:root, #root, [data-composition-id] {
  --bg: #e9e1d2 !important;
  --fg: #202725 !important;
  --muted: #6c746f !important;
  --surface: #f8f1e5 !important;
  --border: #c9bfad !important;
  --brand: #246b63 !important;
  --accent: #31776f !important;
  --accent-2: #8a6549 !important;
  --font-display: Georgia, "Times New Roman", serif !important;
  --font-body: "Iowan Old Style", "Palatino Linotype", Palatino, Georgia, serif !important;
  --font-mono: "SFMono-Regular", Consolas, "Liberation Mono", monospace !important;
  --radius: 0.9cqmin !important;
  --space-1: 1.1cqmin !important;
  --space-2: 2.2cqmin !important;
  --space-3: 3.8cqmin !important;
  --dur-beat: 0.48s !important;
  --ease-standard: cubic-bezier(0.22, 0.61, 0.36, 1) !important;
  --ease-emphasis: cubic-bezier(0.16, 1, 0.3, 1) !important;
}
  </style>
</head>
  <body>
    <div
      id="demo"
      data-composition-id="staggered-fade-up-demo"
      data-start="0"
      data-width="1920"
      data-height="1080"
      data-duration="5"
    >
      <div class="demo-frame">
        <div class="demo-label">staggered fade up</div>
        <div class="hf-remocn-staggered-fade-up">
          <span>Motion</span><span>that</span><span>tells</span><span>a</span><span>story</span><span>one</span><span>word</span><span>at</span><span>a</span><span>time</span>
        </div>
      </div>
      <script>
        const tl = gsap.timeline({ paused: true });
        const startTime = 0.4;
        tl.fromTo(
          ".hf-remocn-staggered-fade-up span",
          { opacity: 0, "--hf-word-y": "28px", "--hf-word-scale": 0.92, "--hf-word-blur": "6px" },
          {
            opacity: 1,
            "--hf-word-y": "0px",
            "--hf-word-scale": 1,
            "--hf-word-blur": "0px",
            duration: 0.4,
            stagger: 0.18,
            ease: "power3.out",
          },
          startTime,
        );
        tl.set({}, {}, 5);
        window.__timelines = window.__timelines || {};
        window.__timelines["staggered-fade-up-demo"] = tl;
      </script>
    </div>
  </body>
</html>
