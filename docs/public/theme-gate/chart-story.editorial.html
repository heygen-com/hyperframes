<!DOCTYPE html>
<!--
  chart-story demo. Large centered mount (80% x 76%) on a light editorial
  backdrop: the bar chart tells its story at presentation scale, with the
  emphasized bar and unit labels readable across the frame.
-->
<html lang="en">
  <head><style data-hyperframes-text-rendering="true">html,body,*{text-rendering:geometricPrecision}</style>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1920, height=1080">
    <title>chart-story Demo</title>
    <style>* {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html,
      body {
        width: 1920px;
        height: 1080px;
        overflow: hidden;
        background: var(--bg, #f4f6f9);
      }

      #root {
        --bg: #f4f6f9;
        --fg: #14161b;
        --surface: #ffffff;
        --border: #dfe4ec;
        --brand: #1d4ed8;
        --accent: #0284c7;
        --font-mono: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
        position: relative;
        width: 1920px;
        height: 1080px;
        overflow: hidden;
        background: radial-gradient(
          ellipse at 50% 40%,
          #ffffff 0%,
          var(--bg, #f4f6f9) 70%
        );
      }

      .mount-stage {
        width: 80%;
        height: 76%;
        left: 10%;
        top: 12%;
        container-type: size;
        overflow: hidden;
      }

*,
          [data-composition-id="chart-story"] *::before,
          [data-composition-id="chart-story"] *::after {
            box-sizing: border-box;
          }

          [data-composition-id="chart-story"] [data-hf-authored-id="root"] {
            position: absolute;
            inset: 0;
            overflow: hidden;
            container-type: size;
            isolation: isolate;
            color: var(--fg, #f8fafc);
            font-family: var(--font-body, Inter, system-ui, sans-serif);
            pointer-events: none;
          }

          [data-composition-id="chart-story"] .cs-clip {
            position: absolute;
            inset: 0;
            display: grid;
            place-items: center;
            overflow: hidden;
            background: var(--bg, transparent);
          }

          [data-composition-id="chart-story"] .cs-stage {
            position: relative;
            width: 92cqw;
            height: 88cqh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: var(--space-2, 2cqmin);
            will-change: transform, opacity;
          }

          [data-composition-id="chart-story"] .cs-stage svg {
            width: 100%;
            height: 100%;
            display: block;
            overflow: visible;
          }

          [data-composition-id="chart-story"] .cs-mono {
            font-family: var(--font-mono, ui-monospace, "SF Mono", Menlo, Consolas, monospace);
            letter-spacing: 0.03em;
          }

          [data-composition-id="chart-story"] .cs-display {
            font-family: var(--font-display, Inter, system-ui, sans-serif);
            font-weight: 600;
            letter-spacing: -0.02em;
          }

[data-composition-id="chart-story"] {
  --type: bars;
  --data: 12,28,45,61,88;
  --labels: Q1,Q2,Q3,Q4,Q5;
  --emphasize: 4;
  --unit: %;
  --accent: green;
  --exit: none;
}</style>
