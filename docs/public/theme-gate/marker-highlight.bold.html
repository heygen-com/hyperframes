<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1920, height=1080" />
    <title>Marker Highlight - Demo</title>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        width: 1920px;
        height: 1080px;
        overflow: hidden;
      }
      #demo {
        width: 1920px;
        height: 1080px;
        display: grid;
        place-items: center;
        background: var(--bg, #f7f7f8);
        font-family: var(--font-body, Inter, system-ui, sans-serif);
      }
      .demo-frame {
        display: grid;
        place-items: center;
        min-width: 900px;
        min-height: 500px;
        padding: 64px;
        /* ponytail: scale wrapper only - GSAP targets children, not this element */
        transform: scale(3.5);
      }
      .hf-remocn-marker-highlight {
        color: var(--fg, #18181b);
        font-family: var(--font-display, Inter, system-ui, sans-serif);
        font-weight: 900;
        letter-spacing: -0.04em;
      }
      .hf-remocn-marker-highlight {
        position: relative;
        display: inline-grid;
        padding: 8px 12px;
        font-size: 64px;
      }
      .hf-remocn-marker-highlight mark {
        position: absolute;
        inset: auto 0 9px;
        height: 24px;
        border-radius: 4px;
        background: var(--accent, #fde047);
        transform: scaleX(var(--hf-marker-progress, 1));
        transform-origin: left center;
      }
      .hf-remocn-marker-highlight span {
        --mh-ink: 1;
        position: relative;
        color: color-mix(
          in srgb,
          var(--muted, #71717a) calc((1 - var(--mh-ink)) * 100%),
          var(--fg, #18181b) calc(var(--mh-ink) * 100%)
        );
      }
    </style>
    <style data-hyperframes-theme="bold">
:root, #root, [data-composition-id] {
  --bg: #080611 !important;
  --fg: #fff8ff !important;
  --muted: #b6a9ca !important;
  --surface: #1b1230 !important;
  --border: #493668 !important;
  --brand: #ff3d81 !important;
  --accent: #7c5cff !important;
  --accent-2: #00d4ff !important;
  --font-display: Impact, Haettenschweiler, "Arial Narrow Bold", sans-serif !important;
  --font-body: Inter, "Helvetica Neue", Arial, sans-serif !important;
  --font-mono: "SFMono-Regular", Consolas, "Liberation Mono", monospace !important;
  --radius: 1.4cqmin !important;
  --space-1: 1.2cqmin !important;
  --space-2: 2.6cqmin !important;
  --space-3: 4.6cqmin !important;
  --dur-beat: 0.32s !important;
  --ease-standard: cubic-bezier(0.16, 1, 0.3, 1) !important;
  --ease-emphasis: cubic-bezier(0.34, 1.56, 0.64, 1) !important;
}
  </style>
</head>
  <body>
    <div
      id="demo"
      data-composition-id="marker-highlight-demo"
      data-start="0"
      data-width="1920"
      data-height="1080"
      data-duration="5"
    >
      <div class="demo-frame">
        <div class="hf-remocn-marker-highlight"><mark></mark><span>Launch ready</span></div>
      </div>
      <script>
        const tl = gsap.timeline({ paused: true });
        const startTime = 0.5;
        tl.fromTo(
          ".hf-remocn-marker-highlight mark",
          { "--hf-marker-progress": 0 },
          { "--hf-marker-progress": 1, duration: 0.42, ease: "power2.out" },
          startTime,
        );
        tl.fromTo(
          ".hf-remocn-marker-highlight span",
          { "--mh-ink": 0 },
          { "--mh-ink": 1, duration: 0.28 },
          startTime + 0.16,
        );
        tl.set({}, {}, 5);
        window.__timelines = window.__timelines || {};
        window.__timelines["marker-highlight-demo"] = tl;
      </script>
    </div>
  </body>
</html>
