[project]
name = "hyperframes-vst-host"
version = "0.1.0"
description = "VST3/AU sidecar host for HyperFrames Studio"
requires-python = ">=3.11"
dependencies = ["pedalboard>=0.9.24", "websockets>=12", "numpy>=1.26"]

[project.scripts]
hyperframes-vst = "hyperframes_vst.__main__:main"

[dependency-groups]
dev = ["pytest>=8", "pytest-asyncio>=0.23"]

[tool.pytest.ini_options]
asyncio_mode = "auto"

[tool.hatch.build.targets.wheel]
packages = ["src/hyperframes_vst"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"
