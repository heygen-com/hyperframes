<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1920, height=1080">
<style>
  html,
  body { margin: 0; width: 1920px; height: 1080px; overflow: hidden; background: #0B132B; }
  [data-composition-id="animejs-test"] { position: relative; width: 1920px; height: 1080px; overflow: hidden; font-family: monospace; }
  .clip { position: absolute; inset: 0; }
  .box { width: 120px; height: 120px; position: absolute; border-radius: 12px; }
  .dot { width: 16px; height: 16px; border-radius: 50%; background: #1C2541; position: absolute; }
  #label { position: absolute; top: 40px; left: 60px; color: #BBFBFF; font-size: 28px; font-weight: bold; opacity: 0; }
</style>
<script src="https://cdn.jsdelivr.net/npm/animejs@4.5.0/dist/bundles/anime.umd.min.js"></script>
</head>
<body>
<div id="root" data-composition-id="animejs-test" data-width="1920" data-height="1080" data-start="0" data-duration="6">
  <div class="clip" data-start="0" data-duration="6">

    <div id="label" data-det-target="label">anime.js adapter test</div>

    <!-- Boxes for transform tests -->
    <div class="box" id="box-a" data-det-target="box-a" style="left:200px;top:300px;background:#5409DA;opacity:0;"></div>
    <div class="box" id="box-b" data-det-target="box-b" style="left:400px;top:300px;background:#FF6D00;opacity:0;"></div>
    <div class="box" id="box-c" data-det-target="box-c" style="left:600px;top:300px;background:#4E71FF;opacity:0;"></div>

    <!-- Dot grid for stagger test -->
    <div id="dot-container" style="position:absolute;right:100px;top:200px;"></div>
  </div>

  <script>
    // Generate dot grid
    const container = document.getElementById('dot-container');
    for (let row = 0; row < 6; row++) {
      for (let col = 0; col < 8; col++) {
        const dot = document.createElement('div');
        dot.className = 'dot';
        dot.dataset.detTarget = 'dot';
        dot.style.left = (col * 40) + 'px';
        dot.style.top = (row * 40) + 'px';
        container.appendChild(dot);
      }
    }

    // Timeline 1: label + box entrances (0-3s)
    const tl1 = anime.createTimeline({ autoplay: false });
    tl1
      .add('#label', { opacity: [0, 1], translateY: [-30, 0], duration: 400, ease: 'out(4)' }, 200)
      .add('#box-a', { opacity: [0, 1], scale: [0, 1], rotate: [-90, 0], duration: 500, ease: 'out(5)' }, 500)
      .add('#box-b', { opacity: [0, 1], scale: [0, 1], rotate: [90, 0], duration: 500, ease: 'out(5)' }, 700)
      .add('#box-c', { opacity: [0, 1], scale: [0, 1], translateY: [80, 0], duration: 500, ease: 'out(3)' }, 900);

    // Timeline 2: CSS transforms on boxes (2-5s), authored at global positions.
    const tl2 = anime.createTimeline({ autoplay: false });
    tl2
      .add('#box-a', { rotate: 360, duration: 2000, ease: 'inOut(2)' }, 2000)
      .add('#box-b', { skewX: 25, scale: 1.3, duration: 1500, ease: 'inOut(3)' }, 2200)
      .add('#box-c', { rotate: -180, translateX: 100, duration: 1800, ease: 'inOut(2)' }, 2400);

    // Timeline 3: stagger wave on dots (3-6s), authored at global positions.
    const tl3 = anime.createTimeline({ autoplay: false });
    tl3.add('.dot', {
      backgroundColor: '#5409DA',
      scale: [1, 2.5, 1],
      duration: 600,
      ease: 'out(2)',
      delay: anime.stagger(30, { grid: [8, 6], from: 'center' }),
    }, 3000);
    tl3.add('.dot', {
      backgroundColor: '#FF6D00',
      scale: [1, 2, 1],
      duration: 500,
      ease: 'in(2)',
      delay: anime.stagger(25, { grid: [8, 6], from: 'edges' }),
    }, 4500);

    hyperframesAnime.register('animejs-adapter-intro', tl1, { labels: { start: 0, end: 3 } });
    hyperframesAnime.register('animejs-adapter-transforms', tl2, { labels: { start: 2, end: 5 } });
    hyperframesAnime.register('animejs-adapter-stagger', tl3, { labels: { start: 3, end: 6 } });
  </script>
</div>
</body>
</html>
