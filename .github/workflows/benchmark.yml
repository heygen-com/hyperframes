name: Performance Benchmark
on: [push, pull_request]
jobs:
  benchmark:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - name: Build time
        run: |
          START=$(date +%s%N)
          npm run build 2>/dev/null || echo "Build step (may not exist)"
          END=$(date +%s%N)
          echo "Build time: $(( (END - START) / 1000000 ))ms"
      - name: Bundle size
        run: |
          npx tsc --noEmit 2>/dev/null || true
          echo "TypeScript check complete"
