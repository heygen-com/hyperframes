pre-commit:
  parallel: true
  commands:
    lint:
      glob: "*.{js,jsx,ts,tsx}"
      run: bunx oxlint {staged_files}
    format:
      glob: "*.{js,jsx,ts,tsx,json,css,md,yaml,yml}"
      run: bunx oxfmt --check {staged_files}
    typecheck:
      glob: "*.{ts,tsx}"
      run: cd packages/core && bunx tsc --noEmit && cd ../studio && bunx tsc --noEmit

commit-msg:
  commands:
    commitlint:
      run: bunx commitlint --edit "{1}"
