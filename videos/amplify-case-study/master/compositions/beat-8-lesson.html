<template id="beat-8-lesson-template">
  <div
    id="amplifier-case-study-beat-8"
    class="b8-root"
    data-composition-id="amplifier-case-study-beat-8"
    data-start="0"
    data-duration="9"
    data-width="1920"
    data-height="1080"
  >
    <div class="b8-quote">
      <div class="b8-q-line">
        <span class="b8-q-word">The</span>
        <span class="b8-q-word b8-q-shape">shape</span>
        <span class="b8-q-word">of</span>
        <span class="b8-q-word">the</span>
        <span class="b8-q-word">schema</span>
      </div>
      <div class="b8-q-line">
        <span class="b8-q-word">is</span>
        <span class="b8-q-word">the</span>
        <span class="b8-q-word b8-q-shape">shape</span>
        <span class="b8-q-word">of</span>
        <span class="b8-q-word">the</span>
        <span class="b8-q-word b8-q-ceiling">ceiling.</span>
      </div>
    </div>

    <div class="b8-cta">
      <img class="b8-cta-qr" src="../assets/cta-qr.svg" alt="" />
      <div class="b8-cta-text">
        <div class="b8-cta-eyebrow">read the full case study</div>
        <div class="b8-cta-url">trilogyai.substack.com/p/we-pulled-the-storyboard-module-and</div>
      </div>
    </div>

    <div class="hf-hairline b8-hairline"></div>

    <style>
      :root {
        --ink: #08090b;
        --ink-elevated: #12141a;
        --ink-line: #1f232c;
        --ink-soft: #2a2f3b;
        --paper: #f5f2ec;
        --paper-muted: #8b8e96;
        --paper-dim: #5a5e68;
        --signal: #22d67a;
        --signal-soft: rgba(34, 214, 122, 0.15);
        --warn: #f4a641;
        --warn-soft: rgba(244, 166, 65, 0.18);
        --code: #7dd3fc;
        --code-soft: rgba(125, 211, 252, 0.15);
        --font-display: "Inter Tight", "Inter", system-ui, sans-serif;
        --font-mono: "JetBrains Mono", "Fira Code", ui-monospace, monospace;
      }

      [data-composition-id="amplifier-case-study-beat-8"] {
        position: absolute;
        inset: 0;
        background: var(--ink);
        color: var(--paper);
        font-family: "Inter Tight", "Inter", system-ui, sans-serif;
        overflow: hidden;
        will-change: opacity;
      }

      /* Pull quote: center-anchored, two lines, massive Inter Tight 600.
         Spec calls for display-xl (168px). At 168px the sentence overflows
         the 1728px content width — drop to 120px so the two lines fit on
         one line each with breathing room while keeping the headline feel. */
      [data-composition-id="amplifier-case-study-beat-8"] .b8-quote {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 1728px;
        text-align: center;
        font-family: "Inter Tight", "Inter", system-ui, sans-serif;
        font-weight: 600;
        font-size: 120px;
        line-height: 1.05;
        letter-spacing: -0.02em;
        color: var(--paper);
      }
      [data-composition-id="amplifier-case-study-beat-8"] .b8-q-line {
        display: block;
        white-space: nowrap;
      }
      [data-composition-id="amplifier-case-study-beat-8"] .b8-q-word {
        display: inline-block;
        margin: 0 18px 0 0;
        will-change: transform, opacity;
      }
      [data-composition-id="amplifier-case-study-beat-8"] .b8-q-shape {
        color: var(--signal);
      }
      [data-composition-id="amplifier-case-study-beat-8"] .b8-q-ceiling {
        color: var(--warn);
      }

      /* CTA card below the quote: QR + text side-by-side.
         Quote half-height ≈ 126px; CTA sits ~64px below that. */
      [data-composition-id="amplifier-case-study-beat-8"] .b8-cta {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, calc(126px + 64px));
        display: flex;
        align-items: center;
        gap: 28px;
        will-change: opacity;
      }
      [data-composition-id="amplifier-case-study-beat-8"] .b8-cta-qr {
        display: block;
        width: 160px;
        height: 160px;
        padding: 12px;
        background: var(--paper);
        border-radius: 8px;
        box-sizing: content-box;
      }
      [data-composition-id="amplifier-case-study-beat-8"] .b8-cta-text {
        display: flex;
        flex-direction: column;
        gap: 10px;
        text-align: left;
      }
      [data-composition-id="amplifier-case-study-beat-8"] .b8-cta-eyebrow {
        font-family: "JetBrains Mono", "Fira Code", ui-monospace, monospace;
        font-weight: 500;
        font-size: 20px;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        color: var(--paper-muted);
      }
      [data-composition-id="amplifier-case-study-beat-8"] .b8-cta-url {
        font-family: "JetBrains Mono", "Fira Code", ui-monospace, monospace;
        font-weight: 500;
        font-size: 26px;
        letter-spacing: 0.01em;
        color: var(--paper);
        white-space: nowrap;
      }

      /* Persistent hairline — final beat, reaches full content width */
      [data-composition-id="amplifier-case-study-beat-8"] .b8-hairline {
        position: absolute;
        bottom: 80px;
        left: 96px;
        height: 1px;
        width: 1728px; /* 1920 - 96*2 outer margins = full content width */
        background: var(--signal);
        transform-origin: left center;
        transform: scaleX(0.85);
        opacity: 0.85;
        will-change: transform, opacity;
      }
    </style>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });
      const ROOT = '[data-composition-id="amplifier-case-study-beat-8"]';

      // Hairline grows from Beat-7 carry-over (~85%) to full content width (100%)
      tl.fromTo(
        ROOT + " .b8-hairline",
        { scaleX: 0.85 },
        {
          scaleX: 1.0,
          duration: 1.0,
          ease: "power2.inOut",
          transformOrigin: "left center",
        },
        0,
      );

      // Pull quote words reveal one at a time
      tl.from(
        ROOT + " .b8-q-word",
        {
          y: 24,
          opacity: 0,
          duration: 0.6,
          ease: "power3.out",
          stagger: 0.18,
        },
        0.5,
      );

      // CTA fades in at t=6.0s
      tl.from(ROOT + " .b8-cta", { opacity: 0, duration: 0.6 }, 6.0);

      // Final fade-to-black at end of beat (t=8.4s).
      // Fading the root naturally fades all children together.
      tl.to(ROOT, { opacity: 0, duration: 0.6 }, 8.4);

      window.__timelines["amplifier-case-study-beat-8"] = tl;
    </script>
  </div>
</template>
