      const tl = gsap.timeline({ paused: true });
      const ROOT = '[data-composition-id="amplifier-case-study-beat-7"]';

      // Label fades in
      tl.from(ROOT + " .b7-label", { opacity: 0, duration: 0.4 }, 0);

      // Cells populate one-by-one with stagger

        ROOT + " .b7-cell:not(.b7-c-caption)",

          scale: 0.96,
          duration: 0.5,
          ease: "power3.out",
          stagger: 0.4,

        0.3,
      );

      // Cell 2 counter: 0 → 42 looping.
      // Cycle = 2.5s + 1s repeatDelay = 3.5s. Window 3.0 → 12.0 = 9s → 2 reps.
      tl.fromTo(
        ROOT + " .b7-c2-num",
        { innerText: 0 },
        {
          innerText: 42,
          duration: 2.5,
          snap: { innerText: 1 },
          repeat: 2,
          yoyo: true,
          repeatDelay: 1,
          ease: "power2.out",
        },
        3.0,
      );

      // Cell 4 mesh: slow rotation. 18s/rotation, but only 8.5s remain → partial.
      // Use a faster rotation that completes a few times within the window.
      tl.to(
        ROOT + " .b7-c4-mesh",
        {
          rotation: 360,
          duration: 8.5,
          ease: "none",
          transformOrigin: "center center",
        },
        3.5,
      );

      // Cell 5 dot pulse. Cycle 0.6s × 2 (yoyo) = 1.2s.
      // Window 3.8 → 12.0 = 8.2s → ~6 yoyo pairs (13 reps).
      tl.to(
        ROOT + " .b7-c5-dot",
        {
          opacity: 0.3,
          duration: 0.6,
          ease: "sine.inOut",
          yoyo: true,
          repeat: 13,
        },
        3.8,
      );

      // Caption at t=7.0s — word-by-word reveal
      tl.from(
        ROOT + " .b7-cap-word",

          y: 24,
          opacity: 0,
          duration: 0.5,
          ease: "power3.out",
          stagger: 0.12,
        },
        7.0,
      );
