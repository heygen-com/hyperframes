    <style>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });

      // Top-right label fades in immediately
      tl.from(
        '[data-composition-id="amplifier-case-study-beat-2"] .b2-label',
        { opacity: 0, duration: 0.4 },
        0,
      );

      // Cells populate one-by-one with subtle scale
      tl.from(
        '[data-composition-id="amplifier-case-study-beat-2"] .b2-cell:not(.b2-cell--caption)',
        {
          opacity: 0,
          scale: 0.96,
          duration: 0.5,
          ease: "power3.out",
          stagger: 0.12,
        },
        0.3,
      );

      // Hairline carries over from Beat 1's end-state (scaleX 1.0 of an 8% width
      // box) and grows to fill its new 25% width box (12% absolute growth).
      tl.fromTo(
        '[data-composition-id="amplifier-case-study-beat-2"] .b2-hairline',
        { scaleX: 0.32 },
        { scaleX: 1.0, duration: 1.6, ease: "power2.out" },
        0.3,
      );

      // All cells "breathe together" — synchronized opacity oscillation 3→5.5s
      tl.to(
        '[data-composition-id="amplifier-case-study-beat-2"] .b2-cell:not(.b2-cell--caption)',
        {
          keyframes: [{ opacity: 0.85 }, { opacity: 1.0 }, { opacity: 0.85 }],
          duration: 2.5,
          ease: "sine.inOut",
          repeat: 0,
        },
        3,
      );

      // Caption appears in cell 6 at 4s — word-by-word reveal
      tl.from(
        '[data-composition-id="amplifier-case-study-beat-2"] .b2-caption .b2-word',
        {
          y: 24,
          opacity: 0,
          duration: 0.4,
          ease: "power3.out",
          stagger: 0.1,
        },
        4,
      );

      // At 9.5s, cells dim and cell 3 enlarges/zooms toward viewer
      tl.to(
        '[data-composition-id="amplifier-case-study-beat-2"] .b2-cell:not(.b2-cell--zoom):not(.b2-cell--caption)',
        { opacity: 0.3, duration: 0.5 },
        9.5,
      );
      tl.to(
        '[data-composition-id="amplifier-case-study-beat-2"] .b2-cell--zoom',
        { scale: 2.4, zIndex: 10, duration: 0.5, ease: "power2.in" },
        9.5,
      );

      window.__timelines["amplifier-case-study-beat-2"] = tl;
    </script>
