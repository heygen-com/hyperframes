<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Amplifier Case Study — Master</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;500;600&family=JetBrains+Mono:wght@400;500&family=Lora:ital,wght@1,600&display=swap"
      rel="stylesheet"
    />
    <style>
      /* Design tokens — mirrors shared/tokens.css. Inlined so master/ is
         self-contained for `hyperframes validate` (which serves only from
         the project root). Keep in sync with ../shared/tokens.css. */
      :root {
        --ink: #08090b;
        --ink-elevated: #12141a;
        --ink-line: #1f232c;
        --ink-soft: #2a2f3b;
        --paper: #f5f2ec;
        --paper-muted: #8b8e96;
        --paper-dim: #5a5e68;
        --signal: #22d67a;
        --signal-soft: rgba(34, 214, 122, 0.15);
        --warn: #f4a641;
        --warn-soft: rgba(244, 166, 65, 0.18);
        --code: #7dd3fc;
        --code-soft: rgba(125, 211, 252, 0.15);
        --font-display: "Inter Tight", "Inter", system-ui, sans-serif;
        --font-mono: "JetBrains Mono", "Fira Code", ui-monospace, monospace;
      }
      [data-composition-id^="amplifier-case-study"] {
        position: absolute;
        inset: 0;
        background: var(--ink);
        color: var(--paper);
        font-family: "Inter Tight", "Inter", system-ui, sans-serif;
        overflow: hidden;
      }
      .hf-hairline {
        position: absolute;
        bottom: 80px;
        left: 96px;
        height: 1px;
        background: var(--signal);
        transform-origin: left center;
      }
      html,
      body {
        margin: 0;
        padding: 0;
        width: 1920px;
        height: 1080px;
        background: #08090b;
      }
      #stage {
        position: relative;
        width: 1920px;
        height: 1080px;
        overflow: hidden;
        background: var(--ink);
      }
      .clip {
        position: absolute;
        inset: 0;
      }
    </style>
  </head>
  <body>
    <div
      id="stage"
      data-composition-id="amplifier-case-study-master"
      data-start="0"
      data-duration="87"
      data-width="1920"
      data-height="1080"
    >

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      // Master timeline is just a paused stub — each beat owns its own
      // child timeline. The runtime activates each clip when the playhead
      // enters its data-start..data-start+data-duration window.
      window.__timelines = window.__timelines || {};
      window.__timelines["amplifier-case-study-master"] = gsap.timeline({
        paused: true,
      });
    </script>

</html>
